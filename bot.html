<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>APX V16 DIAMOND</title>
    <style>
        :root { --bg: #0a0a0a; --primary: #00ffc3; --gray: #1a1a1a; }
        body { background: var(--bg); color: #eee; font-family: sans-serif; margin: 0; padding: 10px; text-align: center; }
        
        .chart-box { 
            background: #000; border: 1px solid var(--gray); border-radius: 10px; 
            display: inline-block; position: relative; margin-top: 10px;
        }
        
        .dashboard { 
            display: flex; justify-content: space-around; background: #111; 
            padding: 15px; margin: 15px auto; width: 95%; border-radius: 8px;
        }
        .stat b { display: block; font-size: 18px; color: var(--primary); }
        .stat span { font-size: 10px; color: #666; }

        .btns button { padding: 15px 40px; margin: 5px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .start { background: var(--primary); color: #000; }
        .stop { background: #222; color: #fff; }

        table { width: 100%; font-size: 12px; margin-top: 15px; border-collapse: collapse; }
        td, th { padding: 10px; border-bottom: 1px solid #111; text-align: left; }
        .win { color: #00ff9d; } .loss { color: #ff3b3b; } .mtg { color: #ffea00; }
    </style>
</head>
<body>

    <h3 style="color:var(--primary); letter-spacing: 2px;">APX V16 DIAMOND</h3>

    <div class="chart-box">
        <canvas id="apxCanvas" width="360" height="220"></canvas>
    </div>

    <div class="dashboard">
        <div class="stat"><span>WIN</span><b id="w_c">0</b></div>
        <div class="stat"><span>LOSS</span><b id="l_c">0</b></div>
        <div class="stat"><span>MTG1</span><b id="m_c">0</b></div>
        <div class="stat"><span>ACC</span><b id="a_c">0%</b></div>
    </div>

    <div class="btns">
        <button class="start" onclick="powerOn()">🚀 START</button>
        <button class="stop" onclick="location.reload()">STOP</button>
    </div>

    <table>
        <thead><tr><th>TIME</th><th>PAIR</th><th>SIG</th><th>RESULT</th></tr></thead>
        <tbody id="log"></tbody>
    </table>

<script>
    const API = "https://bot1.mkapi009.workers.dev/candles?pair=";
    const SEND = "https://bot1.mkapi009.workers.dev/send";
    const pairs = ["USDPKR_otc", "USDBDT_otc", "USDINR_otc", "USDBRL_otc"];
    
    let stats = { w:0, l:0, m:0, t:0 };

    async function tg(fd) { try { await fetch(SEND, {method:"POST", body:fd}); } catch(e){} }

    function draw(data, pair, sig, isMtg = false) {
        const c = document.getElementById("apxCanvas"), ctx = c.getContext("2d");
        ctx.fillStyle = "#000"; ctx.fillRect(0,0,360,220);
        let max = Math.max(...data.map(x=>x.high)), min = Math.min(...data.map(x=>x.low));

        // APX Endorsement
        ctx.fillStyle = "rgba(0,255,195,0.4)"; ctx.font = "bold 11px Arial";
        ctx.fillText("APX PREMIUM", 15, 25);
        
        // Small Font Info (Top Right)
        ctx.fillStyle = "#555"; ctx.font = "9px Arial";
        let now = new Date();
        ctx.fillText(`${pair} | ${now.toLocaleDateString()} | ${now.toLocaleTimeString()}`, 210, 20);

        // Candles
        data.forEach((can, i) => {
            let x = i * 8 + 35;
            let o = 180 - (can.open-min)/(max-min)*140;
            let cl = 180 - (can.close-min)/(max-min)*140;
            ctx.strokeStyle = "#222"; ctx.beginPath(); ctx.moveTo(x+3, 180-(can.high-min)/(max-min)*140); ctx.lineTo(x+3, 180-(can.low-min)/(max-min)*140); ctx.stroke();
            ctx.fillStyle = can.close > can.open ? "#00ff9d" : "#ff3b3b";
            ctx.fillRect(x, Math.min(o,cl), 5, Math.max(Math.abs(o-cl), 2));
        });

        // Direction Arrow
        ctx.fillStyle = isMtg ? "#ffea00" : (sig === "CALL" ? "#00ff9d" : "#ff3b3b");
        ctx.font = "bold 14px Arial";
        ctx.fillText(isMtg ? "⚠️ MTG1 " + sig : "🎯 " + sig, 270, 205);
    }

    async function startTrade(forcePair = null, isMtg = false) {
        let pair = forcePair || pairs[Math.floor(Math.random()*pairs.length)];
        let res = await fetch(API + pair);
        let candles = (await res.json()).slice(-40);
        let last = candles[candles.length-1], prev = candles[candles.length-2];
        let sig = last.close > prev.close ? "CALL" : "PUT";
        
        draw(candles, pair, sig, isMtg);

        document.getElementById("apxCanvas").toBlob(async (blob) => {
            let fd = new FormData();
            fd.append("image", blob, "apx.png");
            fd.append("text", `${isMtg ? '⚠️ *MTG1 ALERT*' : '🚀 *SIGNAL RECEIVED*'}\n\n📊 *Pair:* ${pair}\n🎯 *Side:* ${sig}\n📝 *Type:* ${isMtg ? 'Martingale' : 'Fresh'}\n\n📉 _Start:* ${last.open} | _Live:* ${last.close}\n💎 *Powered by APX Premium*`);
            await tg(fd);
        });

        // Wait for candle close (61s)
        setTimeout(() => check(pair, sig, isMtg), 61000);
    }

    async function check(pair, sig, wasMtg) {
        let res = await fetch(API + pair);
        let data = await res.json();
        let c = data[data.length-1];
        let win = (sig === "CALL" && c.close > c.open) || (sig === "PUT" && c.close < c.open);
        
        if (win) {
            if(wasMtg) stats.m++; else stats.w++;
            stats.t++;
            finish(pair, sig, wasMtg ? "MTG1 WIN" : "WIN");
        } else {
            if (!wasMtg) {
                // Trigger MTG1 if first loss
                startTrade(pair, true);
            } else {
                stats.l++;
                stats.t++;
                finish(pair, sig, "LOSS");
            }
        }
    }

    function finish(p, s, r) {
        document.getElementById("w_c").innerText = stats.w;
        document.getElementById("l_c").innerText = stats.l;
        document.getElementById("m_c").innerText = stats.m;
        document.getElementById("a_c").innerText = (( (stats.w+stats.m) / stats.t)*100).toFixed(1) + "%";
        
        let row = `<tr><td>${new Date().toLocaleTimeString()}</td><td>${p}</td><td>${s}</td><td class="${r.includes('WIN')?'win':'loss'}">${r}</td></tr>`;
        document.getElementById("log").insertAdjacentHTML('afterbegin', row);

        let fd = new FormData();
        fd.append("text", `${r.includes('WIN') ? '✅' : '❌'} *RESULT: ${r}*\n\n📊 Pair: ${p}\n💰 Session Accuracy: ${document.getElementById("a_c").innerText}\n💎 *APX Premium: Quality signals only!*`);
        tg(fd);
    }

    async function powerOn() {
        let fd = new FormData();
        fd.append("text", "🌟 *APX V16 DIAMOND ACTIVE*\n[🟥🟧🟨🟩🟦🟪]\n\n_MTG1 Auto-Recovery Enabled._");
        await tg(fd);
        startTrade(); setInterval(() => { if(stats.t % 2 === 0) startTrade(); }, 130000);
    }
</script>
</body>
</html>
