<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>APX AUTO OTC SIGNAL BOT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; text-align: center; }
        #bot-container { border: 2px solid #333; width: 400px; margin: 50px auto; padding: 20px; border-radius: 15px; background: #1a1a1a; }
        .signal-info { font-size: 24px; font-weight: bold; margin: 20px 0; padding: 10px; border: 1px dashed #555; }
        .buy { color: #00ff00; }
        .sell { color: #ff0000; }
        iframe { display: none; } /* Background mein data lene ke liye */
    </style>
</head>
<body>

    <div id="bot-container">
        <h2>🤖 APX OTC AUTO BOT</h2>
        <p>Target: <b>USDBDT OTC</b></p>
        <div id="capture-area">
            <div class="signal-info">
                Asset: <span id="asset-name">USDBDT_otc</span><br>
                Signal: <span id="signal-text">ANALYZING...</span>
            </div>
        </div>
        <p id="status">Waiting for Signal from Radit.top...</p>
        <button onclick="fetchAndSend()" style="padding:10px 20px; cursor:pointer; background:#007bff; color:white; border:none; border-radius:5px;">Manual Force Send</button>
    </div>

    <iframe id="signal-source" src="https://radit.top/otc.php?asset=USDBDT_otc"></iframe>

    <script>
        async function fetchAndSend() {
            const status = document.getElementById('status');
            const signalText = document.getElementById('signal-text');
            
            status.innerText = "🔍 Fetching Data from Source...";
            
            // Note: Radit.top CORS block kar sakta hai, isliye hum iframe ya proxy use karte hain.
            // Yahan hum dummy logic de rahe hain jo aapke pattern ko capture karega.
            
            // Fake analysis for demo (Actual integration needs Proxy or local scrape)
            const directions = ["BUY 🟢", "SELL 🔴"];
            const currentSignal = directions[Math.floor(Math.random() * directions.length)];
            
            signalText.innerText = currentSignal;
            signalText.className = "signal-info " + (currentSignal.includes("BUY") ? "buy" : "sell");

            status.innerText = "📸 Generating Image...";

            try {
                // Screenshot lena area ka
                const canvas = await html2canvas(document.querySelector("#capture-area"));
                const base64Image = canvas.toDataURL("image/png").split(',')[1];

                status.innerText = "📤 Sending to Telegram Worker...";

                // Worker ko bhej dena
                const res = await fetch("https://signal.mkapi009.workers.dev/send", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        pair: "USDBDT_otc",
                        dir: currentSignal,
                        image: base64Image
                    })
                });

                const result = await res.json();
                if(result.ok) status.innerText = "✅ Signal Sent to Telegram!";
                else status.innerText = "❌ Worker Error!";
                
            } catch (err) {
                status.innerText = "❌ Error: " + err.message;
            }
        }

        // Automatic check har 1 minute baad
        setInterval(fetchAndSend, 60000);
    </script>
</body>
</html>
