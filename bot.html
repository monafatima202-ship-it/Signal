<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APX V14 ELITE</title>
    <style>
        :root { --bg: #05070a; --primary: #00ffc3; --buy: #00ff9d; --sell: #ff3b3b; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; text-align: center; margin: 0; padding: 10px; }
        
        .brand-header { font-size: 18px; font-weight: 800; color: var(--primary); margin-bottom: 15px; letter-spacing: 1px; }
        
        /* Quantex Style Chart Box */
        .chart-frame {
            background: #000; border: 1px solid #111; border-radius: 8px;
            position: relative; display: inline-block; overflow: hidden;
        }

        .dashboard {
            display: flex; justify-content: space-around; width: 95%; 
            margin: 15px auto; background: #0a0c10; padding: 15px;
            border-radius: 8px; border-bottom: 2px solid #111;
        }
        .stat-group span { display: block; font-size: 10px; color: #444; text-transform: uppercase; }
        .stat-group b { font-size: 18px; color: #eee; }

        .action-btns button {
            padding: 14px 40px; margin: 10px; border: none; border-radius: 6px;
            font-weight: 800; cursor: pointer; transition: 0.2s;
        }
        .btn-start { background: var(--primary); color: #000; }
        .btn-stop { background: #1a1a1a; color: #eee; }

        .history-table { width: 100%; margin-top: 15px; border-spacing: 0; font-size: 13px; }
        .history-table th { color: #333; padding: 12px; border-bottom: 1px solid #111; text-align: left; }
        .history-table td { padding: 12px; border-bottom: 1px solid #080808; text-align: left; }
        .win-glow { color: var(--buy); font-weight: bold; text-shadow: 0 0 5px rgba(0,255,157,0.2); }
        .loss-glow { color: var(--sell); font-weight: bold; }
    </style>
</head>
<body>

    <div class="brand-header">💎 APX ULTRA V14 PRO</div>
    
    <div class="chart-frame">
        <canvas id="quantexChart" width="360" height="220"></canvas>
    </div>

    <div class="dashboard">
        <div class="stat-group"><span>Wins</span><b id="w_val">0</b></div>
        <div class="stat-group"><span>Losses</span><b id="l_val">0</b></div>
        <div class="stat-group"><span>Acc %</span><b id="a_val" style="color:var(--primary)">0%</b></div>
    </div>

    <div class="action-btns">
        <button class="btn-start" onclick="startSystem()">🚀 START ENGINE</button>
        <button class="btn-stop" onclick="stopSystem()">🛑 STOP</button>
    </div>

    <table class="history-table">
        <thead><tr><th>TIME</th><th>PAIR</th><th>SIGNAL</th><th>RESULT</th></tr></thead>
        <tbody id="log_rows"></tbody>
    </table>

<script>
    const API = "https://bot1.mkapi009.workers.dev/candles?pair=";
    const TELEGRAM = "https://bot1.mkapi009.workers.dev/send";
    const pairs = ["USDPKR_otc", "USDBDT_otc", "USDINR_otc", "USDARS_otc"];
    
    let engineActive = false, session = { w:0, l:0, t:0 };

    async function tgNotify(data) {
        try { await fetch(TELEGRAM, { method: "POST", body: data }); } catch(e) {}
    }

    function getFormattedTime(offset = 1) {
        let d = new Date(); d.setMinutes(d.getMinutes() + offset);
        return d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
    }

    async function signalFlow() {
        if(!engineActive) return;

        let pair = pairs[Math.floor(Math.random() * pairs.length)];
        let res = await fetch(API + pair);
        let data = (await res.json()).slice(-45);
        
        let last = data[data.length-1], prev = data[data.length-2];
        let sig = last.close > prev.close ? "CALL" : "PUT";
        let entryTime = getFormattedTime(1);

        // 1. Draw Clean Quantex Chart
        drawCleanChart(data, pair, sig, entryTime);
        
        // 2. Send Telegram Signal
        const canvas = document.getElementById("quantexChart");
        canvas.toBlob(async (blob) => {
            let fd = new FormData();
            fd.append("image", blob, "apx_signal.png");
            fd.append("text", `🚀 *APX PREMIUM SIGNAL*\n\n📊 *Pair:* ${pair}\n🕒 *Entry:* ${entryTime}\n🎯 *Direction:* ${sig === 'CALL' ? 'UP 🍏' : 'DOWN 🍎'}\n\n🛰 _Signal Synchronized. Waiting for candle close..._`);
            await tgNotify(fd);
        });

        // 3. WAIT EXACTLY 62 SECONDS (Strict Sync Fix)
        setTimeout(() => getLiveResult(pair, sig), 62000);
    }

    function drawCleanChart(candles, pair, sig, time) {
        const c = document.getElementById("quantexChart"), ctx = c.getContext("2d");
        ctx.fillStyle = "#000"; ctx.fillRect(0,0,360,220);
        let max = Math.max(...candles.map(x=>x.high)), min = Math.min(...candles.map(x=>x.low));
        
        // Professional Endorsement Look
        ctx.fillStyle = "rgba(0,255,195,0.15)"; ctx.font = "bold 9px Arial";
        ctx.fillText("APX PREMIUM ENDORSEMENT", 15, 20);
        ctx.fillText(`${pair} | M1`, 15, 32);

        // Thin, Precise Candles (No more huge bars)
        candles.forEach((can, i) => {
            let x = i * 7 + 45;
            let o = 180 - (can.open-min)/(max-min)*140;
            let cl = 180 - (can.close-min)/(max-min)*140;
            ctx.strokeStyle = "#1a1a1a"; ctx.beginPath(); 
            ctx.moveTo(x+2, 180-(can.high-min)/(max-min)*140); 
            ctx.lineTo(x+2, 180-(can.low-min)/(max-min)*140); ctx.stroke();
            ctx.fillStyle = can.close > can.open ? "#00ff9d" : "#ff3b3b";
            ctx.fillRect(x, Math.min(o, cl), 4, Math.max(Math.abs(o-cl), 1.5));
            // Quantex Dots
            if(i % 6 === 0) { ctx.fillStyle = "#ff00ff"; ctx.beginPath(); ctx.arc(x+2, o-8, 1, 0, 7); ctx.fill(); }
        });

        ctx.fillStyle = sig === "CALL" ? "#00ff9d" : "#ff3b3b";
        ctx.font = "bold 13px Arial"; ctx.fillText(`${sig} @ ${time}`, 250, 205);
        ctx.font = "35px Arial"; ctx.fillText(sig === "CALL" ? "↑" : "↓", 310, 200);
    }

    async function getLiveResult(pair, sig) {
        let res = await fetch(API + pair);
        let j = await res.json();
        let candle = j[j.length-1];
        
        let result = "";
        // Strict Doji = Loss
        if(Math.abs(candle.open - candle.close) < 0.00001) { result = "LOSS (DOJI)"; session.l++; }
        else {
            let isWin = (sig === "CALL" && candle.close > candle.open) || (sig === "PUT" && candle.close < candle.open);
            if(isWin) { result = "WIN"; session.w++; } else { result = "LOSS"; session.l++; }
        }
        
        session.t++;
        updateUI(pair, sig, result);

        // Telegram Result Message
        let txt = result === "WIN" 
            ? `✅ *ITM WINNER!* 💰\n\n📊 *Pair:* ${pair}\n🏆 *Result:* WIN\n✨ _Join APX Premium for 99% accuracy signals!_`
            : `❌ *LOSS ALERT* 🔻\n\n📊 *Pair:* ${pair}\n⚠️ *Result:* ${result}\n🦾 _Don't panic. Next trade will recover!_`;
        
        let fd = new FormData(); fd.append("text", txt);
        await tgNotify(fd);
    }

    function updateUI(p, s, r) {
        let acc = ((session.w / session.t) * 100).toFixed(1);
        document.getElementById("w_val").innerText = session.w;
        document.getElementById("l_val").innerText = session.l;
        document.getElementById("a_val").innerText = acc + "%";
        document.getElementById("log_rows").insertAdjacentHTML('afterbegin', `<tr><td>${new Date().toLocaleTimeString()}</td><td>${p}</td><td>${s}</td><td class="${r==='WIN'?'win-glow':'loss-glow'}">${r}</td></tr>`);
    }

    async function startSystem() {
        engineActive = true;
        let bars = "🟥🟧🟨🟩🟦🟪";
        let welcome = `🌟 *APX V14 DIAMOND ACTIVE* 🌟\n\n[${bars}${bars}]\n📶 *Status:* System Synchronized\n⚡ *Mode:* Zero-Delay Candles\n\n📈 _Engine is warming up..._`;
        let fd = new FormData(); fd.append("text", welcome); await tgNotify(fd);
        alert("🚀 Engine Started!");
        signalFlow(); setInterval(signalFlow, 65000);
    }

    async function stopSystem() {
        engineActive = false;
        let summary = `🛑 *BOT SHUTDOWN* 🛑\n\n📊 *Final Stats:*\n✅ Wins: ${session.w}\n❌ Losses: ${session.l}\n🎯 Accuracy: ${document.getElementById("a_val").innerText}\n\n💎 _APX Premium - Excellence in Trading_`;
        let fd = new FormData(); fd.append("text", summary); await tgNotify(fd);
        alert("🛑 Session Summary Sent.");
    }
</script>
</body>
</html>
