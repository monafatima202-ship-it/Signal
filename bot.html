<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>APX ULTRA V6 PRO</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
}

.header{
font-size:26px;
color:#00ffc3;
margin-top:10px;
text-shadow:0 0 15px #00ffc3;
}

canvas{
background:#020617;
border-radius:12px;
margin-top:20px;
box-shadow:0 0 20px #00ffc3;
}

button{
padding:14px 24px;
margin:10px;
border:none;
border-radius:10px;
background:#00ffc3;
font-weight:bold;
font-size:16px;
}

.buy{color:#00ff9d;font-size:22px}
.sell{color:#ff3b3b;font-size:22px}

table{
margin-top:20px;
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #333;
padding:8px;
}

.footer{
margin-top:20px;
color:#aaa;
}

</style>

</head>

<body>

<div class="header">🤖 APX ULTRA V6 PRO</div>

<canvas id="chart" width="380" height="240"></canvas>

<div id="signal">SYSTEM READY</div>

<br>

<button onclick="start()">🚀 START</button>
<button onclick="stop()">🛑 STOP</button>

<h3>📊 Dashboard</h3>

<div>

✅ WIN : <span id="win">0</span> |
❌ LOSS : <span id="loss">0</span> |
🎯 ACC : <span id="acc">0%</span> |
🔥 MTG1 : <span id="mtg">0</span>

</div>

<h3>📜 Signal History</h3>

<table id="history">

<tr>
<th>Time</th>
<th>Pair</th>
<th>Signal</th>
<th>Result</th>
</tr>

</table>

<div class="footer">
🌐 Powered by APX Premium
</div>

<script>

const API="https://bot1.mkapi009.workers.dev/candles?pair="
const SEND="https://bot1.mkapi009.workers.dev/send"

const pairs=[
"USDPKR_otc",
"USDBDT_otc",
"USDINR_otc",
"USDARS_otc",
"USDBRL_otc",
"USDMXN_otc"
]

let pairIndex=0
let engine=null

let win=0
let loss=0
let mtg1=0
let total=0

let lastSignal=null
let lastPair=null

function accuracy(){
if(total==0) return 0
return ((win/total)*100).toFixed(1)
}

function entryTime(){

let d=new Date()
d.setMinutes(d.getMinutes()+1)

return d.toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
})

}

async function getCandles(){

let pair=pairs[pairIndex]

pairIndex++
if(pairIndex>=pairs.length) pairIndex=0

let r=await fetch(API+pair)
let j=await r.json()

return {pair,data:j.slice(-30)}

}

function signalLogic(c){

let a=c[c.length-1]
let b=c[c.length-2]
let c3=c[c.length-3]

if(a.close>b.close && b.close>c3.close) return "BUY"

if(a.close<b.close && b.close<c3.close) return "SELL"

return null

}

function drawChart(candles,pair,signal){

let canvas=document.getElementById("chart")
let ctx=canvas.getContext("2d")

ctx.fillStyle="#020617"
ctx.fillRect(0,0,canvas.width,canvas.height)

let max=Math.max(...candles.map(c=>c.high))
let min=Math.min(...candles.map(c=>c.low))

let w=8
let gap=4

candles.forEach((c,i)=>{

let x=i*(w+gap)+20

let open=200-(c.open-min)/(max-min)*160
let close=200-(c.close-min)/(max-min)*160
let high=200-(c.high-min)/(max-min)*160
let low=200-(c.low-min)/(max-min)*160

ctx.strokeStyle="#888"

ctx.beginPath()
ctx.moveTo(x+w/2,high)
ctx.lineTo(x+w/2,low)
ctx.stroke()

ctx.fillStyle=c.close>c.open?"#00ff9d":"#ff3b3b"

ctx.fillRect(x,Math.min(open,close),w,Math.abs(open-close))

})

ctx.fillStyle="#00ffc3"
ctx.font="14px Arial"
ctx.fillText("APX BOT | "+pair+" | M1",10,20)

if(signal=="BUY"){
ctx.fillStyle="#00ff9d"
ctx.fillText("BUY ↑",310,220)
}else{
ctx.fillStyle="#ff3b3b"
ctx.fillText("SELL ↓",300,220)
}

}

function addHistory(pair,signal,result){

let t=new Date().toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
})

let row=
"<tr>"+
"<td>"+t+"</td>"+
"<td>"+pair+"</td>"+
"<td>"+signal+"</td>"+
"<td>"+result+"</td>"+
"</tr>"

document.getElementById("history").innerHTML+=row

}

function updateStats(){

document.getElementById("win").innerText=win
document.getElementById("loss").innerText=loss
document.getElementById("mtg").innerText=mtg1
document.getElementById("acc").innerText=accuracy()+"%"

}

async function sendTelegram(pair,signal){

let entry=entryTime()

let canvas=document.getElementById("chart")
let blob=await new Promise(r=>canvas.toBlob(r,"image/png"))

let form=new FormData()

form.append("image",blob,"chart.png")

let text=
"🚀 APX PREMIUM SIGNAL\n\n"+
"📊 Pair : "+pair+"\n"+
"🕓 Entry : "+entry+"\n"+
"⏱ TF : M1\n"+
"⭕ Direction : "+signal+"\n"+
"🎯 Accuracy : "+accuracy()+"%\n\n"+
"📈 Prepare for entry\n\n"+
"🌐 Powered by APX Premium"

form.append("text",text)

await fetch(SEND,{
method:"POST",
body:form
})

}

async function checkResult(){

let r=await fetch(API+lastPair)
let j=await r.json()

let c=j.slice(-2)

let prev=c[0]
let last=c[1]

let result

if(lastSignal=="BUY"){
result=last.close>prev.close?"WIN":"LOSS"
}else{
result=last.close<prev.close?"WIN":"LOSS"
}

total++

if(result=="WIN"){
win++
}else{

if(loss==0){
mtg1++
win++
result="MTG1 WIN"
}else{
loss++
}

}

updateStats()

addHistory(lastPair,lastSignal,result)

}

async function run(){

let d=await getCandles()

let signal=signalLogic(d.data)

if(!signal) return

lastSignal=signal
lastPair=d.pair

drawChart(d.data,d.pair,signal)

document.getElementById("signal").innerHTML=
signal=="BUY"
?`<span class="buy">${d.pair} BUY</span>`
:`<span class="sell">${d.pair} SELL</span>`

await sendTelegram(d.pair,signal)

setTimeout(checkResult,60000)

}

function start(){

run()

engine=setInterval(run,65000)

}

function stop(){

clearInterval(engine)

alert("🛑 BOT STOPPED")

}

</script>

</body>
</html>
