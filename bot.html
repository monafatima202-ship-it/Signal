<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>APX ULTRA DASHBOARD</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
}

canvas{
background:#020617;
border-radius:10px;
box-shadow:0 0 25px #00ffc3;
}

</style>

</head>

<body>

<h2>🤖 APX ULTRA DASHBOARD</h2>

<canvas id="chart" width="380" height="240"></canvas>

<script>

const API="https://bot1.mkapi009.workers.dev/candles?pair=USDBDT_otc"

async function load(){

let r=await fetch(API)

let data=await r.json()

draw(data.slice(-30))

}

function draw(c){

let canvas=document.getElementById("chart")
let ctx=canvas.getContext("2d")

ctx.fillStyle="#020617"
ctx.fillRect(0,0,canvas.width,canvas.height)

let max=Math.max(...c.map(x=>x.high))
let min=Math.min(...c.map(x=>x.low))

let w=8
let gap=4

c.forEach((k,i)=>{

let x=i*(w+gap)+20

let open=200-(k.open-min)/(max-min)*160
let close=200-(k.close-min)/(max-min)*160
let high=200-(k.high-min)/(max-min)*160
let low=200-(k.low-min)/(max-min)*160

ctx.strokeStyle="#888"

ctx.beginPath()
ctx.moveTo(x+w/2,high)
ctx.lineTo(x+w/2,low)
ctx.stroke()

ctx.fillStyle=k.close>k.open?"#00ff9d":"#ff3b3b"

ctx.fillRect(x,Math.min(open,close),w,Math.abs(open-close))

})

}

load()

</script>

</body>
</html>
