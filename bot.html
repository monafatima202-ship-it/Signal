<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>APX PREMIUM BOT</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
}

.header{
font-size:26px;
color:#00ffc3;
margin-top:15px;
}

.clock{
color:#22c55e;
margin-bottom:20px;
}

select,input{
width:90%;
padding:12px;
margin:8px;
border:none;
border-radius:8px;
background:#020617;
color:white;
}

button{
width:90%;
padding:15px;
margin:10px;
border:none;
border-radius:10px;
background:#022c22;
color:white;
box-shadow:0 0 15px #00ffc3;
font-size:16px;
}

#chart{
background:#111;
padding:20px;
border-radius:15px;
width:300px;
margin:auto;
margin-top:20px;
}

.buy{
color:#00ff00;
font-size:32px;
font-weight:bold;
}

.sell{
color:#ff3d00;
font-size:32px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">🚧 APX PREMIUM BOT 🚧</div>

<div class="clock" id="clock"></div>

<select id="pair">

<option>USDBDT_otc</option>
<option>USDINR_otc</option>
<option>USDPKR_otc</option>

</select>

<button onclick="apiSignal()">📡 GET SIGNAL</button>

<button onclick="sendSignal()">🚀 SEND SIGNAL</button>

<div id="chart">

<div>📊 APX PREMIUM</div>

<h2 id="pairView">USDBDT_otc</h2>

<div id="dirView">---</div>

<div id="timeView"></div>

</div>

<script>

const WORKER="https://signal.mkapi009.workers.dev/send";

// CLOCK
setInterval(()=>{
let n=new Date();
n.setHours(n.getUTCHours()+6);
clock.innerText="UTC+6 "+n.toLocaleTimeString();
},1000);

// GET SIGNAL FROM RADIT API

async function apiSignal(){

let pair=document.getElementById("pair").value;

let res=await fetch(
`https://radit.top/otc.php?asset=${pair}`
);

let data=await res.json();

let candles=data.data;

let last=candles[candles.length-1];

let dir="BUY";

if(last.close<last.open){
dir="SELL";
}

window.lastDir=dir;

alert("Signal: "+dir);

}

// SEND SIGNAL

async function sendSignal(){

let pair=document.getElementById("pair").value;

let dir=window.lastDir||"BUY";

document.getElementById("pairView").innerText=pair;

document.getElementById("dirView").innerText=dir;

document.getElementById("dirView").className=
dir==="BUY"?"buy":"sell";

let now=new Date();

now.setHours(now.getUTCHours()+6);

let time=now.toLocaleTimeString();

document.getElementById("timeView").innerText=time;

// wait UI update
await new Promise(r=>setTimeout(r,300));

// screenshot
const canvas=await html2canvas(document.querySelector("#chart"),{scale:1});

const image=canvas.toDataURL("image/jpeg",0.9);

// send to worker

await fetch(WORKER,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
pair:pair,
dir:dir,
image:image
})
});

alert("Signal Sent");

}

</script>

</body>
</html>
