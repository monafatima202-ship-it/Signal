<!DOCTYPE html>
<html>
<head>

<title>APX MASTER PANEL</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
background:#0f0f0f;
color:white;
font-family:sans-serif;
text-align:center;
}

#chart{
background:#1a1a1a;
padding:25px;
border-radius:15px;
border:2px solid #333;
width:320px;
margin:auto;
}

.buy{
color:#00ff00;
font-size:36px;
font-weight:900;
}

.sell{
color:#ff3d00;
font-size:36px;
font-weight:900;
}

button{
padding:12px;
width:90%;
margin:5px;
border:none;
border-radius:8px;
background:#ffca28;
font-weight:bold;
}

</style>
</head>

<body>

<h2>🚀 APX MASTER PANEL</h2>

<div id="chart">

<div>📊 APX PREMIUM</div>

<h2 id="pair">USDBDT_otc</h2>

<div id="dir">---</div>

<div id="time"></div>

</div>

<br>

<input id="pairInput" value="USDBDT_otc">

<select id="dirInput">
<option value="BUY">BUY 🟢</option>
<option value="SELL">SELL 🔴</option>
</select>

<button onclick="send()">SEND FEATURE SIGNAL</button>

<p id="status"></p>

<script>

const API="https://signal.mkapi009.workers.dev/send";

async function send(){

const pair=document.getElementById("pairInput").value;
const dir=document.getElementById("dirInput").value;

document.getElementById("pair").innerText=pair;
document.getElementById("dir").innerText=dir;

document.getElementById("dir").className=
dir==="BUY"?"buy":"sell";

document.getElementById("time").innerText=
new Date().toLocaleTimeString();

document.getElementById("status").innerText="Capturing...";

await new Promise(r=>setTimeout(r,300));

const canvas=await html2canvas(document.querySelector("#chart"),{scale:1});

const image=canvas.toDataURL("image/jpeg",0.9);

document.getElementById("status").innerText="Sending...";

const res=await fetch(API,{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ pair, dir, image })
});

const text=await res.text();

document.getElementById("status").innerText=text;

}

</script>

</body>
</html>
