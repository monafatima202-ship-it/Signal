<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>APX ULTRA SESSION</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
}

.header{
font-size:26px;
color:#00ffc3;
text-shadow:0 0 20px #00ffc3;
margin-top:10px;
}

canvas{
background:#020617;
border-radius:12px;
margin-top:20px;
box-shadow:0 0 25px #00ffc3;
}

button{
padding:14px 25px;
margin:10px;
border:none;
border-radius:10px;
background:#00ffc3;
font-weight:bold;
font-size:16px;
}

table{
margin-top:20px;
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #333;
padding:8px;
}

.box{
margin-top:15px;
}

.footer{
margin-top:20px;
color:#aaa;
}

</style>

</head>

<body>

<div class="header">🤖 APX ULTRA BOT</div>

<canvas id="chart" width="380" height="240"></canvas>

<div id="signal">SYSTEM READY</div>

<br>

<button onclick="start()">🚀 START</button>
<button onclick="stop()">🛑 STOP</button>

<h3>📊 Dashboard</h3>

<div class="box">

Signals : <span id="signals">0</span><br>
WIN : <span id="win">0</span><br>
LOSS : <span id="loss">0</span><br>
MTG1 : <span id="mtg">0</span><br>
Accuracy : <span id="acc">0%</span>

</div>

<h3>📜 History</h3>

<table id="history">

<tr>
<th>Time</th>
<th>Pair</th>
<th>Signal</th>
<th>Result</th>
</tr>

</table>

<h3>📊 Session Summary</h3>

<div id="summary">
Session not finished
</div>

<div class="footer">
🌐 Powered by APX Premium
</div>

<script>

const API="https://bot1.mkapi009.workers.dev/candles?pair="
const SEND="https://bot1.mkapi009.workers.dev/send"

const pairs=[
"USDBDT_otc",
"USDPKR_otc",
"USDINR_otc",
"USDARS_otc"
]

let engine=null

let pairIndex=0

let win=0
let loss=0
let mtg1=0
let signals=0
let total=0

let lastPair=""
let lastSignal=""

function accuracy(){

if(total==0) return 0

return ((win/total)*100).toFixed(1)

}

function entryTime(){

let d=new Date()

d.setMinutes(d.getMinutes()+1)

return d.toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
})

}

async function getCandles(){

let pair=pairs[pairIndex]

pairIndex++

if(pairIndex>=pairs.length) pairIndex=0

let r=await fetch(API+pair)

let j=await r.json()

return {pair,data:j.slice(-30)}

}

function signalLogic(c){

let last=c[c.length-1]
let prev=c[c.length-2]

return last.close>prev.close?"BUY":"SELL"

}

function drawChart(candles,pair,signal,entry){

let canvas=document.getElementById("chart")

let ctx=canvas.getContext("2d")

ctx.fillStyle="#020617"

ctx.fillRect(0,0,canvas.width,canvas.height)

let max=Math.max(...candles.map(c=>c.high))

let min=Math.min(...candles.map(c=>c.low))

let w=8
let gap=4

candles.forEach((c,i)=>{

let x=i*(w+gap)+20

let open=200-(c.open-min)/(max-min)*160
let close=200-(c.close-min)/(max-min)*160
let high=200-(c.high-min)/(max-min)*160
let low=200-(c.low-min)/(max-min)*160

ctx.strokeStyle="#888"

ctx.beginPath()
ctx.moveTo(x+w/2,high)
ctx.lineTo(x+w/2,low)
ctx.stroke()

ctx.fillStyle=c.close>c.open?"#00ff9d":"#ff3b3b"

ctx.fillRect(x,Math.min(open,close),w,Math.abs(open-close))

})

ctx.fillStyle="#fff"
ctx.font="12px Arial"

ctx.fillText(
"APX BOT | "+pair+" | M1 | "+signal+" @ "+entry,
70,
15
)

}

function updateStats(){

document.getElementById("signals").innerText=signals
document.getElementById("win").innerText=win
document.getElementById("loss").innerText=loss
document.getElementById("mtg").innerText=mtg1
document.getElementById("acc").innerText=accuracy()+"%"

}

function addHistory(pair,signal,result){

let t=new Date().toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
})

let row=
"<tr>"+
"<td>"+t+"</td>"+
"<td>"+pair+"</td>"+
"<td>"+signal+"</td>"+
"<td>"+result+"</td>"+
"</tr>"

document.getElementById("history").innerHTML+=row

}

async function sendMessage(text){

let form=new FormData()

form.append("text",text)

await fetch(SEND,{
method:"POST",
body:form
})

}

function sessionSummary(){

let text=
"Signals : "+signals+
"<br>Wins : "+win+
"<br>Loss : "+loss+
"<br>MTG1 : "+mtg1+
"<br>Accuracy : "+accuracy()+"%"

document.getElementById("summary").innerHTML=text

}

async function sendSignal(pair,signal,entry){

let text=
"🚀 APX PREMIUM SIGNAL\n\n"+
"📊 Pair : "+pair+"\n"+
"🕓 Entry : "+entry+"\n"+
"⏱ TF : M1\n"+
"⭕ Direction : "+signal+"\n"+
"🎯 Accuracy : "+accuracy()+"%\n\n"+
"📈 Prepare for entry\n\n"+
"🌐 Powered by APX Premium"

sendMessage(text)

}

async function checkResult(){

let r=await fetch(API+lastPair)

let j=await r.json()

let c=j.slice(-2)

let prev=c[0]
let last=c[1]

let result

if(lastSignal=="BUY"){
result=last.close>prev.close?"WIN":"LOSS"
}else{
result=last.close<prev.close?"WIN":"LOSS"
}

total++

if(result=="WIN"){
win++
}else{
loss++
}

updateStats()

addHistory(lastPair,lastSignal,result)

}

async function run(){

if(signals>=10){

sessionSummary()

stop()

return

}

let d=await getCandles()

let entry=entryTime()

let signal=signalLogic(d.data)

lastPair=d.pair
lastSignal=signal

signals++

drawChart(d.data,d.pair,signal,entry)

document.getElementById("signal").innerHTML=
d.pair+" "+signal+" ENTRY "+entry

sendSignal(d.pair,signal,entry)

setTimeout(checkResult,60000)

updateStats()

}

function start(){

run()

engine=setInterval(run,65000)

}

function stop(){

clearInterval(engine)

}

</script>

</body>
</html>
