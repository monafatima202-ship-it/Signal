<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>APX AUTO-PREMIUM PANEL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background:#020617; color:white; font-family:sans-serif; text-align:center; padding:10px; }
        .header { color:#00ffc3; font-size:22px; font-weight:bold; margin-bottom:10px; }
        
        /* Chart & Control Box */
        #chart-container { background:#111; padding:15px; border-radius:15px; width:330px; margin:auto; border:1px solid #1e293b; }
        #tv-chart { height: 180px; width: 100%; }
        
        .controls { display:grid; grid-template-columns: 1fr 1fr; gap:10px; width:330px; margin:15px auto; }
        button { padding:12px; border-radius:8px; border:none; font-weight:bold; cursor:pointer; }
        .btn-start { background:#22c55e; color:white; }
        .btn-stop { background:#ef4444; color:white; }
        
        /* Summary Table */
        .summary { width:330px; margin:20px auto; background:#1e293b; border-radius:10px; padding:10px; font-size:12px; }
        table { width:100%; border-collapse:collapse; }
        th { border-bottom:1px solid #444; padding:5px; }
        .buy { color:#00ff00; } .sell { color:#ff3d00; }
    </style>
</head>
<body>

<div class="header">🤖 APX AUTO-SIGNAL SYSTEM</div>
<div id="clock" style="color:#94a3b8; margin-bottom:10px;"></div>

<div id="chart-container">
    <div id="tv-chart"></div>
    <div id="signal-info">
        <h3 id="v-pair" style="margin:5px;">USDBDT_otc</h3>
        <div id="v-dir" style="font-size:24px; font-weight:bold;">WAITING</div>
    </div>
</div>

<div class="controls">
    <button class="btn-start" id="startBtn" onclick="startAuto()">▶️ START AUTO</button>
    <button class="btn-stop" id="stopBtn" onclick="stopAuto()" disabled>⏹️ STOP</button>
</div>

<div class="summary">
    <b>📊 SIGNAL SUMMARY</b>
    <table id="summaryTable">
        <tr><th>Time</th><th>Pair</th><th>Signal</th></tr>
    </table>
</div>

<script>
const WORKER = "https://signal.mkapi009.workers.dev/send";
let autoInterval = null;
let signalCount = 0;

// 1. Chart Setup
const chart = LightweightCharts.createChart(document.getElementById('tv-chart'), {
    layout: { backgroundColor: '#111', textColor: '#d1d4dc' },
    grid: { vertLines: { color: '#1e222d' }, horzLines: { color: '#1e222d' } },
});
const candleSeries = chart.addCandlestickSeries();

// 2. Market Data & Logic
async function processSignal() {
    let pair = "USDBDT_otc"; // Aap isay dropdown se bhi connect kar sakte hain
    try {
        let res = await fetch(`https://radit.top/otc.php?asset=${pair}`);
        let json = await res.json();
        let candles = json.data;
        candleSeries.setData(candles); // Update live chart

        let last = candles[candles.length - 1];
        let dir = (last.close > last.open) ? "BUY 🟢" : "SELL 🔴";
        
        document.getElementById("v-dir").innerText = dir;
        document.getElementById("v-dir").className = dir.includes("BUY") ? "buy" : "sell";

        // Auto Send to Telegram
        await sendToTelegram(pair, dir);
        updateSummary(pair, dir);
    } catch(e) { console.log("Error fetching data"); }
}

// 3. Start/Stop Controls
function startAuto() {
    document.getElementById("startBtn").disabled = true;
    document.getElementById("stopBtn").disabled = false;
    processSignal(); // Pehla signal foran
    autoInterval = setInterval(processSignal, 60000); // Har 1 min baad
    alert("Auto Signals Started!");
}

function stopAuto() {
    clearInterval(autoInterval);
    document.getElementById("startBtn").disabled = false;
    document.getElementById("stopBtn").disabled = true;
    alert("Auto Signals Stopped.");
}

// 4. Summary Table Logic
function updateSummary(pair, dir) {
    let table = document.getElementById("summaryTable");
    let row = table.insertRow(1);
    row.innerHTML = `<td>${new Date().toLocaleTimeString()}</td><td>${pair}</td><td class="${dir.includes('BUY')?'buy':'sell'}">${dir}</td>`;
}

async function sendToTelegram(pair, dir) {
    const canvas = await html2canvas(document.querySelector("#chart-container"), { scale: 1 });
    const image = canvas.toDataURL("image/jpeg", 0.7);
    await fetch(WORKER, {
        method: "POST",
        body: JSON.stringify({ pair, dir, image })
    });
}

// Clock UTC+6
setInterval(() => {
    let n = new Date(); n.setHours(n.getUTCHours() + 6);
    document.getElementById('clock').innerText = "UTC+6: " + n.toLocaleTimeString();
}, 1000);
</script>
</body>
</html>
