<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>APX AUTO SYSTEM</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
}

.header{
font-size:28px;
color:#00ffc3;
margin-top:15px;
}

canvas{
background:#0b1220;
border-radius:12px;
margin-top:15px;
}

button{
padding:14px 30px;
margin:10px;
border:none;
border-radius:10px;
background:#00ffc3;
font-size:16px;
}

.buy{color:#00ff9d;font-size:28px}
.sell{color:#ff3b3b;font-size:28px}

</style>

</head>

<body>

<div class="header">🤖 APX AUTO SYSTEM</div>

<select id="pair">

<option>USDPKR_otc</option>
<option selected>USDBDT_otc</option>
<option>USDINR_otc</option>
<option>USDARS_otc</option>
<option>USDBRL_otc</option>
<option>USDMXN_otc</option>

</select>

<br>

<canvas id="chart" width="380" height="250"></canvas>

<div id="signal">READY</div>

<br>

<button onclick="start()">START</button>
<button onclick="stop()">STOP</button>

<script>

const API="https://bot1.mkapi009.workers.dev/candles?pair="
const TG="https://bot1.mkapi009.workers.dev/send"

let canvas=document.getElementById("chart")
let ctx=canvas.getContext("2d")

let engine=null

async function getData(){

let pair=document.getElementById("pair").value

let r=await fetch(API+pair)

let j=await r.json()

return j.slice(-30)

}

function drawChart(candles,signal){

ctx.clearRect(0,0,400,300)

let max=Math.max(...candles.map(c=>c.high))
let min=Math.min(...candles.map(c=>c.low))

let w=10
let gap=3

candles.forEach((c,i)=>{

let x=i*(w+gap)+20

let openY=200-(c.open-min)/(max-min)*180
let closeY=200-(c.close-min)/(max-min)*180
let highY=200-(c.high-min)/(max-min)*180
let lowY=200-(c.low-min)/(max-min)*180

ctx.strokeStyle="white"

ctx.beginPath()
ctx.moveTo(x+5,highY)
ctx.lineTo(x+5,lowY)
ctx.stroke()

ctx.fillStyle=c.close>c.open?"#00ff9d":"#ff3b3b"

ctx.fillRect(x,Math.min(openY,closeY),w,Math.abs(openY-closeY))

})

let last=candles[candles.length-1]

let x=(candles.length-1)*(w+gap)+20
let y=200-(last.close-min)/(max-min)*180

ctx.strokeStyle=signal=="BUY"?"#00ff9d":"#ff3b3b"

ctx.lineWidth=3

ctx.beginPath()

ctx.moveTo(x-40,y+20)
ctx.lineTo(x,y)

ctx.stroke()

ctx.fillStyle="white"

ctx.font="16px Arial"

ctx.fillText(document.getElementById("pair").value+" (OTC) - "+signal,100,20)

ctx.fillStyle=signal=="BUY"?"#00ff9d":"#ff3b3b"

ctx.fillText(signal,x-10,y+35)

}

function getSignal(c){

let last=c[c.length-1]
let prev=c[c.length-2]

return last.close>prev.close?"BUY":"SELL"

}

async function sendTG(pair,signal){

let img=canvas.toDataURL()

await fetch(TG,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
pair:pair,
dir:signal,
image:img
})
})

}

async function run(){

let pair=document.getElementById("pair").value

let candles=await getData()

let sig=getSignal(candles)

drawChart(candles,sig)

let el=document.getElementById("signal")

el.innerText=sig

el.className=sig=="BUY"?"buy":"sell"

sendTG(pair,sig)

}

function start(){

if(engine) return

alert("🚀 APX AUTO ENGINE STARTED")

run()

engine=setInterval(run,60000)

}

function stop(){

clearInterval(engine)

engine=null

alert("🛑 APX SYSTEM STOPPED")

}

</script>

</body>
</html>
