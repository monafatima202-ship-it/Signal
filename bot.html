<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>APX BOT WORKING</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
}

.header{
font-size:24px;
color:#00ffc3;
margin-top:10px;
}

canvas{
background:#000;
border-radius:10px;
margin-top:10px;
}

button{
padding:14px 24px;
margin:10px;
border:none;
border-radius:8px;
background:#00ffc3;
font-weight:bold;
}

.buy{color:#00ff9d}
.sell{color:#ff3b3b}

</style>

</head>

<body>

<div class="header">🤖 APX BOT</div>

<canvas id="chart" width="380" height="220"></canvas>

<div id="signal">SYSTEM READY</div>

<br>

<button onclick="start()">START</button>
<button onclick="stop()">STOP</button>

<h3>Dashboard</h3>

<div>
WIN : <span id="win">0</span> |
LOSS : <span id="loss">0</span> |
ACC : <span id="acc">0%</span>
</div>

<script>

const API="https://bot1.mkapi009.workers.dev/candles?pair="
const SEND="https://bot1.mkapi009.workers.dev/send"

const pairs=[
"USDBDT_otc",
"USDINR_otc",
"USDPKR_otc"
]

let engine=null
let pairIndex=0

let win=0
let loss=0
let total=0

let lastSignal=null
let lastPair=null

function accuracy(){

if(total==0) return 0

return ((win/total)*100).toFixed(1)

}

async function sendTelegram(text){

let form=new FormData()

form.append("text",text)

await fetch(SEND,{
method:"POST",
body:form
})

}

async function getCandles(){

let pair=pairs[pairIndex]

pairIndex=(pairIndex+1)%pairs.length

let r=await fetch(API+pair)

let j=await r.json()

return {pair,data:j.slice(-30)}

}

function signalLogic(c){

let a=c[c.length-1]
let b=c[c.length-2]

if(a.close>b.close) return "BUY"
if(a.close<b.close) return "SELL"

}

function drawChart(c){

let canvas=document.getElementById("chart")
let ctx=canvas.getContext("2d")

ctx.clearRect(0,0,380,220)

let max=Math.max(...c.map(x=>x.high))
let min=Math.min(...c.map(x=>x.low))

let w=6
let gap=3

c.forEach((v,i)=>{

let x=i*(w+gap)+10

let open=200-(v.open-min)/(max-min)*160
let close=200-(v.close-min)/(max-min)*160
let high=200-(v.high-min)/(max-min)*160
let low=200-(v.low-min)/(max-min)*160

ctx.strokeStyle="#888"

ctx.beginPath()
ctx.moveTo(x+w/2,high)
ctx.lineTo(x+w/2,low)
ctx.stroke()

ctx.fillStyle=v.close>v.open?"#00ff9d":"#ff3b3b"

ctx.fillRect(x,Math.min(open,close),w,Math.abs(open-close))

})

}

function updateStats(){

document.getElementById("win").innerText=win
document.getElementById("loss").innerText=loss
document.getElementById("acc").innerText=accuracy()+"%"

}

async function checkResult(){

let r=await fetch(API+lastPair)
let j=await r.json()

let c=j.slice(-2)

let prev=c[0]
let last=c[1]

let result

if(lastSignal=="BUY"){
result=last.close>prev.close?"WIN":"LOSS"
}else{
result=last.close<prev.close?"WIN":"LOSS"
}

total++

if(result=="WIN"){
win++
await sendTelegram("✅ WIN "+lastPair)
}else{
loss++
await sendTelegram("❌ LOSS "+lastPair)
}

updateStats()

}

async function run(){

let d=await getCandles()

drawChart(d.data)

let signal=signalLogic(d.data)

if(!signal) return

lastSignal=signal
lastPair=d.pair

document.getElementById("signal").innerHTML=
signal=="BUY"
?`<span class="buy">${d.pair} BUY</span>`
:`<span class="sell">${d.pair} SELL</span>`

let entry=new Date()

entry.setMinutes(entry.getMinutes()+1)

entry=entry.toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
})

let msg=
"🚀 APX SIGNAL\n\n"+
"Pair : "+d.pair+"\n"+
"Entry : "+entry+"\n"+
"Direction : "+signal

await sendTelegram(msg)

setTimeout(checkResult,60000)

}

function start(){

run()

engine=setInterval(run,65000)

}

function stop(){

clearInterval(engine)

sendTelegram("🛑 APX BOT STOPPED")

}

</script>

</body>
</html>
