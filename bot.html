<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>APX ULTRA V10</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
}

.header{
font-size:28px;
color:#00ffc3;
text-shadow:0 0 15px #00ffc3;
margin-top:10px;
}

#chart{
width:380px;
height:240px;
margin:auto;
box-shadow:0 0 25px #00ffc3;
border-radius:12px;
}

button{
padding:14px 25px;
margin:10px;
border:none;
border-radius:10px;
background:#00ffc3;
font-weight:bold;
}

.buy{color:#00ff9d;font-size:22px}
.sell{color:#ff3b3b;font-size:22px}

table{
margin-top:20px;
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #333;
padding:8px;
}

.footer{
margin-top:20px;
color:#aaa;
}

</style>

</head>

<body>

<div class="header">🤖 APX ULTRA V10</div>

<div id="chart"></div>

<div id="signal">SYSTEM READY</div>

<button onclick="start()">🚀 START</button>
<button onclick="stop()">🛑 STOP</button>

<h3>Dashboard</h3>

<div>
✅ WIN : <span id="win">0</span> |
❌ LOSS : <span id="loss">0</span> |
🎯 ACC : <span id="acc">0</span>%
</div>

<h3>Signal History</h3>

<table id="history">
<tr>
<th>Time</th>
<th>Pair</th>
<th>Signal</th>
<th>Result</th>
</tr>
</table>

<div class="footer">🌐 Powered by APX Premium</div>

<script>

const API="https://bot1.mkapi009.workers.dev/candles?pair="

const pairs=[
"USDPKR_otc",
"USDBDT_otc",
"USDINR_otc",
"USDARS_otc",
"USDBRL_otc",
"USDMXN_otc"
]

let pairIndex=0
let engine=null

let win=0
let loss=0
let total=0

let lastSignal=null
let lastPair=null

/* Chart */

const chart=LightweightCharts.createChart(
document.getElementById("chart"),
{
width:380,
height:240,
layout:{background:{color:"#020617"},textColor:"#ddd"},
grid:{vertLines:{color:"#333"},horzLines:{color:"#333"}}
})

const candleSeries=chart.addCandlestickSeries()

const emaSeries=chart.addLineSeries({
color:"#00ffc3",
lineWidth:2
})

/* EMA */

function EMA(values,period){

let k=2/(period+1)

let ema=[values[0]]

for(let i=1;i<values.length;i++){

ema.push(values[i]*k+ema[i-1]*(1-k))

}

return ema

}

/* RSI */

function RSI(values,period=14){

let gains=0
let losses=0

for(let i=1;i<=period;i++){

let diff=values[i]-values[i-1]

if(diff>=0) gains+=diff
else losses-=diff

}

if(losses==0) return 100

let rs=gains/losses

return 100-(100/(1+rs))

}

/* Signal Logic */

function signalLogic(c){

let closes=c.map(x=>parseFloat(x.close))

let ema=EMA(closes,10)

let rsi=RSI(closes)

let lastClose=closes[closes.length-1]
let lastEMA=ema[ema.length-1]

if(lastClose>lastEMA && rsi>55) return "BUY"

if(lastClose<lastEMA && rsi<45) return "SELL"

return null

}

/* Candles */

async function getCandles(){

let pair=pairs[pairIndex]

pairIndex=(pairIndex+1)%pairs.length

let r=await fetch(API+pair)

let j=await r.json()

let candles=j.slice(-60)

return {pair,candles}

}

/* Chart */

function drawChart(candles,signal){

let data=candles.map((c,i)=>({

time:i,
open:parseFloat(c.open),
high:parseFloat(c.high),
low:parseFloat(c.low),
close:parseFloat(c.close)

}))

candleSeries.setData(data)

let closes=candles.map(c=>parseFloat(c.close))

let ema=EMA(closes,10)

let emaData=ema.map((v,i)=>({time:i,value:v}))

emaSeries.setData(emaData)

/* arrow marker */

if(signal){

let lastIndex=data.length-1

candleSeries.setMarkers([{

time:lastIndex,
position:signal=="BUY"?"belowBar":"aboveBar",
color:signal=="BUY"?"#00ff9d":"#ff3b3b",
shape:signal=="BUY"?"arrowUp":"arrowDown",
text:signal

}])

}

}

/* Stats */

function updateStats(){

document.getElementById("win").innerText=win
document.getElementById("loss").innerText=loss

let acc=total?((win/total)*100).toFixed(1):0

document.getElementById("acc").innerText=acc

}

/* History */

function addHistory(pair,signal,result){

let t=new Date().toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
})

let row=
"<tr>"+
"<td>"+t+"</td>"+
"<td>"+pair+"</td>"+
"<td>"+signal+"</td>"+
"<td>"+result+"</td>"+
"</tr>"

document.getElementById("history").innerHTML+=row

}

/* Run */

async function run(){

let d=await getCandles()

let signal=signalLogic(d.candles)

drawChart(d.candles,signal)

if(!signal) return

lastSignal=signal
lastPair=d.pair

document.getElementById("signal").innerHTML=
signal=="BUY"
?`<span class="buy">${d.pair} BUY ↑</span>`
:`<span class="sell">${d.pair} SELL ↓</span>`

/* result check */

setTimeout(async()=>{

let r=await fetch(API+d.pair)

let j=await r.json()

let c=j.slice(-2)

let prev=c[0]
let last=c[1]

let result

if(signal=="BUY"){
result=last.close>prev.close?"WIN":"LOSS"
}else{
result=last.close<prev.close?"WIN":"LOSS"
}

total++

if(result=="WIN") win++
else loss++

updateStats()

addHistory(d.pair,signal,result)

},60000)

}

/* Engine */

function start(){

if(engine) return

run()

engine=setInterval(run,65000)

}

function stop(){

clearInterval(engine)

engine=null

document.getElementById("signal").innerHTML="SYSTEM STOPPED"

}

</script>

</body>
</html>
