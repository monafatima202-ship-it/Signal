<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>APX ULTRA BOT PRO</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
background:#000;
color:white;
font-family:Arial;
text-align:center;
padding:15px;
}

.header{
font-size:30px;
color:#00ffc3;
text-shadow:0 0 20px #00ffc3;
margin:15px 0;
}

#chart-container{
width:100%;
max-width:420px;
height:280px;
margin:20px auto;
border-radius:12px;
overflow:hidden;
box-shadow:0 0 25px rgba(0,255,195,0.4);
}

#signal{
font-size:24px;
margin:15px 0;
}

.buy{color:#00ff9d}
.sell{color:#ff3b3b}

.btn{
padding:12px 28px;
margin:10px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
}

.start-btn{background:#00ffc3;color:black}
.stop-btn{background:#ff3b3b;color:white}

.dashboard{
background:#0f172a;
border-radius:12px;
padding:15px;
margin:20px auto;
max-width:420px;
}

.stats{
display:flex;
justify-content:space-around;
}

.stat-box{
background:#1e293b;
padding:10px;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #334155;
padding:8px;
}

th{background:#1e293b}

.footer{
margin-top:20px;
color:#aaa;
font-size:14px;
}

</style>

</head>
<body>

<div class="header">⚡ APX ULTRA BOT PRO</div>

<div id="chart-container"></div>

<div id="signal">SYSTEM READY</div>

<button class="btn start-btn" onclick="start()">🚀 START BOT</button>
<button class="btn stop-btn" onclick="stop()">🛑 STOP BOT</button>

<div class="dashboard">

<h3>📊 LIVE DASHBOARD</h3>

<div class="stats">

<div class="stat-box">WIN <span id="win">0</span></div>
<div class="stat-box">LOSS <span id="loss">0</span></div>
<div class="stat-box">ACC <span id="acc">0</span>%</div>

</div>

<h4>Martingale: <span id="mtg">—</span></h4>

</div>

<h3>📜 Signal History</h3>

<table id="history">

<tr>
<th>Time</th>
<th>Pair</th>
<th>Signal</th>
<th>Result</th>
</tr>

</table>

<div class="footer">
Powered by APX Premium
</div>

<script>

const API="https://bot1.mkapi009.workers.dev/candles?pair="
const SEND="https://bot1.mkapi009.workers.dev/send"

const pairs=[
"USDPKR_otc",
"USDBDT_otc",
"USDINR_otc",
"USDARS_otc",
"USDBRL_otc",
"USDMXN_otc"
]

let pairIndex=0
let engine=null

let win=0
let loss=0
let total=0

let lastSignal=null
let lastPair=null
let lastEntryTime=null
let lossStreak=0

let chart
let candleSeries

function initChart(){

const container=document.getElementById("chart-container")

chart=LightweightCharts.createChart(container,{

width:container.clientWidth,
height:280,

layout:{
background:{color:"#000"},
textColor:"#ffffff"
},

grid:{
vertLines:{color:"#1f2937"},
horzLines:{color:"#1f2937"}
}

})

candleSeries=chart.addCandlestickSeries({

upColor:"#00ff9d",
downColor:"#ff3b3b",
borderVisible:false,
wickUpColor:"#00ff9d",
wickDownColor:"#ff3b3b"

})

}

function entryTime(){

let d=new Date()
d.setMinutes(d.getMinutes()+1)

return d.toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
})

}

function signalLogic(c){

let last=c[c.length-1]
let prev=c[c.length-2]

if(parseFloat(last.close)>parseFloat(prev.close)) return "CALL"
if(parseFloat(last.close)<parseFloat(prev.close)) return "PUT"

return null

}

async function getCandles(){

let pair=pairs[pairIndex]
pairIndex=(pairIndex+1)%pairs.length

let r=await fetch(API+pair)
let j=await r.json()

return{pair,data:j.slice(-50)}

}

async function drawChart(candles,pair,signal){

let data=candles.map((c,i)=>({

time:Math.floor(Date.now()/1000)-(candles.length-1-i)*60,
open:parseFloat(c.open),
high:parseFloat(c.high),
low:parseFloat(c.low),
close:parseFloat(c.close)

}))

candleSeries.setData(data)

chart.applyOptions({

watermark:{
visible:true,
fontSize:16,
horzAlign:'center',
vertAlign:'top',
color:'rgba(255,255,255,0.8)',
text:`APX BOT | ${pair} | M1 | ${signal} @ ${lastEntryTime}`
}

})

let last=data[data.length-1].time

candleSeries.setMarkers([{

time:last,
position:signal==="CALL"?"belowBar":"aboveBar",
color:signal==="CALL"?"#00ff9d":"#ff3b3b",
shape:signal==="CALL"?"arrowUp":"arrowDown",
text:signal

}])

document.getElementById("signal").innerHTML=
signal=="CALL"
?`<span class="buy">${pair} CALL ↑</span>`
:`<span class="sell">${pair} PUT ↓</span>`

}

function updateStats(result){

total++

if(result=="WIN"){
win++
lossStreak=0
}else{
loss++
lossStreak++
}

let acc=(total?((win/total)*100):0).toFixed(1)

document.getElementById("win").innerText=win
document.getElementById("loss").innerText=loss
document.getElementById("acc").innerText=acc

document.getElementById("mtg").innerText=
lossStreak>0?`Next trade x2 (${lossStreak} loss)`:"—"

}

function addHistory(time,pair,signal,result){

let table=document.getElementById("history")
let row=table.insertRow(1)

row.innerHTML=`
<td>${time}</td>
<td>${pair}</td>
<td>${signal}</td>
<td>${result}</td>
`

if(table.rows.length>21) table.deleteRow(-1)

}

async function sendTelegram(pair,signal,entry){

let capture=await html2canvas(document.getElementById("chart-container"))

let blob=await new Promise(r=>capture.toBlob(r,"image/png"))

let text=
`⚡ APX ULTRA SIGNAL

Pair: ${pair}
Entry: ${entry}
Direction: ${signal}

Win: ${win}
Loss: ${loss}
Accuracy: ${(total?((win/total)*100):0).toFixed(1)}%
`

let form=new FormData()

form.append("image",blob,"chart.png")
form.append("text",text)

await fetch(SEND,{method:"POST",body:form})

}

async function checkResult(){

let r=await fetch(API+lastPair)
let j=await r.json()

let c=j.slice(-2)

let prev=parseFloat(c[0].close)
let last=parseFloat(c[1].close)

let result

if(lastSignal=="CALL"){
result=last>prev?"WIN":"LOSS"
}else{
result=last<prev?"WIN":"LOSS"
}

updateStats(result)

addHistory(
new Date().toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
}),
lastPair,
lastSignal,
result
)

}

async function run(){

let d=await getCandles()

let signal=signalLogic(d.data)

if(!signal) return

lastSignal=signal
lastPair=d.pair
lastEntryTime=entryTime()

await drawChart(d.data,d.pair,signal)

await sendTelegram(d.pair,signal,lastEntryTime)

setTimeout(checkResult,61000)

}

function start(){

if(engine) return

initChart()

run()

engine=setInterval(run,65000)

}

function stop(){

if(engine) clearInterval(engine)

engine=null

alert("BOT STOPPED")

}

</script>

</body>
</html>
