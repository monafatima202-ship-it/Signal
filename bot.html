<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>APX ULTRA PRO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #00f2ff;
      --buy: #00ff9d;
      --sell: #ff3b5e;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
      color: var(--text);
      font-family: 'Roboto Mono', monospace;
      min-height: 100vh;
      padding: 15px;
      text-align: center;
    }

    .container { max-width: 420px; margin: 0 auto; }

    .header {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.1rem;
      color: var(--accent);
      text-shadow: 0 0 15px rgba(0,242,255,0.6);
      margin: 20px 0 12px;
      letter-spacing: 2px;
    }

    #chart {
      background: #0a0f1a;
      border-radius: 16px;
      border: 1px solid #334155;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
      margin: 15px auto;
      display: block;
    }

    #current-signal {
      font-size: 2.4rem;
      font-weight: bold;
      margin: 18px 0;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-shadow: 0 0 20px currentColor;
    }

    .buy { color: var(--buy); }
    .sell { color: var(--sell); }

    .arrow-up  { font-size: 3rem; transform: scale(1.4); }
    .arrow-down { font-size: 3rem; transform: scale(1.4); }

    .stats {
      background: var(--card);
      border-radius: 12px;
      padding: 16px;
      margin: 20px 0;
      border: 1px solid #334155;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      text-align: center;
    }

    .stat-item span:first-child {
      display: block;
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .stat-item span:last-child {
      font-size: 1.5rem;
      font-weight: bold;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin: 25px 0;
    }

    button {
      padding: 14px 32px;
      font-size: 1.1rem;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    }

    #startBtn {
      background: linear-gradient(90deg, #00d4ff, #00ff9d);
      color: #0f172a;
    }

    #stopBtn {
      background: linear-gradient(90deg, #ff3b5e, #c1121f);
      color: white;
    }

    button:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.6); }

    h3 { margin: 30px 0 12px; color: var(--accent); font-family: 'Orbitron', sans-serif; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    }

    th, td {
      padding: 12px 8px;
      text-align: center;
      border-bottom: 1px solid #334155;
    }

    th {
      background: #1e293b;
      color: var(--accent);
      font-weight: bold;
    }

    tr:last-child td { border-bottom: none; }

    .buy-row { background: rgba(0,255,157,0.08); }
    .sell-row { background: rgba(255,59,94,0.08); }

    .footer {
      margin-top: 40px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    #welcome, #summary {
      font-size: 1.3rem;
      margin: 20px 0;
      padding: 16px;
      border-radius: 12px;
      background: rgba(0,242,255,0.08);
      border: 1px solid var(--accent);
      display: none;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="header">APX ULTRA PRO</div>

  <canvas id="chart" width="400" height="260"></canvas>

  <div id="current-signal">SYSTEM READY</div>

  <div class="stats">
    <div class="stats-grid">
      <div class="stat-item">
        <span>Signals</span>
        <span id="total">0</span>
      </div>
      <div class="stat-item">
        <span>Wins</span>
        <span id="wins">0</span>
      </div>
      <div class="stat-item">
        <span>Win Rate</span>
        <span id="winrate">—</span>
      </div>
    </div>
  </div>

  <div class="buttons">
    <button id="startBtn" onclick="start()">START ENGINE</button>
    <button id="stopBtn" onclick="stop()">STOP ENGINE</button>
  </div>

  <div id="welcome">🚀 Welcome to APX ULTRA PRO – Premium signals activated!</div>
  <div id="summary"></div>

  <h3>📊 Signal History</h3>
  <table id="history">
    <tr>
      <th>Time</th>
      <th>Pair</th>
      <th>Signal</th>
      <th>Result</th>
    </tr>
  </table>

  <div class="footer">
    Powered by 🌐 APX Premium • Next-Gen OTC Signals
  </div>

</div>

<script>
// ────────────────────────────────────────────────
const API  = "https://bot1.mkapi009.workers.dev/candles?pair=";
const SEND = "https://bot1.mkapi009.workers.dev/send";

const pairs = [
  "USDPKR_otc", "USDBDT_otc", "USDINR_otc",
  "USDARS_otc", "USDBRL_otc", "USDMXN_otc"
];

let engine = null;
let totalSignals = 0;
let wins = 0;

// For demo – in real use you'd need actual result from broker/market
// Here we simulate win/loss randomly (replace with real check)
function simulateResult() {
  return Math.random() > 0.45 ? "WIN" : "LOSS"; // \~55% win example
}

function getEntryTime() {
  let d = new Date();
  d.setMinutes(d.getMinutes() + 1);
  return d.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
}

async function getData() {
  let pair = pairs[Math.floor(Math.random() * pairs.length)];
  let r = await fetch(API + pair);
  let j = await r.json();
  return { pair, data: j.slice(-40) }; // more candles = smoother chart
}

function getSignal(candles) {
  let last  = candles[candles.length-1];
  let prev  = candles[candles.length-2];
  let prev2 = candles[candles.length-3] || prev;

  // Slightly smarter logic (you can improve)
  if (last.close > prev.close && prev.close > prev2.close) return "BUY";
  if (last.close < prev.close && prev.close < prev2.close) return "SELL";
  return last.close > prev.close ? "BUY" : "SELL";
}

function drawChart(candles, pair, signal) {
  const canvas = document.getElementById("chart");
  const ctx = canvas.getContext("2d");
  const w = canvas.width, h = canvas.height;

  ctx.fillStyle = "#0a0f1a";
  ctx.fillRect(0,0,w,h);

  // Light grid
  ctx.strokeStyle = "rgba(100,116,139,0.15)";
  ctx.lineWidth = 1;
  for (let i = 1; i < 5; i++) {
    let y = h * (i/5);
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke();
  }

  if (!candles.length) return;

  let highs = candles.map(c=>c.high), lows = candles.map(c=>c.low);
  let max = Math.max(...highs), min = Math.min(...lows);
  let range = max - min || 1;

  const barWidth = 9;
  const gap = 5;
  const startX = 20;

  candles.forEach((c, i) => {
    let x = startX + i * (barWidth + gap);
    if (x + barWidth > w - 20) return;

    let scale = (v) => h - 40 - ((v - min) / range) * (h - 80);

    let yOpen  = scale(c.open);
    let yClose = scale(c.close);
    let yHigh  = scale(c.high);
    let yLow   = scale(c.low);

    // Wick
    ctx.strokeStyle = c.close >= c.open ? var(--buy) : var(--sell);
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    ctx.moveTo(x + barWidth/2, yHigh);
    ctx.lineTo(x + barWidth/2, yLow);
    ctx.stroke();

    // Body
    ctx.fillStyle = c.close >= c.open ? var(--buy) : var(--sell);
    ctx.fillRect(x, Math.min(yOpen, yClose), barWidth, Math.abs(yOpen - yClose));

    // Border
    ctx.strokeStyle = "#475569";
    ctx.strokeRect(x, Math.min(yOpen, yClose), barWidth, Math.abs(yOpen - yClose));
  });

  // Label
  ctx.fillStyle = signal === "BUY" ? var(--buy) : var(--sell);
  ctx.font = "bold 28px Orbitron";
  ctx.fillText(signal, w - 120, h - 35);

  ctx.fillStyle = "white";
  ctx.font = "16px Roboto Mono";
  ctx.fillText(pair.replace("_otc",""), 25, 35);

  ctx.fillStyle = var(--accent);
  ctx.font = "12px Roboto Mono";
  ctx.fillText("APX ULTRA PRO", 25, h - 12);
}

function updateSignalDisplay(pair, signal) {
  const el = document.getElementById("current-signal");
  const cls = signal === "BUY" ? "buy" : "sell";
  const arrow = signal === "BUY" ? "↑" : "↓";
  el.innerHTML = `<span class="\( {cls} arrow- \){signal.toLowerCase()}">${arrow}</span> \( {pair} <span class=" \){cls}">${signal}</span>`;
}

function addHistory(time, pair, signal, result = "—") {
  const table = document.getElementById("history");
  const row = document.createElement("tr");
  row.className = signal === "BUY" ? "buy-row" : "sell-row";
  row.innerHTML = `
    <td>${time}</td>
    <td>${pair.replace("_otc","")}</td>
    <td class="\( {signal.toLowerCase()}"> \){signal}</td>
    <td>${result}</td>
  `;
  table.appendChild(row);

  // Scroll to bottom
  table.scrollTop = table.scrollHeight;
}

function updateStats(result) {
  if (!result || result === "—") return;
  totalSignals++;
  if (result === "WIN") wins++;

  document.getElementById("total").textContent = totalSignals;
  document.getElementById("wins").textContent = wins;
  document.getElementById("winrate").textContent = totalSignals > 0
    ? ((wins / totalSignals) * 100).toFixed(1) + "%"
    : "—";
}

async function sendToTelegram(pair, signal, entry) {
  const canvas = document.getElementById("chart");
  const blob = await new Promise(r => canvas.toBlob(r, "image/png"));

  const text =
`🤖 APX ULTRA PRO
Pair: ${pair}
ENTRY: ${entry}
Timeframe: M1
Direction: ${signal}

Signal Time: ${new Date().toLocaleString()}
Telegram: @MMQUOBOT`;

  const form = new FormData();
  form.append("image", blob, "chart.png");
  form.append("text", text);

  fetch(SEND, { method: "POST", body: form }).catch(console.error);
}

async function run() {
  try {
    const { pair, data } = await getData();
    const signal = getSignal(data);

    drawChart(data, pair, signal);
    updateSignalDisplay(pair, signal);

    const entry = getEntryTime();
    addHistory(entry, pair, signal);

    // For real bot: check market after \~1-2 min and update result
    // Here we simulate after adding to history
    setTimeout(() => {
      const result = simulateResult();
      updateStats(result);

      // Update last row result (simple way)
      const rows = document.querySelectorAll("#history tr");
      if (rows.length > 1) {
        rows[rows.length-1].cells[3].textContent = result;
        rows[rows.length-1].classList.add(result === "WIN" ? "buy-row" : "sell-row");
      }
    }, 80000); // \~80 sec later

    await sendToTelegram(pair, signal, entry);
  } catch(e) {
    console.error(e);
  }
}

function start() {
  document.getElementById("welcome").style.display = "block";
  document.getElementById("summary").style.display = "none";

  if (engine) clearInterval(engine);
  run();                    // immediate first run
  engine = setInterval(run, 65000);

  document.getElementById("current-signal").textContent = "ENGINE RUNNING...";
}

function stop() {
  if (engine) {
    clearInterval(engine);
    engine = null;
  }

  const winRate = totalSignals > 0 ? ((wins / totalSignals) * 100).toFixed(1) : 0;

  document.getElementById("summary").innerHTML =
    `Engine Stopped.<br>Total Signals: <b>${totalSignals}</b><br>` +
    `Wins: <b>\( {wins}</b> • Win Rate: <b> \){winRate}%</b><br>` +
    `Thank you for using APX ULTRA PRO • See you soon! 👋`;

  document.getElementById("summary").style.display = "block";
  document.getElementById("welcome").style.display = "none";

  document.getElementById("current-signal").innerHTML = "SYSTEM PAUSED";
}
</script>
</body>
</html>
