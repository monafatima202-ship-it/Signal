<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>APX V19 PREMIUM</title>
    <style>
        :root { --bg: #0b0d11; --primary: #00ffc3; --dark-gray: #1c1f26; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        
        /* Premium Interface */
        .main-container { max-width: 400px; margin: auto; text-align: center; }
        .chart-wrapper {
            background: #000; border: 1.5px solid var(--dark-gray); border-radius: 15px;
            position: relative; margin-bottom: 15px; padding: 5px;
        }

        .stats-bar {
            display: flex; justify-content: space-around; background: var(--dark-gray);
            padding: 12px; border-radius: 12px; margin-bottom: 15px;
        }
        .stat-item span { font-size: 9px; color: #777; display: block; }
        .stat-item b { font-size: 16px; color: var(--primary); }

        .btn-start { width: 100%; padding: 16px; background: var(--primary); color: #000; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; }
        
        table { width: 100%; font-size: 11px; margin-top: 15px; border-collapse: collapse; }
        td { padding: 10px; border-bottom: 1px solid #1a1a1a; }
        .win-txt { color: #00ff9d; } .loss-txt { color: #ff3b3b; }
    </style>
</head>
<body>

<div class="main-container">
    <h2 style="color: var(--primary); letter-spacing: 1px;">APX PREMIUM</h2>

    <div class="chart-wrapper">
        <canvas id="apxChart" width="350" height="220"></canvas>
    </div>

    <div class="stats-bar">
        <div class="stat-item"><span>WIN</span><b id="w_v">0</b></div>
        <div class="stat-item"><span>LOSS</span><b id="l_v">0</b></div>
        <div class="stat-item"><span>MTG1</span><b id="m_v">0</b></div>
        <div class="stat-item"><span>ACC</span><b id="a_v">0%</b></div>
    </div>

    <button class="btn-start" onclick="startBot()">🚀 START SIGNAL ENGINE</button>

    <table>
        <tbody id="history"></tbody>
    </table>
</div>

<script>
    const API = "https://bot1.mkapi009.workers.dev/candles?pair=";
    const SEND = "https://bot1.mkapi009.workers.dev/send";
    const pairs = ["USDPKR_otc", "USDBDT_otc", "USDINR_otc", "USDBRL_otc"];
    
    let stats = { w:0, l:0, m:0, t:0 };

    async function tg(fd) { try { await fetch(SEND, { method: "POST", body: fd }); } catch(e) {} }

    function drawChart(data, pair, sig, isMtg) {
        const c = document.getElementById("apxChart"), ctx = c.getContext("2d");
        ctx.fillStyle = "#000"; ctx.fillRect(0,0,350,220);
        let max = Math.max(...data.map(x=>x.high)), min = Math.min(...data.map(x=>x.low));

        // APX Premium Style
        ctx.fillStyle = "rgba(0,255,195,0.5)"; ctx.font = "bold 11px Arial";
        ctx.fillText("APX PREMIUM", 15, 25);
        
        // Dark Gray Small Info
        ctx.fillStyle = "#444"; ctx.font = "9px Arial";
        ctx.fillText(`${pair} | ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`, 240, 25);

        data.forEach((can, i) => {
            let x = i * 7 + 40;
            let o = 180 - (can.open-min)/(max-min)*140;
            let cl = 180 - (can.close-min)/(max-min)*140;
            ctx.strokeStyle = "#1a1a1a"; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(x+2, 180-(can.high-min)/(max-min)*140); ctx.lineTo(x+2, 180-(can.low-min)/(max-min)*140); ctx.stroke();
            ctx.fillStyle = can.close > can.open ? "#00ff9d" : "#ff3b3b";
            ctx.fillRect(x, Math.min(o, cl), 4, Math.max(Math.abs(o-cl), 2));
        });

        // Fancy Arrow
        ctx.fillStyle = sig === "CALL" ? "#00ff9d" : "#ff3b3b";
        ctx.font = "30px Arial";
        ctx.fillText(sig === "CALL" ? "↑" : "↓", 310, 200);
    }

    async function sendSignal(pair_lock = null, mtg = false) {
        let p = pair_lock || pairs[Math.floor(Math.random() * pairs.length)];
        let res = await fetch(API + p);
        let candles = (await res.json()).slice(-45);
        let last = candles[candles.length-1];
        let sig = last.close > last.open ? "CALL" : "PUT";
        
        drawChart(candles, p, sig, mtg);

        document.getElementById("apxChart").toBlob(async (blob) => {
            let fd = new FormData();
            fd.append("image", blob, "apx.png");
            fd.append("text", `${mtg ? '⚠️ *MTG1*' : '🚀 *SIGNAL*'}\n\n📊 *Pair:* ${p}\n🕒 *Time:* ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}\n🎯 *Side:* ${sig === 'CALL' ? 'UP 🍏' : 'DOWN 🍎'}\n\n📈 *Open:* ${last.open}\n📉 *Close:* ${last.close}\n💎 *APX PREMIUM*`);
            await tg(fd);
        });

        setTimeout(() => checkResult(p, sig, mtg), 61000);
    }

    async function checkResult(p, s, wasMtg) {
        let res = await fetch(API + p);
        let data = await res.json();
        let c = data[data.length-1];
        let win = (s === "CALL" && c.close > c.open) || (s === "PUT" && c.close < c.open);
        
        if (win) {
            if(wasMtg) stats.m++; else stats.w++;
            stats.t++;
            postRes(p, s, wasMtg ? "MTG1 WIN" : "WIN");
        } else {
            if (!wasMtg) sendSignal(p, true); // MTG1
            else { stats.l++; stats.t++; postRes(p, s, "LOSS"); }
        }
    }

    function postRes(p, s, r) {
        let acc = (((stats.w + stats.m) / stats.t) * 100).toFixed(1);
        document.getElementById("w_v").innerText = stats.w;
        document.getElementById("l_v").innerText = stats.l;
        document.getElementById("m_v").innerText = stats.m;
        document.getElementById("a_v").innerText = acc + "%";

        document.getElementById("history").insertAdjacentHTML('afterbegin', `<tr><td>${p}</td><td>${s}</td><td class="${r.includes('WIN')?'win-txt':'loss-txt'}">${r}</td></tr>`);

        let fd = new FormData();
        fd.append("text", `${r.includes('WIN') ? '✅' : '❌'} *RESULT: ${r}*\n\n📊 *Asset:* ${p}\n\n🏆 Wins: ${stats.w}\n⚠️ MTG1: ${stats.m}\n❌ Losses: ${stats.l}\n🎯 Accuracy: ${acc}%\n\n👑 *APX PREMIUM*`);
        tg(fd);
    }

    async function startBot() {
        let bars = "🟥🟧🟨🟩🟦🟪";
        let fd = new FormData();
        fd.append("text", `🌟 *APX PREMIUM STARTED* 🌟\n\n${bars}${bars}\n\n_Engine is now scanning OTC pairs..._`);
        await tg(fd);
        sendSignal();
        setInterval(sendSignal, 130000);
    }
</script>
</body>
</html>
