<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APX AUTO-FIXED PANEL - Fixed Retry</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background:#020617; color:#e2e8f0; font-family:sans-serif; margin:0; padding:15px; text-align:center; }
        .header { color:#00ffc3; font-size:24px; font-weight:bold; margin:15px 0; }
        #chart-container { background:#0f172a; border-radius:12px; padding:12px; border:1px solid #1e293b; max-width:95%; margin:0 auto; position:relative; }
        #tv-chart { height:320px; width:100%; background:#000; border-radius:8px; }
        .signal-box { margin:20px 0; font-size:32px; font-weight:900; }
        .buy { color:#22c55e; } .sell { color:#ef4444; }
        .controls { display:flex; gap:12px; justify-content:center; margin:20px 0; }
        button { padding:14px 28px; font-size:18px; font-weight:bold; border:none; border-radius:10px; cursor:pointer; color:white; }
        .start { background:#22c55e; } .stop { background:#ef4444; }
        select { padding:12px; font-size:16px; background:#1e293b; color:white; border:1px solid #334155; border-radius:8px; margin-bottom:15px; }
        .summary { margin:25px auto; max-width:95%; background:#0f172a; border-radius:12px; padding:15px; border:1px solid #1e293b; }
        table { width:100%; border-collapse:collapse; font-size:14px; }
        th { background:#1e293b; padding:10px; color:#94a3b8; }
        td { padding:10px; border-top:1px solid #1e293b; }
        #loading { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#00ffc3; font-size:20px; display:none; }
    </style>
</head>
<body>

<div class="header">🤖 APX AUTO-SIGNAL SYSTEM - Arrow Style (Fixed)</div>

<select id="pairSelect">
    <option value="USDBDT_otc">USDBDT_otc</option>
    <option value="EURUSD_otc">EURUSD_otc</option>
    <option value="GBPUSD_otc">GBPUSD_otc</option>
    <option value="USDJPY_otc">USDJPY_otc</option>
</select>

<div id="chart-container">
    <div id="loading">Loading Chart...</div>
    <div id="tv-chart"></div>
    <div id="signalBox" class="signal-box">SYSTEM READY</div>
</div>

<div class="controls">
    <button class="start" id="startBtn" onclick="startEngine()">START AUTO</button>
    <button class="stop" id="stopBtn" onclick="stopEngine()" disabled>STOP</button>
</div>

<div class="summary">
    <h3>📊 SIGNAL SUMMARY</h3>
    <table>
        <thead><tr><th>Time</th><th>Pair</th><th>Signal</th></tr></thead>
        <tbody id="summaryBody"></tbody>
    </table>
</div>

<script>
const WORKER_URL = "https://signal.mkapi009.workers.dev/send";
let engineInterval = null;
let chart, candleSeries;
let currentPair = "USDBDT_otc";

function initChart() {
    chart = LightweightCharts.createChart(document.getElementById('tv-chart'), {
        layout: { background: { color: '#000' }, textColor: '#94a3b8' },
        grid: { vertLines: { visible: false }, horzLines: { color: '#1e293b' } },
        timeScale: { visible: true, borderVisible: false, timeVisible: true, secondsVisible: false },
        rightPriceScale: { borderVisible: false },
        handleScale: false,
        handleScroll: false
    });
    candleSeries = chart.addCandlestickSeries({
        upColor: '#22c55e', downColor: '#ef4444', borderVisible: false,
        wickUpColor: '#22c55e', wickDownColor: '#ef4444'
    });
}
initChart();

async function fetchWithRetry(url, retries = 3, delay = 5000) {
    for (let i = 0; i < retries; i++) {
        try {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const json = await res.json();
            console.log("Data fetched successfully:", json.data?.length || 0, "candles");
            return json;
        } catch (err) {
            console.error(`Fetch attempt ${i+1} failed:`, err);
            if (i < retries - 1) await new Promise(r => setTimeout(r, delay));
        }
    }
    throw new Error("All retries failed");
}

async function fetchAndUpdate() {
    currentPair = document.getElementById('pairSelect').value;
    const status = document.getElementById('signalBox');
    status.innerText = "RETRIEVING...";
    document.getElementById('loading').style.display = 'block';

    try {
        const json = await fetchWithRetry(`https://radit.top/otc.php?asset=${currentPair}`);
        if (!json.data || json.data.length < 10) throw new Error("Insufficient data");

        const candles = json.data.slice(-40);
        candleSeries.setData(candles);
        chart.timeScale().fitContent();
        document.getElementById('loading').style.display = 'none';

        const last = candles[candles.length - 1];
        const isBuy = last.close > last.open;
        const direction = isBuy ? "BUY" : "SELL";
        const signalText = `${direction} ↑`;

        status.innerText = `${currentPair.toUpperCase()} - ${signalText}`;
        status.className = 'signal-box ' + (isBuy ? 'buy' : 'sell');

        const markers = [{
            time: last.time,
            position: isBuy ? 'aboveBar' : 'belowBar',
            color: isBuy ? '#22c55e' : '#ef4444',
            shape: isBuy ? 'arrowUp' : 'arrowDown',
            text: signalText
        }];
        candleSeries.setMarkers(markers);

        const timeStr = new Date().toLocaleTimeString();
        const row = document.getElementById('summaryBody').insertRow(0);
        row.innerHTML = `<td>\( {timeStr}</td><td> \){currentPair}</td><td class="\( {isBuy ? 'buy' : 'sell'}"> \){signalText}</td>`;

        await sendSignalWithImage(currentPair, signalText);
    } catch (err) {
        console.error("Update failed:", err);
        status.innerText = "ERROR / RETRYING... (Check console)";
        document.getElementById('loading').style.display = 'none';
    }
}

async function sendSignalWithImage(pair, direction) {
    try {
        await new Promise(r => setTimeout(r, 1500)); // Render wait
        const canvas = await html2canvas(document.getElementById('chart-container'), { scale: 1.5, backgroundColor: null });
        const imageBase64 = canvas.toDataURL('image/jpeg', 0.8);

        const payload = { pair, dir: direction, image: imageBase64 };
        const res = await fetch(WORKER_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        console.log("Worker send status:", res.status, res.ok ? "OK" : "Failed");
    } catch (e) {
        console.error("Telegram send failed:", e);
    }
}

function startEngine() {
    document.getElementById('startBtn').disabled = true;
    document.getElementById('stopBtn').disabled = false;
    fetchAndUpdate();
    engineInterval = setInterval(fetchAndUpdate, 60000);
}

function stopEngine() {
    clearInterval(engineInterval);
    document.getElementById('startBtn').disabled = false;
    document.getElementById('stopBtn').disabled = true;
    document.getElementById('signalBox').innerText = "STOPPED";
    candleSeries.setMarkers([]);
    document.getElementById('loading').style.display = 'none';
}

document.getElementById('pairSelect').addEventListener('change', () => {
    if (!document.getElementById('stopBtn').disabled) fetchAndUpdate();
});
</script>
</body>
</html>
