<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>APX ULTRA BOT</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
}

.header{
font-size:26px;
color:#00ffc3;
margin-top:10px;
}

canvas{
background:#020617;
border-radius:10px;
margin-top:20px;
}

button{
padding:14px 25px;
margin:10px;
border:none;
border-radius:8px;
background:#00ffc3;
font-weight:bold;
font-size:16px;
}

.buy{color:#00ff9d;font-size:24px}
.sell{color:#ff3b3b;font-size:24px}

table{
margin-top:20px;
border-collapse:collapse;
width:100%;
}

th,td{
padding:8px;
border:1px solid #333;
}

th{
background:#111827;
}

.footer{
margin-top:20px;
color:#aaa;
font-size:14px;
}

</style>

</head>

<body>

<div class="header">🤖 APX ULTRA AUTO BOT</div>

<canvas id="chart" width="380" height="240"></canvas>

<div id="signal">SYSTEM READY</div>

<button onclick="start()">START</button>
<button onclick="stop()">STOP</button>

<h3>📊 Signals History</h3>

<table id="history">

<tr>
<th>Time</th>
<th>Pair</th>
<th>Signal</th>
</tr>

</table>

<div class="footer">
Powered by 🌐 APX Premium
</div>

<script>

const API="https://bot1.mkapi009.workers.dev/candles?pair="
const SEND="https://bot1.mkapi009.workers.dev/send"

const pairs=[
"USDPKR_otc",
"USDBDT_otc",
"USDINR_otc",
"USDARS_otc",
"USDBRL_otc",
"USDMXN_otc"
]

let engine=null

function entryTime(){

let d=new Date()

d.setMinutes(d.getMinutes()+1)

return d.toLocaleTimeString()

}

async function getData(){

let pair=pairs[Math.floor(Math.random()*pairs.length)]

let r=await fetch(API+pair)

let j=await r.json()

return {pair,data:j.slice(-30)}

}

function getSignal(c){

let last=c[c.length-1]
let prev=c[c.length-2]

if(last.close>prev.close){
return "BUY"
}else{
return "SELL"
}

}

function drawChart(candles,pair,signal){

let canvas=document.getElementById("chart")
let ctx=canvas.getContext("2d")

ctx.fillStyle="#020617"
ctx.fillRect(0,0,canvas.width,canvas.height)

let max=Math.max(...candles.map(c=>c.high))
let min=Math.min(...candles.map(c=>c.low))

let w=8
let gap=4

candles.forEach((c,i)=>{

let x=i*(w+gap)+20

let open=200-(c.open-min)/(max-min)*160
let close=200-(c.close-min)/(max-min)*160
let high=200-(c.high-min)/(max-min)*160
let low=200-(c.low-min)/(max-min)*160

ctx.strokeStyle="white"

ctx.beginPath()
ctx.moveTo(x+w/2,high)
ctx.lineTo(x+w/2,low)
ctx.stroke()

ctx.fillStyle=c.close>c.open?"#00ff9d":"#ff3b3b"

ctx.fillRect(x,Math.min(open,close),w,Math.abs(open-close))

})

ctx.fillStyle="white"
ctx.font="16px Arial"
ctx.fillText(pair+" "+signal,120,20)

if(signal=="BUY"){

ctx.fillStyle="#00ff9d"
ctx.fillText("↑ BUY",300,220)

}else{

ctx.fillStyle="#ff3b3b"
ctx.fillText("↓ SELL",300,220)

}

ctx.fillStyle="#00ffc3"
ctx.font="12px Arial"
ctx.fillText("APX PREMIUM",10,230)

}

function addHistory(pair,signal){

let t=new Date().toLocaleTimeString()

let row=`
<tr>
<td>${t}</td>
<td>${pair}</td>
<td>${signal}</td>
</tr>
`

document.getElementById("history").innerHTML+=row

}

async function sendTelegram(pair,signal){

let entry=entryTime()

let canvas=document.getElementById("chart")

let blob=await new Promise(resolve=>canvas.toBlob(resolve,"image/png"))

let form=new FormData()

form.append("image",blob,"chart.png")

let text=
"🤖 APX BOT ====== 🚧\n\n"+
"📊 Pair "+pair+"\n"+
"🕓 ENTRY "+entry+"\n"+
"⌛ M1\n"+
"⭕ DIRECTION "+signal+"\n\n"+
"📳 SIGNAL : "+new Date().toLocaleString()+"\n\n"+
"🌐Telegram @MMQUOBOT"

form.append("text",text)

await fetch(SEND,{
method:"POST",
body:form
})

}

async function run(){

let d=await getData()

let signal=getSignal(d.data)

drawChart(d.data,d.pair,signal)

document.getElementById("signal").innerHTML=
signal=="BUY"
?`<span class="buy">${d.pair} BUY</span>`
:`<span class="sell">${d.pair} SELL</span>`

addHistory(d.pair,signal)

sendTelegram(d.pair,signal)

}

function start(){

run()

engine=setInterval(run,65000)

}

function stop(){

clearInterval(engine)

alert("APX ULTRA STOPPED")

}

</script>

</body>
</html>
