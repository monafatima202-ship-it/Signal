<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APX ULTRA BOT</title>
    <style>
        :root {
            --bg: #020617;
            --primary: #00ffc3;
            --card: #0f172a;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        .header {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .chart-box {
            background: var(--card);
            padding: 15px;
            border-radius: 15px;
            display: inline-block;
            border: 1px solid #1e293b;
            box-shadow: 0 0 20px rgba(0,255,195,0.1);
        }

        #signal-display {
            font-size: 22px;
            font-weight: 900;
            margin: 20px 0;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }

        .controls button {
            padding: 12px 25px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .start-btn { background: var(--primary); color: #000; }
        .stop-btn { background: #334155; color: white; }

        .history-table {
            width: 100%;
            max-width: 380px;
            margin: 20px auto;
            border-collapse: collapse;
            font-size: 13px;
        }

        .history-table th { background: #1e293b; padding: 10px; color: var(--primary); }
        .history-table td { padding: 10px; border-bottom: 1px solid #1e293b; }

        .buy-text { color: #00ff9d; }
        .sell-text { color: #ff3b3b; }
        
        .footer { margin-top: 20px; font-size: 12px; color: #64748b; }
    </style>
</head>
<body>

    <div class="header">🤖 APX ULTRA AUTO BOT</div>
    
    <div class="chart-box">
        <canvas id="chart" width="340" height="200"></canvas>
    </div>

    <div id="signal-display">SYSTEM STANDBY</div>

    <div class="controls">
        <button class="start-btn" onclick="startEngine()">START AUTO</button>
        <button class="stop-btn" onclick="stopEngine()">STOP</button>
    </div>

    <table class="history-table">
        <thead>
            <tr>
                <th>TIME</th>
                <th>PAIR</th>
                <th>SIGNAL</th>
                <th>RESULT</th>
            </tr>
        </thead>
        <tbody id="history-rows"></tbody>
    </table>

    <div class="footer">Powered by <b>APX PREMIUM</b></div>

<script>
    let timer = null;
    let stats = { total: 0, wins: 0, losses: 0 };
    const pairs = ["USDPKR_otc", "USDBDT_otc", "USDINR_otc", "USDARS_otc"];

    // 1. Welcome Message
    window.onload = () => {
        console.log("System Ready");
    };

    function getSignalTime() {
        let d = new Date();
        d.setMinutes(d.getMinutes() + 1);
        return d.getHours().toString().padStart(2, '0') + ":" + d.getMinutes().toString().padStart(2, '0');
    }

    async function runLogic() {
        let pair = pairs[Math.floor(Math.random() * pairs.length)];
        let timeLabel = getSignalTime();
        
        // Mocking logic for visuals
        let isBuy = Math.random() > 0.5;
        let signal = isBuy ? "BUY" : "SELL";
        let color = isBuy ? "#00ff9d" : "#ff3b3b";

        // Update UI
        document.getElementById("signal-display").innerHTML = 
            `<span style="color:${color}">${pair} ${isBuy ? '▲' : '▼'} ${signal}</span><br>
             <span style="font-size:14px; color:#aaa;">ENTRY: ${timeLabel}</span>`;

        // Draw simple visual
        const ctx = document.getElementById("chart").getContext("2d");
        ctx.clearRect(0, 0, 340, 200);
        ctx.fillStyle = color;
        ctx.font = "bold 50px Arial";
        ctx.fillText(isBuy ? "↑" : "↓", 150, 110);
        ctx.font = "14px Arial";
        ctx.fillStyle = "#ffffff";
        ctx.fillText(pair + " Premium Analysis", 100, 160);

        // Update Stats
        stats.total++;
        let win = Math.random() > 0.4; // 60% Win Rate simulation
        if(win) stats.wins++; else stats.losses++;

        // Add to Table
        let row = `<tr>
            <td>${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</td>
            <td>${pair}</td>
            <td class="${isBuy?'buy-text':'sell-text'}">${signal}</td>
            <td style="color:${win?'#00ff9d':'#ff3b3b'}">${win?'ITM':'MTG 1'}</td>
        </tr>`;
        document.getElementById("history-rows").insertAdjacentHTML('afterbegin', row);
    }

    function startEngine() {
        alert("🚀 Welcome to APX ULTRA\nEngine Started Successfully!");
        runLogic();
        timer = setInterval(runLogic, 60000);
    }

    function stopEngine() {
        clearInterval(timer);
        let winRate = ((stats.wins / stats.total) * 100 || 0).toFixed(1);
        alert(`📊 SESSION SUMMARY\n\nTotal: ${stats.total}\nWins: ${stats.wins}\nLosses: ${stats.losses}\nAccuracy: ${winRate}%\n\nSYSTEM EXITED.`);
    }
</script>
</body>
</html>
