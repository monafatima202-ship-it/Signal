<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>APX PREMIUM AUTO SYSTEM - Fixed</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
body{background:#020617;color:white;font-family:sans-serif;text-align:center;margin:0;}
.header{font-size:26px;color:#00ffc3;margin:15px;font-weight:bold;}
#chart{width:100%;height:300px;}
.panel{background:#0f172a;padding:15px;border-radius:10px;margin:10px;}
.buy{color:#22c55e;font-size:26px;font-weight:bold}
.sell{color:#ef4444;font-size:26px;font-weight:bold}
button{padding:14px 25px;margin:8px;border:none;border-radius:10px;font-size:16px;color:white;font-weight:bold;}
.start{background:#22c55e}
.stop{background:#ef4444}
#errorMsg{color:#ffcc00;font-size:18px;margin:10px;}
</style>
</head>
<body>

<div class="header">🤖 APX PREMIUM AUTO SYSTEM</div>
<div id="chart"></div>
<div id="errorMsg"></div>

<div class="panel">
<div id="pair">Pair: --</div>
<div id="direction">Direction: --</div>
<div id="signalTime">Signal Time: --</div>
<div id="entryTime">Entry Time: --</div>
<div id="accuracy">Accuracy: 0% (0/0)</div>
<div style="margin-top:10px">Powered by 🌐 APX Premium</div>
</div>

<button class="start" onclick="start()">START</button>
<button class="stop" onclick="stop()">STOP</button>

<script>
const WORKER = "https://signal.mkapi009.workers.dev/send";
const PAIRS = ["USDBDT_otc", "USDPKR_otc", "USDINR_otc", "USDARS_otc", "USDBRL_otc", "USDMXN_otc"];

let engine = null;
let total = 0, wins = 0, losses = 0;

const chart = LightweightCharts.createChart(document.getElementById("chart"), {
  width: window.innerWidth,
  height: 300,
  layout: { background: {color: "#000"}, textColor: "#aaa" },
  grid: { vertLines: {color: "#222"}, horzLines: {color: "#222"} },
  timeScale: { timeVisible: true, secondsVisible: false }
});

const series = chart.addCandlestickSeries({
  upColor: '#22c55e', downColor: '#ef4444',
  borderVisible: false, wickUpColor: '#22c55e', wickDownColor: '#ef4444'
});

window.addEventListener('resize', () => {
  chart.applyOptions({ width: window.innerWidth });
});

function showError(msg) {
  document.getElementById("errorMsg").innerText = msg;
}

async function getCandles(pair) {
  try {
    const r = await fetch(`https://radit.top/otc.php?asset=${pair}`);
    if (!r.ok) throw new Error("HTTP " + r.status);
    const j = await r.json();
    return j; // direct array hai
  } catch (e) {
    console.error("Fetch error for " + pair + ":", e);
    showError("Data fetch failed for " + pair + " - Check internet or API");
    return [];
  }
}

function convert(data) {
  const now = Date.now() / 1000 | 0; // current unix
  let baseTime = now - (data.length * 60); // assume 1-min candles backward

  return data.map((c, i) => {
    let timeStr = c.time || c.t; // "HH:MM"
    let [hh, mm] = timeStr.split(':').map(Number);
    let candleTime = baseTime + (i * 60); // approximate unix

    return {
      time: candleTime,
      open: Number(c.o || c.open),
      high: Number(c.h || c.high),
      low: Number(c.l || c.low),
      close: Number(c.c || c.close)
    };
  });
}

function analyze(candles) {
  if (candles.length < 3) return null;
  let last3 = candles.slice(-3);
  let upCount = last3.filter(c => c.close > c.open).length;
  let downCount = last3.filter(c => c.close < c.open).length;

  if (upCount >= 2) return "BUY";
  if (downCount >= 2) return "SELL";
  return null;
}

async function scan() {
  showError(""); // clear error
  for (let pair of PAIRS) {
    let raw = await getCandles(pair);
    if (raw.length < 10) continue;

    let data = convert(raw);
    series.setData(data);
    chart.timeScale().fitContent();

    let signal = analyze(data);
    if (signal) {
      let entryPrice = data[data.length - 1].close;
      await sendSignal(pair, signal, entryPrice);
      return; // ek signal pe ruk jao (jaise original intent)
    }
  }
  showError("No strong signal found in any pair");
}

async function sendSignal(pair, dir, price) {
  let now = new Date();
  let entry = new Date(now.getTime() + 60000);

  document.getElementById("pair").innerText = "Pair: " + pair;
  document.getElementById("direction").innerHTML = `Direction: <span class="\( {dir=="BUY"?"buy":"sell"}"> \){dir}</span>`;
  document.getElementById("signalTime").innerText = "Signal Time: " + now.toLocaleTimeString();
  document.getElementById("entryTime").innerText = "Entry Time: " + entry.toLocaleTimeString();

  await new Promise(r => setTimeout(r, 2000)); // render wait

  try {
    const canvas = await html2canvas(document.getElementById("chart"));
    const image = canvas.toDataURL("image/jpeg", 0.8);

    await fetch(WORKER, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ pair, dir, image })
    });
    console.log("Signal sent for " + pair);
  } catch (e) {
    console.error("Worker send failed:", e);
  }

  total++;
  await checkResult(pair, dir, price);
  updateAccuracy();
}

async function checkResult(pair, dir, entryPrice) {
  await new Promise(r => setTimeout(r, 65000)); // \~1 min + buffer
  let raw = await getCandles(pair);
  if (raw.length === 0) return;

  let data = convert(raw);
  let lastClose = data[data.length - 1].close;

  if ((dir === "BUY" && lastClose > entryPrice) || (dir === "SELL" && lastClose < entryPrice)) {
    wins++;
  } else {
    losses++;
  }
  updateAccuracy();
}

function updateAccuracy() {
  let acc = total > 0 ? Math.round((wins / total) * 100) : 0;
  document.getElementById("accuracy").innerText = `Accuracy: \( {acc}% ( \){wins}/${total})`;
}

function start() {
  scan();
  engine = setInterval(scan, 60000);
}

function stop() {
  clearInterval(engine);
}
</script>
</body>
</html>
