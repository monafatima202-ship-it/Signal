<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>APX ULTRA BOT</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>

body{
background:#020617;
font-family:Arial;
color:white;
text-align:center;
}

.header{
font-size:28px;
color:#00ffc3;
margin-top:10px;
}

canvas{
background:#020617;
border-radius:12px;
margin-top:15px;
box-shadow:0 0 30px #00ffc3;
}

.signal{
font-size:30px;
margin-top:15px;
color:#00ffc3;
}

button{
padding:14px 25px;
margin:10px;
border:none;
border-radius:10px;
background:#00ffc3;
color:#020617;
font-weight:bold;
font-size:18px;
}

.dashboard{
margin-top:15px;
}

table{
width:100%;
margin-top:15px;
border-collapse:collapse;
font-size:14px;
}

th,td{
padding:8px;
border-bottom:1px solid #1e293b;
}

footer{
margin-top:30px;
color:#94a3b8;
}

</style>

</head>

<body>

<div class="header">🤖 APX ULTRA BOT</div>

<canvas id="chart" width="350" height="220"></canvas>

<div id="signal" class="signal">READY</div>

<button onclick="start()">START</button>
<button onclick="stop()">STOP</button>

<div class="dashboard">

WIN : <span id="win">0</span> |
LOSS : <span id="loss">0</span> |
MTG1 : <span id="mtg">0</span>

</div>

<table>

<thead>
<tr>
<th>Time</th>
<th>Pair</th>
<th>Signal</th>
<th>Result</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

<footer>
Powered by 🌐 APX Premium
</footer>

<script>

const worker="https://bot1.mkapi009.workers.dev"

let pairs=[
"USDPKR_otc",
"USDINR_otc",
"USDBDT_otc",
"USDARS_otc",
"USDBRL_otc",
"USDMXN_otc"
]

let pairIndex=0
let running=false

let win=0
let loss=0
let mtg=0

function accuracy(){

let total=win+loss
if(total==0)return 0

return Math.round((win/total)*100)

}

async function candles(pair){

let r=await fetch(worker+"/candles?pair="+pair)
return await r.json()

}

function draw(data,pair,signal){

let canvas=document.getElementById("chart")
let ctx=canvas.getContext("2d")

ctx.fillStyle="#020617"
ctx.fillRect(0,0,350,220)

let max=Math.max(...data.map(x=>x.high))
let min=Math.min(...data.map(x=>x.low))

let w=10
let gap=2

data.slice(-20).forEach((c,i)=>{

let x=i*(w+gap)+10

let open=(c.open-min)/(max-min)
let close=(c.close-min)/(max-min)
let high=(c.high-min)/(max-min)
let low=(c.low-min)/(max-min)

open=200-(open*180)
close=200-(close*180)
high=200-(high*180)
low=200-(low*180)

ctx.strokeStyle="white"

ctx.beginPath()
ctx.moveTo(x+w/2,high)
ctx.lineTo(x+w/2,low)
ctx.stroke()

ctx.fillStyle=c.close>c.open?"#00ff9c":"#ff3b3b"

ctx.fillRect(x,Math.min(open,close),w,Math.abs(open-close))

})

ctx.fillStyle="#00ffc3"
ctx.font="16px Arial"
ctx.fillText(pair+" "+signal,90,20)

ctx.fillStyle="#334155"
ctx.fillText("APX Premium",250,210)

}

async function telegram(pair,signal){

let canvas=document.getElementById("chart")

let image=await html2canvas(canvas)

let base64=image.toDataURL("image/png")

let entry=new Date(Date.now()+60000)

let text=
"🤖 APX BOT PREMIUM\n\n"+
"📊 Pair "+pair+"\n"+
"🕓 ENTRY "+entry.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})+"\n"+
"⌛ M1\n"+
"⭕ DIRECTION "+signal+"\n"+
"🎯 Accuracy "+accuracy()+"%\n\n"+
"🌐 Powered by APX Premium"

await fetch(worker+"/send",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

text:text,
image:base64

})

})

}

function addRow(pair,signal,res){

let row=document.createElement("tr")

row.innerHTML=
"<td>"+new Date().toLocaleTimeString()+"</td>"+
"<td>"+pair+"</td>"+
"<td>"+signal+"</td>"+
"<td>"+res+"</td>"

document.getElementById("table").prepend(row)

}

async function engine(){

if(!running)return

let pair=pairs[pairIndex]

pairIndex++
if(pairIndex>=pairs.length)pairIndex=0

let data=await candles(pair)

let last=data[data.length-1]

let signal=last.close>last.open?"BUY":"SELL"

draw(data,pair,signal)

document.getElementById("signal").innerText=pair+" "+signal

await telegram(pair,signal)

addRow(pair,signal,"WAIT")

setTimeout(engine,60000)

}

function start(){

running=true

alert("🚀 APX ULTRA STARTED")

engine()

}

function stop(){

running=false

alert(

"📊 FINAL SUMMARY\n\n"+
"WIN "+win+"\n"+
"LOSS "+loss+"\n"+
"MTG1 "+mtg+"\n\n"+
"🎯 Accuracy "+accuracy()+"%"

)

}

</script>

</body>
</html>
