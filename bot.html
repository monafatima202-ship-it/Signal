<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>APX Panel</title>

<style>
body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
}

canvas{
background:#0b1220;
border-radius:10px;
margin-top:20px;
}

button{
padding:10px 20px;
margin:10px;
border:none;
border-radius:6px;
background:#00ffc3;
font-weight:bold;
cursor:pointer;
}

.buy{color:#00ff9d;font-size:26px}
.sell{color:#ff3b3b;font-size:26px}
</style>
</head>

<body>

<h2>🤖 APX SIGNAL PANEL</h2>

<select id="pair">
<option>USDBDT_otc</option>
<option>USDPKR_otc</option>
<option>USDINR_otc</option>
<option>USDARS_otc</option>
<option>USDBRL_otc</option>
<option>USDMXN_otc</option>
</select>

<br>

<canvas id="chart" width="350" height="200"></canvas>

<div id="signal">READY</div>

<br>

<button onclick="startEngine()">START</button>
<button onclick="stopEngine()">STOP</button>

<script>

const API="https://bot1.mkapi009.workers.dev/candles?pair="

const canvas=document.getElementById("chart")
const ctx=canvas.getContext("2d")

let engine=null

async function loadCandles(){

let pair=document.getElementById("pair").value

let r=await fetch(API+pair)

let data=await r.json()

return data.slice(-20)

}

function drawChart(candles){

ctx.clearRect(0,0,canvas.width,canvas.height)

let max=Math.max(...candles.map(c=>c.high))
let min=Math.min(...candles.map(c=>c.low))

let width=10
let gap=4

candles.forEach((c,i)=>{

let x=i*(width+gap)+10

let openY=180-(c.open-min)/(max-min)*150
let closeY=180-(c.close-min)/(max-min)*150
let highY=180-(c.high-min)/(max-min)*150
let lowY=180-(c.low-min)/(max-min)*150

ctx.strokeStyle="white"

ctx.beginPath()
ctx.moveTo(x+5,highY)
ctx.lineTo(x+5,lowY)
ctx.stroke()

ctx.fillStyle=c.close>c.open?"#00ff9d":"#ff3b3b"

ctx.fillRect(x,Math.min(openY,closeY),width,Math.abs(openY-closeY))

})

}

function getSignal(c){

let last=c[c.length-1]
let prev=c[c.length-2]

return last.close>prev.close?"BUY":"SELL"

}

async function run(){

let candles=await loadCandles()

drawChart(candles)

let signal=getSignal(candles)

let el=document.getElementById("signal")

el.innerText=signal
el.className=signal=="BUY"?"buy":"sell"

}

function startEngine(){

if(engine) return

run()

engine=setInterval(run,60000)

alert("Engine Started")

}

function stopEngine(){

clearInterval(engine)

engine=null

alert("Engine Stopped")

}

</script>

</body>
</html>
