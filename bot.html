<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>APX PREMIUM AUTO SYSTEM</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>

<style>

body{
background:#020617;
color:white;
font-family:sans-serif;
text-align:center;
margin:0;
}

.header{
font-size:26px;
color:#00ffc3;
margin:15px;
font-weight:bold;
}

#chart{
width:100%;
height:300px;
}

.panel{
background:#0f172a;
padding:15px;
border-radius:10px;
margin:10px;
}

.buy{color:#22c55e;font-size:26px;font-weight:bold}
.sell{color:#ef4444;font-size:26px;font-weight:bold}

button{
padding:14px 25px;
margin:8px;
border:none;
border-radius:10px;
font-size:16px;
color:white;
font-weight:bold;
}

.start{background:#22c55e}
.stop{background:#ef4444}

</style>
</head>

<body>

<div class="header">🤖 APX PREMIUM AUTO SYSTEM</div>

<div id="chart"></div>

<div class="panel">

<div id="pair">Pair: --</div>
<div id="direction">Direction: --</div>
<div id="signalTime">Signal Time: --</div>
<div id="entryTime">Entry Time: --</div>
<div id="accuracy">Accuracy: 0%</div>

<div style="margin-top:10px">
Powered by 🌐 APX Premium
</div>

</div>

<button class="start" onclick="start()">START</button>
<button class="stop" onclick="stop()">STOP</button>

<script>

const WORKER="https://signal.mkapi009.workers.dev/send"

const PAIRS=[
"USDPKR_otc",
"USDBDT_otc",
"USDINR_otc",
"USDARS_otc",
"USDBRL_otc",
"USDMXN_otc"
]

let engine=null
let total=0
let wins=0
let losses=0

const chart=LightweightCharts.createChart(
document.getElementById("chart"),
{
width:window.innerWidth,
height:300,
layout:{
background:{color:"#000"},
textColor:"#aaa"
}
})

const series=chart.addCandlestickSeries()

async function getCandles(pair){

let r=await fetch(`https://radit.top/otc.php?asset=${pair}`)

let j=await r.json()

return j.data

}

function convert(data){

return data.map(c=>({

time: Math.floor(Number(c.t || c.time)),
open: Number(c.o || c.open),
high: Number(c.h || c.high),
low: Number(c.l || c.low),
close: Number(c.c || c.close)

}))

}

function analyze(c){

let a=c[c.length-1]
let b=c[c.length-2]
let c2=c[c.length-3]

if(
a.close>a.open &&
b.close>b.open &&
c2.close>c2.open
)
return "BUY"

if(
a.close<a.open &&
b.close<b.open &&
c2.close<c2.open
)
return "SELL"

return null

}

async function scan(){

for(let pair of PAIRS){

try{

let raw=await getCandles(pair)

if(!raw || raw.length<10) continue

let data=convert(raw.slice(-50))

series.setData(data)

let signal=analyze(data)

if(signal){

await sendSignal(pair,signal,data[data.length-1].close)

break

}

}catch(e){

console.log(e)

}

}

}

async function sendSignal(pair,dir,price){

let now=new Date()

let entry=new Date(now.getTime()+60000)

document.getElementById("pair").innerText="Pair: "+pair

document.getElementById("direction").innerHTML=
`Direction: <span class="${dir=="BUY"?"buy":"sell"}">${dir}</span>`

document.getElementById("signalTime").innerText=
"Signal Time: "+now.toLocaleTimeString()

document.getElementById("entryTime").innerText=
"Entry Time: "+entry.toLocaleTimeString()

await new Promise(r=>setTimeout(r,2000))

const canvas=await html2canvas(document.getElementById("chart"))

const image=canvas.toDataURL("image/jpeg",0.8)

await fetch(WORKER,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
pair:pair,
dir:dir,
image:image
})
})

total++

await checkResult(pair,dir,price)

updateAccuracy()

}

async function checkResult(pair,dir,entryPrice){

await new Promise(r=>setTimeout(r,60000))

let raw=await getCandles(pair)

let data=convert(raw)

let last=data[data.length-1].close

if(dir=="BUY" && last>entryPrice) wins++
else if(dir=="SELL" && last<entryPrice) wins++
else losses++

}

function updateAccuracy(){

let acc=0

if(total>0) acc=Math.round((wins/total)*100)

document.getElementById("accuracy").innerText=
"Accuracy: "+acc+"%"

}

function start(){

scan()

engine=setInterval(scan,60000)

}

function stop(){

clearInterval(engine)

}

</script>

</body>
</html>
