<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>APX ULTRA DASHBOARD</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
}

.header{
font-size:26px;
color:#00ffc3;
text-shadow:0 0 20px #00ffc3;
margin-top:10px;
}

canvas{
background:#020617;
border-radius:12px;
margin-top:20px;
box-shadow:0 0 25px #00ffc3;
}

button{
padding:14px 25px;
margin:10px;
border:none;
border-radius:10px;
background:#00ffc3;
font-weight:bold;
font-size:16px;
}

.buy{color:#00ff9d;font-size:22px}
.sell{color:#ff3b3b;font-size:22px}

table{
margin-top:20px;
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #333;
padding:8px;
}

.footer{
margin-top:20px;
color:#aaa;
}

</style>

</head>

<body>

<div class="header">🤖 APX ULTRA DASHBOARD</div>

<canvas id="chart" width="380" height="240"></canvas>

<div id="pair"></div>
<div id="direction"></div>

<br>

<button onclick="run()">🚀 SIGNAL</button>

<h3>📊 Stats</h3>

<div>

✅ WIN : <span id="win">0</span> |
❌ LOSS : <span id="loss">0</span>

</div>

<h3>📜 Signal History</h3>

<table id="history">

<tr>
<th>Time</th>
<th>Pair</th>
<th>Signal</th>
</tr>

</table>

<div class="footer">
🌐 Powered by APX Premium
</div>

<script>

const API="https://bot1.mkapi009.workers.dev/candles?pair="
const SEND="https://bot1.mkapi009.workers.dev/send"

const pairs=[
"USDPKR_otc",
"USDBDT_otc",
"USDINR_otc",
"USDARS_otc"
]

let win=0
let loss=0

async function run(){

let pair=pairs[Math.floor(Math.random()*pairs.length)]

let r=await fetch(API+pair)

let j=await r.json()

let candles=j.slice(-30)

let last=candles[candles.length-1]
let prev=candles[candles.length-2]

let signal=last.close>prev.close?"BUY":"SELL"

drawChart(candles,pair,signal)

document.getElementById("pair").innerText="PAIR : "+pair

document.getElementById("direction").innerHTML=
signal=="BUY"
?'<span class="buy">BUY ↑</span>'
:'<span class="sell">SELL ↓</span>'

addHistory(pair,signal)

sendTelegram(pair,signal)

}

function drawChart(candles,pair,signal){

let canvas=document.getElementById("chart")
let ctx=canvas.getContext("2d")

ctx.fillStyle="#020617"
ctx.fillRect(0,0,canvas.width,canvas.height)

let max=Math.max(...candles.map(c=>c.high))
let min=Math.min(...candles.map(c=>c.low))

let w=8
let gap=4

candles.forEach((c,i)=>{

let x=i*(w+gap)+20

let open=200-(c.open-min)/(max-min)*160
let close=200-(c.close-min)/(max-min)*160
let high=200-(c.high-min)/(max-min)*160
let low=200-(c.low-min)/(max-min)*160

ctx.strokeStyle="#777"

ctx.beginPath()
ctx.moveTo(x+w/2,high)
ctx.lineTo(x+w/2,low)
ctx.stroke()

ctx.fillStyle=c.close>c.open?"#00ff9d":"#ff3b3b"

ctx.fillRect(x,Math.min(open,close),w,Math.abs(open-close))

})

ctx.fillStyle="#00ffc3"
ctx.font="14px Arial"
ctx.fillText(pair,10,20)

if(signal=="BUY"){

ctx.strokeStyle="#00ff9d"

ctx.beginPath()
ctx.moveTo(300,200)
ctx.lineTo(340,170)
ctx.stroke()

ctx.fillStyle="#00ff9d"
ctx.fillText("BUY ↑",300,220)

}else{

ctx.strokeStyle="#ff3b3b"

ctx.beginPath()
ctx.moveTo(300,170)
ctx.lineTo(340,200)
ctx.stroke()

ctx.fillStyle="#ff3b3b"
ctx.fillText("SELL ↓",290,220)

}

ctx.fillStyle="#00ffc3"
ctx.font="12px Arial"
ctx.fillText("APX PREMIUM",10,230)

}

function addHistory(pair,signal){

let t=new Date().toLocaleTimeString()

let row=
"<tr>"+
"<td>"+t+"</td>"+
"<td>"+pair+"</td>"+
"<td>"+signal+"</td>"+
"</tr>"

document.getElementById("history").innerHTML+=row

}

async function sendTelegram(pair,signal){

let canvas=document.getElementById("chart")

let blob=await new Promise(r=>canvas.toBlob(r,"image/png"))

let form=new FormData()

form.append("image",blob,"chart.png")

let text=
"🚀 APX PREMIUM SIGNAL\n\n"+
"📊 Pair : "+pair+"\n"+
"⏱ TF : M1\n"+
"⭕ Direction : "+signal+"\n\n"+
"🌐 Powered by APX Premium"

form.append("text",text)

await fetch(SEND,{
method:"POST",
body:form
})

}

</script>

</body>
</html>
