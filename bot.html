<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APX ULTRA NEURAL v4</title>
    <style>
        :root {
            --bg: #020617;
            --primary: #00ffc3;
            --card: #0f172a;
            --buy: #00ff9d;
            --sell: #ff3b3b;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            margin: 0; padding: 20px;
        }

        .header {
            font-size: 26px;
            font-weight: 900;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(0, 255, 195, 0.4);
            margin-bottom: 5px;
        }

        .chart-box {
            background: var(--card);
            padding: 15px;
            border-radius: 20px;
            display: inline-block;
            border: 1px solid #1e293b;
            margin: 15px 0;
        }

        #signal-box {
            font-size: 20px;
            font-weight: bold;
            padding: 15px;
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
            width: 320px;
            margin: 10px auto;
        }

        .btn-group button {
            padding: 14px 30px;
            margin: 8px;
            border: none;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }

        .start-btn { background: var(--primary); color: #020617; box-shadow: 0 4px 15px rgba(0,255,195,0.3); }
        .stop-btn { background: #334155; color: white; }

        .history-table {
            width: 100%; max-width: 400px;
            margin: 20px auto;
            border-collapse: collapse;
            background: var(--card);
            border-radius: 10px;
            overflow: hidden;
        }

        th { background: #1e293b; padding: 12px; font-size: 12px; color: #94a3b8; }
        td { padding: 12px; border-bottom: 1px solid #1e293b; font-size: 14px; }

        .footer { margin-top: 25px; font-size: 13px; color: #64748b; }
        .premium { color: var(--primary); }
    </style>
</head>
<body>

    <div class="header">🤖 APX ULTRA AUTO</div>
    <div style="font-size: 12px; color: #94a3b8;">NEURAL SIGNAL ENGINE v4.0</div>
    
    <div class="chart-box">
        <canvas id="chart" width="340" height="200"></canvas>
    </div>

    <div id="signal-box">SYSTEM STANDBY</div>

    <div class="btn-group">
        <button class="start-btn" onclick="startBot()">START ENGINE</button>
        <button class="stop-btn" onclick="stopBot()">STOP</button>
    </div>

    <table class="history-table">
        <thead>
            <tr>
                <th>TIME</th>
                <th>PAIR</th>
                <th>SIGNAL</th>
                <th>RESULT</th>
            </tr>
        </thead>
        <tbody id="history-rows"></tbody>
    </table>

    <div class="footer">Powered by <span class="premium">APX PREMIUM</span></div>

<script>
    const API = "https://bot1.mkapi009.workers.dev/candles?pair=";
    const SEND = "https://bot1.mkapi009.workers.dev/send";
    const pairs = ["USDPKR_otc", "USDBDT_otc", "USDINR_otc", "USDARS_otc", "USDBRL_otc"];
    
    let botLoop = null;
    let stats = { total: 0, wins: 0, losses: 0 };

    function getCleanTime() {
        let d = new Date();
        d.setMinutes(d.getMinutes() + 1);
        return d.getHours().toString().padStart(2, '0') + ":" + d.getMinutes().toString().padStart(2, '0');
    }

    async function fetchSignal() {
        let pair = pairs[Math.floor(Math.random() * pairs.length)];
        let res = await fetch(API + pair);
        let candles = await res.json();
        let data = candles.slice(-20);
        
        let last = data[data.length-1];
        let prev = data[data.length-2];
        let signal = last.close > prev.close ? "BUY" : "SELL";
        let entry = getCleanTime();

        updateUI(data, pair, signal, entry);
        await sendToTelegram(pair, signal, entry);
    }

    function updateUI(candles, pair, signal, entry) {
        const canvas = document.getElementById("chart");
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0,0,340,200);

        // Professional Chart Drawing
        let max = Math.max(...candles.map(c => c.high));
        let min = Math.min(...candles.map(c => c.low));
        
        candles.forEach((c, i) => {
            let x = i * 15 + 20;
            let open = 160 - (c.open - min)/(max-min) * 120;
            let close = 160 - (c.close - min)/(max-min) * 120;
            ctx.fillStyle = c.close > c.open ? "#00ff9d" : "#ff3b3b";
            ctx.fillRect(x, Math.min(open, close), 10, Math.max(Math.abs(open-close), 2));
        });

        // Big Arrow and Text
        ctx.font = "bold 40px Arial";
        ctx.fillStyle = signal === "BUY" ? "#00ff9d" : "#ff3b3b";
        ctx.fillText(signal === "BUY" ? "▲" : "▼", 280, 60);

        document.getElementById("signal-box").innerHTML = `
            <span style="color:${signal === "BUY" ? '#00ff9d' : '#ff3b3b'}">${pair} ${signal}</span><br>
            <span style="font-size:14px; color:#94a3b8">Entry: ${entry} (M1)</span>
        `;

        // Update History
        stats.total++;
        let isWin = Math.random() > 0.3; // Logic for Win/Loss Display
        if(isWin) stats.wins++; else stats.losses++;

        let row = `<tr>
            <td>${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</td>
            <td>${pair}</td>
            <td style="color:${signal === 'BUY' ? '#00ff9d' : '#ff3b3b'}">${signal}</td>
            <td style="color:${isWin ? '#00ff9d' : '#ff3b3b'}">${isWin ? 'WIN' : 'MTG 1'}</td>
        </tr>`;
        document.getElementById("history-rows").insertAdjacentHTML('afterbegin', row);
    }

    async function sendToTelegram(pair, signal, entry) {
        return new Promise((resolve) => {
            const canvas = document.getElementById("chart");
            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                const text = `🤖 *APX ULTRA BOT* ====== 🚧\n\n` +
                             `📊 *Pair:* ${pair}\n` +
                             `🕒 *ENTRY:* ${entry}\n` +
                             `⌛ *Timeframe:* M1\n` +
                             `🎯 *DIRECTION:* ${signal === 'BUY' ? 'CALL 🟢' : 'PUT 🔴'}\n\n` +
                             `🌐 @MMQUOBOT | PREMIUM`;

                formData.append("photo", blob, "chart.png");
                formData.append("caption", text);
                formData.append("parse_mode", "Markdown");

                try {
                    await fetch(SEND, { method: "POST", body: formData });
                } catch (e) { console.log("Telegram Error"); }
                resolve();
            }, "image/png");
        });
    }

    function startBot() {
        alert("🚀 APX NEURAL START\nWelcome, Engine is analyzing markets...");
        fetchSignal();
        botLoop = setInterval(fetchSignal, 65000);
    }

    function stopBot() {
        clearInterval(botLoop);
        let accuracy = ((stats.wins/stats.total)*100 || 0).toFixed(1);
        alert(`📊 SESSION SUMMARY\n\nTotal Signals: ${stats.total}\nWins: ${stats.wins}\nAccuracy: ${accuracy}%\n\nBYE BYE!`);
    }
</script>
</body>
</html>
