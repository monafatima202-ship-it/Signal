<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>APX AUTO-FIXED PANEL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body { background:#020617; color:white; font-family:sans-serif; text-align:center; padding:10px; margin:0; }
        .header { color:#00ffc3; font-size:20px; font-weight:bold; padding:15px 0; }
        
        /* Chart & Signal Display */
        #chart-container { background:#0a0a0a; padding:10px; border-radius:15px; width:92%; margin:auto; border:1px solid #1e293b; }
        #tv-chart { height: 220px; width: 100%; background: #000; }
        
        .signal-display { padding:15px 0; border-top:1px solid #1e293b; margin-top:10px; }
        #v-dir { font-size:32px; font-weight:900; margin:10px 0; }
        
        /* Buttons */
        .controls { display:flex; gap:10px; width:92%; margin:15px auto; }
        .btn-start { background:#22c55e; flex:1; padding:15px; border-radius:10px; border:none; color:white; font-weight:bold; }
        .btn-stop { background:#ef4444; flex:1; padding:15px; border-radius:10px; border:none; color:white; font-weight:bold; }
        
        /* Summary */
        .summary-box { width:92%; margin:20px auto; background:#0f172a; border-radius:12px; padding:10px; }
        table { width:100%; border-collapse:collapse; font-size:12px; }
        th { color:#94a3b8; padding:8px; border-bottom:1px solid #1e293b; }
        td { padding:8px; }
        .buy { color:#00ff00; } .sell { color:#ff3d00; }
    </style>
</head>
<body>

<div class="header">🤖 APX AUTO-SIGNAL SYSTEM</div>

<div id="chart-container">
    <div id="tv-chart"></div>
    <div class="signal-display">
        <p id="v-pair">USDBDT_otc</p>
        <div id="v-dir">SYSTEM READY</div>
    </div>
</div>

<div class="controls">
    <button class="btn-start" id="startBtn" onclick="startEngine()">▶ START AUTO</button>
    <button class="btn-stop" id="stopBtn" onclick="stopEngine()" disabled>■ STOP</button>
</div>

<div class="summary-box">
    <b>📊 SIGNAL SUMMARY</b>
    <table id="summaryTable">
        <thead><tr><th>Time</th><th>Pair</th><th>Signal</th></tr></thead>
        <tbody id="summaryBody"></tbody>
    </table>
</div>

<script>
const WORKER = "https://signal.mkapi009.workers.dev/send";
let engine = null;

// Chart Initialization
let chart, candleSeries;
function initChart() {
    const chartElement = document.getElementById('tv-chart');
    chart = LightweightCharts.createChart(chartElement, {
        layout: { background: { color: '#000' }, textColor: '#94a3b8' },
        grid: { vertLines: { visible: false }, horzLines: { color: '#1e293b' } },
        timeScale: { visible: false },
        handleScale: false,
        handleScroll: false
    });
    candleSeries = chart.addCandlestickSeries({
        upColor: '#22c55e', downColor: '#ef4444', borderVisible: false, wickVisible: true
    });
}
initChart();

async function analyzeAndSend() {
    const pair = "USDBDT_otc";
    const status = document.getElementById("v-dir");
    
    try {
        status.innerText = "ANALYZING...";
        const res = await fetch(`https://radit.top/otc.php?asset=${pair}`);
        const data = await res.json();
        
        if(!data.data || data.data.length === 0) throw new Error("No Data");

        // Update Chart
        candleSeries.setData(data.data.slice(-40));
        chart.timeScale().fitContent();

        // Signal Logic
        const last = data.data[data.data.length - 1];
        const dir = (last.close > last.open) ? "BUY 🟢" : "SELL 🔴";
        
        status.innerText = dir;
        status.className = dir.includes("BUY") ? "buy" : "sell";

        // Telegram Send
        await sendTelegram(pair, dir);
        addSummary(pair, dir);
        
    } catch(e) {
        status.innerText = "RETRYING...";
        console.error("Fetch Error:", e);
    }
}

async function sendTelegram(pair, dir) {
    try {
        await new Promise(r => setTimeout(r, 500)); // Wait for chart to render
        const canvas = await html2canvas(document.querySelector("#chart-container"), { scale: 1 });
        const image = canvas.toDataURL("image/jpeg", 0.7);

        await fetch(WORKER, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ pair, dir, image })
        });
    } catch(e) { console.log("Telegram Failed"); }
}

function startEngine() {
    document.getElementById("startBtn").disabled = true;
    document.getElementById("stopBtn").disabled = false;
    analyzeAndSend();
    engine = setInterval(analyzeAndSend, 60000); // 1 minute interval
}

function stopEngine() {
    clearInterval(engine);
    document.getElementById("startBtn").disabled = false;
    document.getElementById("stopBtn").disabled = true;
    document.getElementById("v-dir").innerText = "STOPPED";
}

function addSummary(pair, dir) {
    const body = document.getElementById("summaryBody");
    const row = body.insertRow(0);
    row.innerHTML = `<td>${new Date().toLocaleTimeString()}</td><td>${pair}</td><td class="${dir.includes('BUY')?'buy':'sell'}">${dir}</td>`;
}
</script>
</body>
</html>
