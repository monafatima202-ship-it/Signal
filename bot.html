<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>APX PREMIUM BOT</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
}

.header{
font-size:24px;
color:#00ffc3;
margin-top:15px;
}

#chart{
height:320px;
margin:15px;
border-radius:10px;
}

.signal{
font-size:32px;
font-weight:bold;
}

.buy{color:#22c55e}
.sell{color:#ef4444}

button{
padding:14px;
margin:8px;
border:none;
border-radius:10px;
background:#022c22;
color:white;
box-shadow:0 0 10px #00ffc3;
}

table{
width:95%;
margin:auto;
border-collapse:collapse;
}

td,th{
border-bottom:1px solid #333;
padding:8px;
}

</style>

</head>

<body>

<div class="header">🤖 APX PREMIUM BOT</div>

<select id="pair">

<option>USDPKR_otc</option>
<option selected>USDBDT_otc</option>
<option>USDINR_otc</option>
<option>USDARS_otc</option>
<option>USDBRL_otc</option>
<option>USDMXN_otc</option>

</select>

<div id="chart"></div>

<div id="pairLabel"></div>
<div id="signal" class="signal">READY</div>
<div id="time"></div>

<button onclick="start()">START</button>
<button onclick="stop()">STOP</button>

<h3>📊 Dashboard</h3>

<div>

WIN : <span id="win">0</span> |
LOSS : <span id="loss">0</span> |
MTG1 : <span id="mtg">0</span>

</div>

<h3>📈 Summary</h3>

<table>

<thead>
<tr>
<th>Time</th>
<th>Pair</th>
<th>Signal</th>
<th>Result</th>
</tr>
</thead>

<tbody id="summary"></tbody>

</table>

<script>

const TG="https://bot1.mkapi009.workers.dev/send"

let chart=LightweightCharts.createChart(document.getElementById("chart"),{
layout:{background:{color:"#000"},textColor:"#ccc"}
})

let series=chart.addCandlestickSeries()

let engine=null

let stats={
win:0,
loss:0,
mtg:0
}

function convert(data){

return data.map(c=>{

let d=new Date(c.date+" "+c.time)

return{

time:Math.floor(d.getTime()/1000),
open:c.open,
high:c.high,
low:c.low,
close:c.close

}

})

}

async function loadCandles(){

let pair=document.getElementById("pair").value

let r=await fetch("https://radit.top/otc.php?asset="+pair)

let j=await r.json()

let candles=convert(j)

series.setData(candles)

return candles

}

function generateSignal(candles){

let last=candles[candles.length-1]

let prev=candles[candles.length-2]

let dir="SELL"

if(last.close>prev.close){

dir="BUY"

}

return dir

}

function futureTime(){

let d=new Date()

d.setMinutes(d.getMinutes()+1)

return d.toLocaleTimeString()

}

async function sendTelegram(){

let canvas=await html2canvas(document.body)

let img=canvas.toDataURL()

let pair=document.getElementById("pair").value

let dir=document.getElementById("signal").innerText

await fetch(TG,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
pair:pair,
dir:dir,
image:img
})
})

}

function updateSummary(pair,dir,res){

let row=document.createElement("tr")

row.innerHTML=

"<td>"+new Date().toLocaleTimeString()+"</td>"+
"<td>"+pair+"</td>"+
"<td>"+dir+"</td>"+
"<td>"+res+"</td>"

document.getElementById("summary").prepend(row)

}

async function run(){

let pair=document.getElementById("pair").value

let candles=await loadCandles()

let signal=generateSignal(candles)

document.getElementById("pairLabel").innerText=pair

document.getElementById("signal").innerText=signal

document.getElementById("signal").className=
signal=="BUY"?"signal buy":"signal sell"

document.getElementById("time").innerText=
"Signal Time : "+futureTime()

await sendTelegram()

}

function start(){

if(engine) return

run()

engine=setInterval(run,60000)

}

function stop(){

clearInterval(engine)

engine=null

alert("Engine stopped")

}

</script>

</body>
</html>
