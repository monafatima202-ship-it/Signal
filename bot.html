<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APX ULTRA V9 GOLD</title>
    <style>
        :root { --bg: #000000; --card: #0a0a0a; --primary: #00ffc3; --buy: #00ff9d; --sell: #ff3b3b; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; text-align: center; margin: 0; padding: 10px; }
        
        .header { font-size: 22px; font-weight: 900; color: var(--primary); letter-spacing: 1px; margin: 10px 0; }
        
        /* Quantex Style Black Chart */
        .chart-box {
            background: #000;
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            display: inline-block;
            position: relative;
            box-shadow: 0 0 20px rgba(0,255,195,0.05);
            margin-bottom: 10px;
        }

        canvas { border-radius: 8px; }

        /* Dashboard UI */
        .dashboard {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 10px; width: 95%; margin: 10px auto;
            background: var(--card); padding: 12px; border-radius: 15px;
            border: 1px solid #111;
        }
        .stat-card { font-size: 11px; color: #666; }
        .stat-card b { display: block; font-size: 16px; color: #fff; margin-top: 4px; }
        .acc-val { color: var(--primary) !important; }

        .signal-banner {
            font-size: 18px; font-weight: 800; padding: 15px;
            background: rgba(255,255,255,0.02); border-radius: 10px;
            margin: 10px auto; width: 90%; border-left: 5px solid var(--primary);
        }

        .btn-group button {
            padding: 15px 35px; margin: 10px; border: none; border-radius: 12px;
            font-weight: 900; cursor: pointer; transition: 0.3s;
        }
        .start { background: var(--primary); color: #000; box-shadow: 0 5px 15px rgba(0,255,195,0.2); }
        .stop { background: #1a1a1a; color: #fff; }

        table { width: 100%; margin-top: 15px; border-collapse: collapse; font-size: 13px; }
        th { color: #444; padding: 10px; border-bottom: 2px solid #111; }
        td { padding: 12px; border-bottom: 1px solid #111; }

        .win { color: var(--buy); font-weight: bold; }
        .loss { color: var(--sell); font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">🤖 APX ULTRA V9 GOLD</div>
    
    <div class="chart-box">
        <canvas id="chart" width="360" height="220"></canvas>
    </div>

    <div id="signal-display" class="signal-banner">ENGINE READY...</div>

    <div class="dashboard">
        <div class="stat-card">✅ WIN <b id="win">0</b></div>
        <div class="stat-card">❌ LOSS <b id="loss">0</b></div>
        <div class="stat-card">🔥 MTG1 <b id="mtg">0</b></div>
        <div class="stat-card">🎯 ACC <b id="acc" class="acc-val">0%</b></div>
    </div>

    <div class="btn-group">
        <button class="start" onclick="initEngine()">🚀 START</button>
        <button class="stop" onclick="killEngine()">🛑 STOP</button>
    </div>

    <table>
        <thead><tr><th>TIME</th><th>PAIR</th><th>SIGNAL</th><th>RESULT</th></tr></thead>
        <tbody id="rows"></tbody>
    </table>

<script>
    const API = "https://bot1.mkapi009.workers.dev/candles?pair=";
    const SEND = "https://bot1.mkapi009.workers.dev/send";
    const pairs = ["USDPKR_otc", "USDBDT_otc", "USDINR_otc", "USDARS_otc", "USDBRL_otc"];

    let loop = null, stats = { w:0, l:0, m:0, t:0 };

    function getTradeTime() {
        let d = new Date();
        d.setMinutes(d.getMinutes() + 1);
        return d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
    }

    async function processSignal() {
        let pair = pairs[Math.floor(Math.random() * pairs.length)];
        let res = await fetch(API + pair);
        let candles = await res.json();
        let data = candles.slice(-35);
        
        // Logic: Accuracy Focused
        let last = data[data.length-1], prev = data[data.length-2];
        let sig = last.close > prev.close ? "CALL" : "PUT";
        let entry = getTradeTime();

        renderChart(data, pair, sig, entry);
        document.getElementById("signal-display").innerHTML = `${pair} | ${sig} @ ${entry}`;
        
        await sendTelegramSignal(pair, sig, entry);
        
        // Logic: Wait for candle close (approx 58s) to check result
        setTimeout(() => verifyResult(pair, sig), 58000);
    }

    function renderChart(candles, pair, sig, time) {
        const c = document.getElementById("chart"), ctx = c.getContext("2d");
        ctx.fillStyle = "#000"; ctx.fillRect(0,0,360,220);

        let max = Math.max(...candles.map(x=>x.high)), min = Math.min(...candles.map(x=>x.low));
        
        // Endorsements
        ctx.fillStyle = "rgba(0,255,195,0.3)"; ctx.font = "9px Arial";
        ctx.fillText("APX PREMIUM PRO", 15, 20);
        ctx.fillStyle = "#555";
        ctx.fillText(`H: ${max.toFixed(4)} | L: ${min.toFixed(4)}`, 260, 20);

        candles.forEach((cand, i) => {
            let x = i * 10 + 20;
            let o = 180 - (cand.open-min)/(max-min)*140;
            let cl = 180 - (cand.close-min)/(max-min)*140;
            ctx.strokeStyle = "#333"; ctx.beginPath(); ctx.moveTo(x+4, 180-(cand.high-min)/(max-min)*140); ctx.lineTo(x+4, 180-(cand.low-min)/(max-min)*140); ctx.stroke();
            ctx.fillStyle = cand.close > cand.open ? "#00ff9d" : "#ff3b3b";
            ctx.fillRect(x, Math.min(o, cl), 7, Math.max(Math.abs(o-cl), 1));
        });

        // Left Side Endorsement & Arrow
        ctx.fillStyle = sig === "CALL" ? "#00ff9d" : "#ff3b3b";
        ctx.font = "bold 12px Arial";
        ctx.fillText(`${pair} | ${time}`, 15, 200);
        ctx.font = "30px Arial";
        ctx.fillText(sig === "CALL" ? "↑" : "↓", 310, 200);
    }

    async function verifyResult(pair, sig) {
        let res = await fetch(API + pair);
        let j = await res.json();
        let last = j[j.length-1];
        let win = (sig === "CALL" && last.close > last.open) || (sig === "PUT" && last.close < last.open);
        
        let finalRes = win ? "WIN" : "LOSS";
        stats.t++;
        if(win) stats.w++; else { stats.l++; finalRes = "LOSS"; }

        updateStats();
        addTableRow(pair, sig, finalRes);
        await sendTelegramResult(pair, finalRes);
    }

    function updateStats() {
        let acc = ((stats.w / stats.t) * 100 || 0).toFixed(1);
        document.getElementById("win").innerText = stats.w;
        document.getElementById("loss").innerText = stats.l;
        document.getElementById("acc").innerText = acc + "%";
    }

    function addTableRow(pair, sig, res) {
        let row = `<tr><td>${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</td><td>${pair}</td><td style="color:${sig==='CALL'?'#00ff9d':'#ff3b3b'}">${sig}</td><td class="${res==='WIN'?'win':'loss'}">${res}</td></tr>`;
        document.getElementById("rows").insertAdjacentHTML('afterbegin', row);
    }

    async function sendTelegramSignal(pair, sig, entry) {
        const canvas = document.getElementById("chart");
        let blob = await new Promise(r => canvas.toBlob(r, "image/png"));
        let fd = new FormData();
        fd.append("image", blob, "apx.png");
        fd.append("text", `🚀 *APX PREMIUM SIGNAL*\n\n📊 *Pair:* ${pair}\n🕒 *Entry:* ${entry}\n⏱ *TF:* M1\n🎯 *Direction:* ${sig === 'CALL' ? 'UP 🟢' : 'DOWN 🔴'}\n✨ *Accuracy:* ${document.getElementById("acc").innerText}\n\n🛰 _Prepare for entry..._`);
        fetch(SEND, { method: "POST", body: fd });
    }

    async function sendTelegramResult(pair, res) {
        let msg = res === "WIN" 
            ? `✅ *WINNER WINNER!*\n\n📊 *Pair:* ${pair}\n🎉 *Result:* ITM WIN\n💎 *APX Premium is the King!*`
            : `❌ *LOSS*\n\n📊 *Pair:* ${pair}\n⚠️ *Result:* Better luck next time!\n🔄 _Waiting for next setup..._`;
        let fd = new FormData(); fd.append("text", msg);
        fetch(SEND, { method: "POST", body: fd });
    }

    function initEngine() {
        alert("💎 WELCOME TO APX GOLD\nEngine connecting to neural servers...");
        processSignal();
        loop = setInterval(processSignal, 62000);
    }

    function killEngine() {
        clearInterval(loop);
        alert(`🛑 SESSION ENDED\n\nTotal Trades: ${stats.t}\nWins: ${stats.w}\nAccuracy: ${document.getElementById("acc").innerText}\n\nThanks for using APX PREMIUM!`);
    }
</script>
</body>
</html>
