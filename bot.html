<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>APX Premium Auto</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
}

.header{
font-size:26px;
color:#00ffc3;
margin-top:10px;
}

canvas{
background:#0b1220;
border-radius:10px;
margin-top:15px;
}

button{
padding:14px 25px;
margin:10px;
border:none;
border-radius:8px;
background:#00ffc3;
font-weight:bold;
}

.buy{color:#00ff9d;font-size:24px}
.sell{color:#ff3b3b;font-size:24px}

.stats{
margin-top:10px;
}

.footer{
margin-top:20px;
color:#888;
}

</style>

</head>

<body>

<div class="header">🤖 APX PREMIUM AUTO BOT</div>

<canvas id="chart" width="380" height="240"></canvas>

<div id="signal">SYSTEM READY</div>

<div class="stats">

Win : <span id="win">0</span> |
Loss : <span id="loss">0</span> |
MTG1 : <span id="mtg">0</span> |
Accuracy : <span id="acc">0</span>%

</div>

<br>

<button onclick="start()">START</button>
<button onclick="stop()">STOP</button>

<div class="footer">
Powered by 🌐 APX Premium
</div>

<script>

const API="https://bot1.mkapi009.workers.dev/candles?pair="
const TG="https://bot1.mkapi009.workers.dev/send"

const pairs=[
"USDPKR_otc",
"USDBDT_otc",
"USDINR_otc",
"USDARS_otc",
"USDBRL_otc",
"USDMXN_otc"
]

let engine=null

let win=0
let loss=0
let mtg=0
let total=0

function entryTime(){

let d=new Date()

d.setMinutes(d.getMinutes()+1)

return d.toLocaleTimeString()

}

async function getPairData(){

let pair=pairs[Math.floor(Math.random()*pairs.length)]

let r=await fetch(API+pair)

let j=await r.json()

return {pair,data:j.slice(-30)}

}

function getSignal(c){

let a=c[c.length-1]
let b=c[c.length-2]

if(a.close>b.close) return "BUY"
else return "SELL"

}

function drawChart(candles,signal,pair){

let canvas=document.getElementById("chart")
let ctx=canvas.getContext("2d")

ctx.clearRect(0,0,400,250)

let max=Math.max(...candles.map(c=>c.high))
let min=Math.min(...candles.map(c=>c.low))

let w=8
let gap=4

candles.forEach((c,i)=>{

let x=i*(w+gap)+20

let open=(200-(c.open-min)/(max-min)*160)
let close=(200-(c.close-min)/(max-min)*160)
let high=(200-(c.high-min)/(max-min)*160)
let low=(200-(c.low-min)/(max-min)*160)

ctx.strokeStyle="white"

ctx.beginPath()
ctx.moveTo(x+w/2,high)
ctx.lineTo(x+w/2,low)
ctx.stroke()

ctx.fillStyle=c.close>c.open?"#00ff9d":"#ff3b3b"

ctx.fillRect(x,Math.min(open,close),w,Math.abs(open-close))

})

ctx.fillStyle="white"
ctx.font="14px Arial"

ctx.fillText(pair+" "+signal,120,20)

}

async function sendSignal(pair,signal){

let entry=entryTime()

let canvas=document.getElementById("chart")

let img=canvas.toDataURL("image/jpeg")

let text=
"📊 APX PREMIUM SIGNAL\n\n"+
"Pair : "+pair+"\n"+
"Direction : "+signal+"\n"+
"Entry : "+entry+"\n\n"+
"Powered by APX Premium"

await fetch(TG,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
text:text,
image:img
})
})

}

function updateStats(){

document.getElementById("win").innerText=win
document.getElementById("loss").innerText=loss
document.getElementById("mtg").innerText=mtg

let acc=Math.round((win/(win+loss||1))*100)

document.getElementById("acc").innerText=acc

}

async function run(){

let d=await getPairData()

let signal=getSignal(d.data)

drawChart(d.data,signal,d.pair)

document.getElementById("signal").innerHTML=
signal=="BUY"
?`<span class=buy>${d.pair} BUY</span>`
:`<span class=sell>${d.pair} SELL</span>`

sendSignal(d.pair,signal)

}

function start(){

run()

engine=setInterval(run,60000)

}

function stop(){

clearInterval(engine)

alert("APX System Stopped")

}

</script>

</body>
</html>
