<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>APX ULTRA ENGINE</title>

<style>

body{
background:#050505;
color:white;
font-family:Arial;
text-align:center;
}

.header{
font-size:24px;
color:#00ffc3;
text-shadow:0 0 10px #00ffc3;
margin-top:10px;
}

canvas{
background:#000;
border-radius:10px;
box-shadow:0 0 20px #00ffc3;
margin-top:15px;
}

button{
padding:14px 24px;
margin:10px;
border:none;
border-radius:8px;
background:#00ffc3;
font-weight:bold;
}

.buy{color:#00ff9d;font-size:20px}
.sell{color:#ff3b3b;font-size:20px}

</style>

</head>

<body>

<div class="header">🚀 APX ULTRA ENGINE</div>

<canvas id="chart" width="380" height="260"></canvas>

<div id="signal">SYSTEM READY</div>

<button onclick="start()">START</button>
<button onclick="stop()">STOP</button>

<script>

const API="https://bot1.mkapi009.workers.dev/candles?pair="

const pairs=[
"USDPKR_otc",
"USDBDT_otc",
"USDINR_otc",
"USDMXN_otc"
]

let pairIndex=0
let engine=null

/* EMA */

function EMA(values,period){

let k=2/(period+1)
let ema=[values[0]]

for(let i=1;i<values.length;i++){

ema.push(values[i]*k+ema[i-1]*(1-k))

}

return ema

}

/* RSI */

function RSI(values,period=14){

let gain=0
let loss=0

for(let i=1;i<=period;i++){

let diff=values[i]-values[i-1]

if(diff>=0) gain+=diff
else loss-=diff

}

if(loss==0) return 100

let rs=gain/loss

return 100-(100/(1+rs))

}

/* SIGNAL */

function signalLogic(c){

let closes=c.map(x=>parseFloat(x.close))

let ema=EMA(closes,10)

let rsi=RSI(closes)

let last=closes[closes.length-1]
let lastEMA=ema[ema.length-1]

if(last>lastEMA && rsi>55) return "BUY"
if(last<lastEMA && rsi<45) return "SELL"

return null

}

/* FETCH */

async function getCandles(){

let pair=pairs[pairIndex]

pairIndex=(pairIndex+1)%pairs.length

let r=await fetch(API+pair)

let j=await r.json()

return {pair,candles:j.slice(-40)}

}

/* CHART */

function drawChart(c,pair,signal){

let canvas=document.getElementById("chart")

let ctx=canvas.getContext("2d")

ctx.clearRect(0,0,380,260)

/* grid */

ctx.strokeStyle="#111"

for(let i=0;i<10;i++){

ctx.beginPath()
ctx.moveTo(0,i*25)
ctx.lineTo(380,i*25)
ctx.stroke()

}

/* range */

let max=Math.max(...c.map(x=>x.high))
let min=Math.min(...c.map(x=>x.low))

let w=7
let gap=3

/* candles */

c.forEach((v,i)=>{

let x=i*(w+gap)+10

let open=200-(v.open-min)/(max-min)*160
let close=200-(v.close-min)/(max-min)*160
let high=200-(v.high-min)/(max-min)*160
let low=200-(v.low-min)/(max-min)*160

ctx.strokeStyle="#888"

ctx.beginPath()
ctx.moveTo(x+w/2,high)
ctx.lineTo(x+w/2,low)
ctx.stroke()

ctx.fillStyle=v.close>v.open?"#00ff9d":"#ff3b3b"

ctx.fillRect(x,Math.min(open,close),w,Math.abs(open-close))

})

/* EMA */

let closes=c.map(x=>x.close)

let ema=EMA(closes,10)

ctx.strokeStyle="#00eaff"

ctx.beginPath()

ema.forEach((v,i)=>{

let x=i*(w+gap)+10
let y=200-(v-min)/(max-min)*160

if(i==0) ctx.moveTo(x,y)
else ctx.lineTo(x,y)

})

ctx.stroke()

/* dots */

c.forEach((v,i)=>{

let x=i*(w+gap)+10

let y=200-(v.close-min)/(max-min)*160

ctx.fillStyle="#ff00ff"

ctx.beginPath()
ctx.arc(x+4,y,3,0,Math.PI*2)
ctx.fill()

})

/* label */

ctx.fillStyle="#00ffc3"

ctx.font="13px Arial"

ctx.fillText(pair+" M1",10,15)

/* signal */

if(signal=="BUY"){

ctx.fillStyle="#00ff9d"
ctx.fillText("BUY ↑",300,240)

}

if(signal=="SELL"){

ctx.fillStyle="#ff3b3b"
ctx.fillText("SELL ↓",300,240)

}

}

/* RUN */

async function run(){

let d=await getCandles()

let signal=signalLogic(d.candles)

drawChart(d.candles,d.pair,signal)

if(signal){

document.getElementById("signal").innerHTML=
signal=="BUY"
?`<span class="buy">${d.pair} BUY</span>`
:`<span class="sell">${d.pair} SELL</span>`

}

}

function start(){

run()

engine=setInterval(run,60000)

}

function stop(){

clearInterval(engine)

}

</script>

</body>
</html>
