<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>APX ULTRA BOT</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
}

.header{
font-size:28px;
color:#00ffc3;
text-shadow:0 0 20px #00ffc3;
}

canvas{
background:#020617;
border-radius:12px;
margin-top:20px;
box-shadow:0 0 25px #00ffc3;
}

button{
padding:14px 26px;
margin:10px;
border:none;
border-radius:10px;
background:#00ffc3;
font-weight:bold;
font-size:16px;
}

table{
margin-top:20px;
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #333;
padding:8px;
}

.win{color:#00ff9d}
.loss{color:#ff3b3b}

.footer{
margin-top:20px;
color:#aaa;
}

</style>

</head>

<body>

<div class="header">🤖 APX ULTRA BOT</div>

<canvas id="chart" width="380" height="240"></canvas>

<div id="signal">SYSTEM READY</div>

<br>

<button onclick="start()">🚀 START</button>
<button onclick="stop()">🛑 STOP</button>

<h3>📊 Dashboard</h3>

Signals : <span id="signals">0</span> |
WIN : <span id="win">0</span> |
LOSS : <span id="loss">0</span> |
MTG1 : <span id="mtg">0</span> |
ACC : <span id="acc">0%</span>

<h3>📜 History</h3>

<table id="history">

<tr>
<th>Time</th>
<th>Pair</th>
<th>Signal</th>
<th>Result</th>
</tr>

</table>

<h3>📊 Session Summary</h3>

<div id="summary">Session Running</div>

<div class="footer">
🌐 Powered by APX Premium
</div>

<script>

const API="https://bot1.mkapi009.workers.dev/candles?pair="
const SEND="https://bot1.mkapi009.workers.dev/send"

const pairs=[
"USDBDT_otc",
"USDPKR_otc",
"USDINR_otc",
"USDARS_otc",
"USDBRL_otc",
"USDMXN_otc"
]

let pairIndex=0
let engine=null

let win=0
let loss=0
let mtg=0
let signals=0
let total=0

let lastPair=""
let lastSignal=""
let lastEntry=""

function accuracy(){

if(total==0)return 0

return ((win/total)*100).toFixed(1)

}

function entryTime(){

let d=new Date()

d.setMinutes(d.getMinutes()+1)

return d.toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
})

}

async function getCandles(){

let pair=pairs[pairIndex]

pairIndex++

if(pairIndex>=pairs.length)pairIndex=0

let r=await fetch(API+pair)

let j=await r.json()

return {pair,data:j.slice(-30)}

}

function signalLogic(c){

let a=c[c.length-1]
let b=c[c.length-2]
let c3=c[c.length-3]

if(a.close>b.close && b.close>c3.close) return "BUY"

if(a.close<b.close && b.close<c3.close) return "SELL"

return Math.random()>0.5?"BUY":"SELL"

}

function drawChart(c,pair,signal){

let canvas=document.getElementById("chart")
let ctx=canvas.getContext("2d")

ctx.fillStyle="#020617"
ctx.fillRect(0,0,canvas.width,canvas.height)

let max=Math.max(...c.map(x=>x.high))
let min=Math.min(...c.map(x=>x.low))

let w=8
let gap=4

c.forEach((k,i)=>{

let x=i*(w+gap)+20

let open=200-(k.open-min)/(max-min)*160
let close=200-(k.close-min)/(max-min)*160
let high=200-(k.high-min)/(max-min)*160
let low=200-(k.low-min)/(max-min)*160

ctx.strokeStyle="#888"

ctx.beginPath()
ctx.moveTo(x+w/2,high)
ctx.lineTo(x+w/2,low)
ctx.stroke()

ctx.fillStyle=k.close>k.open?"#00ff9d":"#ff3b3b"

ctx.fillRect(x,Math.min(open,close),w,Math.abs(open-close))

})

ctx.fillStyle="#00ffc3"
ctx.font="12px Arial"
ctx.fillText("APX "+pair+" "+signal,120,15)

if(signal=="BUY"){

ctx.fillStyle="#00ff9d"
ctx.fillText("↑ BUY",310,220)

}else{

ctx.fillStyle="#ff3b3b"
ctx.fillText("↓ SELL",300,220)

}

}

function addHistory(pair,signal,result){

let t=new Date().toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
})

let row=
"<tr>"+
"<td>"+t+"</td>"+
"<td>"+pair+"</td>"+
"<td>"+signal+"</td>"+
"<td>"+result+"</td>"+
"</tr>"

document.getElementById("history").innerHTML+=row

}

function updateStats(){

document.getElementById("signals").innerText=signals
document.getElementById("win").innerText=win
document.getElementById("loss").innerText=loss
document.getElementById("mtg").innerText=mtg
document.getElementById("acc").innerText=accuracy()+"%"

}

async function sendTelegram(text){

let canvas=document.getElementById("chart")

let blob=await new Promise(r=>canvas.toBlob(r,"image/png"))

let form=new FormData()

form.append("image",blob,"chart.png")
form.append("text",text)

await fetch(SEND,{
method:"POST",
body:form
})

}

async function sendSignal(pair,signal){

let text=
"🚀 APX PREMIUM SIGNAL\n\n"+
"📊 Pair : "+pair+"\n"+
"🕓 Entry : "+lastEntry+"\n"+
"⭕ Direction : "+signal+"\n"+
"🎯 Accuracy : "+accuracy()+"%\n\n"+
"📈 Prepare for entry\n\n"+
"🌐 Powered by APX Premium"

sendTelegram(text)

}

async function sendWin(pair){

let text=
"✅ TRADE RESULT\n\n"+
"📊 Pair : "+pair+"\n"+
"🎉 Result : WIN\n\n"+
"🔥 Perfect entry"

sendTelegram(text)

}

async function sendLoss(pair){

let text=
"❌ TRADE RESULT\n\n"+
"📊 Pair : "+pair+"\n"+
"⚠ Result : LOSS"

sendTelegram(text)

}

async function sendMtg(pair){

let text=
"🟡 MARTINGALE RESULT\n\n"+
"📊 Pair : "+pair+"\n"+
"🎯 Result : MTG1 WIN\n\n"+
"💰 Recovery successful"

sendTelegram(text)

}

async function checkResult(){

let r=await fetch(API+lastPair)

let j=await r.json()

let c=j.slice(-2)

let prev=c[0]
let last=c[1]

let result

if(lastSignal=="BUY"){

result=last.close>prev.close?"WIN":"LOSS"

}else{

result=last.close<prev.close?"WIN":"LOSS"

}

total++

if(result=="WIN"){

win++
sendWin(lastPair)

}else{

loss++
sendLoss(lastPair)

}

addHistory(lastPair,lastSignal,result)

updateStats()

}

async function run(){

let d=await getCandles()

let signal=signalLogic(d.data)

lastPair=d.pair
lastSignal=signal
lastEntry=entryTime()

signals++

drawChart(d.data,d.pair,signal)

document.getElementById("signal").innerHTML=
d.pair+" "+signal+" ENTRY "+lastEntry

sendSignal(d.pair,signal)

setTimeout(checkResult,60000)

updateStats()

if(signals>=10){

document.getElementById("summary").innerHTML=
"Signals:"+signals+
" Win:"+win+
" Loss:"+loss+
" MTG:"+mtg+
" Accuracy:"+accuracy()+"%"

stop()

}

}

function start(){

run()

engine=setInterval(run,65000)

}

function stop(){

clearInterval(engine)

}

</script>

</body>
</html>
