<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>APX ULTRA SYSTEM</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
}

.header{
font-size:28px;
color:#00ffc3;
margin-top:15px;
}

canvas{
background:#0b1220;
border-radius:12px;
margin-top:15px;
}

button{
padding:14px 30px;
margin:10px;
border:none;
border-radius:10px;
background:#022c22;
color:white;
font-size:16px;
box-shadow:0 0 10px #00ffc3;
}

.signal{
font-size:30px;
margin:10px;
}

.buy{color:#00ff9d}
.sell{color:#ff3b3b}

.box{
background:#0b1220;
margin:15px;
padding:15px;
border-radius:10px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
border-bottom:1px solid #333;
padding:8px;
}

</style>

</head>

<body>

<div class="header">🤖 APX ULTRA PROFESSIONAL</div>

<select id="pair">

<option>USDPKR_otc</option>
<option selected>USDBDT_otc</option>
<option>USDINR_otc</option>
<option>USDARS_otc</option>
<option>USDBRL_otc</option>
<option>USDMXN_otc</option>

</select>

<br>

<canvas id="chart" width="380" height="250"></canvas>

<div id="signal" class="signal">READY</div>

<button onclick="start()">START</button>
<button onclick="stop()">STOP</button>

<div class="box">

📊 Dashboard

<br><br>

WIN : <span id="win">0</span>

LOSS : <span id="loss">0</span>

MTG1 : <span id="mtg">0</span>

</div>

<div class="box">

📈 Summary

<table>

<thead>

<tr>
<th>Time</th>
<th>Pair</th>
<th>Signal</th>
<th>Result</th>
</tr>

</thead>

<tbody id="summary"></tbody>

</table>

</div>

<script>

const TG="https://bot1.mkapi009.workers.dev/send"

let ctx=document.getElementById("chart").getContext("2d")

let engine=null

let stats={
win:0,
loss:0,
mtg:0
}

function entryTime(){

let d=new Date()

d.setMinutes(d.getMinutes()+1)

return d.toLocaleTimeString()

}

async function getData(){

let pair=document.getElementById("pair").value

let r=await fetch("https://radit.top/otc.php?asset="+pair)

let j=await r.json()

return j.slice(-30)

}

function drawChart(candles,signal){

ctx.clearRect(0,0,400,300)

let w=10
let gap=2

let max=Math.max(...candles.map(c=>c.high))
let min=Math.min(...candles.map(c=>c.low))

candles.forEach((c,i)=>{

let x=i*(w+gap)+20

let openY=200-(c.open-min)/(max-min)*180
let closeY=200-(c.close-min)/(max-min)*180
let highY=200-(c.high-min)/(max-min)*180
let lowY=200-(c.low-min)/(max-min)*180

ctx.strokeStyle="white"

ctx.beginPath()
ctx.moveTo(x+5,highY)
ctx.lineTo(x+5,lowY)
ctx.stroke()

ctx.fillStyle=c.close>c.open?"#00ff9d":"#ff3b3b"

ctx.fillRect(x,Math.min(openY,closeY),w,Math.abs(openY-closeY))

})

ctx.fillStyle="white"

ctx.font="16px Arial"

ctx.fillText(document.getElementById("pair").value,140,20)

ctx.fillStyle=signal=="BUY"?"#00ff9d":"#ff3b3b"

ctx.font="18px Arial"

ctx.fillText(signal,300,220)

}

function getSignal(c){

let last=c[c.length-1]
let prev=c[c.length-2]

return last.close>prev.close?"BUY":"SELL"

}

async function run(){

let candles=await getData()

let sig=getSignal(candles)

drawChart(candles,sig)

document.getElementById("signal").innerText=

sig+" | Entry "+entryTime()

document.getElementById("signal").className=

sig=="BUY"?"signal buy":"signal sell"

sendTG(sig)

updateSummary(sig)

}

function updateSummary(sig){

let pair=document.getElementById("pair").value

let row=document.createElement("tr")

row.innerHTML=

"<td>"+new Date().toLocaleTimeString()+"</td>"+
"<td>"+pair+"</td>"+
"<td>"+sig+"</td>"+
"<td>Pending</td>"

document.getElementById("summary").prepend(row)

}

async function sendTG(sig){

let canvas=document.getElementById("chart")

let img=canvas.toDataURL()

await fetch(TG,{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({

pair:document.getElementById("pair").value,
dir:sig,
image:img

})

})

}

function start(){

if(engine) return

alert("🚀 APX ULTRA SYSTEM STARTED")

run()

engine=setInterval(run,60000)

}

function stop(){

clearInterval(engine)

engine=null

alert(

"🛑 SYSTEM STOPPED\n\n"+
"WIN : "+stats.win+"\n"+
"LOSS : "+stats.loss+"\n"+
"MTG1 : "+stats.mtg

)

}

</script>

</body>
</html>
