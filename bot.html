<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APX ULTRA NEURAL ENGINE</title>
    <style>
        :root {
            --bg: #050a18;
            --card: #111827;
            --primary: #00ffc3;
            --buy: #00ff9d;
            --sell: #ff3b3b;
            --text: #e2e8f0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Premium Glass Header */
        .header {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
            text-shadow: 0 0 15px rgba(0, 255, 195, 0.3);
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .status-badge {
            background: rgba(0, 255, 195, 0.1);
            border: 1px solid var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 20px;
        }

        /* Advanced Chart Container */
        .chart-container {
            background: var(--card);
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #1f2937;
            position: relative;
        }

        canvas { border-radius: 8px; }

        /* Signal Alert Area */
        #signal-box {
            margin: 20px 0;
            padding: 20px;
            width: 90%;
            max-width: 380px;
            border-radius: 12px;
            background: #0f172a;
            border-left: 5px solid var(--primary);
            font-size: 20px;
            font-weight: bold;
        }

        .btn-group button {
            padding: 12px 30px;
            margin: 5px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-start { background: var(--primary); color: #000; }
        .btn-stop { background: #334155; color: white; }
        .btn-start:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(0, 255, 195, 0.4); }

        /* Stats Table */
        .history-card {
            width: 100%;
            max-width: 400px;
            margin-top: 25px;
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: #1f2937; padding: 12px; text-align: left; color: #94a3b8; }
        td { padding: 12px; border-bottom: 1px solid #1f2937; }

        .win { color: var(--buy); font-weight: bold; }
        .loss { color: var(--sell); font-weight: bold; }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #64748b;
        }
        
        .premium-tag { color: var(--primary); font-weight: bold; }

    </style>
</head>
<body>

<div class="header">APX ULTRA NEURAL</div>
<div class="status-badge" id="bot-status">SYSTEM STANDBY</div>

<div class="chart-container">
    <canvas id="chart" width="360" height="220"></canvas>
</div>

<div id="signal-box">READY TO ANALYZE...</div>

<div class="btn-group">
    <button class="btn-start" onclick="startBot()">LAUNCH AUTO</button>
    <button class="btn-stop" onclick="stopBot()">SHUTDOWN</button>
</div>

<div class="history-card">
    <table>
        <thead>
            <tr>
                <th>TIME</th>
                <th>PAIR</th>
                <th>SIGNAL</th>
                <th>RESULT</th>
            </tr>
        </thead>
        <tbody id="history-body"></tbody>
    </table>
</div>

<div class="footer">
    POWERED BY <span class="premium-tag">APX PREMIUM v4.0</span>
</div>

<script>
    const API = "https://bot1.mkapi009.workers.dev/candles?pair=";
    const SEND = "https://bot1.mkapi009.workers.dev/send";
    
    const pairs = ["USDPKR_otc", "USDBDT_otc", "USDINR_otc", "USDARS_otc", "USDBRL_otc"];
    let sessionStats = { total: 0, wins: 0, losses: 0, mtgWins: 0 };
    let engine = null;
    let lastSignal = null;

    // Time formatting without seconds
    function getEntryTime() {
        let d = new Date();
        d.setMinutes(d.getMinutes() + 1);
        return d.getHours().toString().padStart(2, '0') + ":" + d.getMinutes().toString().padStart(2, '0');
    }

    async function fetchMarketData() {
        let pair = pairs[Math.floor(Math.random() * pairs.length)];
        try {
            let r = await fetch(API + pair);
            let j = await r.json();
            return { pair, data: j.slice(-25) };
        } catch (e) { return null; }
    }

    function analyzeLogic(candles) {
        let c = candles;
        let last = c[c.length - 1];
        let prev = c[c.length - 2];
        let rsi_simple = last.close > prev.close ? "BUY" : "SELL";
        return rsi_simple;
    }

    function drawModernChart(candles, pair, signal) {
        const canvas = document.getElementById("chart");
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        let max = Math.max(...candles.map(c => c.high));
        let min = Math.min(...candles.map(c => c.low));
        let range = max - min;

        candles.forEach((c, i) => {
            let x = i * 14 + 10;
            let open = 180 - (c.open - min) / range * 150;
            let close = 180 - (c.close - min) / range * 150;
            let high = 180 - (c.high - min) / range * 150;
            let low = 180 - (c.low - min) / range * 150;

            // Wick
            ctx.strokeStyle = "#4b5563";
            ctx.beginPath();
            ctx.moveTo(x + 5, high);
            ctx.lineTo(x + 5, low);
            ctx.stroke();

            // Body
            ctx.fillStyle = c.close > c.open ? "#00ff9d" : "#ff3b3b";
            ctx.shadowBlur = 5;
            ctx.shadowColor = ctx.fillStyle;
            ctx.fillRect(x, Math.min(open, close), 10, Math.max(Math.abs(open - close), 1));
            ctx.shadowBlur = 0;
        });

        // Signal Arrow Logic
        ctx.font = "bold 20px Arial";
        if(signal === "BUY") {
            ctx.fillStyle = "#00ff9d";
            ctx.fillText("▲", 320, 50);
        } else {
            ctx.fillStyle = "#ff3b3b";
            ctx.fillText("▼", 320, 50);
        }
    }

    async function processSignal() {
        let market = await fetchMarketData();
        if(!market) return;

        let signal = analyzeLogic(market.data);
        let entry = getEntryTime();
        
        // Random Win/Loss Simulation for Auto MTG Logic (Replace with real result check if API allows)
        let isWin = Math.random() > 0.3; 
        let resultText = isWin ? "WIN" : "LOSS (MTG 1)";
        
        if(isWin) sessionStats.wins++;
        else sessionStats.losses++;
        sessionStats.total++;

        // Update UI
        drawModernChart(market.data, market.pair, signal);
        document.getElementById("signal-box").innerHTML = `
            <div style="font-size:14px; color:#94a3b8">${market.pair}</div>
            <div style="color:${signal==='BUY'?'#00ff9d':'#ff3b3b'}">${signal} @ ${entry}</div>
        `;

        updateTable(market.pair, signal, isWin);
        sendToTelegram(market.pair, signal, entry, resultText);
    }

    function updateTable(pair, signal, isWin) {
        let row = `<tr>
            <td>${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</td>
            <td>${pair}</td>
            <td style="color:${signal==='BUY'?'#00ff9d':'#ff3b3b'}">${signal}</td>
            <td class="${isWin?'win':'loss'}">${isWin?'ITM':'MTG 1'}</td>
        </tr>`;
        document.getElementById("history-body").insertAdjacentHTML('afterbegin', row);
    }

    function startBot() {
        alert("🚀 APX NEURAL ENGINE ACTIVATED\nAuto-trading & Analysis started.");
        document.getElementById("bot-status").innerHTML = "🟢 ENGINE ACTIVE";
        document.getElementById("bot-status").style.borderColor = "#00ff9d";
        processSignal();
        engine = setInterval(processSignal, 60000); // 1 Minute loop
    }

    function stopBot() {
        clearInterval(engine);
        document.getElementById("bot-status").innerHTML = "🔴 ENGINE STOPPED";
        
        let summary = `📊 SESSION SUMMARY\n\n` +
                      `Total Signals: ${sessionStats.total}\n` +
                      `Total Wins: ${sessionStats.wins}\n` +
                      `Total Losses: ${sessionStats.losses}\n` +
                      `Accuracy: ${((sessionStats.wins/sessionStats.total)*100 || 0).toFixed(1)}%\n\n` +
                      `EXITING SYSTEM...`;
        
        alert(summary);
    }

    async function sendToTelegram(pair, signal, entry, res) {
        let text = `🚀 *APX ULTRA SIGNAL* 🚀\n\n` +
                   `📊 *PAIR:* ${pair}\n` +
                   `⌛ *EXPIRY:* M1\n` +
                   `🕒 *ENTRY:* ${entry}\n` +
                   `🎯 *DIRECTION:* ${signal === 'BUY' ? 'CALL 🟢' : 'PUT 🔴'}\n` +
                   `📈 *PREDICTION:* ${res}\n\n` +
                   `🌐 @MMQUOBOT | PREMIUM`;

        let form = new FormData();
        form.append("text", text);
        // Canvas image logic included here in real version
        fetch(SEND, { method: "POST", body: form });
    }
</script>

</body>
</html>
