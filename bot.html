<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>APX ULTRA PANEL</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
}

button{
padding:14px 26px;
margin:10px;
border:none;
border-radius:10px;
background:#00ffc3;
font-size:16px;
}

</style>

</head>

<body>

<h2>🤖 APX ULTRA CONTROL PANEL</h2>

<button onclick="start()">START ENGINE</button>

<div id="status"></div>

<script>

const API="https://apxengine.mkapi009.workers.dev"

function start(){

fetch(API+"/start")

}

async function load(){

let r=await fetch(API+"/status")

let s=await r.json()

document.getElementById("status").innerHTML=
"Running : "+s.running+
"<br>Signals : "+s.count+
"<br>Cooldown : "+s.cooldown

}

setInterval(load,5000)

load()

</script>

</body>
</html>
