<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APX V12 FINAL</title>
    <style>
        :root { --bg: #000; --primary: #00ffc3; --buy: #00ff9d; --sell: #ff3b3b; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 5px; }
        
        .header { font-size: 22px; font-weight: 900; color: var(--primary); margin: 10px 0; letter-spacing: 2px; }
        
        /* Quantex Chart */
        .chart-box {
            background: #000; border: 1px solid #1a1a1a; border-radius: 15px;
            display: inline-block; position: relative; box-shadow: 0 0 25px rgba(0,255,195,0.1);
        }

        .stats-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            width: 95%; margin: 10px auto; background: #080808;
            padding: 15px; border-radius: 12px; border: 1px solid #111;
        }
        .stat-box { font-size: 10px; color: #666; }
        .stat-box b { display: block; font-size: 16px; color: #fff; margin-top: 5px; }

        .btn-group button {
            padding: 15px 35px; margin: 10px; border: none; border-radius: 12px;
            font-weight: 900; cursor: pointer; transition: 0.3s;
        }
        .start { background: var(--primary); color: #000; box-shadow: 0 0 15px rgba(0,255,195,0.3); }
        .stop { background: #1a1a1a; color: #fff; }

        table { width: 100%; margin-top: 10px; border-collapse: collapse; font-size: 13px; background: #050505; }
        th { color: #444; padding: 12px; border-bottom: 2px solid #111; }
        td { padding: 12px; border-bottom: 1px solid #0a0a0a; }
        .win-txt { color: var(--buy); font-weight: bold; }
        .loss-txt { color: var(--sell); font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">рџ’Ћ APX ULTRA V12 DIAMOND</div>
    
    <div class="chart-box">
        <canvas id="chart" width="360" height="230"></canvas>
    </div>

    <div class="stats-grid">
        <div class="stat-box">WIN <b id="win">0</b></div>
        <div class="stat-box">LOSS <b id="loss">0</b></div>
        <div class="stat-box">MTG1 <b id="mtg">0</b></div>
        <div class="stat-box">ACC <b id="acc" style="color:var(--primary)">0%</b></div>
    </div>

    <div class="btn-group">
        <button class="start" onclick="powerUp()">рџљЂ START</button>
        <button class="stop" onclick="powerDown()">рџ›‘ STOP</button>
    </div>

    <table>
        <thead><tr><th>TIME</th><th>PAIR</th><th>SIGNAL</th><th>RESULT</th></tr></thead>
        <tbody id="rows"></tbody>
    </table>

<script>
    const API = "https://bot1.mkapi009.workers.dev/candles?pair=";
    const SEND = "https://bot1.mkapi009.workers.dev/send";
    const pairs = ["USDPKR_otc", "USDBDT_otc", "USDINR_otc", "USDARS_otc", "USDBRL_otc"];

    let mainLoop = null, stats = { w:0, l:0, m:0, t:0 };

    function getNextTime() {
        let d = new Date(); d.setMinutes(d.getMinutes() + 1);
        return d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');
    }

    async function tgCall(fd) {
        try { await fetch(SEND, { method: "POST", body: fd }); } catch(e) {}
    }

    async function runEngine() {
        let pair = pairs[Math.floor(Math.random() * pairs.length)];
        let res = await fetch(API + pair);
        let j = await res.json();
        let data = j.slice(-45);
        
        let last = data[data.length-1], prev = data[data.length-2];
        let sig = last.close > prev.close ? "CALL" : "PUT";
        let entry = getNextTime();

        // 1. Draw & Update UI FIRST
        drawChart(data, pair, sig, entry);
        
        // 2. Send Signal to Telegram IMMEDIATELY
        const canvas = document.getElementById("chart");
        canvas.toBlob(async (blob) => {
            let fd = new FormData();
            fd.append("image", blob, "apx.png");
            fd.append("text", `рџљЂ *APX DIAMOND SIGNAL*\n\nрџ“Љ *Pair:* ${pair}\nрџ•’ *Entry:* ${entry}\nрџЋЇ *Direction:* ${sig === 'CALL' ? 'UP рџЌЏ' : 'DOWN рџЌЋ'}\nвњЁ *Acc:* ${document.getElementById("acc").innerText}\n\nрџ›° _Prepare for Entry..._`);
            await tgCall(fd);
        });

        // 3. WAIT exactly 60 seconds for candle result
        setTimeout(() => processResult(pair, sig, entry), 60000);
    }

    function drawChart(candles, pair, sig, time) {
        const c = document.getElementById("chart"), ctx = c.getContext("2d");
        ctx.fillStyle = "#000"; ctx.fillRect(0,0,360,230);
        let max = Math.max(...candles.map(x=>x.high)), min = Math.min(...candles.map(x=>x.low));
        
        // Mixed Colorful Bars (Top-Right)
        const colors = ["#ff00ff", "#00ffff", "#00ffc3", "#ffef00"];
        for(let i=0; i<12; i++) {
            ctx.fillStyle = colors[i % colors.length];
            ctx.fillRect(280 + (i*5), 15, 3, 10);
        }

        // Quantex Dots & Candles
        candles.forEach((cand, i) => {
            let x = i * 7 + 40;
            let o = 190 - (cand.open-min)/(max-min)*150;
            let cl = 190 - (cand.close-min)/(max-min)*150;
            ctx.strokeStyle = "#222"; ctx.beginPath(); ctx.moveTo(x+3, 190-(cand.high-min)/(max-min)*150); ctx.lineTo(x+3, 190-(cand.low-min)/(max-min)*150); ctx.stroke();
            ctx.fillStyle = cand.close > cand.open ? "#00ff9d" : "#ff3b3b";
            ctx.fillRect(x, Math.min(o, cl), 5, Math.max(Math.abs(o-cl), 1));
            if(i % 4 === 0) { ctx.fillStyle = "#ff00ff"; ctx.beginPath(); ctx.arc(x+2.5, o-12, 1.2, 0, 7); ctx.fill(); }
        });

        ctx.fillStyle = sig === "CALL" ? "#00ff9d" : "#ff3b3b";
        ctx.font = "bold 12px Arial"; ctx.fillText(`${pair} | ${time}`, 15, 215);
        ctx.font = "38px Arial"; ctx.fillText(sig === "CALL" ? "в†‘" : "в†“", 310, 210);
    }

    async function processResult(pair, sig, entryTime) {
        let res = await fetch(API + pair);
        let j = await res.json();
        let lastCandle = j[j.length-1];
        
        let final = "";
        // DOJI Check
        if(Math.abs(lastCandle.open - lastCandle.close) < 0.0001) { final = "DOJI (LOSS)"; stats.l++; }
        else {
            let win = (sig === "CALL" && lastCandle.close > lastCandle.open) || (sig === "PUT" && lastCandle.close < lastCandle.open);
            if(win) { final = "WIN"; stats.w++; } else { final = "LOSS"; stats.l++; }
        }
        
        stats.t++;
        updateStatsUI(pair, sig, final);

        // Telegram Result with Marketing
        let resMsg = final === "WIN" 
            ? `вњ… *ITM WINNER!* рџ’°\n\nрџ“Љ *Pair:* ${pair}\nрџЏ† *Result:* WIN\n\nрџ‘‘ *APX Premium: King of OTC Market! Join now for 100% Accuracy.*`
            : `вќЊ *LOSS / DOJI* рџ”»\n\nрџ“Љ *Pair:* ${pair}\nвљ пёЏ *Result:* ${final === "DOJI (LOSS)" ? "Market Neutral (Loss)" : "Better Luck Next Time"}\n\nрџ¦ѕ _Don't panic, stay disciplined for next setup!_`;
        
        let fd = new FormData(); fd.append("text", resMsg);
        await tgCall(fd);
    }

    function updateStatsUI(p, s, r) {
        let acc = ((stats.w / stats.t) * 100).toFixed(1);
        document.getElementById("win").innerText = stats.w;
        document.getElementById("loss").innerText = stats.l;
        document.getElementById("acc").innerText = acc + "%";
        document.getElementById("rows").insertAdjacentHTML('afterbegin', `<tr><td>${new Date().toLocaleTimeString()}</td><td>${p}</td><td>${s}</td><td class="${r==='WIN'?'win-txt':'loss-txt'}">${r}</td></tr>`);
    }

    async function powerUp() {
        let bars = "рџџҐрџџ§рџџЁрџџ©рџџ¦рџџЄ";
        let welcome = `рџ’Ћ *APX DIAMOND V12 STARTED* рџ’Ћ\n\n${bars}${bars}\nрџ“¶ *Status:* Connected to Neural Server\nвљЎ *Mode:* Advanced Predictor\n\nрџ“€ _Analyzing market candles..._`;
        let fd = new FormData(); fd.append("text", welcome); await tgCall(fd);
        alert("рџљЂ APX Engine Active!");
        runEngine(); mainLoop = setInterval(runEngine, 65000);
    }

    async function powerDown() {
        clearInterval(mainLoop);
        let summary = `рџ›‘ *SESSION SUMMARY* рџ›‘\n\nрџ“Љ *Stats:*\nвњ… Total Wins: ${stats.w}\nвќЊ Total Losses: ${stats.l}\nрџЋЇ Final Acc: ${document.getElementById("acc").innerText}\n\nрџ’Ћ _Powered by APX PREMIUM_`;
        let fd = new FormData(); fd.append("text", summary); await tgCall(fd);
        alert("рџ›‘ Session Ended. Check TG for Summary.");
    }
</script>
</body>
</html>
