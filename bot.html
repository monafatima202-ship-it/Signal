<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>APX ULTRA ENGINE</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
}

.header{
font-size:28px;
color:#00ffc3;
text-shadow:0 0 15px #00ffc3;
margin-top:10px;
}

canvas{
background:#000;
border-radius:12px;
box-shadow:0 0 20px #00ffc3;
margin-top:10px;
}

button{
padding:14px 26px;
margin:10px;
border:none;
border-radius:10px;
background:#00ffc3;
font-weight:bold;
font-size:16px;
}

.buy{color:#00ff9d;font-size:22px}
.sell{color:#ff3b3b;font-size:22px}

table{
margin-top:15px;
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #333;
padding:8px;
}

</style>

</head>

<body>

<div class="header">🚀 APX ULTRA ENGINE</div>

<canvas id="chart" width="380" height="260"></canvas>

<div id="signal">SYSTEM READY</div>

<button onclick="start()">🚀 START</button>
<button onclick="stop()">🛑 STOP</button>

<h3>📊 Dashboard</h3>

<div>
✅ WIN : <span id="win">0</span> |
❌ LOSS : <span id="loss">0</span> |
🔥 MTG1 : <span id="mtg">0</span> |
🎯 ACC : <span id="acc">0</span>%
</div>

<h3>📜 Signal History</h3>

<table id="history">

<tr>
<th>Time</th>
<th>Pair</th>
<th>Signal</th>
<th>Result</th>
</tr>

</table>

<script>

const API="https://bot1.mkapi009.workers.dev/candles?pair="
const SEND="https://bot1.mkapi009.workers.dev/send"

const pairs=[
"USDPKR_otc",
"USDBDT_otc",
"USDINR_otc",
"USDARS_otc",
"USDMXN_otc"
]

let pairIndex=0
let engine=null

let win=0
let loss=0
let mtg=0
let total=0

let lastSignal=null
let lastPair=null

/* EMA */

function EMA(values,period){

let k=2/(period+1)
let ema=[values[0]]

for(let i=1;i<values.length;i++){
ema.push(values[i]*k+ema[i-1]*(1-k))
}

return ema

}

/* RSI */

function RSI(values,period=14){

let gain=0
let loss=0

for(let i=1;i<=period;i++){

let diff=values[i]-values[i-1]

if(diff>=0) gain+=diff
else loss-=diff

}

if(loss==0) return 100

let rs=gain/loss

return 100-(100/(1+rs))

}

/* Signal */

function signalLogic(c){

let closes=c.map(x=>parseFloat(x.close))

let ema=EMA(closes,10)
let rsi=RSI(closes)

let last=closes[closes.length-1]
let lastEMA=ema[ema.length-1]

if(last>lastEMA && rsi>55) return "BUY"
if(last<lastEMA && rsi<45) return "SELL"

return null

}

/* Fetch candles */

async function getCandles(){

let pair=pairs[pairIndex]

pairIndex=(pairIndex+1)%pairs.length

let r=await fetch(API+pair)

let j=await r.json()

return {pair,candles:j.slice(-30)}

}

/* Chart */

function drawChart(c,pair,signal){

let canvas=document.getElementById("chart")
let ctx=canvas.getContext("2d")

ctx.clearRect(0,0,380,260)

ctx.strokeStyle="#111"

for(let i=0;i<10;i++){
ctx.beginPath()
ctx.moveTo(0,i*25)
ctx.lineTo(380,i*25)
ctx.stroke()
}

let max=Math.max(...c.map(x=>x.high))
let min=Math.min(...c.map(x=>x.low))

let w=7
let gap=3

c.forEach((v,i)=>{

let x=i*(w+gap)+10

let open=200-(v.open-min)/(max-min)*160
let close=200-(v.close-min)/(max-min)*160
let high=200-(v.high-min)/(max-min)*160
let low=200-(v.low-min)/(max-min)*160

ctx.strokeStyle="#888"

ctx.beginPath()
ctx.moveTo(x+w/2,high)
ctx.lineTo(x+w/2,low)
ctx.stroke()

ctx.fillStyle=v.close>v.open?"#00ff9d":"#ff3b3b"

ctx.fillRect(x,Math.min(open,close),w,Math.abs(open-close))

})

}

/* Dashboard */

function updateStats(){

document.getElementById("win").innerText=win
document.getElementById("loss").innerText=loss
document.getElementById("mtg").innerText=mtg

let acc=total?((win/total)*100).toFixed(1):0

document.getElementById("acc").innerText=acc

}

/* History */

function addHistory(pair,signal,result){

let t=new Date().toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
})

let row=
"<tr>"+
"<td>"+t+"</td>"+
"<td>"+pair+"</td>"+
"<td>"+signal+"</td>"+
"<td>"+result+"</td>"+
"</tr>"

document.getElementById("history").innerHTML+=row

}

/* Send telegram */

async function sendTelegram(pair,signal){

await fetch(
SEND,
{
method:"POST",
headers:{
'content-type':'application/json'
},
body:JSON.stringify({
pair:pair,
signal:signal
})
}
)

}

/* Engine */

async function run(){

let d=await getCandles()

drawChart(d.candles,d.pair)

let signal=signalLogic(d.candles)

if(!signal) return

lastSignal=signal
lastPair=d.pair

document.getElementById("signal").innerHTML=
signal=="BUY"
?`<span class="buy">${d.pair} BUY</span>`
:`<span class="sell">${d.pair} SELL</span>`

await sendTelegram(d.pair,signal)

/* Result */

setTimeout(async()=>{

let r=await fetch(API+d.pair)
let j=await r.json()

let c=j.slice(-2)

let prev=c[0]
let last=c[1]

let result

if(signal=="BUY"){
result=last.close>prev.close?"WIN":"LOSS"
}else{
result=last.close<prev.close?"WIN":"LOSS"
}

total++

if(result=="WIN") win++
else loss++

updateStats()

addHistory(d.pair,signal,result)

},60000)

}

function start(){

run()

engine=setInterval(run,65000)

}

function stop(){

clearInterval(engine)

alert("Session Closed")

}

</script>

</body>
</html>
