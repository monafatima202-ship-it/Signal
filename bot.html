<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>APX ULTRA PRO</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
}

.header{
font-size:28px;
color:#00ffc3;
text-shadow:0 0 15px #00ffc3;
}

canvas{
background:#000;
border-radius:12px;
box-shadow:0 0 25px #00ffc3;
margin-top:10px;
}

button{
padding:14px 26px;
margin:10px;
border:none;
border-radius:10px;
background:#00ffc3;
font-weight:bold;
font-size:16px;
}

.buy{color:#00ff9d;font-size:24px}
.sell{color:#ff3b3b;font-size:24px}

table{
margin-top:20px;
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #333;
padding:8px;
}

</style>

</head>

<body>

<div class="header">🤖 APX ULTRA PRO</div>

<canvas id="chart" width="380" height="240"></canvas>

<div id="signal">SYSTEM READY</div>

<button onclick="start()">🚀 START</button>
<button onclick="stop()">🛑 STOP</button>

<h3>📊 Dashboard</h3>

<div>
✅ WIN : <span id="win">0</span> |
❌ LOSS : <span id="loss">0</span> |
🎯 ACC : <span id="acc">0%</span>
</div>

<h3>📜 Signal History</h3>

<table id="history">
<tr>
<th>Time</th>
<th>Pair</th>
<th>Signal</th>
<th>Result</th>
</tr>
</table>

<script>

const API="https://bot1.mkapi009.workers.dev/candles?pair="
const SEND="https://bot1.mkapi009.workers.dev/send"

const pairs=[
"USDPKR_otc",
"USDBDT_otc",
"USDINR_otc",
"USDARS_otc"
]

let pairIndex=0
let engine=null

let win=0
let loss=0
let total=0

let lastSignal=null
let lastPair=null

function accuracy(){

if(total==0) return 0

return ((win/total)*100).toFixed(1)

}

function entryTime(){

let d=new Date()
d.setMinutes(d.getMinutes()+1)

return d.toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
})

}

async function sendTG(text){

let f=new FormData()
f.append("text",text)

await fetch(SEND,{
method:"POST",
body:f
})

}

async function getCandles(){

let pair=pairs[pairIndex]

pairIndex=(pairIndex+1)%pairs.length

let r=await fetch(API+pair)

let j=await r.json()

return {pair,data:j.slice(-30)}

}

function signalLogic(c){

let a=c[c.length-1]
let b=c[c.length-2]

if(a.close>b.close) return "BUY"
if(a.close<b.close) return "SELL"

}

function drawChart(c,pair){

let canvas=document.getElementById("chart")
let ctx=canvas.getContext("2d")

ctx.clearRect(0,0,380,240)

let max=Math.max(...c.map(x=>x.high))
let min=Math.min(...c.map(x=>x.low))

let w=7
let gap=3

c.forEach((v,i)=>{

let x=i*(w+gap)+10

let open=200-(v.open-min)/(max-min)*160
let close=200-(v.close-min)/(max-min)*160
let high=200-(v.high-min)/(max-min)*160
let low=200-(v.low-min)/(max-min)*160

ctx.strokeStyle="#888"

ctx.beginPath()
ctx.moveTo(x+w/2,high)
ctx.lineTo(x+w/2,low)
ctx.stroke()

ctx.fillStyle=v.close>v.open?"#00ff9d":"#ff3b3b"

ctx.fillRect(x,Math.min(open,close),w,Math.abs(open-close))

})

ctx.fillStyle="#00ffc3"
ctx.fillText(pair,10,15)

}

function addHistory(pair,signal,result){

let t=new Date().toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
})

let row=
"<tr>"+
"<td>"+t+"</td>"+
"<td>"+pair+"</td>"+
"<td>"+signal+"</td>"+
"<td>"+result+"</td>"+
"</tr>"

document.getElementById("history").innerHTML+=row

}

function updateStats(){

document.getElementById("win").innerText=win
document.getElementById("loss").innerText=loss
document.getElementById("acc").innerText=accuracy()+"%"

}

async function run(){

let d=await getCandles()

let signal=signalLogic(d.data)

if(!signal) return

lastSignal=signal
lastPair=d.pair

drawChart(d.data,d.pair)

document.getElementById("signal").innerHTML=
signal=="BUY"
?`<span class="buy">${d.pair} BUY ↑</span>`
:`<span class="sell">${d.pair} SELL ↓</span>`

let entry=entryTime()

let text=
"🚀 APX PREMIUM SIGNAL\n\n"+
"📊 Pair : "+d.pair+"\n"+
"🕓 Entry : "+entry+"\n"+
"⏱ TF : M1\n"+
"⭕ Direction : "+signal+"\n\n"+
"🌐 Powered by APX Premium"

await sendTG(text)

setTimeout(checkResult,60000)

}

async function checkResult(){

let r=await fetch(API+lastPair)
let j=await r.json()

let c=j.slice(-2)

let prev=c[0]
let last=c[1]

let result

if(lastSignal=="BUY"){
result=last.close>prev.close?"WIN":"LOSS"
}else{
result=last.close<prev.close?"WIN":"LOSS"
}

total++

if(result=="WIN"){
win++
await sendTG("✅ WIN\n\n📊 "+lastPair)
}else{
loss++
await sendTG("❌ LOSS\n\n📊 "+lastPair)
}

updateStats()

addHistory(lastPair,lastSignal,result)

}

function start(){

sendTG("🤖 APX BOT STARTED")

run()

engine=setInterval(run,65000)

}

function stop(){

clearInterval(engine)

sendTG("🛑 APX BOT STOPPED")

}

</script>

</body>
</html>
