<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MILOGZAI PROJECTION ENGINE</title>
<style>
body{background:#111;color:#00ff88;font-family:Arial;margin:0;padding:20px}
.container{max-width:600px;margin:auto;background:#1b2b3c;padding:20px;border-radius:10px}
select,input,button{width:100%;margin:6px 0;padding:10px;border-radius:6px;border:none}
button{background:#00ff88;color:black;font-weight:bold}
#output{background:#000;padding:12px;margin-top:10px;white-space:pre-wrap;min-height:220px}
</style>
</head>
<body>

<div class="container">
<h2>MILOGZAI PROJECTION FLOW</h2>

<select id="pairs" multiple size="6">
<option value="USDINR-otc">USDINR</option>
<option value="USDPKR-otc">USDPKR</option>
<option value="USDARS-otc">USDARS</option>
<option value="USDBDT-otc">USDBDT</option>
<option value="USDNGN-otc">USDNGN</option>
<option value="BRLUSD-otc">BRLUSD</option>
</select>

<input type="time" id="start" value="18:00">
<input type="time" id="end" value="21:00">

<button onclick="generate()">GENERATE FLOW</button>

<div id="output">READY</div>
</div>

<script>
const API="https://apx.mkapi009.workers.dev?pair=";

function padTime(min){
let h=Math.floor(min/60)%24;
let m=min%60;
return (h<10?"0":"")+h+":"+(m<10?"0":"")+m;
}

function toMin(t){
let [h,m]=t.split(":").map(Number);
return h*60+m;
}

async function getBias(pair){
try{
let res=await fetch(API+pair);
let json=await res.json();
if(!json.data||json.data.length<10) return "CALL";

let closes=json.data.map(c=>c.close);

// last 4 candle direction weight
let up=0,down=0;
for(let i=closes.length-4;i<closes.length;i++){
if(closes[i]>closes[i-1]) up++;
if(closes[i]<closes[i-1]) down++;
}

if(up>down) return "CALL";
if(down>up) return "PUT";

// if equal → use last candle
return closes[closes.length-1] > closes[closes.length-2] ? "CALL":"PUT";

}catch(e){
return "CALL"; // fallback only if API dead
}
}

async function generate(){

let output=document.getElementById("output");
output.innerText="Building Projection...";

let selected=[...document.getElementById("pairs").selectedOptions].map(o=>o.value);
if(selected.length<3){
output.innerText="Select minimum 3 pairs";
return;
}

let start=toMin(document.getElementById("start").value);
let end=toMin(document.getElementById("end").value);
if(end<=start) end+=1440;

let biasMap={};
await Promise.all(selected.map(async p=>{
biasMap[p]=await getBias(p);
}));

let pointer=start;
let index=0;
let lastDir=null;
let signals=[];

while(pointer<=end && signals.length<35){

let pair=selected[index%selected.length];
let clean=pair.replace("-otc","").toUpperCase();
let dir=biasMap[pair];

if(dir!==lastDir){
signals.push(`M1;${clean};${padTime(pointer)};${dir}`);
lastDir=dir;
pointer+=9+Math.floor(Math.random()*5); // 9–13 min gap
}

index++;
if(index>200) break;
}

if(signals.length===0){
output.innerText="Try different time range.";
return;
}

let text="MILOGZAI STYLE FLOW\n━━━━━━━━━━━━━━\n";
text+=signals.join("\n");
text+="\n━━━━━━━━━━━━━━\n• Projection Based\n• Momentum Bias\n• OTC Friendly";

output.innerText=text;
}
</script>

</body>
</html>
