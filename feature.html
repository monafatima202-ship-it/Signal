<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>APX NEON V72 PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#02060c;
--panel:#0a111f;
--neon:#00ff88;
--cyan:#00ccff;
--glow:0 0 15px #00ff88,0 0 35px #00ccff;
}
body{margin:0;background:var(--bg);color:#e0fbee;font-family:'Rajdhani'}
header{text-align:center;padding:22px;background:black;border-bottom:4px solid var(--neon);box-shadow:var(--glow)}
.logo{font-family:'Orbitron';font-size:26px;color:var(--neon);letter-spacing:3px}
.container{max-width:500px;margin:20px auto;padding:15px}
.panel{background:var(--panel);border-radius:20px;padding:25px;border:1px solid rgba(0,255,136,.3);box-shadow:0 0 25px rgba(0,255,136,.2)}
.tabs{display:flex;gap:8px;margin-bottom:15px}
.tab{flex:1;padding:12px;border:2px solid var(--neon);background:transparent;color:var(--neon);border-radius:10px;font-weight:bold;cursor:pointer}
.tab.active{background:var(--neon);color:black;box-shadow:var(--glow)}
select,input{width:100%;padding:14px;margin-bottom:15px;background:#050d1a;border:1px solid #1a3a3a;border-radius:12px;color:white}
button{width:100%;padding:16px;border:none;border-radius:14px;font-family:'Orbitron';font-weight:900;cursor:pointer}
.generate{background:linear-gradient(135deg,#00ff88,#00ccff);color:black;box-shadow:var(--glow)}
.telegram{background:#0088cc;color:white;margin-top:10px}
#output{margin-top:20px;background:#01040a;padding:20px;border-radius:15px;border:1px dashed var(--neon);white-space:pre-wrap;font-family:monospace;font-size:13px;min-height:300px}
.loader{text-align:center;color:var(--neon);padding:40px 0;font-family:'Orbitron'}
</style>
</head>
<body>

<header><div class="logo">APX NEON V72 PRO</div></header>

<div class="container">
<div class="panel">

<div class="tabs">
<button class="tab active" onclick="setMarket('OTC',this)">OTC</button>
<button class="tab" onclick="setMarket('CRYPTO',this)">CRYPTO</button>
<button class="tab" onclick="setMarket('STOCK',this)">STOCK</button>
</div>

<select id="pairs" multiple size="8"></select>

<div style="display:flex;gap:10px">
<input type="time" id="start" value="18:00">
<input type="time" id="end" value="21:00">
</div>

<button class="generate" onclick="generateSignals()">GENERATE FEATURE SIGNALS</button>
<button class="telegram" onclick="sendTelegram()">SEND TO TELEGRAM</button>

<div id="output">SYSTEM READY</div>

</div>
</div>

<script>
const API="https://apx.mkapi009.workers.dev?pair=";
const TG="https://signal.mkapi009.workers.dev/send";

let signals=[];

const PAIRS={
OTC:["USDPKR-otc","USDBDT-otc","USDINR-otc","USDARS-otc","USDNGN-otc","BRLUSD-otc","USDMXN-otc","USDEGP-otc","USDIDR-otc"],
CRYPTO:["XAUUSD-otc","BTCUSD-otc","ETHUSD-otc"],
STOCK:["MSFSTK-otc","AXPSTK-OTC","PFESTK-otc","MCDSTK-otc","JNJSTK-otc"]
};

function setMarket(type,btn){
document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
let s=document.getElementById("pairs");
s.innerHTML="";
PAIRS[type].forEach(p=>{
let o=document.createElement("option");
o.value=p;
o.textContent=p.replace(/-otc|-OTC/gi,"");
s.appendChild(o);
});
}
setMarket("OTC",document.querySelector(".tab.active"));

function ema(c,p){
if(c.length<p)return null;
let k=2/(p+1);
let e=c[c.length-p].close;
for(let i=c.length-p+1;i<c.length;i++)
e=c[i].close*k+e*(1-k);
return e;
}

function rsi(c){
if(c.length<15)return 50;
let g=0,l=0;
for(let i=c.length-14;i<c.length;i++){
let d=c[i].close-c[i-1].close;
if(d>0)g+=d;else l-=d;
}
let ag=g/14,al=l/14||0.0001;
return 100-(100/(1+ag/al));
}

function atr(c){
if(c.length<15)return 0;
let t=0;
for(let i=c.length-14;i<c.length;i++)
t+=c[i].high-c[i].low;
return t/14;
}

function analyze(c){
if(c.length<80)return null;
let e9=ema(c,9),e21=ema(c,21);
if(!e9||!e21)return null;

let score=0;
score+=(e9>e21?3:-3);

let r=rsi(c);
if(r<45)score+=2;
if(r>55)score-=2;

let m=0;
for(let i=c.length-6;i<c.length-1;i++)
m+=c[i+1].close-c[i].close;
m/=5;
score+=(m>0?1.5:-1.5);

let a=atr(c);
if(a>0.0003)score+=1;

if(Math.abs(score)>=4.5)
return{dir:score>0?"CALL":"PUT",strength:Math.abs(score),vol:a};

return null;
}

async function generateSignals(){
document.getElementById("output").innerHTML="<div class='loader'>SCANNING MARKET...</div>";
signals=[];

let selected=[...document.getElementById("pairs").selectedOptions].map(o=>o.value);
if(selected.length<1){
document.getElementById("output").innerText="Select pairs first";
return;
}

let pool=[];
for(let p of selected){
try{
let r=await fetch(API+p);
let j=await r.json();
let c=j.data||[];
let res=analyze(c);
if(res)pool.push({pair:p.split('-')[0],...res});
}catch(e){}
}

if(pool.length===0){
document.getElementById("output").innerText="NO STRONG STRUCTURE FOUND.";
return;
}

let start=document.getElementById("start").value;
let end=document.getElementById("end").value;
let now=new Date();
let current=new Date(now.toDateString()+" "+start+":00").getTime();
let stop=new Date(now.toDateString()+" "+end+":00").getTime();
if(stop<=current)stop+=86400000;

pool.sort((a,b)=>b.strength-a.strength);

while(current<stop && signals.length<20){
let asset=pool[signals.length%pool.length];
let gap=(3+ (6/(asset.vol+0.0001)) - (asset.strength*0.3));
gap=Math.max(3,Math.min(10,gap));
current+=gap*60000;
signals.push({time:new Date(current).toTimeString().slice(0,5),pair:asset.pair,dir:asset.dir});
}

let out="NEON V72 PRO\nUTC+5 | 1 MIN\n━━━━━━━━━━━━━━━━━━\n\n";
signals.forEach(s=>{
out+=`M1;${s.pair};${s.time};${s.dir}\n`;
});
out+="\n━━━━━━━━━━━━━━━━━━\n• Exact time entry\n• 1 Martingale max\n• Stop after 2 losses";

document.getElementById("output").innerText=out;
}

async function sendTelegram(){
if(signals.length===0){alert("Generate first");return;}
let loading="⚡ APX NEON LOADING ⚡\n[■■■■□□□□□□] 40%\nProcessing...\n";
await fetch(TG,{method:"POST",body:loading});
await new Promise(r=>setTimeout(r,2000));

let msg=document.getElementById("output").innerText;
await fetch(TG,{method:"POST",body:msg});
alert("Sent to Telegram");
}
</script>

</body>
</html>
