<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APX HYBRID PROJECTION ENGINE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
 --bg:#01060b;
 --panel:#0a111f;
 --neon:#00ff88;
 --cyan:#00ccff;
 --glow:0 0 18px #00ff88;
}
body{margin:0;background:var(--bg);color:#e0fbee;font-family:'Rajdhani';}
header{text-align:center;padding:20px;background:black;border-bottom:3px solid var(--neon);box-shadow:var(--glow);}
.logo{font-family:'Orbitron';font-size:22px;color:var(--neon);}
.container{max-width:520px;margin:15px auto;padding:10px;}
.panel{background:var(--panel);border-radius:18px;padding:20px;}
.tabs{display:flex;gap:6px;margin-bottom:12px;}
.tab{flex:1;padding:8px;border:2px solid var(--neon);background:transparent;color:var(--neon);border-radius:8px;cursor:pointer;}
.tab.active{background:var(--neon);color:black;}
select,input{width:100%;padding:10px;margin-bottom:10px;background:#050d1a;border:1px solid #1a3a3a;border-radius:8px;color:white;}
button{width:100%;padding:12px;border:none;border-radius:10px;font-family:'Orbitron';font-weight:900;margin:6px 0;cursor:pointer;text-transform:uppercase;}
.generate{background:linear-gradient(135deg,#00ff88,#00ccff);color:black;}
.telegram{background:#0088cc;color:white;}
#output{margin-top:12px;background:#01040a;padding:12px;border-radius:8px;border:1px dashed var(--neon);white-space:pre-wrap;font-family:monospace;font-size:13px;min-height:240px;}
</style>
</head>
<body>

<header>
<div class="logo">APX HYBRID PROJECTION ENGINE</div>
</header>

<div class="container">
<div class="panel">

<div class="tabs">
<button class="tab active" onclick="setMarket('OTC',this)">OTC</button>
<button class="tab" onclick="setMarket('CRYPTO',this)">CRYPTO</button>
<button class="tab" onclick="setMarket('STOCK',this)">STOCK</button>
</div>

<select id="pairs" multiple size="6"></select>

<input type="time" id="start" value="18:00">
<input type="time" id="end" value="20:00">

<button class="generate" onclick="generate()">GENERATE SIGNALS</button>
<button class="telegram" onclick="sendTG()">SEND TO TELEGRAM</button>

<div id="output">READY</div>

</div>
</div>

<script>

const API="https://apx.mkapi009.workers.dev?pair=";
const TG ="https://signal.mkapi009.workers.dev/send";

let currentMarket="OTC";
let signals=[];

const PAIRS={
 OTC:["USDPKR-otc","USDINR-otc","USDARS-otc","USDBDT-otc","USDNGN-otc"],
 CRYPTO:["BTCUSD-otc","ETHUSD-otc","XAUUSD-otc"],
 STOCK:["MCDSTK-otc","JNJSTK-otc","AXPSTK-otc"]
};

function setMarket(type,el){
 currentMarket=type;
 document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
 el.classList.add("active");
 loadPairs();
}

function loadPairs(){
 let select=document.getElementById("pairs");
 select.innerHTML="";
 PAIRS[currentMarket].forEach(p=>{
  let o=document.createElement("option");
  o.value=p;
  o.textContent=p.replace("-otc","");
  select.appendChild(o);
 });
}
loadPairs();

function EMA(prices,period){
 let k=2/(period+1);
 let ema=prices[0];
 for(let i=1;i<prices.length;i++){
  ema=prices[i]*k + ema*(1-k);
 }
 return ema;
}

function randomStep(){
 return Math.floor(Math.random()*6)+3; // 3-8 minute natural gap
}

async function generate(){

 let out=document.getElementById("output");
 out.innerText="ANALYZING BIAS & PROJECTING...";
 signals=[];

 let selected=[...document.getElementById("pairs").selectedOptions].map(o=>o.value);
 if(selected.length===0){out.innerText="SELECT PAIRS";return;}

 let start=document.getElementById("start").value;
 let end=document.getElementById("end").value;

 let startMin=parseInt(start.split(":")[0])*60+parseInt(start.split(":")[1]);
 let endMin=parseInt(end.split(":")[0])*60+parseInt(end.split(":")[1]);

 let projectionTimes=[];
 let t=startMin;

 while(true){
   if(startMin<=endMin){
     if(t>endMin) break;
   }else{
     if(t>endMin && t<startMin) break;
   }
   projectionTimes.push(t);
   t+=randomStep();
 }

 for(let pair of selected){

   let res=await fetch(API+pair);
   let data=await res.json();
   if(!data || !data.data) continue;

   let candles=data.data;
   if(candles.length<40) continue;

   let closes=candles.slice(-40).map(c=>c.close);

   let ema9=EMA(closes,9);
   let ema21=EMA(closes,21);

   let upCount=0;
   let downCount=0;

   for(let i=1;i<closes.length;i++){
     if(closes[i]>closes[i-1]) upCount++;
     else downCount++;
   }

   let bias;

   if(upCount>downCount && ema9>ema21){
     bias="CALL";
   }else if(downCount>upCount && ema9<ema21){
     bias="PUT";
   }else{
     bias = ema9>ema21 ? "CALL":"PUT";
   }

   for(let minute of projectionTimes){

     let hh=Math.floor(minute/60).toString().padStart(2,"0");
     let mm=(minute%60).toString().padStart(2,"0");

     signals.push(`M1;${pair.replace("-otc","")};${hh}:${mm};${bias}`);

     if(signals.length>=18) break;
   }

   if(signals.length>=18) break;
 }

 if(signals.length===0){
   out.innerText="NO DATA AVAILABLE";
   return;
 }

 signals.sort((a,b)=>a.split(";")[2].localeCompare(b.split(";")[2]));
 out.innerText=signals.join("\n");
}

async function sendTG(){
 if(signals.length===0){alert("No signals");return;}
 await fetch(TG,{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({signals})
 });
 alert("Sent to Telegram");
}

</script>
</body>
</html>
