<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>APX NEURAL - FINAL V63 (TERE EXAMPLE STYLE)</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
body { margin:0; background:#000; color:#0f0; font-family:'Rajdhani',sans-serif; }
header { text-align:center; padding:15px; background:#111; }
.container { max-width:500px; margin:20px auto; padding:20px; background:#0a0a0a; border:1px solid #0f0; border-radius:10px; }
select, input, button { width:100%; margin:10px 0; padding:12px; font-size:16px; background:#111; color:#0f0; border:1px solid #0f0; }
button { background:#0f0; color:#000; border:none; font-weight:bold; cursor:pointer; }
#output { margin-top:20px; white-space:pre-wrap; font-size:14px; line-height:1.5; background:#000; padding:10px; border:1px solid #0f0; border-radius:5px; }
</style>
</head>
<body>
<header><h2>APX NEURAL - FINAL V63</h2></header>

<div class="container">
  <select id="pairs" multiple size="6">
    <option value="USDPKR-otc">USDPKR</option>
    <option value="USDBDT-otc">USDBDT</option>
    <option value="USDINR-otc">USDINR</option>
    <option value="USDARS-otc">USDARS</option>
    <option value="USDNGN-otc">USDNGN</option>
    <option value="BRLUSD-otc">BRLUSD</option>
    <option value="USDMXN-otc">USDMXN</option>
  </select>

  <input type="time" id="start" value="18:00">
  <input type="time" id="end" value="19:00">

  <button onclick="runScan()">RUN SCAN</button>

  <div id="output">Waiting for scan...</div>
</div>

<script>
const API = "https://apx.mkapi009.workers.dev?pair=";

async function runScan() {
  const output = document.getElementById('output');
  output.innerHTML = "Scanning API...\n";

  const selected = Array.from(document.getElementById('pairs').selectedOptions).map(o => o.value);
  if (selected.length === 0) {
    output.innerHTML += "Koi pair select nahi kiya!\n";
    return;
  }

  let signals = "";
  let startStr = new Date().toDateString() + " " + document.getElementById('start').value;
  let current = new Date(startStr).getTime();
  let endStr = new Date().toDateString() + " " + document.getElementById('end').value;
  let endT = new Date(endStr).getTime();

  let loadedPairs = [];

  for (let pairVal of selected) {
    try {
      let res = await fetch(API + pairVal);
      let json = await res.json();
      let candles = json.data || [];
      if (candles.length < 30) continue;

      loadedPairs.push(pairVal.replace('-otc', '') + " (" + candles.length + " candles)");

      let last = candles[candles.length - 1];
      let prev = candles[candles.length - 2];
      let prev2 = candles[candles.length - 3] || prev;

      let direction = "HOLD";
      if (last.close > prev.close && prev.close > prev2.close) direction = "CALL";
      if (last.close < prev.close && prev.close < prev2.close) direction = "PUT";

      if (direction !== "HOLD") {
        let timeStr = new Date(current).toTimeString().slice(0,5);
        let cleanPair = pairVal.replace('-otc', '');
        signals += `M1;\( {cleanPair}; \){timeStr};${direction}\n`;

        // Natural gap: 2-8 min based on last candle range + small random
        let lastRange = last.high - last.low;
        let gap = 120000 + (lastRange * 1000000) + Math.floor(Math.random() * 180000);
        current += gap;
      }
    } catch (e) {
      output.innerHTML += `Error on ${pairVal}: ${e.message}\n`;
    }
  }

  output.innerHTML += "\nLoaded pairs:\n" + loadedPairs.join("\n") + "\n\n";

  if (signals === "") {
    output.innerHTML += "No strong signals right now (market flat hai).\nSubah 8-11 AM PKT ya news time try karo.";
  } else {
    output.innerHTML += "Generated Signals:\n" + signals;
  }
}
</script>
</body>
</html>
