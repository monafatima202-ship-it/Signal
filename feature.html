<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neon-DX Signal Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon-blue: #00f0ff;
      --neon-pink: #ff00aa;
      --neon-green: #39ff14;
      --bg-dark: #0a0a1f;
      --card-bg: #12123a;
      --text-light: #e0f7ff;
    }
    body {
      margin: 0; font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #0a0a1f, #1a0033);
      color: var(--text-light);
      min-height: 100vh; padding: 20px; box-sizing: border-box;
    }
    h1 { font-family: 'Orbitron', sans-serif; text-align: center; color: var(--neon-blue);
         text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue); margin-bottom: 10px; }
    .subtitle { text-align: center; color: #aaa; margin-bottom: 30px; }
    .container { max-width: 1100px; margin: 0 auto; }
    .controls { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin-bottom: 30px;
                background: var(--card-bg); padding: 20px; border-radius: 12px;
                box-shadow: 0 0 20px rgba(0, 240, 255, 0.2); border: 1px solid var(--neon-blue); }
    label { display: flex; flex-direction: column; color: #ccc; font-weight: bold; }
    select, input[type="time"], button {
      padding: 10px 15px; border: none; border-radius: 8px; font-size: 16px;
      background: #1e1e4a; color: white; border: 1px solid var(--neon-blue); transition: all 0.3s;
    }
    select:focus, input:focus { outline: none; box-shadow: 0 0 10px var(--neon-blue); }
    button { background: linear-gradient(45deg, var(--neon-pink), var(--neon-blue)); color: white;
             cursor: pointer; font-weight: bold; box-shadow: 0 0 15px var(--neon-pink); }
    button:hover { transform: scale(1.05); box-shadow: 0 0 25px var(--neon-blue); }
    #signalsTable { width: 100%; border-collapse: collapse; margin-top: 20px; background: var(--card-bg);
                    border-radius: 12px; overflow: hidden; box-shadow: 0 0 20px rgba(57, 255, 20, 0.2); }
    th, td { padding: 12px; text-align: center; border-bottom: 1px solid #333; }
    th { background: #1e1e4a; color: var(--neon-green); font-family: 'Orbitron', sans-serif; }
    .call { color: var(--neon-green); font-weight: bold; text-shadow: 0 0 8px var(--neon-green); }
    .put  { color: var(--neon-pink);  font-weight: bold; text-shadow: 0 0 8px var(--neon-pink); }
    .send-btn { background: #00cc66; color: black; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
    .send-btn:hover { background: #00ff88; }
    #status { text-align: center; margin-top: 20px; font-size: 18px; color: #ffcc00; }
  </style>
</head>
<body>

  <div class="container">
    <h1>NEON-DX SIGNAL GENERATOR</h1>
    <p class="subtitle">Real Candle-Based Signals • OTC • Crypto • Your API</p>

    <div class="controls">
      <label>Pair:
        <select id="pairSelect">
          <option value="USDTRY-OTC">USDTRY-OTC</option>
          <option value="USDPKR-OTC">USDPKR-OTC</option>
          <option value
