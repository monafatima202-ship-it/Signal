<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APX NEON V67 STRUCTURE SCANNER</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#01060b;
--neon:#00ff88;
--cyan:#00ccff;
--glow:0 0 15px #00ff88,0 0 30px #00ccff;
--text:#e0fbee;
}
body{margin:0;background:var(--bg);color:var(--text);font-family:'Rajdhani';}
header{text-align:center;padding:22px;background:black;border-bottom:4px solid var(--neon);box-shadow:var(--glow);}
.logo{font-family:'Orbitron';font-size:28px;color:var(--neon);text-shadow:0 0 15px var(--neon);letter-spacing:3px;}
.container{max-width:480px;margin:15px auto;padding:10px;}
.panel{background:#0a111f;border-radius:20px;padding:25px;border:1px solid rgba(0,255,136,.25);box-shadow:0 0 25px rgba(0,255,136,0.2);}
.tabs{display:flex;gap:8px;margin-bottom:15px;}
.tab{flex:1;padding:12px;border:2px solid var(--neon);background:transparent;color:var(--neon);border-radius:10px;cursor:pointer;font-weight:bold;transition:0.3s;}
.tab.active{background:var(--neon);color:black;box-shadow:var(--glow);transform:scale(1.05);}
select,input{width:100%;padding:14px;margin-bottom:15px;background:#050d1a;border:1px solid #1a3a3a;border-radius:12px;color:white;}
button{width:100%;padding:18px;border:none;border-radius:15px;font-family:'Orbitron';font-weight:900;cursor:pointer;text-transform:uppercase;transition:0.3s;}
.generate{background:linear-gradient(135deg,#00ff88,#00ccff);color:black;box-shadow:var(--glow);}
.telegram{background:linear-gradient(135deg,#0088cc,#00aaff);color:white;margin-top:12px;}
#output{margin-top:20px;background:#01040a;padding:20px;border-radius:15px;border:1px dashed var(--neon);white-space:pre-wrap;font-family:monospace;font-size:13px;color:#afffdf;line-height:1.7;min-height:300px;}
.loader{text-align:center;color:var(--neon);padding:40px 0;font-size:18px;}
</style>
</head>
<body>

<header><div class="logo">APX NEON V67 STRUCTURE</div></header>

<div class="container">
<div class="panel">

<div class="tabs">
<button class="tab active" onclick="setMarket('OTC',this)">OTC</button>
<button class="tab" onclick="setMarket('CRYPTO',this)">CRYPTO</button>
<button class="tab" onclick="setMarket('STOCK',this)">STOCK</button>
</div>

<select id="pairs" multiple size="8"></select>

<button class="generate" onclick="scanStructure()">SCAN STRUCTURE</button>
<button class="telegram" onclick="sendToTelegram()">SEND TO TELEGRAM</button>

<div id="output">SYSTEM READY</div>

</div>
</div>

<script>

const API="https://apx.mkapi009.workers.dev?pair=";
const TG="https://signal.mkapi009.workers.dev/send";

let signals=[];

const PAIRS={
OTC:["USDPKR-otc","USDBDT-otc","USDINR-otc","USDARS-otc","USDNGN-otc","BRLUSD-otc","USDMXN-otc","USDEGP-otc"],
CRYPTO:["XAUUSD-otc","BTCUSD-otc","ETHUSD-otc"],
STOCK:["MSFSTK-otc","AXPSTK-OTC","PFESTK-otc","MCDSTK-otc","JNJSTK-otc"]
};

function setMarket(type,btn){
document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
const select=document.getElementById("pairs");
select.innerHTML="";
PAIRS[type].forEach(p=>{
let opt=document.createElement("option");
opt.value=p;
opt.textContent=p.replace(/-otc|-OTC/gi,"");
select.appendChild(opt);
});
}
setMarket("OTC",document.querySelector(".tab.active"));

function ema(data,period){
if(data.length<period) return null;
let k=2/(period+1);
let sum=data.slice(0,period).reduce((s,c)=>s+c.close,0);
let emaVal=sum/period;
for(let i=period;i<data.length;i++){
emaVal=data[i].close*k+emaVal*(1-k);
}
return emaVal;
}

function rsi(data){
if(data.length<15) return 50;
let gains=0,losses=0;
for(let i=1;i<=14;i++){
let diff=data[data.length-i].close-data[data.length-i-1].close;
if(diff>0) gains+=diff; else losses-=diff;
}
let ag=gains/14;
let al=losses/14||0.0001;
return 100-(100/(1+ag/al));
}

async function scanStructure(){

const output=document.getElementById("output");
output.innerHTML='<div class="loader">SCANNING REAL STRUCTURE...</div>';

signals=[];

const selected=[...document.getElementById('pairs').selectedOptions].map(o=>o.value);
if(!selected.length){output.innerText="Select pairs.";return;}

for(let p of selected){
try{
let res=await fetch(API+p);
let json=await res.json();
let candles=json.data||[];
if(candles.length<120) continue;

for(let i=50;i<candles.length-1;i++){

let slice=candles.slice(0,i+1);
let fast=ema(slice,9);
let slow=ema(slice,21);
let r=rsi(slice);

let momentum=slice[i].close-slice[i-4].close;
let body=Math.abs(slice[i].close-slice[i].open);
let range=slice[i].high-slice[i].low||0.0001;
let strength=body/range;

let score=0;
if(fast>slow) score+=2;
if(fast<slow) score-=2;
if(r<45) score+=1;
if(r>55) score-=1;
if(momentum>0) score+=1;
if(momentum<0) score-=1;
if(strength>0.6) score+=(slice[i].close>slice[i].open?1:-1);

if(Math.abs(score)>=3){
let dir=score>0?"CALL":"PUT";
let t=new Date(slice[i+1].time).toTimeString().slice(0,5);
signals.push({pair:p.replace(/-otc|-OTC/gi,""),time:t,dir});
}
}

}catch(e){}
}

signals.sort((a,b)=>a.time.localeCompare(b.time));

if(!signals.length){
output.innerText="NO STRONG STRUCTURE FOUND.";
return;
}

let text="";
signals.slice(-25).forEach(s=>{
text+=`M1;${s.pair};${s.time};${s.dir}\n`;
});

output.innerText=text;
}

async function sendToTelegram(){
if(!signals.length){alert("Scan first.");return;}
let msg=document.getElementById("output").innerText;
await fetch(TG,{method:"POST",body:msg});
alert("Sent to Telegram");
}

</script>
</body>
</html>
