<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>APX FEATURE ENGINE STABLE</title>
<style>
body{background:#0f1724;color:#00ff88;font-family:Arial;margin:0;padding:20px}
.container{max-width:800px;margin:auto;background:#18293d;padding:20px;border-radius:12px}
h2{text-align:center}
select,input,button{width:100%;padding:10px;margin:6px 0;border-radius:6px;border:none}
button{background:#00ff88;color:black;font-weight:bold;cursor:pointer}
#output{background:#000;padding:12px;margin-top:10px;white-space:pre-wrap;min-height:250px;border-radius:6px}
#status{color:yellow;text-align:center;margin-top:5px;font-weight:bold}
</style>
</head>
<body>

<div class="container">
<h2>APX FEATURE SIGNAL ENGINE (Stable)</h2>

<select id="pair">
<option value="USDINR-OTC" selected>USDINR</option>
<option value="USDTRY-OTC">USDTRY</option>
<option value="USDPKR-OTC">USDPKR</option>
<option value="USDARS-OTC">USDARS</option>
<option value="USDBDT-OTC">USDBDT</option>
<option value="USDNGN-OTC">USDNGN</option>
</select>

<label>Min Confidence (0.5 - 0.95)</label>
<input type="number" id="confidence" step="0.05" value="0.80">

<label>Remove Back-to-Back (1 or 0)</label>
<input type="number" id="remove" value="1">

<button onclick="generate()">GENERATE FEATURE SIGNALS</button>

<div id="status"></div>
<div id="output">READY</div>
</div>

<script>

const API="https://apx.mkapi009.workers.dev?pair=";

function EMA(prices,period){
let k=2/(period+1);
let ema=prices[0];
for(let i=1;i<prices.length;i++){
ema=prices[i]*k+ema*(1-k);
}
return ema;
}

function sleep(){
return new Promise(r=>setTimeout(r,0));
}

async function generate(){

let pair=document.getElementById("pair").value;
let minConf=parseFloat(document.getElementById("confidence").value);
let remove=parseInt(document.getElementById("remove").value);

let output=document.getElementById("output");
let status=document.getElementById("status");

output.innerText="Fetching candle data...";
status.innerText="Loading...";

let res=await fetch(API+pair);
let json=await res.json();

if(!json.data || json.data.length<60){
output.innerText="Not enough data.";
return;
}

let closes=json.data.map(c=>c.close);

// 🔥 LIMIT SCAN RANGE (no full history)
let startIndex = closes.length - 60;

let signals=[];
let lastDir=null;

for(let i=startIndex; i<closes.length-10; i++){

let slice=closes.slice(i-20,i);
if(slice.length<20) continue;

let ema9=EMA(slice,9);
let ema21=EMA(slice,21);

if(!ema9 || !ema21) continue;

let dir=ema9>ema21?"CALL":"PUT";

// last 3 candle agreement
let up=0,down=0;
for(let j=i-3;j<i;j++){
if(closes[j]>closes[j-1]) up++;
if(closes[j]<closes[j-1]) down++;
}

let agreement = dir==="CALL" ? up/3 : down/3;

if(agreement>=minConf){

if(remove===1 && dir===lastDir) continue;

signals.push({
time: json.data[i].time || "00:00",
direction: dir,
confidence: Math.round(agreement*100)
});

lastDir=dir;
}

if(i%5===0) await sleep(); // 🔥 prevent freeze
}

if(signals.length===0){
output.innerText="No feature signals found.";
status.innerText="0 Signals";
return;
}

let text="TRADING SIGNALS\n━━━━━━━━━━━━━━\n";

signals.forEach(s=>{
text+=pair+" => "+s.time+" => "+s.direction+
" ("+s.confidence+"%)\n";
});

output.innerText=text;
status.innerText="Generated "+signals.length+" Signals";

}

</script>

</body>
</html>
