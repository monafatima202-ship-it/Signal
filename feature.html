<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APX MILOGZAI REAL ENGINE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#01060b;
--panel:#0a111f;
--neon:#00ff88;
--cyan:#00ccff;
}
body{margin:0;background:var(--bg);color:#e0fbee;font-family:'Rajdhani'}
header{text-align:center;padding:20px;background:black;border-bottom:4px solid var(--neon)}
.logo{font-family:'Orbitron';font-size:26px;color:var(--neon)}
.container{max-width:600px;margin:20px auto;padding:15px}
.panel{background:var(--panel);padding:25px;border-radius:15px}
select,input{width:100%;padding:12px;margin:10px 0;background:#050d1a;border:1px solid #1a3a3a;border-radius:10px;color:white}
button{width:100%;padding:16px;margin:8px 0;border:none;border-radius:12px;font-family:'Orbitron';font-weight:bold;cursor:pointer}
.generate{background:linear-gradient(135deg,#00ff88,#00ccff);color:black}
#output{margin-top:15px;background:#000;padding:15px;border-radius:10px;white-space:pre-wrap;min-height:250px;font-family:monospace}
</style>
</head>
<body>

<header>
<div class="logo">APX MILOGZAI REAL ENGINE</div>
</header>

<div class="container">
<div class="panel">

<select id="pairs" multiple size="6">
<option value="USDINR-otc">USDINR</option>
<option value="USDPKR-otc">USDPKR</option>
<option value="USDARS-otc">USDARS</option>
<option value="USDBDT-otc">USDBDT</option>
<option value="USDNGN-otc">USDNGN</option>
<option value="BRLUSD-otc">BRLUSD</option>
</select>

<input type="time" id="start" value="18:00">
<input type="time" id="end" value="21:00">

<button class="generate" onclick="generateFlow()">GENERATE MILOGZAI FLOW</button>

<div id="output">READY • SELECT MIN 3 PAIRS</div>

</div>
</div>

<script>

const API = "https://apx.mkapi009.workers.dev?pair=";
let signals = [];

function padTime(min){
let h=Math.floor(min/60)%24;
let m=min%60;
return (h<10?"0":"")+h+":"+(m<10?"0":"")+m;
}

function toMin(t){
let [h,m]=t.split(":").map(Number);
return h*60+m;
}

function EMA(arr,p){
let k=2/(p+1);
let ema=arr[0];
for(let i=1;i<arr.length;i++){
ema=arr[i]*k+ema*(1-k);
}
return ema;
}

async function getBias(pair){
try{
let res=await fetch(API+pair);
let json=await res.json();
if(!json.data || json.data.length<30) return null;

let closes=json.data.map(c=>c.close);
let slice=closes.slice(-20);

let ema9=EMA(slice,9);
let ema21=EMA(slice,21);

let up=0,down=0;
for(let i=closes.length-3;i<closes.length;i++){
if(closes[i]>closes[i-1]) up++;
if(closes[i]<closes[i-1]) down++;
}

if(ema9>ema21 && up>=2) return "CALL";
if(ema9<ema21 && down>=2) return "PUT";

return null;

}catch(e){
return null;
}
}

async function generateFlow(){

signals=[];
const output=document.getElementById("output");
output.innerText="Analyzing Candle Structure...";

const selected=[...document.getElementById("pairs").selectedOptions].map(o=>o.value);
if(selected.length<3){
output.innerText="Select at least 3 pairs bhai";
return;
}

let startMin=toMin(document.getElementById("start").value);
let endMin=toMin(document.getElementById("end").value);
if(endMin<=startMin) endMin+=1440;

let biasMap={};
await Promise.all(selected.map(async p=>{
biasMap[p]=await getBias(p);
}));

let currentMin=startMin;
let lastDir=null;
let index=0;

while(currentMin<=endMin && signals.length<40){

let pair=selected[index % selected.length];
let dir=biasMap[pair];
let clean=pair.replace("-otc","").toUpperCase();

if(dir && dir!==lastDir){
signals.push(`M1;${clean};${padTime(currentMin)};${dir}`);
lastDir=dir;
currentMin+=10; // stable 10 min gap
}

index++;
if(index>100) break;
}

if(signals.length===0){
output.innerText="Market flat hai ya structure weak hai";
return;
}

let txt="MILOGZAI STYLE FLOW\n━━━━━━━━━━━━━━\n";
txt+=signals.join("\n");
txt+="\n━━━━━━━━━━━━━━\n• EMA + Momentum\n• No Random\n• 1 Step MG Max";

output.innerText=txt;
}

</script>
</body>
</html>
