<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APX ULTRA PRO v8 STABLE</title>

<style>
body{
background:#061018;
color:#00ff88;
font-family:Arial;
margin:0;
padding:20px;
}
.container{
max-width:650px;
margin:auto;
background:#0c1b2a;
padding:20px;
border-radius:12px;
}
h2{
text-align:center;
margin-bottom:15px;
}
select,input,button{
width:100%;
margin:6px 0;
padding:10px;
border-radius:6px;
border:none;
}
button{
background:#00ff88;
color:black;
font-weight:bold;
cursor:pointer;
}
#output{
background:#000;
padding:12px;
margin-top:10px;
white-space:pre-wrap;
min-height:200px;
border-radius:6px;
}
#status{
margin-top:6px;
color:yellow;
font-weight:bold;
text-align:center;
}
</style>
</head>
<body>

<div class="container">
<h2>APX HYBRID MILOGZAI ULTRA PRO v8</h2>

<label>Select Pairs:</label>
<select id="pairs" multiple>
<option value="USDTRY-OTC">USDTRY</option>
<option value="USDPKR-OTC">USDPKR</option>
<option value="USDINR-OTC">USDINR</option>
<option value="USDARS-OTC">USDARS</option>
<option value="USDBDT-OTC">USDBDT</option>
<option value="USDNGN-OTC">USDNGN</option>
</select>

<label>Start Time:</label>
<input type="time" id="start" value="18:00">

<label>End Time:</label>
<input type="time" id="end" value="23:00">

<button onclick="generateSignals()">GENERATE STABLE FLOW</button>

<div id="status"></div>
<div id="output">READY</div>
</div>

<script>
const API="https://apx.mkapi009.workers.dev?pair=";
const MAX_SIGNALS=40;

let cachedBias={};

function padTime(min){
let h=Math.floor(min/60)%24;
let m=min%60;
return (h<10?"0":"")+h+":"+(m<10?"0":"")+m;
}

function toMin(t){
let [h,m]=t.split(":").map(Number);
return h*60+m;
}

function timeoutFetch(url,ms=4000){
return Promise.race([
fetch(url),
new Promise((_,rej)=>setTimeout(()=>rej("timeout"),ms))
]);
}

async function getBiasOnce(pair){
try{
let res=await timeoutFetch(API+pair);
if(!res.ok) throw "bad response";
let json=await res.json();
if(!json.data||json.data.length<5) throw "no data";

let last=json.data[json.data.length-1];
return last.direction || (Math.random()>0.5?"CALL":"PUT");
}catch(e){
return Math.random()>0.5?"CALL":"PUT";
}
}

async function generateSignals(){

let output=document.getElementById("output");
let status=document.getElementById("status");

output.innerText="Analyzing Market...";
status.innerText="Fetching bias...";

let selected=[...document.getElementById("pairs").selectedOptions].map(o=>o.value);

if(selected.length===0){
output.innerText="Please select at least one pair.";
status.innerText="";
return;
}

// 🔥 FETCH ONCE PER PAIR (NO LOOP FREEZE)
cachedBias={};

await Promise.all(selected.map(async pair=>{
cachedBias[pair]=await getBiasOnce(pair);
}));

status.innerText="Generating signals...";

let startMin=toMin(document.getElementById("start").value);
let endMin=toMin(document.getElementById("end").value);

if(endMin<=startMin) endMin+=1440;

let pointer=startMin;
let signals=[];
let count=0;

while(pointer<=endMin && count<MAX_SIGNALS){

for(let pair of selected){

if(count>=MAX_SIGNALS) break;

let clean=pair.replace("-OTC","");
let dir=cachedBias[pair];

signals.push("M1;"+clean+";"+padTime(pointer)+";"+dir);

pointer+=3;
count++;
}

pointer+=1;
}

if(signals.length===0){
output.innerText="No signals generated.";
status.innerText="0 Signals";
return;
}

output.innerText=
"HYBRID STABLE FLOW\n━━━━━━━━━━━━━━\n"+
signals.join("\n")+
"\n━━━━━━━━━━━━━━\nStable Engine Mode Active";

status.innerText="Generated "+signals.length+" Signals";
}
</script>

</body>
</html>
