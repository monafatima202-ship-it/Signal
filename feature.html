<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ ADOX APE v2 – 20 SIGNAL ENGINE ✦</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#02060c;
--panel:#0a111f;
--neon:#00ff88;
--cyan:#00ccff;
--glow:0 0 20px #00ff88,0 0 30px #00ccff;
}

body{
background:var(--bg);
color:#e0fbee;
font-family:'Rajdhani';
padding:20px;
}

header{
text-align:center;
padding:25px;
background:black;
border-bottom:4px solid var(--neon);
box-shadow:var(--glow);
}

.logo{
font-family:'Orbitron';
font-size:20px;
color:var(--neon);
text-shadow:0 0 15px var(--neon);
}

.container{
max-width:520px;
margin:20px auto;
}

.panel{
background:var(--panel);
padding:25px;
border-radius:20px;
box-shadow:0 0 25px rgba(0,255,136,.2);
}

.tabs{
display:flex;
gap:8px;
margin-bottom:15px;
}

.tab{
flex:1;
padding:10px;
border:2px solid var(--neon);
background:transparent;
color:var(--neon);
cursor:pointer;
border-radius:8px;
font-weight:bold;
}

.tab.active{
background:var(--neon);
color:black;
box-shadow:var(--glow);
}

select,input{
width:100%;
padding:12px;
margin:10px 0;
background:#050d1a;
border:1px solid #1a3a3a;
color:white;
border-radius:10px;
}

button{
width:100%;
padding:16px;
margin:10px 0;
border:none;
border-radius:12px;
font-family:'Orbitron';
font-weight:900;
cursor:pointer;
}

.generate{
background:linear-gradient(135deg,#00ff88,#00ccff);
color:black;
box-shadow:var(--glow);
}

.telegram{
background:linear-gradient(135deg,#0088cc,#00aaff);
color:white;
}

#output{
margin-top:20px;
background:#01040a;
padding:15px;
border-radius:12px;
border:1px dashed var(--neon);
white-space:pre-wrap;
font-family:monospace;
min-height:320px;
}

.loader{
display:none;
text-align:center;
color:var(--neon);
}
</style>
</head>

<body>

<header>
<div class="logo">✦ ADOX APE v2 – 20 SIGNAL FLOW ✦</div>
</header>

<div class="container">
<div class="panel">

<div class="tabs">
<button class="tab active" onclick="setMarket('OTC',this)">OTC</button>
<button class="tab" onclick="setMarket('CRYPTO',this)">CRYPTO</button>
<button class="tab" onclick="setMarket('STOCK',this)">STOCK</button>
</div>

<select id="pairs" multiple size="8"></select>

<input type="time" id="start" value="20:00">

<button class="generate" onclick="generateFlow()">GENERATE 20 SIGNAL FLOW</button>
<button class="telegram" onclick="sendToTelegram()">SEND TO TELEGRAM</button>

<div class="loader" id="loader">Analyzing Structure...</div>

<div id="output">READY • SELECT PAIRS</div>

</div>
</div>

<script>

const API="https://mrbeaxt.site/Qx/Qx.php?format=json&pair=";
const TG="https://signal.mkapi009.workers.dev/send";

const PAIRS={
OTC:["USDINR_otc","USDPKR_otc","USDBDT_otc","USDARS_otc","USDNGN_otc"],
CRYPTO:["BTCUSD_otc","ETHUSD_otc","XAUUSD_otc"],
STOCK:["MSFSTK_otc","AXPSTK_otc","PFESTK_otc"]
};

let currentMarket="OTC";
let signals=[];

function setMarket(type,el){
currentMarket=type;
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
el.classList.add("active");
let select=document.getElementById("pairs");
select.innerHTML="";
PAIRS[type].forEach(p=>{
let o=document.createElement("option");
o.value=p;
o.textContent=p.replace("_otc","");
select.appendChild(o);
});
}
setMarket("OTC",document.querySelector(".tab"));

function EMA(arr,period){
let k=2/(period+1);
let ema=arr[0];
for(let i=1;i<arr.length;i++){
ema=arr[i]*k+ema*(1-k);
}
return ema;
}

function toMin(t){
let [h,m]=t.split(":").map(Number);
return h*60+m;
}

function pad(min){
let h=Math.floor(min/60)%24;
let m=min%60;
return (h<10?"0":"")+h+":"+(m<10?"0":"")+m;
}

async function analyzePair(pair){

let r=await fetch(API+pair);
let j=await r.json();
if(!j.success||j.data.length<50) return null;

let data=j.data.reverse();
let closes=data.map(c=>parseFloat(c.close));
let opens=data.map(c=>parseFloat(c.open));
let highs=data.map(c=>parseFloat(c.high));
let lows=data.map(c=>parseFloat(c.low));

let ema9=EMA(closes.slice(-40),9);
let ema21=EMA(closes.slice(-40),21);

let sep=Math.abs(ema9-ema21);
if(sep<0.0002) return null;

let bull=0,bear=0;
for(let i=closes.length-6;i<closes.length;i++){
if(closes[i]>opens[i]) bull++;
if(closes[i]<opens[i]) bear++;
}

let volatility=0;
for(let i=highs.length-15;i<highs.length;i++){
volatility+=Math.abs(highs[i]-lows[i]);
}
volatility/=15;

let dir=ema9>ema21?"CALL":"PUT";

let score=sep*1000 + Math.max(bull,bear)*4 + volatility*500;

let confidence=Math.min(95,
Math.floor((sep*1000*0.4 + Math.max(bull,bear)*4*0.3 + volatility*500*0.3)/10)+60
);

return {pair,dir,score,confidence};
}

async function generateFlow(){

signals=[];
let output=document.getElementById("output");
let loader=document.getElementById("loader");
loader.style.display="block";
output.innerText="";

let selected=[...document.getElementById("pairs").selectedOptions].map(o=>o.value);

if(selected.length===0){
loader.style.display="none";
output.innerText="Select at least 1 pair";
return;
}

let pointer=toMin(document.getElementById("start").value);

let structures=[];
for(let p of selected){
let result=await analyzePair(p);
if(result) structures.push(result);
}

if(structures.length===0){
loader.style.display="none";
output.innerText="Market flat or weak structure.";
return;
}

let lastPair=null;

while(signals.length<20){

structures.sort((a,b)=>b.score-a.score);

let chosen=structures[0];

if(lastPair===chosen.pair && structures.length>1){
if(structures[0].score < structures[1].score*1.08){
chosen=structures[1];
}
}

signals.push(
`M1;${chosen.pair.replace("_otc","")};${pad(pointer)};${chosen.dir};${chosen.confidence}%`
);

let gap=6+Math.floor(chosen.score%5);
pointer+=gap;

chosen.score*=0.93;
lastPair=chosen.pair;
}

loader.style.display="none";

let text="✦ ADOX APE v2 – 20 SIGNAL FLOW ✦\n━━━━━━━━━━━━━━━━━━\nUTC+6 | Adaptive Engine\n\n";
text+=signals.join("\n");
text+="\n━━━━━━━━━━━━━━━━━━\n• EMA Structure Weighted\n• Momentum Dominance\n• Volatility Ranked\n• Strength Decay\n• 1 Step MG Max\n• Avoid News";

output.innerText=text;
}

async function sendToTelegram(){
if(signals.length===0){alert("Generate flow first");return;}
let msg="✦ ADOX APE v2 – 20 FLOW ✦\n━━━━━━━━━━\nUTC+6\n"+signals.join("\n")+"\n━━━━━━━━━━\nTrade Safe";
await fetch(TG,{method:"POST",headers:{"Content-Type":"text/plain"},body:msg});
alert("Sent to Telegram");
}

</script>
</body>
</html>
