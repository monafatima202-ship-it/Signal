<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APX NEURAL FEATURE ENGINE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
 --bg:#01060b;
 --panel:#0a111f;
 --neon:#00ff88;
 --cyan:#00ccff;
 --glow:0 0 20px #00ff88;
}
body{margin:0;background:var(--bg);color:#e0fbee;font-family:'Rajdhani';}
header{text-align:center;padding:20px;background:black;border-bottom:4px solid var(--neon);box-shadow:var(--glow);}
.logo{font-family:'Orbitron';font-size:26px;color:var(--neon);}
.container{max-width:520px;margin:15px auto;padding:10px;}
.panel{background:var(--panel);border-radius:20px;padding:25px;}
.tabs{display:flex;gap:8px;margin-bottom:15px;}
.tab{flex:1;padding:12px;border:2px solid var(--neon);background:transparent;color:var(--neon);border-radius:10px;cursor:pointer;font-weight:bold;}
.tab.active{background:var(--neon);color:black;box-shadow:var(--glow);}
select,input{width:100%;padding:14px;margin-bottom:15px;background:#050d1a;border:1px solid #1a3a3a;border-radius:10px;color:white;}
button{width:100%;padding:18px;border:none;border-radius:15px;font-family:'Orbitron';font-weight:900;cursor:pointer;text-transform:uppercase;margin:8px 0;}
.generate{background:linear-gradient(135deg,#00ff88,#00ccff);color:black;box-shadow:var(--glow);}
.telegram{background:#0088cc;color:white;}
#output{margin-top:20px;background:#01040a;padding:20px;border-radius:15px;border:1px dashed var(--neon);white-space:pre-wrap;font-family:monospace;font-size:13px;min-height:300px;}
</style>
</head>
<body>

<header>
<div class="logo">APX NEURAL FEATURE ENGINE</div>
</header>

<div class="container">
<div class="panel">

<div class="tabs">
 <button class="tab active" onclick="setMarket('OTC',this)">OTC</button>
 <button class="tab" onclick="setMarket('CRYPTO',this)">CRYPTO</button>
 <button class="tab" onclick="setMarket('STOCK',this)">STOCK</button>
</div>

<select id="pairs" multiple size="6"></select>

<div style="display:flex;gap:10px;">
 <input type="time" id="start" value="12:00">
 <input type="time" id="end" value="02:00">
</div>

<button class="generate" onclick="generateSignals()">GENERATE FEATURE SIGNALS</button>
<button class="telegram" onclick="sendToTelegram()">SEND TO TELEGRAM</button>

<div id="output">READY</div>

</div>
</div>

<script>

const API="https://apx.mkapi009.workers.dev?pair=";
const TG ="https://signal.mkapi009.workers.dev/send";

let signals=[];
let currentMarket="OTC";

const PAIRS={
 OTC:["USDPKR-otc","USDINR-otc","USDARS-otc","USDBDT-otc","USDNGN-otc"],
 CRYPTO:["BTCUSD-otc","ETHUSD-otc","XAUUSD-otc"],
 STOCK:["MCDSTK-otc","JNJSTK-otc","AXPSTK-otc"]
};

function setMarket(type,el){
 currentMarket=type;
 document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
 el.classList.add("active");
 loadPairs();
}

function loadPairs(){
 let select=document.getElementById("pairs");
 select.innerHTML="";
 PAIRS[currentMarket].forEach(p=>{
  let opt=document.createElement("option");
  opt.value=p;
  opt.textContent=p.replace("-otc","");
  select.appendChild(opt);
 });
}
loadPairs();

function EMA(prices,period){
 let k=2/(period+1);
 let ema=prices[0];
 for(let i=1;i<prices.length;i++){
  ema=prices[i]*k + ema*(1-k);
 }
 return ema;
}

function body(c){return Math.abs(c.close-c.open);}
function range(c){return c.high-c.low;}

function isHammer(c){
 if(range(c)===0) return false;
 let lower=Math.min(c.open,c.close)-c.low;
 let upper=c.high-Math.max(c.open,c.close);
 return lower>=body(c)*2 && upper<=body(c)*0.5;
}

function isShootingStar(c){
 if(range(c)===0) return false;
 let upper=c.high-Math.max(c.open,c.close);
 let lower=Math.min(c.open,c.close)-c.low;
 return upper>=body(c)*2 && lower<=body(c)*0.5;
}

async function generateSignals(){

 let output=document.getElementById("output");
 signals=[];
 output.innerText="ANALYZING PAST CANDLES...";

 let selected=[...document.getElementById("pairs").selectedOptions].map(o=>o.value);
 if(selected.length===0){
   output.innerText="SELECT PAIRS";
   return;
 }

 let startVal=document.getElementById("start").value;
 let endVal=document.getElementById("end").value;

 let startMin=parseInt(startVal.split(":")[0])*60+parseInt(startVal.split(":")[1]);
 let endMin=parseInt(endVal.split(":")[0])*60+parseInt(endVal.split(":")[1]);

 let allSignals=[];

 for(let pair of selected){

   try{

     let res=await fetch(API+pair);
     let data=await res.json();

     if(!data || !Array.isArray(data.data)) continue;

     let candles=data.data;

     for(let i=21;i<candles.length;i++){

       let c=candles[i];
       let prev=candles[i-1];

       if(!c.time) continue;

       let parts=c.time.split(":");
       if(parts.length!==2) continue;

       let totalMin=parseInt(parts[0])*60+parseInt(parts[1]);

       let valid=false;
       if(startMin<=endMin){
         valid= totalMin>=startMin && totalMin<=endMin;
       }else{
         valid= totalMin>=startMin || totalMin<=endMin;
       }

       if(!valid) continue;

       let closes=candles.slice(i-21,i+1).map(x=>x.close);
       let ema9=EMA(closes,9);
       let ema21=EMA(closes,21);

       let direction=null;

       if(isHammer(c) && ema9>ema21){
         direction="CALL";
       }
       else if(isShootingStar(c) && ema9<ema21){
         direction="PUT";
       }
       else if(ema9>ema21 && c.close>prev.close){
         direction="CALL";
       }
       else if(ema9<ema21 && c.close<prev.close){
         direction="PUT";
       }

       if(direction){
         allSignals.push(`M1;${pair.replace("-otc","")};${c.time};${direction}`);
       }

     }

   }catch(e){}
 }

 if(allSignals.length===0){
   output.innerText="NO HIGH ACCURACY STRUCTURE FOUND.";
   return;
 }

 allSignals.sort((a,b)=>a.split(";")[2].localeCompare(b.split(";")[2]));

 signals=allSignals;
 output.innerText=signals.join("\n");
}

async function sendToTelegram(){

 if(signals.length===0){
   alert("No signals to send");
   return;
 }

 await fetch(TG,{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({signals})
 });

 alert("Sent to Telegram");
}

</script>

</body>
</html>
