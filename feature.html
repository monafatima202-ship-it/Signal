<!DOCTYPE html>
<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#02050f;
--panel:#0b1626;
--neon:#00ffea;
--neon-glow:0 0 15px #00ffea, 0 0 30px #00ffea;

}
body{margin:0;background:var(--bg);color:#e0fffc;font-family:'Rajdhani';min-height:100vh;overflow-x:hidden;}
header{text-align:center;padding:22px;background:linear-gradient(to bottom,#000,#001122);border-bottom:3px solid var(--neon);box-shadow:var(--neon-glow);}
.logo{font-family:'Orbitron';font-size:32px;color:var(--neon);text-shadow:var(--neon-glow);letter-spacing:4px;}
.container{max-width:520px;margin:25px auto;padding:15px;}
.panel{background:var(--panel);border-radius:20px;padding:25px;border:2px solid rgba(0,255,234,0.25);box-shadow:0 0 30px rgba(0,255,234,0.18);}
.tabs{display:flex;gap:10px;margin-bottom:18px;}
.tab{flex:1;padding:12px;border:2px solid var(--neon);background:transparent;color:var(--neon);border-radius:12px;font-weight:700;cursor:pointer;transition:0.3s;}
.tab.active{background:var(--neon);color:#000;box-shadow:var(--neon-glow);transform:scale(1.05);}
select,input[type="time"]{width:100%;padding:14px;margin:12px 0;background:#051021;border:1px solid #1a3a5a;border-radius:12px;color:#fff;font-size:16px;}
button{width:100%;padding:16px;margin:10px 0;border:none;border-radius:14px;font-family:'Orbitron';font-weight:900;cursor:pointer;text-transform:uppercase;letter-spacing:1.5px;transition:0.3s;}
.generate{background:linear-gradient(135deg,#00ffea,#00aaff);color:#000;box-shadow:var(--neon-glow);}
.generate:hover{transform:scale(1.03);box-shadow:0 0 40px var(--neon);}
.telegram{background:linear-gradient(135deg,#0088cc,#00aaff);color:white;box-shadow:0 0 15px #0088cc;}
#output{margin-top:25px;background:#000814;padding:20px;border-radius:14px;border:2px dashed var(--neon);white-space:pre-wrap;font-family:monospace;font-size:13.5px;color:#c8fffa;line-height:1.6;min-height:220px;box-shadow:0 0 20px rgba(0,255,234,0.15);}
.loader{text-align:center;color:var(--neon);font-family:'Orbitron';font-size:18px;padding:50px 0;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.6;}}
</style>
</head>

<body>

<header>
<div class="logo">APX ULTRA V38 FINAL PRO</div>
</header>

<div class="container">
<div class="panel">

<div class="tabs">
<button class="tab active" onclick="setMarket('OTC',this)">OTC</button>
<button class="tab" onclick="setMarket('STOCK',this)">STOCK</button>
<button class="tab" onclick="setMarket('CRYPTO',this)">CRYPTO</button>
</div>

<select id="pairs" multiple size="8"></select>

<div style="display:flex;gap:12px;margin:15px 0;">
<input type="time" id="start" value="15:00">
<input type="time" id="end" value="18:00">
</div>

<button class="generate" onclick="generateSignals()">GENERATE HIGH QUALITY SIGNALS</button>
<button class="telegram" onclick="sendToTelegram()">SEND TO TELEGRAM</button>

<div id="output">SYSTEM READY • SELECT ASSETS & TIME RANGE</div>

</div>
</div>

<script>

const API = "https://apx.mkapi009.workers.dev?pair=";
const TG  = "https://signal.mkapi009.workers.dev/send";

let signalsList = [];
let isProcessing = false;

const PAIRS_LIST = {
  OTC:    ["USDPKR-otc","USDBDT-otc","USDINR-otc","USDARS-otc","USDNGN-otc","BRLUSD-otc","USDMXN-otc","USDEGP-otc","USDIDR-otc"],
  STOCK:  ["MSFSTK-otc","AXPSTK-OTC","PFESTK-otc","MCDSTK-otc","JNJSTK-otc","FABSTK-otc","BOISTK-otc"],
  CRYPTO: ["XAUUSD-otc","BTCUSD-otc","ETHUSD-otc"]
};

function setMarket(type, btn) {
  document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  const select = document.getElementById("pairs");
  select.innerHTML = "";
  PAIRS_LIST[type].forEach(p => {
    let opt = document.createElement("option");
    opt.value = p;
    opt.textContent = p.replace(/-otc|-OTC/,'').replace('USD','').replace('otc','');
    select.appendChild(opt);
  });
}
setMarket("OTC", document.querySelector(".tab.active"));

function calculateEMA(candles, period) {
  if (candles.length < period) return null;
  const k = 2 / (period + 1);
  let ema = candles.slice(0, period).reduce((sum, c) => sum + c.close, 0) / period;
  for (let i = period; i < candles.length; i++) {
    ema = (candles[i].close * k) + (ema * (1 - k));
  }
  return ema;
}

function analyze(candles) {
  if (candles.length < 200) return null;
  const recent = candles.slice(-200);

  const emaFast   = calculateEMA(recent, 9);
  const emaMedium = calculateEMA(recent, 21);
  const emaSlow   = calculateEMA(recent, 50);
  const emaLong   = calculateEMA(recent, 100);

  if (!emaFast || !emaMedium || !emaSlow) return null;

  let score = 0;

  // Trend alignment
  if (emaFast > emaMedium && emaMedium > emaSlow) score += 4;       // strong bullish
  if (emaFast < emaMedium && emaMedium < emaSlow) score -= 4;       // strong bearish

  // Partial trend bonus
  if (emaFast > emaMedium) score += 1.5;
  if (emaFast < emaMedium) score -= 1.5;

  // Momentum (last 20 candles)
  let momentum = 0;
  for (let i = recent.length - 20; i < recent.length; i++) {
    const diff = recent[i].close - recent[i-1].close;
    if (diff > 0) momentum += 1;
    else if (diff < 0) momentum -= 1;
  }
  if (momentum >= 10) score += 3;
  if (momentum <= -10) score -= 3;

  // Breakout detection
  const last = recent[recent.length - 1];
  const recentHigh = Math.max(...recent.slice(-40).map(c => c.high));
  const recentLow  = Math.min(...recent.slice(-40).map(c => c.low));
  if (last.close > recentHigh * 1.0005) score += 3;
  if (last.close < recentLow * 0.9995)  score -= 3;

  // Volume surge bonus (if available)
  const avgVol = recent.slice(-20).reduce((sum, c) => sum + (c.volume || 0), 0) / 20;
  if (last.volume > avgVol * 1.8) score += 2;  // bullish volume

  // Final filter - strict for quality
  if (score >= 7)  return "CALL ↑";
  if (score <= -7) return "PUT ↓";

  return null;
}

async function generateSignals() {
  if (isProcessing) return alert("Processing already running...");
  isProcessing = true;
  signalsList = [];

  const output = document.getElementById("output");
  output.innerHTML = `<div class="loader">DEEP SCANNING 200+ CANDLES...</div>`;

  const selected = [...document.getElementById("pairs").selectedOptions].map(o => o.value);
  if (!selected.length) {
    output.innerText = "Select at least 1-2 pairs bhai!";
    isProcessing = false;
    return;
  }

  for (const pair of selected) {
    try {
      const res = await fetch(API + pair);
      const json = await res.json();
      const candles = json?.data || [];
      const direction = analyze(candles);
      if (direction) {
        signalsList.push({
          pair: pair.replace(/-otc|-OTC/,'').trim(),
          dir: direction
        });
      }
    } catch (e) {
      console.log("API fail for", pair);
    }
  }

  if (!signalsList.length) {
    output.innerText = "No high-quality setups found this cycle.\nTry different pairs or later time.";
  } else {
    distributeTimes();
    displaySignals();
  }

  isProcessing = false;
}

function distributeTimes() {
  const startVal = document.getElementById("start").value;
  const endVal   = document.getElementById("end").value;
  const now      = new Date();
  let startMs    = new Date(now.toDateString() + " " + startVal + ":00").getTime();
  let endMs      = new Date(now.toDateString() + " " + endVal + ":00").getTime();
  if (endMs <= startMs) endMs += 24 * 60 * 60 * 1000;

  const totalSignals = signalsList.length;
  if (totalSignals === 0) return;

  const interval = (endMs - startMs) / (totalSignals + 1); // even spacing
  let current = startMs + interval;

  signalsList = signalsList.map(sig => {
    const timeStr = new Date(current).toTimeString().slice(0,5);
    current += interval;
    return { ...sig, time: timeStr };
  });
}

function displaySignals() {
  let text = "✦ APX ULTRA V38 FINAL PRO ✦\n";
  text += "━━━━━━━━━━━━━━━━━━━━━━━━━━\n";
  text += "UTC+5 PK Time | 1 Min Expiry\n";
  text += "METHOD: EMA + MOMENTUM + BREAKOUT\n\n";

  signalsList.forEach(s => {
    const dirClass = s.dir.includes("CALL") ? "color:#00ffea;" : "color:#ff3366;";
    text += `➤ ${s.pair.padEnd(10)}  ${s.time}   ${s.dir}\n`;
  });

  text += "\n━━━━━━━━━━━━━━━━━━━━━━━━━━\n";
  text += "RULES:\n";
  text += "• Enter at exact time\n";
  text += "• 1-step Martingale max\n";
  text += "• Avoid high-impact news\n";
  text += "• Stop after 2 consecutive losses\n\n";
  text += "Powered by APX Elite • Stay Disciplined";

  document.getElementById("output").innerText = text;
}

async function sendToTelegram() {
  if (!signalsList.length) return alert("Generate signals first bhai!");

  const output = document.getElementById("output");
  output.innerHTML += "\n\nSending to Telegram...\n";

  // Fake loading progress
  await fetch(TG, {method:"POST", body: "✦ APX ULTRA V38 SIGNALS ✦\nLoading Analysis... 20%"});
  await new Promise(r => setTimeout(r, 3000));
  await fetch(TG, {method:"POST", body: "✦ APX ULTRA V38 SIGNALS ✦\nScanning Complete... 70%"});
  await new Promise(r => setTimeout(r, 3000));
  await fetch(TG, {method:"POST", body: "✦ APX ULTRA V38 SIGNALS ✦\nFinalizing High-Quality Entries... 100%"});
  await new Promise(r => setTimeout(r, 2000));

  let msg = "✦═ APX ULTRA V38 FINAL SIGNALS ═✦\n\n";
  msg += "Timezone: UTC+5 (PK) | 1 Min Expiry\n";
  msg += "━━━━━━━━━━━━━━━━━━\n```text\n";

  signalsList.forEach(s => {
    msg += `✦ ${s.time}  ${s.pair.padEnd(10)} ${s.dir}\n`;
  });

  msg += "```\n━━━━━━━━━━━━━━━━━━\n";
  msg += "Follow Rules Strictly:\n• Exact time entry\n• Max 1 step MG\n• No news trading\n• Cut after 2L\n\n";
  msg += "APX Elite • Trade Smart";

  await fetch(TG, {method:"POST", body: msg});
  alert("Signals sent to Telegram successfully! Check your channel/group.");
}

</script>
</body>
