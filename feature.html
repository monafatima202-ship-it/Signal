<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>APX MILOGZAI ROTATION PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
body{background:#050b14;color:#00ff88;font-family:'Rajdhani';margin:0;padding:20px}
.container{max-width:700px;margin:auto;background:#0f1c2c;padding:20px;border-radius:12px}
h2{font-family:'Orbitron';text-align:center}
select,input,button{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:none}
button{background:linear-gradient(135deg,#00ff88,#00ccff);color:black;font-weight:bold}
.telegram{background:linear-gradient(135deg,#0088cc,#00aaff);color:white}
#output{background:#000;padding:15px;margin-top:10px;white-space:pre-wrap;min-height:280px;font-family:monospace}
</style>
</head>
<body>

<div class="container">
<h2>MILOGZAI ROTATION FLOW</h2>

<select id="pairs" multiple size="6">
<option value="USDINR">USDINR</option>
<option value="USDPKR">USDPKR</option>
<option value="USDARS">USDARS</option>
<option value="USDBDT">USDBDT</option>
<option value="USDNGN">USDNGN</option>
<option value="BRLUSD">BRLUSD</option>
</select>

<input type="time" id="start" value="14:00">
<input type="time" id="end" value="18:00">

<button onclick="generate()">GENERATE FLOW</button>
<button class="telegram" onclick="sendToTelegram()">SEND TO TELEGRAM</button>

<div id="output">READY</div>
</div>

<script>

let signals=[];

function padTime(min){
let h=Math.floor(min/60)%24;
let m=min%60;
return (h<10?"0":"")+h+":"+(m<10?"0":"")+m;
}

function toMin(t){
let [h,m]=t.split(":").map(Number);
return h*60+m;
}

function generate(){

signals=[];
let output=document.getElementById("output");

let selected=[...document.getElementById("pairs").selectedOptions].map(o=>o.value);
if(selected.length<2){
output.innerText="Select at least 2 pairs";
return;
}

let start=toMin(document.getElementById("start").value);
let end=toMin(document.getElementById("end").value);
if(end<=start) end+=1440;

let pointer=start;
let pairIndex=0;
let direction="CALL";
let dirCycleCount=0;

while(pointer<=end && signals.length<35){

let pair=selected[pairIndex%selected.length];

// Flip direction every full pair cycle (Milogzai style smoothing)
if(pairIndex%selected.length===0 && pairIndex!==0){
dirCycleCount++;
if(dirCycleCount%2===1){
direction = direction==="CALL"?"PUT":"CALL";
}
}

signals.push(`M1;${pair.padEnd(8)};${padTime(pointer)};${direction}`);

pointer+=9 + (pairIndex%3);  // natural variation 9-11
pairIndex++;
}

let text="✦ MILOGZAI STYLE FLOW ✦\n━━━━━━━━━━━━━━━━━━\n";
text+=signals.join("\n");
text+="\n━━━━━━━━━━━━━━━━━━\nRules:\n• Exact Time Entry\n• 1 Step Martingale Max\n• Avoid High Impact News\n• Stop After 2 Loss\n• Risk 2% Per Trade";

output.innerText=text;
}

function sendToTelegram(){
if(signals.length===0){
alert("Generate signals first");
return;
}

let message="✦ MILOGZAI FLOW ✦\n━━━━━━━━━━\n"+signals.join("\n")+"\n━━━━━━━━━━\nTrade Safe";

console.log("Telegram Message:\n"+message);

// Here you would connect real Telegram Bot API
alert("Telegram format ready (connect bot token here)");
}

</script>

</body>
</html>
