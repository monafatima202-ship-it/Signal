<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>✦ ADOX PREMIUM ENGINE ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#050b14;
--panel:#0f1c2c;
--neon:#00ff88;
--cyan:#00ccff;
--glow:0 0 20px #00ff88,0 0 40px #00ccff;
}
body{margin:0;background:var(--bg);color:#e0fbee;font-family:'Rajdhani'}
header{text-align:center;padding:20px;background:black;border-bottom:4px solid var(--neon);box-shadow:var(--glow)}
.logo{font-family:'Orbitron';font-size:24px;color:var(--neon)}
.container{max-width:750px;margin:20px auto;padding:15px}
.panel{background:var(--panel);padding:25px;border-radius:15px;box-shadow:0 0 25px rgba(0,255,136,0.15)}
.tabs{display:flex;gap:8px;margin-bottom:15px}
.tab{flex:1;padding:10px;border:2px solid var(--neon);background:transparent;color:var(--neon);border-radius:10px;cursor:pointer;font-weight:bold}
.tab.active{background:var(--neon);color:black;box-shadow:var(--glow)}
select,input{width:100%;padding:12px;margin:10px 0;background:#06121f;border:1px solid #1a3a3a;border-radius:10px;color:white}
button{width:100%;padding:16px;margin:8px 0;border:none;border-radius:12px;font-family:'Orbitron';font-weight:bold;cursor:pointer}
.generate{background:linear-gradient(135deg,#00ff88,#00ccff);color:black;box-shadow:var(--glow)}
.telegram{background:linear-gradient(135deg,#0088cc,#00aaff);color:white}
#output{margin-top:15px;background:#000;padding:15px;border-radius:10px;white-space:pre-wrap;min-height:340px;font-family:monospace}
</style>
</head>
<body>

<header>
<div class="logo">✦ ADOX PREMIUM ENGINE ✦</div>
</header>

<div class="container">
<div class="panel">

<div class="tabs">
<button class="tab active" onclick="setMarket('OTC',this)">OTC</button>
<button class="tab" onclick="setMarket('CRYPTO',this)">CRYPTO</button>
<button class="tab" onclick="setMarket('STOCK',this)">STOCK</button>
</div>

<select id="pairs" multiple size="6"></select>

<input type="time" id="start" value="14:00">
<input type="time" id="end" value="18:00">

<button class="generate" onclick="generate()">GENERATE PREMIUM FLOW</button>
<button class="telegram" onclick="sendToTelegram()">SEND TO TELEGRAM</button>

<div id="output">READY • SELECT PAIRS + TIME RANGE</div>

</div>
</div>

<script>

const API="https://milongazi197.serv00.net/otc.php?pair=";
const TG="https://signal.mkapi009.workers.dev/send";

let signals=[];
let currentMarket="OTC";

const PAIRS={
OTC:["USDPKR-otc","USDINR-otc","USDARS-otc","USDBDT-otc","USDNGN-otc"],
CRYPTO:["BTCUSD-otc","ETHUSD-otc","XAUUSD-otc"],
STOCK:["MSFSTK-otc","AXPSTK-otc","PFESTK-otc","MCDSTK-otc"]
};

function setMarket(type,el){
currentMarket=type;
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
el.classList.add("active");
loadPairs();
}

function loadPairs(){
const select=document.getElementById("pairs");
select.innerHTML="";
PAIRS[currentMarket].forEach(p=>{
let opt=document.createElement("option");
opt.value=p;
opt.textContent=p.replace("-otc","");
select.appendChild(opt);
});
}
loadPairs();

function padTime(min){
let h=Math.floor(min/60)%24;
let m=min%60;
return (h<10?"0":"")+h+":"+(m<10?"0":"")+m;
}

function toMin(t){
let [h,m]=t.split(":").map(Number);
return h*60+m;
}

async function getBias(pair){
try{
let res=await fetch(API+pair);
let json=await res.json();
if(!json.data||json.data.length<20) return null;

let candles=json.data.slice(-20);
let call=0, put=0;

candles.forEach(c=>{
if(c.direction==="CALL") call++;
if(c.direction==="PUT") put++;
});

let dir = call>=put?"CALL":"PUT";
let confidence=Math.round((Math.max(call,put)/20)*100);

return {dir,confidence};

}catch(e){
return null;
}
}

async function generate(){

signals=[];
const output=document.getElementById("output");
output.innerText="Analyzing Real Market Structure...";

let selected=[...document.getElementById("pairs").selectedOptions].map(o=>o.value);
if(selected.length<2){
output.innerText="Select at least 2 pairs";
return;
}

let start=toMin(document.getElementById("start").value);
let end=toMin(document.getElementById("end").value);
if(end<=start) end+=1440;

let biasMap={};
await Promise.all(selected.map(async p=>{
biasMap[p]=await getBias(p);
}));

let pointer=start;
let index=0;
let lastPair=null;

while(pointer<=end && signals.length<40){

let pair=selected[index%selected.length];
let clean=pair.replace("-otc","").toUpperCase();
let data=biasMap[pair];

if(data && pair!==lastPair){

signals.push(`M1;${clean.padEnd(8)};${padTime(pointer)};${data.dir};${data.confidence}%`);
lastPair=pair;

// strength-based dynamic gap
let gap;
if(data.confidence>=75) gap=7;
else if(data.confidence>=60) gap=9;
else gap=11;

pointer+=gap;
}

index++;
if(index>300) break;
}

if(signals.length===0){
output.innerText="No strong structure detected.";
return;
}

let text="✦ ADOX PREMIUM FLOW ✦\n━━━━━━━━━━━━━━━━━━\n";
text+=signals.join("\n");
text+="\n━━━━━━━━━━━━━━━━━━\nRules:\n";
text+="• Exact Time Entry\n";
text+="• Max 1 Step MG\n";
text+="• Stop After 2 Loss\n";
text+="• Avoid High Impact News\n";
text+="• Risk 2% Per Trade";

output.innerText=text;
}

async function sendToTelegram(){

if(signals.length===0){
alert("Generate signals first");
return;
}

let message="✦ ADOX PREMIUM FLOW ✦\n━━━━━━━━━━━━━━━━━━\n";
message+=signals.join("\n");
message+="\n━━━━━━━━━━━━━━━━━━\n";
message+="Rules:\n";
message+="• Exact Time Entry\n";
message+="• Max 1 Step MG\n";
message+="• Stop After 2 Loss\n";
message+="• Avoid High Impact News\n";
message+="• Risk 2% Per Trade";

try{
const res = await fetch(TG,{
method:"POST",
headers:{ "Content-Type":"text/plain" },
body: message
});

if(res.ok){
alert("Signals sent to Telegram successfully");
}else{
alert("Telegram send failed: "+res.status);
}

}catch(err){
alert("Telegram error: "+err.message);
}
}

</script>

</body>
</html>
