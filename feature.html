<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APX PROFESSIONAL STRUCTURE ENGINE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
 --bg:#01060b;
 --panel:#0a111f;
 --neon:#00ff88;
 --cyan:#00ccff;
 --glow:0 0 20px #00ff88,0 0 35px #00ccff;
}
body{margin:0;background:var(--bg);color:#e0fbee;font-family:'Rajdhani';}
header{text-align:center;padding:20px;background:black;border-bottom:4px solid var(--neon);box-shadow:var(--glow);}
.logo{font-family:'Orbitron';font-size:22px;color:var(--neon);}
.container{max-width:520px;margin:15px auto;padding:10px;}
.panel{background:var(--panel);border-radius:20px;padding:20px;}
.tabs{display:flex;gap:6px;margin-bottom:10px;}
.tab{flex:1;padding:8px;border:2px solid var(--neon);background:transparent;color:var(--neon);border-radius:8px;cursor:pointer;}
.tab.active{background:var(--neon);color:black;}
select,input{width:100%;padding:10px;margin-bottom:10px;background:#050d1a;border:1px solid #1a3a3a;border-radius:8px;color:white;}
button{width:100%;padding:12px;border:none;border-radius:10px;font-family:'Orbitron';font-weight:900;margin:6px 0;cursor:pointer;}
.generate{background:linear-gradient(135deg,#00ff88,#00ccff);color:black;}
.telegram{background:#0088cc;color:white;}
.modeToggle{display:flex;gap:6px;margin-bottom:10px;}
.modeBtn{flex:1;padding:8px;border:2px solid #00ff88;background:transparent;color:#00ff88;border-radius:6px;cursor:pointer;}
.modeBtn.active{background:#00ff88;color:black;}
#output{margin-top:10px;background:#01040a;padding:12px;border-radius:8px;border:1px dashed var(--neon);white-space:pre-wrap;font-family:monospace;font-size:13px;min-height:250px;}
</style>
</head>
<body>

<header>
<div class="logo">APX STRUCTURE ENGINE</div>
</header>

<div class="container">
<div class="panel">

<div class="tabs">
<button class="tab active" onclick="setMarket('OTC',this)">OTC</button>
<button class="tab" onclick="setMarket('CRYPTO',this)">CRYPTO</button>
<button class="tab" onclick="setMarket('STOCK',this)">STOCK</button>
</div>

<div class="modeToggle">
<button class="modeBtn active" onclick="setMode('STRICT',this)">STRICT</button>
<button class="modeBtn" onclick="setMode('BALANCED',this)">BALANCED</button>
</div>

<select id="pairs" multiple size="6"></select>

<input type="time" id="start" value="18:00">
<input type="time" id="end" value="20:00">

<button class="generate" onclick="generate()">GENERATE</button>
<button class="telegram" onclick="sendTG()">SEND TELEGRAM</button>

<div id="output">READY</div>

</div>
</div>

<script>

const API="https://apx.mkapi009.workers.dev?pair=";
const TG="https://signal.mkapi009.workers.dev/send";

let currentMarket="OTC";
let mode="STRICT";
let signals=[];

const PAIRS={
OTC:["USDPKR-otc","USDINR-otc","USDARS-otc","USDBDT-otc","USDNGN-otc"],
CRYPTO:["BTCUSD-otc","ETHUSD-otc","XAUUSD-otc"],
STOCK:["MCDSTK-otc","JNJSTK-otc","AXPSTK-otc"]
};

function setMarket(type,el){
currentMarket=type;
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
el.classList.add("active");
loadPairs();
}

function setMode(m,el){
mode=m;
document.querySelectorAll(".modeBtn").forEach(t=>t.classList.remove("active"));
el.classList.add("active");
}

function loadPairs(){
let s=document.getElementById("pairs");
s.innerHTML="";
PAIRS[currentMarket].forEach(p=>{
let o=document.createElement("option");
o.value=p;
o.textContent=p.replace("-otc","");
s.appendChild(o);
});
}
loadPairs();

function EMA(arr,period){
if(arr.length<period) return null;
let k=2/(period+1);
let ema=arr[0];
for(let i=1;i<arr.length;i++){
ema=arr[i]*k + ema*(1-k);
}
return ema;
}

function body(c){return Math.abs(c.close-c.open);}
function rangeC(c){return c.high-c.low;}

function strongCandle(c){
if(rangeC(c)==0) return false;
return body(c)>=rangeC(c)*0.5;
}

async function generate(){

signals=[];
let out=document.getElementById("output");
out.innerText="SCANNING STRUCTURE...";

let selected=[...document.getElementById("pairs").selectedOptions].map(o=>o.value);
if(selected.length==0){out.innerText="SELECT PAIRS";return;}

let start=document.getElementById("start").value;
let end=document.getElementById("end").value;

let startMin=parseInt(start.split(":")[0])*60+parseInt(start.split(":")[1]);
let endMin=parseInt(end.split(":")[0])*60+parseInt(end.split(":")[1]);

let all=[];

for(let pair of selected){

let r=await fetch(API+pair);
let j=await r.json();
if(!j.data || j.data.length<30) continue;

let candles=j.data;

for(let i=25;i<candles.length;i++){

let c=candles[i];
let prev=candles[i-1];

let [h,m]=c.time.split(":").map(Number);
let total=h*60+m;

if(startMin<=endMin){
if(total<startMin || total>endMin) continue;
}else{
if(total>endMin && total<startMin) continue;
}

let closes=candles.slice(i-20,i+1).map(x=>x.close);

let ema9=EMA(closes,9);
let ema21=EMA(closes,21);
if(!ema9 || !ema21) continue;

let direction=null;

if(strongCandle(c)){
if(ema9>ema21 && c.close>prev.close) direction="CALL";
if(ema9<ema21 && c.close<prev.close) direction="PUT";
}

if(direction){

// STRICT MODE
if(mode=="STRICT"){
if(body(c)<rangeC(c)*0.6) continue;
}

// BALANCED MODE
if(mode=="BALANCED"){
if(body(c)<rangeC(c)*0.4) continue;
}

all.push(`M1;${pair.replace("-otc","")};${c.time.slice(0,5)};${direction}`);
}
}
}

if(all.length==0){
out.innerText="NO STRONG STRUCTURE IN WINDOW";
return;
}

all.sort((a,b)=>a.split(";")[2].localeCompare(b.split(";")[2]));

signals=all;

let msg="M1 SIGNALS\n━━━━━━━━━━━━━━\n";
msg+=all.join("\n");
msg+="\n━━━━━━━━━━━━━━\nMODE: "+mode+"\nStrong candle only";

out.innerText=msg;
}

async function sendTG(){
if(signals.length==0){alert("No signals");return;}
let text="APX STRUCTURE\nUTC+6 | M1\n━━━━━━━━━━\n"+signals.join("\n")+"\n━━━━━━━━━━\nTrade Safe";
await fetch(TG,{method:"POST",body:text});
alert("Sent");
}

</script>
</body>
</html>
