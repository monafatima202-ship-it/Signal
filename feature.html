<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>APX NEON BALANCED PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500&display=swap" rel="stylesheet">
<style>
:root{
--bg:#02060c;
--panel:#0a111f;
--neon:#00ff88;
--cyan:#00ccff;
--glow:0 0 15px #00ff88,0 0 25px #00ccff;
}
body{margin:0;background:var(--bg);color:white;font-family:'Rajdhani';}
header{text-align:center;padding:20px;background:black;border-bottom:3px solid var(--neon);box-shadow:var(--glow);}
.logo{font-family:'Orbitron';color:var(--neon);font-size:24px;}
.container{max-width:480px;margin:20px auto;padding:15px;}
.panel{background:var(--panel);border-radius:20px;padding:25px;border:1px solid rgba(0,255,136,.3);}
.tabs{display:flex;gap:8px;margin-bottom:15px;}
.tab{flex:1;padding:10px;border:1px solid var(--neon);background:transparent;color:var(--neon);cursor:pointer;border-radius:8px;font-weight:bold;}
.tab.active{background:linear-gradient(135deg,var(--neon),var(--cyan));color:black;}
select,input{width:100%;padding:12px;margin-bottom:12px;background:#061021;border:1px solid #123;border-radius:10px;color:white;}
button{width:100%;padding:14px;margin-top:8px;border:none;border-radius:10px;font-weight:bold;cursor:pointer;}
.generate{background:linear-gradient(135deg,#00ff88,#00ccff);}
.telegram{background:#0088cc;color:white;}
#output{margin-top:15px;background:#01040a;padding:15px;border-radius:10px;border:1px dashed var(--neon);white-space:pre-wrap;font-family:monospace;}
.loader{height:8px;background:#123;border-radius:6px;overflow:hidden;margin-top:10px;}
.loader div{height:100%;width:0%;background:linear-gradient(90deg,#00ff88,#00ccff);transition:width .3s;}
</style>
</head>

<body>
<header><div class="logo">APX NEON BALANCED</div></header>

<div class="container">
<div class="panel">

<div class="tabs">
<button class="tab active" onclick="setMarket('OTC',this)">OTC</button>
<button class="tab" onclick="setMarket('STOCK',this)">STOCK</button>
<button class="tab" onclick="setMarket('CRYPTO',this)">CRYPTO</button>
</div>

<select id="pairs" multiple size="6"></select>

<input type="time" id="start" value="21:00">
<input type="time" id="end" value="23:00">

<button class="generate" onclick="scan()">SCAN MARKET</button>
<button class="telegram" onclick="sendTG()">SEND TELEGRAM</button>

<div id="output">READY...</div>

</div>
</div>

<script>
const API="https://apx.mkapi009.workers.dev?pair=";
const TG="https://signal.mkapi009.workers.dev/send";

const ASSETS={
OTC:["USDPKR-otc","USDBDT-otc","USDINR-otc","USDARS-otc","USDNGN-otc","BRLUSD-otc","USDMXN-otc","USDEGP-otc","USDIDR-otc"],
STOCK:["MSFSTK-otc","AXPSTK-OTC","PFESTK-otc","MCDSTK-otc","JNJSTK-otc"],
CRYPTO:["XAUUSD-otc","BTCUSD-otc","ETHUSD-otc"]
};

let FINAL=[];

function setMarket(type,btn){
document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
let s=document.getElementById("pairs");
s.innerHTML="";
ASSETS[type].forEach(p=>{
let o=document.createElement("option");
o.value=p;
o.textContent=p.replace(/-otc/gi,"").toUpperCase();
s.appendChild(o);
});
}
setMarket("OTC",document.querySelector(".tab.active"));

function EMA(data,p){
let k=2/(p+1);
let ema=data[data.length-p].close;
for(let i=data.length-p+1;i<data.length;i++){
ema=data[i].close*k+ema*(1-k);
}
return ema;
}

function RSI(data,p=14){
let g=0,l=0;
for(let i=data.length-p;i<data.length;i++){
let d=data[i].close-data[i-1].close;
d>0?g+=d:l-=d;
}
let rs=g/(l||1);
return 100-(100/(1+rs));
}

function analyze(c){
if(c.length<150)return null;
let ema20=EMA(c,20);
let ema50=EMA(c,50);
let rsi=RSI(c);
let last=c[c.length-1].close;

if(ema20>ema50 && rsi<60) return "CALL";
if(ema20<ema50 && rsi>40) return "PUT";
return null;
}

async function scan(){
FINAL=[];
let out=document.getElementById("output");
out.innerHTML="Scanning...<div class='loader'><div id='bar'></div></div>";

let selected=[...document.getElementById("pairs").selectedOptions].map(o=>o.value);
let pool=[];

for(let i=0;i<selected.length;i++){
let r=await fetch(API+selected[i]);
let j=await r.json();
let dir=analyze(j.data||[]);
if(dir) pool.push({pair:selected[i].replace(/-otc/gi,"").toUpperCase(),dir});
document.getElementById("bar").style.width=((i+1)/selected.length*100)+"%";
}

if(pool.length===0){
out.innerText="Market currently ranging / weak.";
return;
}

let start=new Date().toDateString()+" "+document.getElementById("start").value;
let end=new Date().toDateString()+" "+document.getElementById("end").value;

let t=new Date(start).getTime();
let endT=new Date(end).getTime();
if(endT<=t)endT+=86400000;

let i=0;
while(t<endT && FINAL.length<15){
t+=90000+Math.random()*60000;
let asset=pool[i%pool.length];
FINAL.push({time:new Date(t).toTimeString().slice(0,5),pair:asset.pair,dir:asset.dir});
i++;
}

render();
}

function render(){
let txt="APX NEON BALANCED\n━━━━━━━━━━━━━━━━━━\nUTC+6 | 1 MIN EXP\n━━━━━━━━━━━━━━━━━━\n\n";
FINAL.forEach(s=>{
txt+=`${s.pair.padEnd(10)} ${s.time}   ${s.dir}\n`;
});
txt+="\n━━━━━━━━━━━━━━━━━━\nFor educational analysis only.";
document.getElementById("output").innerText=txt;
}

async function sendTG(){
if(FINAL.length===0)return alert("Generate first");
await fetch(TG,{method:"POST",body:document.getElementById("output").innerText});
alert("Sent");
}
</script>
</body>
</html>
