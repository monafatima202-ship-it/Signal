<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APX FEATURE ENGINE FINAL</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
 --bg:#01060b;
 --panel:#0a111f;
 --neon:#00ff88;
 --cyan:#00ccff;
 --glow:0 0 20px #00ff88;
}
body{margin:0;background:var(--bg);color:#e0fbee;font-family:'Rajdhani';}
header{text-align:center;padding:20px;background:black;border-bottom:4px solid var(--neon);box-shadow:var(--glow);}
.logo{font-family:'Orbitron';font-size:26px;color:var(--neon);}
.container{max-width:520px;margin:15px auto;padding:10px;}
.panel{background:var(--panel);border-radius:20px;padding:25px;}
.tabs{display:flex;gap:8px;margin-bottom:15px;}
.tab{
 flex:1;
 padding:12px;
 border:2px solid var(--neon);
 background:transparent;
 color:var(--neon);
 border-radius:10px;
 cursor:pointer;
 font-weight:bold;
}
.tab.active{
 background:var(--neon);
 color:black;
 box-shadow:var(--glow);
}
select,input{
 width:100%;
 padding:14px;
 margin-bottom:15px;
 background:#050d1a;
 border:1px solid #1a3a3a;
 border-radius:10px;
 color:white;
}
button{
 width:100%;
 padding:18px;
 border:none;
 border-radius:15px;
 font-family:'Orbitron';
 font-weight:900;
 cursor:pointer;
 text-transform:uppercase;
 margin:8px 0;
}
.generate{
 background:linear-gradient(135deg,#00ff88,#00ccff);
 color:black;
 box-shadow:var(--glow);
}
.telegram{
 background:#0088cc;
 color:white;
}
#output{
 margin-top:20px;
 background:#01040a;
 padding:20px;
 border-radius:15px;
 border:1px dashed var(--neon);
 white-space:pre-wrap;
 font-family:monospace;
 font-size:13px;
 min-height:300px;
}
</style>
</head>
<body>

<header>
<div class="logo">APX FEATURE ENGINE</div>
</header>

<div class="container">
<div class="panel">

<div class="tabs">
 <button class="tab active" onclick="setMarket('OTC',this)">OTC</button>
 <button class="tab" onclick="setMarket('CRYPTO',this)">CRYPTO</button>
 <button class="tab" onclick="setMarket('STOCK',this)">STOCK</button>
</div>

<select id="pairs" multiple size="6"></select>

<div style="display:flex;gap:10px;">
 <input type="time" id="start" value="18:00">
 <input type="time" id="end" value="20:00">
</div>

<button class="generate" onclick="generateSignals()">GENERATE SIGNALS</button>
<button class="telegram" onclick="sendToTelegram()">SEND TO TELEGRAM</button>

<div id="output">READY</div>

</div>
</div>

<script>

const API = "https://apx.mkapi009.workers.dev?pair=";
const TG = "https://signal.mkapi009.workers.dev/send";

let signals=[];
let currentMarket="OTC";

const PAIRS={
 OTC:["USDPKR-otc","USDINR-otc","USDARS-otc","USDBDT-otc"],
 CRYPTO:["BTCUSD-otc","ETHUSD-otc","XAUUSD-otc"],
 STOCK:["MCDSTK-otc","JNJSTK-otc","AXPSTK-otc"]
};

function setMarket(type,el){
 currentMarket=type;
 document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
 el.classList.add("active");
 loadPairs();
}

function loadPairs(){
 let select=document.getElementById("pairs");
 select.innerHTML="";
 PAIRS[currentMarket].forEach(p=>{
  let opt=document.createElement("option");
  opt.value=p;
  opt.textContent=p.replace("-otc","");
  select.appendChild(opt);
 });
}
loadPairs();

function EMA(data,period){
 let k=2/(period+1);
 let ema=data[0];
 for(let i=1;i<data.length;i++){
  ema=data[i]*k+ema*(1-k);
 }
 return ema;
}

function formatTime(d){return d.toTimeString().slice(0,5);}

async function generateSignals(){

 signals=[];
 let selected=[...document.getElementById("pairs").selectedOptions].map(o=>o.value);
 if(selected.length===0){alert("Select pair");return;}

 let startVal=document.getElementById("start").value;
 let endVal=document.getElementById("end").value;

 let start=new Date();
 let end=new Date();
 let [sh,sm]=startVal.split(":").map(Number);
 let [eh,em]=endVal.split(":").map(Number);

 start.setHours(sh,sm,0,0);
 end.setHours(eh,em,0,0);
 if(end<=start) end.setDate(end.getDate()+1);

 let cur=new Date(start);

 document.getElementById("output").innerText="SCANNING...";

 while(cur<end && signals.length<25){

  for(let pair of selected){

   try{
    let r1=await fetch(API+pair);
    let j1=await r1.json();
    if(!j1.data||j1.data.length<30) continue;

    let closes=j1.data.map(c=>c.close);
    let ema9=EMA(closes,9);
    let ema21=EMA(closes,21);

    let last=j1.data[j1.data.length-1];
    let prev=j1.data[j1.data.length-2];

    let direction=null;

    if(ema9>ema21 && last.close>prev.close) direction="CALL";
    if(ema9<ema21 && last.close<prev.close) direction="PUT";

    if(direction){
      signals.push(`M1;${pair.replace("-otc","")};${formatTime(cur)};${direction}`);
    }

    if(signals.length>=25) break;

   }catch(e){}
  }

  cur.setMinutes(cur.getMinutes()+2);
 }

 if(signals.length===0){
  document.getElementById("output").innerText="NO SIGNALS FOUND";
  return;
 }

 document.getElementById("output").innerText=signals.join("\n");
}

async function sendToTelegram(){

 if(signals.length===0){
  alert("No signals");
  return;
 }

 await fetch(TG,{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({signals})
 });

 alert("Sent to Telegram");
}

</script>

</body>
</html>
