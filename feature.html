<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APX ULTRA PRO v78 - REAL CANDLE LOGIC</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
 --bg:#01060b;
 --panel:#0a111f;
 --neon:#00ff88;
 --cyan:#00ccff;
 --glow:0 0 18px #00ff88;
}
body{margin:0;background:var(--bg);color:#e0fbee;font-family:'Rajdhani';}
header{text-align:center;padding:20px;background:black;border-bottom:3px solid var(--neon);box-shadow:var(--glow);}
.logo{font-family:'Orbitron';font-size:26px;color:var(--neon);}
.container{max-width:520px;margin:15px auto;padding:10px;}
.panel{background:var(--panel);border-radius:18px;padding:20px;}
.tabs{display:flex;gap:6px;margin-bottom:12px;}
.tab{flex:1;padding:8px;border:2px solid var(--neon);background:transparent;color:var(--neon);border-radius:8px;cursor:pointer;}
.tab.active{background:var(--neon);color:black;}
select,input{width:100%;padding:10px;margin-bottom:10px;background:#050d1a;border:1px solid #1a3a3a;border-radius:8px;color:white;}
button{width:100%;padding:12px;border:none;border-radius:10px;font-family:'Orbitron';font-weight:900;margin:6px 0;cursor:pointer;text-transform:uppercase;}
.generate{background:linear-gradient(135deg,#00ff88,#00ccff);color:black;}
.telegram{background:#0088cc;color:white;}
#output{margin-top:12px;background:#000;padding:12px;border-radius:8px;white-space:pre-wrap;font-family:monospace;font-size:13px;min-height:240px;}
</style>
</head>
<body>

<header>
<div class="logo">APX ULTRA PRO v78</div>
</header>

<div class="container">
<div class="panel">

<div class="tabs">
 <button class="tab active" onclick="setMarket('OTC',this)">OTC</button>
 <button class="tab" onclick="setMarket('CRYPTO',this)">CRYPTO</button>
 <button class="tab" onclick="setMarket('STOCK',this)">STOCK</button>
</div>

<select id="pairs" multiple size="6"></select>

<div style="display:flex;gap:10px;">
 <input type="time" id="start" value="18:00">
 <input type="time" id="end" value="21:00">
</div>

<button class="generate" onclick="generate()">GENERATE SIGNALS</button>
<button class="telegram" onclick="sendTG()">SEND TO TELEGRAM</button>

<div id="output">READY</div>

</div>
</div>

<script>

const API="https://apx.mkapi009.workers.dev?pair=";
const TG ="https://signal.mkapi009.workers.dev/send";

let signals=[];

const PAIRS={
 OTC:["USDPKR-otc","USDINR-otc","USDARS-otc","USDBDT-otc","USDNGN-otc","BRLUSD-otc","USDMXN-otc","USDEGP-otc"],
 CRYPTO:["BTCUSD-otc","ETHUSD-otc","XAUUSD-otc"],
 STOCK:["MSFSTK-otc","AXPSTK-OTC","PFESTK-otc","MCDSTK-otc","JNJSTK-otc"]
};

function setMarket(type,el){
 document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
 el.classList.add("active");
 let select=document.getElementById("pairs");
 select.innerHTML="";
 PAIRS[type].forEach(p=>{
  let o=document.createElement("option");
  o.value=p;
  o.textContent=p.replace("-otc","");
  select.appendChild(o);
 });
}

function EMA(prices,period){
 if (prices.length < period) return null;
 let k = 2 / (period + 1);
 let ema = prices[0];
 for(let i = 1; i < prices.length; i++){
  ema = prices[i] * k + ema * (1 - k);
 }
 return ema;
}

function rsi(candles) {
  if (candles.length < 15) return 50;
  let gains = 0, losses = 0;
  for (let i = 1; i <= 14; i++) {
    let diff = candles[candles.length - i].close - candles[candles.length - i - 1].close;
    if (diff > 0) gains += diff; else losses -= diff;
  }
  let ag = gains / 14;
  let al = losses / 14 || 0.0001;
  return 100 - (100 / (1 + ag / al));
}

async function generate(){
  signals = [];
  let out = document.getElementById("output");
  out.innerText = "ANALYZING...";

  let selected = [...document.getElementById("pairs").selectedOptions].map(o=>o.value);
  if(selected.length === 0){
    out.innerText = "SELECT PAIRS";
    return;
  }

  let start = document.getElementById("start").value;
  let end = document.getElementById("end").value;

  let startMin = parseInt(start.split(":")[0])*60 + parseInt(start.split(":")[1]);
  let endMin = parseInt(end.split(":")[0])*60 + parseInt(end.split(":")[1]);

  let allSignals = [];

  for(let pair of selected){
    try{
      let res = await fetch(API+pair);
      let json = await res.json();
      if(!json.data || json.data.length < 25) continue;

      let candles = json.data;

      for(let i = 15; i < candles.length; i++){
        let c = candles[i];

        let timeParts = c.time.split(" ");
        let hm = timeParts[1] || c.time;
        let [h,m,s] = hm.split(":").map(Number);
        let totalMin = h*60 + m;

        if(totalMin < startMin || totalMin > endMin) continue;

        let closes = candles.slice(i-15, i+1).map(x => x.close);
        let ema9 = EMA(closes, 9);
        let ema21 = EMA(closes, 21);
        let rsiVal = rsi(candles.slice(Math.max(0, i-14), i+1));

        let direction = null;

        // Relaxed logic taake signals aayein
        if(ema9 > ema21 && rsiVal < 65){
          direction = "CALL";
        } else if(ema9 < ema21 && rsiVal > 35){
          direction = "PUT";
        }

        if(direction){
          allSignals.push(`M1;\( {pair.replace("-otc","").padEnd(6)}; \){hm.split(":").slice(0,2).join(":")};${direction}`);
        }
      }

    }catch(e){}
  }

  if(allSignals.length === 0){
    out.innerText = "NO STRONG MOVE YET\nTRY DIFFERENT TIME OR PAIRS";
    return;
  }

  allSignals.sort((a,b) => a.split(";")[2].localeCompare(b.split(";")[2]));

  signals = allSignals;

  out.innerText = "M1 SIGNALS\n━━━━━━━━━━━━━━\n" + signals.join("\n") + "\n━━━━━━━━━━━━━━\n• Exact time entry\n• 1 step MG max\n• Avoid news\n• 2 loss pe stop";
}

async function sendTG(){
  if(signals.length === 0){
    alert("No signals");
    return;
  }

  let msg = "APX SIGNALS\nPK Time | 1 Min\n━━━━━━━━━━\n" + signals.join("\n") + "\n━━━━━━━━━━\nTrade safe";

  await fetch(TG, {method:"POST", body: msg});
  alert("Sent to Telegram");
}
</script>

</body>
</html>
