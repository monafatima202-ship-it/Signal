<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APX V47 - MANUAL TIME STRONG SIGNALS</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #02060c;
  --panel: #0a111f;
  --neon: #00ff88;
  --glow: 0 0 15px #00ff88;
  --text: #e0fbee;
}
body { margin:0; background:var(--bg); color:var(--text); font-family:'Rajdhani'; }
header { text-align:center; padding:20px; background:black; border-bottom:4px solid var(--neon); box-shadow:var(--glow); }
.logo { font-family:'Orbitron'; font-size:28px; color:var(--neon); text-shadow:0 0 12px var(--neon); }
.container { max-width:480px; margin:20px auto; padding:15px; }
.panel { background:var(--panel); border-radius:18px; padding:20px; border:1px solid rgba(0,255,136,0.2); }
select, input { width:100%; padding:12px; margin:10px 0; background:#050d1a; border:1px solid #1a3a3a; border-radius:10px; color:white; }
button { width:100%; padding:15px; margin:10px 0; border:none; border-radius:12px; font-family:'Orbitron'; font-weight:bold; cursor:pointer; }
.generate { background:linear-gradient(135deg,#00ff88,#00ccff); color:black; box-shadow:var(--glow); }
#output { margin-top:20px; background:#01040a; padding:18px; border-radius:12px; border:1px dashed var(--neon); white-space:pre-wrap; font-family:monospace; font-size:13px; min-height:280px; line-height:1.6; }
.loader { text-align:center; color:var(--neon); padding:40px 0; font-size:18px; }
</style>
</head>
<body>

<header><div class="logo">APX V47 MANUAL STRONG SIGNALS</div></header>

<div class="container">
  <div class="panel">

    <select id="pairs" multiple size="8">
      <!-- JS se load honge -->
    </select>

    <div style="display:flex; gap:12px; margin:15px 0;">
      <input type="time" id="startTime" value="18:00">
      <input type="time" id="endTime" value="19:30">
    </div>

    <button class="generate" onclick="generateSignals()">GENERATE STRONG SIGNALS</button>

    <div id="output">PAIRS + START & END TIME SELECT KARO → GENERATE</div>

  </div>
</div>

<script>
const API = "https://apx.mkapi009.workers.dev?pair=";

let signals = [];

const ALL_PAIRS = [
  "USDPKR-otc", "USDBDT-otc", "USDINR-otc", "USDARS-otc",
  "USDMXN-otc", "BRLUSD-otc", "USDNGN-otc", "USDEGP-otc",
  "XAUUSD-otc", "BTCUSD-otc", "ETHUSD-otc"
];

function loadPairs() {
  const select = document.getElementById("pairs");
  select.innerHTML = "";
  ALL_PAIRS.forEach(p => {
    let opt = document.createElement("option");
    opt.value = p;
    opt.textContent = p.replace(/-otc/gi, "");
    select.appendChild(opt);
  });
}
loadPairs();

function ema(candles, period) {
  if (candles.length < period) return null;
  let k = 2 / (period + 1);
  let emaVal = candles.slice(0, period).reduce((s, c) => s + c.close, 0) / period;
  for (let i = period; i < candles.length; i++) {
    emaVal = candles[i].close * k + emaVal * (1 - k);
  }
  return emaVal;
}

function rsi(candles) {
  if (candles.length < 15) return 50;
  let gains = 0, losses = 0;
  for (let i = 1; i <= 14; i++) {
    let diff = candles[candles.length - i].close - candles[candles.length - i - 1].close;
    if (diff > 0) gains += diff; else losses -= diff;
  }
  let ag = gains / 14;
  let al = losses / 14 || 0.0001;
  return 100 - (100 / (1 + ag / al));
}

function getSignal(candles, pair) {
  if (candles.length < 50) return null;

  const emaFast = ema(candles, 8) || ema(candles, 5);
  const emaSlow = ema(candles, 21) || ema(candles, 13);
  if (!emaFast || !emaSlow) return null;

  const rsiVal = rsi(candles);

  let mom = 0;
  for (let i = candles.length - 8; i < candles.length - 1; i++) {
    mom += candles[i+1].close - candles[i].close;
  }
  mom /= 7;

  let score = 0;
  score += (emaFast > emaSlow ? 5 : -5);
  score += (rsiVal < 50 ? 2.5 : rsiVal > 50 ? -2.5 : 0);
  score += (mom > 0 ? 2 : mom < 0 ? -2 : 0);

  let lastClose = candles[candles.length-1].close;
  score += (lastClose > emaFast ? 1.5 : lastClose < emaFast ? -1.5 : 0);

  // Low threshold taake signals aayein
  let thresh = pair.includes('BTC') || pair.includes('XAU') || pair.includes('ARS') || pair.includes('MXN') || pair.includes('NGN') ? 1.5 : 2.5;

  let dir = score >= thresh ? "CALL" : score <= -thresh ? "PUT" : null;

  let acc = 70 + Math.abs(score) * 3;
  acc = Math.min(88, Math.max(70, acc));

  if (dir) return { dir, acc: acc.toFixed(1) };
  return null;
}

async function generateSignals() {
  const output = document.getElementById("output");
  output.innerHTML = '<div class="loader">GENERATING STRONG SIGNALS...</div>';

  const selected = Array.from(document.getElementById("pairs").selectedOptions).map(o => o.value);
  if (selected.length === 0) {
    output.innerText = "Bhai kam se kam 3-5 pairs select karo (volatile better)";
    return;
  }

  signals = [];

  for (const pair of selected) {
    try {
      let res = await fetch(API + pair);
      let json = await res.json();
      let candles = json?.data || [];
      let result = getSignal(candles, pair);
      if (result) {
        signals.push({
          pair: pair.replace(/-otc/gi, ""),
          dir: result.dir,
          acc: result.acc
        });
      }
    } catch (e) {}
  }

  if (signals.length === 0) {
    output.innerText = "Abhi bhi strong move nahi mila.\nTry more volatile pairs (BTCUSD, XAUUSD, USDARS, USDMXN)\nYa 15-30 min baad dobara try kar.";
    return;
  }

  // Manual start + end time use kar ke distribute
  const startStr = document.getElementById("startTime").value || "18:00";
  const endStr   = document.getElementById("endTime").value || "19:30";

  const now = new Date();
  let startMs = new Date(now.toDateString() + " " + startStr + ":00").getTime();
  let endMs   = new Date(now.toDateString() + " " + endStr   + ":00").getTime();
  if (endMs <= startMs) endMs += 86400000;

  const total = signals.length;
  const totalMs = endMs - startMs;
  const baseGap = totalMs / (total + 1);

  let current = startMs + baseGap;

  signals.forEach(s => {
    // 1 to 9 min extra random gap for realism
    let extra = Math.floor(Math.random() * 480 + 60) * 1000;
    current += extra;
    s.time = new Date(current).toTimeString().slice(0,5);
  });

  // Time ke hisaab se sort
  signals.sort((a,b) => a.time.localeCompare(b.time));

  // Final display – exact example style
  let text = "M1 SIGNALS - V47\n━━━━━━━━━━━━━━━━━━\n";
  signals.forEach(s => {
    text += `M1 │ ${s.pair.padEnd(6)} │ ${s.time} │ \( {s.dir} [ \){s.acc}%]\n`;
  });
  text += "\n━━━━━━━━━━━━━━━━━━\n• Exact time pe entry\n• 1 step MG max\n• News avoid\n• 2 loss pe stop";

  output.innerText = text;
}
</script>
</body>
</html>
