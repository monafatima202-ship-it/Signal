<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APX NEURAL V70</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
 --bg:#01060b;
 --panel:#0a111f;
 --neon:#00ff88;
 --cyan:#00ccff;
 --text:#e0fbee;
}
body{
 margin:0;
 background:var(--bg);
 color:var(--text);
 font-family:'Rajdhani';
}
header{
 text-align:center;
 padding:20px;
 background:black;
 border-bottom:4px solid var(--neon);
 box-shadow:0 0 25px #00ff88;
}
.logo{
 font-family:'Orbitron';
 font-size:26px;
 color:var(--neon);
 letter-spacing:3px;
}
.container{
 max-width:500px;
 margin:20px auto;
 padding:10px;
}
.panel{
 background:var(--panel);
 border-radius:20px;
 padding:25px;
 box-shadow:0 0 20px rgba(0,255,136,.2);
}
select,input{
 width:100%;
 padding:12px;
 margin-bottom:12px;
 background:#050d1a;
 border:1px solid #1a3a3a;
 border-radius:10px;
 color:white;
}
button{
 width:100%;
 padding:15px;
 margin:8px 0;
 border:none;
 border-radius:12px;
 font-family:'Orbitron';
 font-weight:bold;
 cursor:pointer;
}
.generate{
 background:linear-gradient(135deg,#00ff88,#00ccff);
 color:black;
}
.telegram{
 background:#0088cc;
 color:white;
}
#output{
 margin-top:15px;
 background:#01040a;
 padding:15px;
 border-radius:12px;
 border:1px dashed var(--neon);
 white-space:pre-wrap;
 min-height:300px;
 font-family:monospace;
 font-size:13px;
}
.loader{
 text-align:center;
 padding:40px 0;
 color:var(--neon);
}
</style>
</head>
<body>

<header>
 <div class="logo">APX NEURAL V70</div>
</header>

<div class="container">
 <div class="panel">

   <select id="pairs" multiple size="8">
     <option value="USDPKR-otc">USDPKR</option>
     <option value="USDINR-otc">USDINR</option>
     <option value="USDARS-otc">USDARS</option>
     <option value="USDBDT-otc">USDBDT</option>
     <option value="USDNGN-otc">USDNGN</option>
     <option value="USDMXN-otc">USDMXN</option>
   </select>

   <button class="generate" onclick="generateSignals()">GENERATE SIGNALS</button>
   <button class="telegram" onclick="sendToTelegram()">SEND TO TELEGRAM</button>

   <div id="output">READY • SELECT PAIRS • GENERATE</div>

 </div>
</div>

<script>

const API = "https://apx.mkapi009.workers.dev?pair=";
const TG  = "https://signal.mkapi009.workers.dev/send";

let signals = [];

function EMA(data,period){
 let k=2/(period+1);
 let ema=[data[0]];
 for(let i=1;i<data.length;i++){
  ema.push(data[i]*k + ema[i-1]*(1-k));
 }
 return ema;
}

function RSI(closes,period=14){
 let gain=0,loss=0;
 for(let i=closes.length-period;i<closes.length-1;i++){
  let diff=closes[i+1]-closes[i];
  if(diff>0) gain+=diff;
  else loss-=diff;
 }
 let rs=gain/(loss||1);
 return 100-(100/(1+rs));
}

function nextMinute(){
 let d=new Date();
 d.setSeconds(0);
 d.setMinutes(d.getMinutes()+1);
 return d.toTimeString().slice(0,5);
}

async function generateSignals(){

 signals=[];
 let selected=[...document.getElementById("pairs").selectedOptions].map(o=>o.value);

 if(selected.length===0){
  alert("Select pairs first");
  return;
 }

 document.getElementById("output").innerHTML="<div class='loader'>SCANNING MARKET...</div>";

 for(let pair of selected){

  try{
   let res=await fetch(API+pair);
   let data=await res.json();
   let candles=data.slice(-100);

   let closes=candles.map(c=>c.close);
   let highs=candles.map(c=>c.high);
   let lows=candles.map(c=>c.low);

   let ema9=EMA(closes,9);
   let ema21=EMA(closes,21);
   let rsi=RSI(closes);

   let score=0;
   let direction=null;

   if(ema9.at(-1)>ema21.at(-1)){
     score+=2;
     direction="CALL";
   }else{
     score+=2;
     direction="PUT";
   }

   if(direction==="CALL" && rsi>55) score+=2;
   if(direction==="PUT" && rsi<45) score+=2;

   let recentHigh=Math.max(...highs.slice(-15));
   let recentLow=Math.min(...lows.slice(-15));
   let lastClose=closes.at(-1);

   if(direction==="CALL" && lastClose>recentHigh) score+=3;
   if(direction==="PUT" && lastClose<recentLow) score+=3;

   let range=highs.at(-1)-lows.at(-1);
   let avgRange=0;
   for(let i=highs.length-15;i<highs.length;i++){
     avgRange+=highs[i]-lows[i];
   }
   avgRange/=15;

   if(range>avgRange) score+=1;

   if(score>=6){
     signals.push(`M1;${pair.replace("-otc","")};${nextMinute()};${direction}`);
   }

  }catch(e){
   console.log("Error",pair);
  }
 }

 if(signals.length===0){
   document.getElementById("output").innerHTML="NO HIGH ACCURACY STRUCTURE FOUND.";
   return;
 }

 document.getElementById("output").innerHTML=signals.join("\n");
}

async function sendToTelegram(){
 if(signals.length===0){
  alert("No signals to send");
  return;
 }

 await fetch(TG,{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({signals})
 });

 alert("Signals sent to Telegram");
}

</script>
</body>
</html>
