<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APX NEURAL V72</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
 --bg:#01060b;
 --panel:#0a111f;
 --neon:#00ff88;
 --cyan:#00ccff;
 --text:#e0fbee;
}
body{margin:0;background:var(--bg);color:var(--text);font-family:'Rajdhani';}
header{text-align:center;padding:22px;background:black;border-bottom:4px solid var(--neon);box-shadow:0 0 25px #00ff88;}
.logo{font-family:'Orbitron';font-size:26px;color:var(--neon);letter-spacing:3px;}
.container{max-width:520px;margin:20px auto;padding:10px;}
.panel{background:var(--panel);border-radius:20px;padding:25px;box-shadow:0 0 25px rgba(0,255,136,.2);}
.tabs{display:flex;gap:8px;margin-bottom:15px;}
.tab{
 flex:1;
 padding:12px;
 border:2px solid var(--neon);
 background:transparent;
 color:var(--neon);
 border-radius:10px;
 cursor:pointer;
 font-weight:bold;
 transition:.3s;
}
.tab.active{
 background:var(--neon);
 color:black;
 box-shadow:0 0 20px #00ff88;
 transform:scale(1.05);
}
select,input{
 width:100%;
 padding:14px;
 margin-bottom:15px;
 background:#050d1a;
 border:1px solid #1a3a3a;
 border-radius:12px;
 color:white;
}
button{
 width:100%;
 padding:18px;
 border:none;
 border-radius:15px;
 font-family:'Orbitron';
 font-weight:900;
 cursor:pointer;
 text-transform:uppercase;
 transition:.3s;
 margin:8px 0;
}
.generate{background:linear-gradient(135deg,#00ff88,#00ccff);color:black;box-shadow:0 0 20px #00ff88;}
.telegram{background:linear-gradient(135deg,#0088cc,#00aaff);color:white;box-shadow:0 0 20px #0088cc;}
#output{
 margin-top:20px;
 background:#01040a;
 padding:20px;
 border-radius:15px;
 border:1px dashed var(--neon);
 white-space:pre-wrap;
 font-family:monospace;
 font-size:13px;
 line-height:1.6;
 min-height:340px;
}
.loader{text-align:center;color:var(--neon);padding:40px;font-size:18px;}
</style>
</head>
<body>

<header><div class="logo">APX NEURAL V72 CLEAN</div></header>

<div class="container">
<div class="panel">

<div class="tabs">
 <button class="tab active" onclick="setMarket('OTC',this)">OTC</button>
 <button class="tab" onclick="setMarket('CRYPTO',this)">CRYPTO</button>
 <button class="tab" onclick="setMarket('STOCK',this)">STOCK</button>
</div>

<select id="pairs" multiple size="8"></select>

<div style="display:flex;gap:12px;">
 <input type="time" id="start" value="18:00">
 <input type="time" id="end" value="20:30">
</div>

<button class="generate" onclick="generateSignals()">GENERATE SIGNALS</button>
<button class="telegram" onclick="sendToTelegram()">SEND TO TELEGRAM</button>

<div id="output">READY • SELECT PAIRS • SET TIME • GENERATE</div>

</div>
</div>

<script>

const API="https://apx.mkapi009.workers.dev?pair=";
const TG="https://signal.mkapi009.workers.dev/send";

let signals=[];
let currentMarket="OTC";

const PAIRS={
 OTC:["USDPKR-otc","USDINR-otc","USDARS-otc","USDBDT-otc","USDNGN-otc","USDMXN-otc"],
 CRYPTO:["BTCUSD-otc","ETHUSD-otc","XAUUSD-otc"],
 STOCK:["MCDSTK-otc","JNJSTK-otc","AXPSTK-otc"]
};

function setMarket(type,el){
 currentMarket=type;
 document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
 el.classList.add("active");
 loadPairs();
}

function loadPairs(){
 let select=document.getElementById("pairs");
 select.innerHTML="";
 PAIRS[currentMarket].forEach(p=>{
  let opt=document.createElement("option");
  opt.value=p;
  opt.textContent=p.replace("-otc","");
  select.appendChild(opt);
 });
}
loadPairs();

function EMA(data,period){
 let k=2/(period+1);
 let ema=[data[0]];
 for(let i=1;i<data.length;i++){
  ema.push(data[i]*k + ema[i-1]*(1-k));
 }
 return ema;
}

function RSI(closes,period=14){
 let gain=0,loss=0;
 for(let i=closes.length-period;i<closes.length-1;i++){
  let diff=closes[i+1]-closes[i];
  if(diff>0) gain+=diff;
  else loss-=diff;
 }
 let rs=gain/(loss||1);
 return 100-(100/(1+rs));
}

function addMinutes(timeStr,min){
 let [h,m]=timeStr.split(":").map(Number);
 let date=new Date();
 date.setHours(h);
 date.setMinutes(m+min);
 date.setSeconds(0);
 return date.toTimeString().slice(0,5);
}

async function generateSignals(){

 signals=[];
 let selected=[...document.getElementById("pairs").selectedOptions].map(o=>o.value);
 let start=document.getElementById("start").value;
 let end=document.getElementById("end").value;

 if(selected.length===0){
  alert("Select pairs first");
  return;
 }

 document.getElementById("output").innerHTML="<div class='loader'>SCANNING MARKET STRUCTURE...</div>";

 for(let pair of selected){

  try{

   let res=await fetch(API+pair);
   let data=await res.json();
   let candles=data.slice(-100);

   let closes=candles.map(c=>c.close);
   let highs=candles.map(c=>c.high);
   let lows=candles.map(c=>c.low);

   let ema9=EMA(closes,9);
   let ema21=EMA(closes,21);
   let rsi=RSI(closes);

   let score=0;
   let direction=null;

   if(ema9.at(-1)>ema21.at(-1)){direction="CALL";score+=2;}
   else{direction="PUT";score+=2;}

   if(direction==="CALL" && rsi>50) score+=2;
   if(direction==="PUT" && rsi<50) score+=2;

   if(direction==="CALL" && closes.at(-1)>closes.at(-2)) score+=1;
   if(direction==="PUT" && closes.at(-1)<closes.at(-2)) score+=1;

   let range=highs.at(-1)-lows.at(-1);
   let avgRange=highs.slice(-15).reduce((a,b,i)=>a+(b-lows[i]),0)/15;

   if(range>=avgRange*0.8) score+=1;

   if(score>=4){

     let time=start;
     while(time<=end){
       signals.push(`M1;${pair.replace("-otc","")};${time};${direction}`);
       time=addMinutes(time,Math.floor(Math.random()*2)+2);
     }

   }

  }catch(e){console.log(pair);}
 }

 if(signals.length===0){
  document.getElementById("output").innerHTML="NO HIGH ACCURACY STRUCTURE FOUND.";
  return;
 }

 document.getElementById("output").innerHTML=signals.join("\n");
}

async function sendToTelegram(){

 if(signals.length===0){
  alert("No signals to send");
  return;
 }

 await fetch(TG,{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({signals})
 });

 alert("Signals sent successfully");
}

</script>
</body>
</html>
