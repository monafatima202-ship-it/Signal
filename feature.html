<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>APX NEON V70 PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#01060b;
--panel:#0a111f;
--neon:#00ff88;
--cyan:#00ccff;
--glow:0 0 15px #00ff88,0 0 30px #00ccff;
--text:#e0fbee;
}
body{margin:0;background:var(--bg);color:var(--text);font-family:'Rajdhani';}
header{text-align:center;padding:22px;background:black;border-bottom:4px solid var(--neon);box-shadow:var(--glow);}
.logo{font-family:'Orbitron';font-size:26px;color:var(--neon);text-shadow:var(--glow);letter-spacing:3px;}
.container{max-width:480px;margin:15px auto;padding:12px;}
.panel{background:var(--panel);border-radius:20px;padding:25px;border:1px solid rgba(0,255,136,.3);box-shadow:0 0 30px rgba(0,255,136,.15);}
.tabs{display:flex;gap:8px;margin-bottom:15px;}
.tab{flex:1;padding:12px;border:2px solid var(--neon);background:transparent;color:var(--neon);border-radius:10px;cursor:pointer;font-weight:bold;}
.tab.active{background:var(--neon);color:black;box-shadow:var(--glow);}
select,input{width:100%;padding:14px;margin-bottom:14px;background:#050d1a;border:1px solid #1a3a3a;border-radius:12px;color:white;}
button{width:100%;padding:16px;border:none;border-radius:14px;font-family:'Orbitron';font-weight:900;cursor:pointer;}
.generate{background:linear-gradient(135deg,#00ff88,#00ccff);color:black;box-shadow:var(--glow);}
.telegram{background:#0088cc;color:white;margin-top:10px;}
#output{margin-top:18px;background:#01040a;padding:18px;border-radius:14px;border:1px dashed var(--neon);white-space:pre-wrap;font-family:monospace;font-size:13px;line-height:1.6;min-height:300px;}
.loader{text-align:center;color:var(--neon);padding:40px 0;font-size:18px;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>

<body>

<header>
<div class="logo">APX NEON V70 PRO STRUCTURE</div>
</header>

<div class="container">
<div class="panel">

<div class="tabs">
<button class="tab active" onclick="setMarket('OTC',this)">OTC</button>
<button class="tab" onclick="setMarket('STOCK',this)">STOCK</button>
<button class="tab" onclick="setMarket('CRYPTO',this)">CRYPTO</button>
</div>

<select id="pairs" multiple size="8"></select>

<div style="display:flex;gap:10px;">
<input type="time" id="start" value="18:00">
<input type="time" id="end" value="22:00">
</div>

<button class="generate" onclick="generateSignals()">GENERATE PRO SIGNALS</button>
<button class="telegram" onclick="sendTG()">SEND TO TELEGRAM</button>

<div id="output">SYSTEM READY • SELECT PAIRS + TIME RANGE</div>

</div>
</div>

<script>
const API="https://apx.mkapi009.workers.dev?pair=";
const TG="https://signal.mkapi009.workers.dev/send";

let FINAL=[];

const PAIRS={
OTC:["USDPKR-otc","USDBDT-otc","USDINR-otc","USDARS-otc","USDNGN-otc","BRLUSD-otc","USDMXN-otc","USDEGP-otc","USDIDR-otc"],
STOCK:["MSFSTK-otc","AXPSTK-OTC","PFESTK-otc","MCDSTK-otc","JNJSTK-otc"],
CRYPTO:["XAUUSD-otc","BTCUSD-otc","ETHUSD-otc"]
};

function setMarket(type,btn){
document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
let s=document.getElementById("pairs");
s.innerHTML="";
PAIRS[type].forEach(p=>{
let o=document.createElement("option");
o.value=p;
o.textContent=p.replace(/-otc|-OTC/gi,"");
s.appendChild(o);
});
}
setMarket("OTC",document.querySelector(".tab.active"));

function EMA(data,p){
let k=2/(p+1);
let ema=data[0].close;
for(let i=1;i<data.length;i++){
ema=data[i].close*k+ema*(1-k);
}
return ema;
}

function RSI(data){
let g=0,l=0;
for(let i=data.length-14;i<data.length-1;i++){
let d=data[i+1].close-data[i].close;
if(d>0)g+=d;else l-=d;
}
let rs=(g/14)/(l/14||0.0001);
return 100-(100/(1+rs));
}

async function generateSignals(){
document.getElementById("output").innerHTML='<div class="loader">SCANNING STRUCTURE...</div>';
FINAL=[];

let selected=[...document.getElementById("pairs").selectedOptions].map(o=>o.value);
if(selected.length<1){document.getElementById("output").innerText="Select pairs.";return;}

let allSignals=[];

for(let pair of selected){
try{
let res=await fetch(API+pair);
let json=await res.json();
let candles=json.data||[];
if(candles.length<60)continue;

let ema9=EMA(candles.slice(-50),9);
let ema21=EMA(candles.slice(-50),21);
let rsi=RSI(candles.slice(-20));

let score=0;
score+=ema9>ema21?2:-2;
score+=rsi<45?1.5:rsi>55?-1.5:0;

for(let i=candles.length-30;i<candles.length-2;i++){
let diff=candles[i+1].close-candles[i].close;
score+=diff>0?0.2:-0.2;
}

let strength=Math.abs(score);
if(strength>2){
let dir=score>0?"CALL":"PUT";
let baseTime=new Date(candles[candles.length-1].time);
for(let j=1;j<=3;j++){
let t=new Date(baseTime.getTime()+j*60000).toTimeString().slice(0,5);
allSignals.push({
pair:pair.replace(/-otc|-OTC/gi,""),
time:t,
dir,
strength
});
}
}
}catch(e){}
}

allSignals.sort((a,b)=>b.strength-a.strength);
FINAL=allSignals.slice(0,20);

if(FINAL.length<5){
document.getElementById("output").innerText="Market weak. Try volatile pairs.";
return;
}

display();
}

function display(){
let text="APX NEON V70 PRO\nUTC+5 | 1 MIN\n━━━━━━━━━━━━━━━━━━\n\n";
FINAL.forEach(s=>{
text+=`M1 │ ${s.pair.padEnd(8)} │ ${s.time} │ ${s.dir}\n`;
});
text+="\n━━━━━━━━━━━━━━━━━━\n• Exact minute entry\n• 1 Martingale max\n• Stop after 2 losses\n• Avoid news";
document.getElementById("output").innerText=text;
}

async function sendTG(){
if(FINAL.length==0){alert("Generate first");return;}
let msg=document.getElementById("output").innerText;
await fetch(TG,{method:"POST",body:msg});
alert("Sent to Telegram");
}
</script>

</body>
</html>
