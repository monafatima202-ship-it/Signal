<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APX HYBRID V44 - BRAIN SIGNALS</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{--bg:#02050f;--panel:#0b1626;--neon:#00ffea;--neon-glow:0 0 15px #00ffea, 0 0 35px #00ffea;}
body{margin:0;background:var(--bg);color:#e0fffc;font-family:'Rajdhani';min-height:100vh;}
header{text-align:center;padding:20px;background:linear-gradient(to bottom,#000,#001122);border-bottom:3px solid var(--neon);box-shadow:var(--neon-glow);}
.logo{font-family:'Orbitron';font-size:30px;color:var(--neon);text-shadow:var(--neon-glow);letter-spacing:3px;}
.container{max-width:500px;margin:20px auto;padding:15px;}
.panel{background:var(--panel);border-radius:18px;padding:20px;border:2px solid rgba(0,255,234,0.2);box-shadow:0 0 25px rgba(0,255,234,0.15);}
select,input[type="time"]{width:100%;padding:12px;margin:10px 0;background:#051021;border:1px solid #1a3a5a;border-radius:10px;color:#fff;}
button{width:100%;padding:15px;margin:12px 0;border:none;border-radius:12px;font-family:'Orbitron';font-weight:900;cursor:pointer;text-transform:uppercase;}
.generate{background:linear-gradient(135deg,#00ffea,#ff00aa);color:#000;box-shadow:var(--neon-glow);}
.telegram{background:#0088cc;color:white;}
#output{margin-top:20px;background:#000814;padding:18px;border-radius:12px;border:2px dashed var(--neon);white-space:pre-wrap;font-family:monospace;font-size:13px;color:#c8fffa;min-height:300px;}
.loader{text-align:center;color:var(--neon);padding:40px 0;font-size:18px;}
</style>
</head>
<body>

<header><div class="logo">APX HYBRID V44 BRAIN</div></header>

<div class="container">
<div class="panel">

<select id="pairs" multiple size="8"></select>

<div style="display:flex;gap:10px;margin:15px 0;">
<input type="time" id="start" value="22:30">
<input type="time" id="end" value="02:00">
</div>

<button class="generate" onclick="generateSignals()">GENERATE BRAIN SIGNALS</button>
<button class="telegram" onclick="sendToTelegram()">SEND TELEGRAM</button>

<div id="output">V44 READY • PAST CANDLES ONLY • VOLATILE PAIRS SELECT KARO</div>

</div>
</div>

<script>

const API = "https://apx.mkapi009.workers.dev?pair=";
const TG = "https://signal.mkapi009.workers.dev/send";

let signalsList = [];
let isProcessing = false;

const PAIRS_LIST = {
  OTC: ["USDPKR-otc","USDBDT-otc","USDINR-otc","USDARS-otc","USDNGN-otc","BRLUSD-otc","USDMXN-otc","USDEGP-otc","USDIDR-otc"],
  CRYPTO: ["XAUUSD-otc","BTCUSD-otc","ETHUSD-otc"]
};

function loadPairs() {
  const select = document.getElementById("pairs");
  select.innerHTML = "";
  [...PAIRS_LIST.OTC, ...PAIRS_LIST.CRYPTO].forEach(p => {
    let opt = document.createElement("option");
    opt.value = p;
    opt.textContent = p.replace(/-otc|-OTC/,'').trim();
    select.appendChild(opt);
  });
}
loadPairs();

// Fast EMA
function ema(candles, period) {
  if (candles.length < period) return null;
  let k = 2 / (period + 1);
  let emaVal = candles.slice(0, period).reduce((s, c) => s + c.close, 0) / period;
  for (let i = period; i < candles.length; i++) {
    emaVal = c.close * k + emaVal * (1 - k);
  }
  return emaVal;
}

// RSI 9
function rsi(candles) {
  if (candles.length < 10) return 50;
  let gains = 0, losses = 0;
  for (let i = 1; i <= 9; i++) {
    let diff = candles[candles.length - i].close - candles[candles.length - i - 1].close;
    if (diff > 0) gains += diff; else losses -= diff;
  }
  let ag = gains / 9;
  let al = losses / 9 || 0.0001;
  return 100 - (100 / (1 + ag / al));
}

// MACD simple
function macdHist(candles) {
  let ema12 = ema(candles, 12);
  let ema26 = ema(candles, 26);
  if (!ema12 || !ema26) return 0;
  return ema12 - ema26;
}

function analyze(candles, pair) {
  if (candles.length < 60) return null;

  const ema5 = ema(candles, 5);
  const ema13 = ema(candles, 13);
  if (!ema5 || !ema13) return null;

  const rsiVal = rsi(candles);
  const macdVal = macdHist(candles);

  // Momentum last 10
  let mom = 0;
  for (let i = candles.length - 10; i < candles.length - 1; i++) {
    mom += candles[i+1].close - candles[i].close;
  }
  mom /= 9;

  // Breakout
  let recentHigh = Math.max(...candles.slice(-20).map(c => c.high));
  let recentLow = Math.min(...candles.slice(-20).map(c => c.low));
  let breakout = 0;
  let lastClose = candles[candles.length-1].close;
  if (lastClose > recentHigh) breakout = 3;
  if (lastClose < recentLow) breakout = -3;

  let score = 0;
  score += (ema5 > ema13 ? 5 : -5);                // strong weight
  score += (rsiVal < 42 ? 3 : rsiVal > 58 ? -3 : 0);
  score += (macdVal > 0 ? 2.5 : -2.5);
  score += (mom > 0.0003 ? 3 : mom < -0.0003 ? -3 : 0);
  score += breakout;
  score += (lastClose > ema5 ? 2 : lastClose < ema5 ? -2 : 0);

  let thresh = (pair.includes('BTC') || pair.includes('XAU') || pair.includes('ARS') || pair.includes('MXN')) ? 2.2 : 3.2;

  let dir = null;
  let acc = 70 + Math.abs(score) * 2.5;
  acc = Math.min(93, Math.max(70, acc));

  if (Math.abs(score) >= thresh) {
    dir = score > 0 ? "CALL ↑" : "PUT ↓";
  } else if (Math.abs(score) >= 1.2) {
    dir = score > 0 ? "CALL ↑" : "PUT ↓";
    acc -= 10;
  }

  if (dir) {
    return {dir, acc: acc.toFixed(1)};
  }
  return null;
}

async function generateSignals() {
  if (isProcessing) return;
  isProcessing = true;
  signalsList = [];

  const output = document.getElementById("output");
  output.innerHTML = `<div class="loader">BRAIN SCANNING PAST CANDLES...</div>`;

  const selected = Array.from(document.getElementById("pairs").selectedOptions).map(o => o.value);
  if (selected.length === 0) {
    output.innerText = "At least 4-6 pairs select kar bhai (BTC, XAU, ARS, MXN best)";
    isProcessing = false;
    return;
  }

  for (const pair of selected) {
    try {
      let res = await fetch(API + pair);
      let json = await res.json();
      let candles = json?.data || [];
      let result = analyze(candles, pair);
      if (result) {
        signalsList.push({
          pair: pair.replace(/-otc|-OTC/,'').trim(),
          dir: result.dir,
          acc: result.acc
        });
      }
    } catch (e) {}
  }

  if (signalsList.length === 0) {
    output.innerText = "No clear setups this moment.\nTry: BTCUSD-otc, XAUUSD-otc, USDARS-otc, USDMXN-otc\nWider time range ya thodi der baad try kar.";
  } else {
    distributeTimes();
    displaySignals();
  }
  isProcessing = false;
}

function distributeTimes() {
  const s = document.getElementById("start").value;
  const e = document.getElementById("end").value;
  const now = new Date();
  let startMs = new Date(now.toDateString() + " " + s + ":00").getTime();
  let endMs = new Date(now.toDateString() + " " + e + ":00").getTime();
  if (endMs <= startMs) endMs += 86400000;

  const gap = (endMs - startMs) / (signalsList.length + 1);
  let cur = startMs + gap;

  signalsList.forEach(sig => {
    sig.time = new Date(cur).toTimeString().slice(0,5);
    cur += gap;
  });
}

function displaySignals() {
  let text = "✦ APX HYBRID V44 BRAIN SIGNALS ✦\n";
  text += "━━━━━━━━━━━━━━━━━━━━━━━━━━\n";
  text += "PK Time | 1 Min Expiry | Past Candles Only\n\n";

  signalsList.forEach(s => {
    text += `➤ ${s.pair.padEnd(10)} ${s.time}  \( {s.dir} [ \){s.acc}%]\n`;
  });

  text += "\n━━━━━━━━━━━━━━━━━━━━━━━━━━\n• Exact time pe trade\n• 1 step MG max\n• News time avoid\n• 2 loss pe ruk jao";

  document.getElementById("output").innerText = text;
}

async function sendToTelegram() {
  if (signalsList.length === 0) return alert("Generate signals pehle!");
  let msg = "APX V44 BRAIN SIGNALS\nPK Time | 1 Min\n━━━━━━━━━━\n";
  signalsList.forEach(s => msg += `${s.time} | ${s.pair.padEnd(10)} | \( {s.dir} [ \){s.acc}%]\n`);
  msg += "━━━━━━━━━━\nDiscipline rakho bhai";
  await fetch(TG, {method:"POST", body: msg});
  alert("Telegram pe bhej diya!");
}

</script>
</body>
</html>
