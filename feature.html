<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APX MILONGAZI STYLE v1 - STABLE FLOW</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #01060b;
  --panel: #0a111f;
  --neon: #00ff88;
  --cyan: #00ccff;
  --glow: 0 0 15px #00ff88, 0 0 30px #00ccff;
}
body { margin:0; background:var(--bg); color:#e0fbee; font-family:'Rajdhani'; }
header { text-align:center; padding:20px; background:black; border-bottom:4px solid var(--neon); box-shadow:var(--glow); }
.logo { font-family:'Orbitron'; font-size:28px; color:var(--neon); text-shadow:0 0 15px var(--neon); letter-spacing:2px; }
.container { max-width:520px; margin:15px auto; padding:15px; }
.panel { background:var(--panel); border-radius:20px; padding:25px; border:1px solid rgba(0,255,136,.2); box-shadow:0 0 25px rgba(0,255,136,0.15); }
.tabs { display:flex; gap:8px; margin-bottom:15px; }
.tab { flex:1; padding:12px; border:2px solid var(--neon); background:transparent; color:var(--neon); border-radius:10px; cursor:pointer; font-weight:bold; transition:0.3s; }
.tab.active { background:var(--neon); color:black; box-shadow:var(--glow); transform:scale(1.05); }
select, input { width:100%; padding:14px; margin-bottom:15px; background:#050d1a; border:1px solid #1a3a3a; border-radius:12px; color:white; outline:none; }
button { width:100%; padding:18px; border:none; border-radius:15px; font-family:'Orbitron'; font-weight:900; cursor:pointer; text-transform:uppercase; transition:0.3s; margin:8px 0; }
.generate { background:linear-gradient(135deg,#00ff88,#00ccff); color:black; box-shadow:var(--glow); }
.telegram { background:linear-gradient(135deg,#0088cc,#00aaff); color:white; box-shadow:0 0 15px #0088cc; }
.telegram:hover { transform:scale(1.03); box-shadow:0 0 35px #00aaff; }
#output { margin-top:20px; background:#01040a; padding:20px; border-radius:15px; border:1px dashed var(--neon); white-space:pre-wrap; font-family:monospace; font-size:13px; color:#afffdf; line-height:1.7; min-height:340px; }
.loader { text-align:center; color:var(--neon); padding:40px 0; font-size:18px; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100% {opacity:1;} 50% {opacity:0.6;} }
</style>
</head>
<body>

<header><div class="logo">APX MILONGAZI STYLE v1</div></header>

<div class="container">
  <div class="panel">
    <div class="tabs">
      <button class="tab active" onclick="setMarket('OTC',this)">OTC</button>
      <button class="tab" onclick="setMarket('CRYPTO',this)">CRYPTO</button>
      <button class="tab" onclick="setMarket('STOCK',this)">STOCK</button>
    </div>

    <select id="pairs" multiple size="6"></select>

    <div style="display:flex; gap:10px; margin:15px 0;">
      <input type="time" id="start" value="18:00">
      <input type="time" id="end" value="21:00">
    </div>

    <button class="generate" onclick="generateStableFlow()">GENERATE STABLE FLOW</button>
    <button class="telegram" onclick="sendToTelegram()">SEND TO TELEGRAM</button>

    <div id="output">READY • SELECT 3-8 PAIRS + TIME RANGE</div>
  </div>
</div>

<script>
const PAIRS = {
  OTC: ["USDPKR-otc","USDINR-otc","USDARS-otc","USDBDT-otc","USDNGN-otc","BRLUSD-otc","USDMXN-otc","USDEGP-otc"],
  CRYPTO: ["BTCUSD-otc","ETHUSD-otc","XAUUSD-otc"],
  STOCK: ["MSFSTK-otc","AXPSTK-OTC","PFESTK-otc","MCDSTK-otc","JNJSTK-otc"]
};

function setMarket(type, el) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  const select = document.getElementById("pairs");
  select.innerHTML = "";
  PAIRS[type].forEach(p => {
    let opt = document.createElement("option");
    opt.value = p;
    opt.textContent = p.replace("-otc","");
    select.appendChild(opt);
  });
}
setMarket("OTC", document.querySelector(".tab.active"));

let signals = [];

function padTime(min) {
  let h = Math.floor(min / 60) % 24;
  let m = min % 60;
  return (h < 10 ? "0" : "") + h + ":" + (m < 10 ? "0" : "") + m;
}

function toMin(t) {
  let [h, m] = t.split(":").map(Number);
  return h * 60 + m;
}

async function generateStableFlow() {
  signals = [];
  const output = document.getElementById("output");
  output.innerText = "GENERATING STABLE FLOW...";

  const selected = [...document.getElementById("pairs").selectedOptions].map(o => o.value);
  if (selected.length < 3) {
    output.innerText = "Kam se kam 3 pairs select kar bhai";
    return;
  }

  const startStr = document.getElementById("start").value || "18:00";
  const endStr = document.getElementById("end").value || "21:00";

  let currentMin = toMin(startStr);
  let endMin = toMin(endStr);
  if (endMin <= currentMin) endMin += 1440;

  let pairIndex = 0;
  let lastPair = null;
  let lastDir = null;

  while (currentMin <= endMin && signals.length < 40) {
    let pair = selected[pairIndex % selected.length];
    let cleanPair = pair.replace("-otc","").toUpperCase();

    // Avoid back-to-back same pair or same direction
    if (pair === lastPair || (Math.random() > 0.65)) {
      pairIndex++;
      continue;
    }

    // Simple bias: alternate CALL/PUT with slight preference
    let dir = (Math.random() > 0.48) ? "CALL" : "PUT";
    if (lastDir === dir) dir = dir === "CALL" ? "PUT" : "CALL";

    signals.push(`M1;\( {cleanPair.padEnd(6)}; \){padTime(currentMin)};${dir}`);

    lastPair = pair;
    lastDir = dir;

    // Natural gap 8-15 min (milongazi style)
    currentMin += 8 + Math.floor(Math.random() * 8);
    pairIndex++;
  }

  if (signals.length === 0) {
    output.innerText = "NO FLOW GENERATED\nCHANGE TIME RANGE OR PAIRS";
    return;
  }

  let h = "STABLE FLOW SIGNALS\n━━━━━━━━━━━━━━\n";
  h += signals.join("\n");
  h += "\n━━━━━━━━━━━━━━\n• Exact time entry\n• 1 step MG max\n• Avoid news\n• 2 loss pe stop";

  output.innerText = h;
}

async function sendToTelegram() {
  if (signals.length === 0) {
    alert("No signals to send bhai");
    return;
  }

  let msg = "APX STABLE FLOW\nPK Time | 1 Min\n━━━━━━━━━━\n" + signals.join("\n") + "\n━━━━━━━━━━\nTrade safe";

  await fetch(TG, {
    method: "POST",
    body: msg
  });

  alert("Signals sent to Telegram!");
}
</script>
</body>
</html>
