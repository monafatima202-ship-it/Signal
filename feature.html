<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ ADOX PWME ENGINE ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#02060c;
--panel:#0a111f;
--neon:#00ff88;
--cyan:#00ccff;
--glow:0 0 20px #00ff88,0 0 30px #00ccff;
}

body{
background:var(--bg);
color:#e0fbee;
font-family:'Rajdhani',sans-serif;
padding:20px;
}

header{
text-align:center;
padding:25px;
background:black;
border-bottom:4px solid var(--neon);
box-shadow:var(--glow);
}

.logo{
font-family:'Orbitron';
font-size:22px;
color:var(--neon);
text-shadow:0 0 15px var(--neon);
}

.container{
max-width:520px;
margin:20px auto;
}

.panel{
background:var(--panel);
padding:25px;
border-radius:20px;
box-shadow:0 0 25px rgba(0,255,136,.2);
}

.tabs{
display:flex;
gap:8px;
margin-bottom:15px;
}

.tab{
flex:1;
padding:10px;
border:2px solid var(--neon);
background:transparent;
color:var(--neon);
cursor:pointer;
border-radius:8px;
font-weight:bold;
}

.tab.active{
background:var(--neon);
color:black;
box-shadow:var(--glow);
}

select,input{
width:100%;
padding:12px;
margin:10px 0;
background:#050d1a;
border:1px solid #1a3a3a;
color:white;
border-radius:10px;
}

button{
width:100%;
padding:16px;
margin:10px 0;
border:none;
border-radius:12px;
font-family:'Orbitron';
font-weight:900;
cursor:pointer;
}

.generate{
background:linear-gradient(135deg,#00ff88,#00ccff);
color:black;
box-shadow:var(--glow);
}

.telegram{
background:linear-gradient(135deg,#0088cc,#00aaff);
color:white;
}

#output{
margin-top:20px;
background:#01040a;
padding:15px;
border-radius:12px;
border:1px dashed var(--neon);
white-space:pre-wrap;
font-family:monospace;
min-height:320px;
}

.loader{
display:none;
text-align:center;
color:var(--neon);
margin-top:10px;
}
</style>
</head>

<body>

<header>
<div class="logo">✦ ADOX PWME HIGH ACCURACY ✦</div>
</header>

<div class="container">
<div class="panel">

<div class="tabs">
<button class="tab active" onclick="setMarket('OTC',this)">OTC</button>
<button class="tab" onclick="setMarket('CRYPTO',this)">CRYPTO</button>
<button class="tab" onclick="setMarket('STOCK',this)">STOCK</button>
</div>

<select id="pairs" multiple size="8"></select>

<div style="display:flex; gap:10px;">
<input type="time" id="start" value="14:00">
<input type="time" id="end" value="18:00">
</div>

<button class="generate" onclick="generateFlow()">GENERATE FLOW</button>
<button class="telegram" onclick="sendToTelegram()">SEND TO TELEGRAM</button>

<div class="loader" id="loader">Analyzing Structure...</div>

<div id="output">READY • SELECT PAIRS</div>

</div>
</div>

<script>

const API="https://mrbeaxt.site/Qx/Qx.php?format=json&pair=";
const TG="https://signal.mkapi009.workers.dev/send";

const PAIRS={
OTC:["USDINR_otc","USDPKR_otc","USDBDT_otc","USDARS_otc","USDNGN_otc"],
CRYPTO:["BTCUSD_otc","ETHUSD_otc","XAUUSD_otc"],
STOCK:["MSFSTK_otc","AXPSTK_otc","PFESTK_otc"]
};

let currentMarket="OTC";
let signals=[];

function setMarket(type,el){
currentMarket=type;
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
el.classList.add("active");
let select=document.getElementById("pairs");
select.innerHTML="";
PAIRS[type].forEach(p=>{
let o=document.createElement("option");
o.value=p;
o.textContent=p.replace("_otc","");
select.appendChild(o);
});
}
setMarket("OTC",document.querySelector(".tab"));

function EMA(arr,period){
let k=2/(period+1);
let ema=arr[0];
for(let i=1;i<arr.length;i++){
ema=arr[i]*k+ema*(1-k);
}
return ema;
}

function momentum(closes,opens){
let bull=0,bear=0;
for(let i=closes.length-6;i<closes.length;i++){
if(closes[i]>opens[i]) bull++;
if(closes[i]<opens[i]) bear++;
}
return {bull,bear};
}

function toMin(t){
let [h,m]=t.split(":").map(Number);
return h*60+m;
}

function pad(min){
let h=Math.floor(min/60)%24;
let m=min%60;
return (h<10?"0":"")+h+":"+(m<10?"0":"")+m;
}

async function generateFlow(){

signals=[];
let output=document.getElementById("output");
let loader=document.getElementById("loader");

loader.style.display="block";
output.innerText="";

let selected=[...document.getElementById("pairs").selectedOptions].map(o=>o.value);
if(selected.length<2){
loader.style.display="none";
output.innerText="Select at least 2 pairs";
return;
}

let start=toMin(document.getElementById("start").value);
let end=toMin(document.getElementById("end").value);
if(end<=start) end+=1440;

let structures=[];

for(let pair of selected){

try{
let r=await fetch(API+pair);
let j=await r.json();
if(!j.success||j.data.length<50) continue;

let data=j.data.reverse();
let closes=data.map(c=>parseFloat(c.close));
let opens=data.map(c=>parseFloat(c.open));

let ema9=EMA(closes.slice(-40),9);
let ema21=EMA(closes.slice(-40),21);

let sep=Math.abs(ema9-ema21);
if(sep<0.0005) continue;

let m=momentum(closes,opens);
let dir=ema9>ema21?"CALL":"PUT";
let strength=sep*1000+Math.max(m.bull,m.bear)*2;

structures.push({pair,dir,strength});
}catch(e){}
}

if(structures.length===0){
loader.style.display="none";
output.innerText="No strong structure detected.";
return;
}

structures.sort((a,b)=>b.strength-a.strength);

let pointer=start;
let index=0;
let phase=0;

while(pointer<=end && signals.length<30){

let s=structures[index%structures.length];
let direction=s.dir;

if(phase===1) direction=direction==="CALL"?"PUT":"CALL";
if(phase===2) direction=s.dir;

signals.push(`M1;${s.pair.replace("_otc","")};${pad(pointer)};${direction}`);

pointer+=6+(Math.floor(s.strength)%3);
index++;

if(index%structures.length===0){
phase++;
if(phase>2) phase=0;
}
}

loader.style.display="none";

let text="✦ ADOX PWME REAL FLOW ✦\n━━━━━━━━━━━━━━━━━━\nUTC+6 | Weighted Structure\n\n";
text+=signals.join("\n");
text+="\n━━━━━━━━━━━━━━━━━━\n• EMA Ranked\n• Momentum Weighted\n• Pullback Phase Injected\n• 1 Step MG Max\n• Avoid News";

output.innerText=text;
}

async function sendToTelegram(){
if(signals.length===0){
alert("Generate flow first");
return;
}
let msg="✦ ADOX PWME FLOW ✦\n━━━━━━━━━━\nUTC+6\n"+signals.join("\n")+"\n━━━━━━━━━━\nTrade Safe";
await fetch(TG,{method:"POST",headers:{"Content-Type":"text/plain"},body:msg});
alert("Sent to Telegram");
}

</script>
</body>
</html>
