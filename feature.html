<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APX MILOGZAI FLOW ENGINE ULTIMATE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
 --bg:#01060b;
 --panel:#0a111f;
 --neon:#00ff88;
 --cyan:#00ccff;
 --glow:0 0 20px #00ff88,0 0 35px #00ccff;
}
body{margin:0;background:var(--bg);color:#e0fbee;font-family:'Rajdhani';}
header{text-align:center;padding:20px;background:black;border-bottom:3px solid var(--neon);box-shadow:var(--glow);}
.logo{font-family:'Orbitron';font-size:22px;color:var(--neon);}
.container{max-width:520px;margin:15px auto;padding:10px;}
.panel{background:var(--panel);border-radius:20px;padding:20px;border:1px solid rgba(0,255,136,.3);}
.tabs{display:flex;gap:6px;margin-bottom:10px;}
.tab{flex:1;padding:10px;border:2px solid var(--neon);background:transparent;color:var(--neon);border-radius:8px;cursor:pointer;font-weight:bold;}
.tab.active{background:var(--neon);color:black;box-shadow:var(--glow);}
select,input{width:100%;padding:10px;margin-bottom:10px;background:#050d1a;border:1px solid #1a3a3a;border-radius:8px;color:white;}
button{width:100%;padding:12px;border:none;border-radius:10px;font-family:'Orbitron';font-weight:900;margin:6px 0;cursor:pointer;}
.generate{background:linear-gradient(135deg,#00ff88,#00ccff);color:black;box-shadow:var(--glow);}
.telegram{background:linear-gradient(135deg,#0088cc,#00aaff);color:white;}
#output{margin-top:10px;background:#01040a;padding:15px;border-radius:8px;border:1px dashed var(--neon);white-space:pre-wrap;font-family:monospace;font-size:13px;min-height:260px;}
</style>
</head>
<body>

<header>
<div class="logo">APX MILOGZAI FLOW ENGINE</div>
</header>

<div class="container">
<div class="panel">

<div class="tabs">
<button class="tab active" onclick="setMarket('OTC',this)">OTC</button>
<button class="tab" onclick="setMarket('CRYPTO',this)">CRYPTO</button>
<button class="tab" onclick="setMarket('STOCK',this)">STOCK</button>
</div>

<select id="pairs" multiple size="6"></select>

<input type="time" id="start" value="18:00">
<input type="time" id="end" value="20:00">

<button class="generate" onclick="generateSignals()">GENERATE SIGNALS</button>
<button class="telegram" onclick="sendToTelegram()">SEND TO TELEGRAM</button>

<div id="output">READY • ALWAYS OUTPUT MODE</div>

</div>
</div>

<script>

const API="https://apx.mkapi009.workers.dev?pair=";
const TG="https://signal.mkapi009.workers.dev/send";

let signals=[];
let currentMarket="OTC";

const PAIRS={
OTC:["USDPKR-otc","USDINR-otc","USDARS-otc","USDBDT-otc","USDNGN-otc"],
CRYPTO:["BTCUSD-otc","ETHUSD-otc","XAUUSD-otc"],
STOCK:["MCDSTK-otc","JNJSTK-otc","AXPSTK-otc"]
};

function setMarket(type,el){
currentMarket=type;
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
el.classList.add("active");
loadPairs();
}

function loadPairs(){
let s=document.getElementById("pairs");
s.innerHTML="";
PAIRS[currentMarket].forEach(p=>{
let o=document.createElement("option");
o.value=p;
o.textContent=p.replace("-otc","");
s.appendChild(o);
});
}
loadPairs();

function minutes(hhmm){
let [h,m]=hhmm.split(":").map(Number);
return h*60+m;
}

function formatTime(total){
let h=Math.floor(total/60)%24;
let m=total%60;
return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");
}

async function generateSignals(){

signals=[];
let out=document.getElementById("output");
out.innerText="ANALYZING FLOW...";

let selected=[...document.getElementById("pairs").selectedOptions].map(o=>o.value);
if(selected.length===0){out.innerText="Select pairs";return;}

let start=document.getElementById("start").value;
let end=document.getElementById("end").value;

let startMin=minutes(start);
let endMin=minutes(end);

let totalWindow=endMin>=startMin ? endMin-startMin : (1440-startMin)+endMin;

let all=[];

for(let pair of selected){

let r=await fetch(API+pair);
let j=await r.json();
if(!j.data||j.data.length<25) continue;

let candles=j.data;

// ---- Dominance Bias ----
let up=0,down=0;
for(let i=candles.length-20;i<candles.length;i++){
if(candles[i].close>candles[i-1].close) up++;
else down++;
}

let bias;
if(up/down>1.2) bias="CALL";
else if(down/up>1.2) bias="PUT";
else bias = candles[candles.length-1].close > candles[candles.length-2].close ? "CALL" : "PUT";

// ---- Adaptive spacing ----
let strength=Math.abs(up-down);
let spacing=3 + Math.min(4, Math.floor(strength/3)); // 3–7 min

let timePointer=startMin;
let perPairCount=0;

while(perPairCount<4 && totalWindow>0){

if(endMin>=startMin){
if(timePointer>endMin) break;
}else{
if(timePointer>1440) timePointer-=1440;
}

all.push(`M1;${pair.replace("-otc","")};${formatTime(timePointer)};${bias}`);

timePointer+=spacing;
perPairCount++;
}

}

all.sort((a,b)=>a.split(";")[2].localeCompare(b.split(";")[2]));

if(all.length>20) all=all.slice(0,20);

signals=all;

let msg="MILOGZAI FLOW SIGNALS\n━━━━━━━━━━━━━━\n";
msg+=all.join("\n");
msg+="\n━━━━━━━━━━━━━━\nDominance Projection Mode\nAdaptive Flow\nMax 1 Step MG";

out.innerText=msg;
}

async function sendToTelegram(){
if(signals.length===0){alert("No signals");return;}
let text="APX MILOGZAI FLOW\nUTC+6 | M1\n━━━━━━━━━━\n";
text+=signals.join("\n");
text+="\n━━━━━━━━━━\nTrade Safe";
await fetch(TG,{method:"POST",body:text});
alert("Sent to Telegram");
}

</script>

</body>
</html>
