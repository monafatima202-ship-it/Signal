<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APX HYBRID V39 - HIGH ACCURACY PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#02050f;
--panel:#0b1626;
--neon:#00ffea;
--neon-glow:0 0 15px #00ffea, 0 0 35px #00ffea;
--accent:#ff00aa;
}
body{margin:0;background:var(--bg);color:#e0fffc;font-family:'Rajdhani';min-height:100vh;overflow-x:hidden;}
header{text-align:center;padding:22px;background:linear-gradient(to bottom,#000,#001122);border-bottom:3px solid var(--neon);box-shadow:var(--neon-glow);}
.logo{font-family:'Orbitron';font-size:32px;color:var(--neon);text-shadow:var(--neon-glow);letter-spacing:4px;}
.container{max-width:520px;margin:25px auto;padding:15px;}
.panel{background:var(--panel);border-radius:20px;padding:25px;border:2px solid rgba(0,255,234,0.25);box-shadow:0 0 30px rgba(0,255,234,0.18);}
.tabs{display:flex;gap:10px;margin-bottom:18px;}
.tab{flex:1;padding:12px;border:2px solid var(--neon);background:transparent;color:var(--neon);border-radius:12px;font-weight:700;cursor:pointer;transition:0.3s;}
.tab.active{background:var(--neon);color:#000;box-shadow:var(--neon-glow);transform:scale(1.05);}
select,input[type="time"]{width:100%;padding:14px;margin:12px 0;background:#051021;border:1px solid #1a3a5a;border-radius:12px;color:#fff;font-size:16px;}
button{width:100%;padding:16px;margin:10px 0;border:none;border-radius:14px;font-family:'Orbitron';font-weight:900;cursor:pointer;text-transform:uppercase;letter-spacing:1.5px;transition:0.3s;}
.generate{background:linear-gradient(135deg,#00ffea,#ff00aa);color:#000;box-shadow:var(--neon-glow);}
.generate:hover{transform:scale(1.03);box-shadow:0 0 45px var(--neon);}
.telegram{background:linear-gradient(135deg,#0088cc,#00aaff);color:white;box-shadow:0 0 15px #0088cc;}
#output{margin-top:25px;background:#000814;padding:20px;border-radius:14px;border:2px dashed var(--neon);white-space:pre-wrap;font-family:monospace;font-size:13.5px;color:#c8fffa;line-height:1.6;min-height:220px;box-shadow:0 0 20px rgba(0,255,234,0.15);}
.loader{text-align:center;color:var(--neon);font-family:'Orbitron';font-size:18px;padding:50px 0;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.6;}}
</style>
</head>

<body>

<header>
<div class="logo">APX HYBRID V39 HIGH ACCURACY</div>
</header>

<div class="container">
<div class="panel">

<div class="tabs">
<button class="tab active" onclick="setMarket('OTC',this)">OTC</button>
<button class="tab" onclick="setMarket('STOCK',this)">STOCK</button>
<button class="tab" onclick="setMarket('CRYPTO',this)">CRYPTO</button>
</div>

<select id="pairs" multiple size="8"></select>

<div style="display:flex;gap:12px;margin:15px 0;">
<input type="time" id="start" value="15:00">
<input type="time" id="end" value="20:00">
</div>

<button class="generate" onclick="generateSignals()">GENERATE HYBRID SIGNALS</button>
<button class="telegram" onclick="sendToTelegram()">SEND TO TELEGRAM</button>

<div id="output">HYBRID SYSTEM READY • EMA + RSI + MACD + STOCH</div>

</div>
</div>

<script>

const API = "https://apx.mkapi009.workers.dev?pair=";
const TG  = "https://signal.mkapi009.workers.dev/send";

let signalsList = [];
let isProcessing = false;

const PAIRS_LIST = {
  OTC:    ["USDPKR-otc","USDBDT-otc","USDINR-otc","USDARS-otc","USDNGN-otc","BRLUSD-otc","USDMXN-otc","USDEGP-otc","USDIDR-otc"],
  STOCK:  ["MSFSTK-otc","AXPSTK-OTC","PFESTK-otc","MCDSTK-otc","JNJSTK-otc","FABSTK-otc","BOISTK-otc"],
  CRYPTO: ["XAUUSD-otc","BTCUSD-otc","ETHUSD-otc"]
};

function setMarket(type, btn) {
  document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  const select = document.getElementById("pairs");
  select.innerHTML = "";
  PAIRS_LIST[type].forEach(p => {
    let opt = document.createElement("option");
    opt.value = p;
    opt.textContent = p.replace(/-otc|-OTC/,'').trim();
    select.appendChild(opt);
  });
}
setMarket("OTC", document.querySelector(".tab.active"));

// EMA
function ema(candles, period) {
  if (candles.length < period) return null;
  let k = 2 / (period + 1);
  let emaVal = candles.slice(0, period).reduce((a, c) => a + c.close, 0) / period;
  for (let i = period; i < candles.length; i++) {
    emaVal = candles[i].close * k + emaVal * (1 - k);
  }
  return emaVal;
}

// RSI 14
function rsi(candles, period = 14) {
  if (candles.length < period + 1) return 50;
  let gains = 0, losses = 0;
  for (let i = 1; i <= period; i++) {
    let diff = candles[candles.length - i].close - candles[candles.length - i - 1].close;
    if (diff > 0) gains += diff; else losses -= diff;
  }
  let avgGain = gains / period;
  let avgLoss = losses / period || 0.0001;
  let rs = avgGain / avgLoss;
  return 100 - (100 / (1 + rs));
}

// MACD simplified (line - signal)
function macd(candles) {
  const ema12 = ema(candles, 12);
  const ema26 = ema(candles, 26);
  if (!ema12 || !ema26) return 0;
  const macdLine = ema12 - ema26;
  const signal9 = ema(candles.slice(-9).map((c,i)=> ({close: macdLine})), 9); // approx
  return macdLine - (signal9 || 0);
}

// Stochastic %K simplified
function stochastic(candles, k=14, smooth=3) {
  if (candles.length < k) return 50;
  let recent = candles.slice(-k);
  let low = Math.min(...recent.map(c => c.low));
  let high = Math.max(...recent.map(c => c.high));
  let current = recent[recent.length-1].close;
  let rawK = ((current - low) / (high - low || 0.0001)) * 100;
  return rawK; // simple, no full smoothing for speed
}

function analyze(candles) {
  if (candles.length < 100) return null; // safe

  const closes = candles.map(c => c.close);
  const lastClose = closes[closes.length - 1];

  const ema9  = ema(candles, 9);
  const ema21 = ema(candles, 21);
  if (!ema9 || !ema21) return null;

  const rsiVal = rsi(candles);
  const macdVal = macd(candles);
  const stochVal = stochastic(candles);

  let score = 0;

  // Trend (EMA)
  if (ema9 > ema21) score += 3;
  if (ema9 < ema21) score -= 3;

  // RSI filter
  if (rsiVal < 45) score += 2;      // oversold bias CALL
  if (rsiVal > 55) score -= 2;      // overbought bias PUT
  if (rsiVal < 35) score += 2;      // strong oversold
  if (rsiVal > 65) score -= 2;

  // MACD momentum
  if (macdVal > 0) score += 2;
  if (macdVal < 0) score -= 2;

  // Stochastic
  if (stochVal < 35) score += 2;
  if (stochVal > 65) score -= 2;

  // Price action last candle
  if (lastClose > ema9) score += 1;
  if (lastClose < ema9) score -= 1;

  let dir = null;
  let conf = 60 + Math.abs(score) * 4; // rough %
  conf = Math.min(92, Math.max(68, conf));

  if (score >= 7) dir = "CALL ↑";
  if (score <= -7) dir = "PUT ↓";

  if (dir) {
    return { dir, acc: conf.toFixed(1) };
  }
  return null;
}

async function generateSignals() {
  if (isProcessing) return;
  isProcessing = true;
  signalsList = [];

  const output = document.getElementById("output");
  output.innerHTML = `<div class="loader">HYBRID SCAN: EMA+RSI+MACD+STOCH...</div>`;

  const selected = [...document.getElementById("pairs").selectedOptions].map(o => o.value);
  if (!selected.length) {
    output.innerText = "At least 2-4 pairs select kar bhai!";
    isProcessing = false;
    return;
  }

  for (const pair of selected) {
    try {
      const res = await fetch(API + pair);
      const json = await res.json();
      const candles = json?.data || [];
      const result = analyze(candles);
      if (result) {
        signalsList.push({
          pair: pair.replace(/-otc|-OTC/,'').trim(),
          dir: result.dir,
          acc: result.acc
        });
      }
    } catch (e) {}
  }

  if (!signalsList.length) {
    output.innerText = "No high-prob setups this time.\nTry volatile pairs like BTCUSD-otc, XAUUSD-otc or USDARS-otc";
  } else {
    distributeTimes();
    displaySignals();
  }
  isProcessing = false;
}

function distributeTimes() {
  const startVal = document.getElementById("start").value;
  const endVal   = document.getElementById("end").value;
  const now      = new Date();
  let startMs    = new Date(now.toDateString() + " " + startVal + ":00").getTime();
  let endMs      = new Date(now.toDateString() + " " + endVal + ":00").getTime();
  if (endMs <= startMs) endMs += 86400000;

  const interval = (endMs - startMs) / (signalsList.length + 1);
  let current = startMs + interval;

  signalsList.forEach(sig => {
    sig.time = new Date(current).toTimeString().slice(0,5);
    current += interval;
  });
}

function displaySignals() {
  let text = "✦ APX HYBRID V39 HIGH ACCURACY ✦\n";
  text += "━━━━━━━━━━━━━━━━━━━━━━━━━━\n";
  text += "UTC+5 PK | 1 Min Expiry | EMA9/21 + RSI14 + MACD + STOCH\n\n";

  signalsList.forEach(s => {
    text += `➤ ${s.pair.padEnd(10)} ${s.time}  \( {s.dir} [ \){s.acc}%]\n`;
  });

  text += "\n━━━━━━━━━━━━━━━━━━━━━━━━━━\nRULES:\n• Exact time entry only\n• 1-step MG max\n• No news/high volatility spikes\n• Stop after 2 losses\n\nAPX Elite • Trade with Discipline";

  document.getElementById("output").innerText = text;
}

async function sendToTelegram() {
  if (!signalsList.length) return alert("Generate first bhai!");

  await fetch(TG, {method:"POST", body: "APX HYBRID V39 • Loading High-Prob Signals..."});
  await new Promise(r => setTimeout(r, 2500));
  await fetch(TG, {method:"POST", body: "Scanning Complete • Accuracy Filter Applied..."});

  let msg = "✦ APX HYBRID V39 SIGNALS ✦\n\nUTC+5 PK | 1 Min\n━━━━━━━━━━\n```text\n";
  signalsList.forEach(s => {
    msg += `${s.time} | ${s.pair.padEnd(10)} | \( {s.dir} [ \){s.acc}%]\n`;
  });
  msg += "```\n━━━━━━━━━━\nFollow Rules • Stay Safe";

  await fetch(TG, {method:"POST", body: msg});
  alert("Sent to Telegram!");
}

</script>
</body>
</html>
