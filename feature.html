<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>✦ ADOX APE v4 PREMIUM APX ✦</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#000814;
--neon:#39ff14;
--cyan:#00f0ff;
--glass:rgba(10,20,40,0.4);
--glow:0 0 30px #39ff14,0 0 50px #00f0ff;
}

body{
background:var(--bg);
color:white;
font-family:'Rajdhani',sans-serif;
padding:20px;
}

header{
text-align:center;
padding:25px;
border-bottom:4px solid var(--neon);
box-shadow:var(--glow);
}

.logo{
font-family:'Orbitron';
font-size:28px;
color:#39ff14;
}

.container{
max-width:600px;
margin:auto;
}

.panel{
background:var(--glass);
padding:25px;
border-radius:20px;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:15px;
}

.tab{
flex:1;
padding:12px;
border:2px solid var(--neon);
background:none;
color:var(--neon);
border-radius:10px;
}

.tab.active{
background:#39ff14;
color:black;
}

select,input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:10px;
background:#0a1a2a;
color:white;
}

button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:12px;
font-family:'Orbitron';
}

.generate{
background:linear-gradient(135deg,#39ff14,#00f0ff);
}

.telegram{
background:linear-gradient(135deg,#00bfff,#8a2be2);
color:white;
}

#output{
margin-top:20px;
background:black;
padding:15px;
border-radius:10px;
white-space:pre;
min-height:300px;
}

</style>
</head>

<body>

<header>

<div class="logo">✦ ADOX APE v4 PREMIUM APX ✦</div>

<div>UTC+6 | ADOX Premium Engine Activated</div>

</header>

<div class="container">

<div class="panel">

<div class="tabs">

<button class="tab active" onclick="setMarket('OTC',this)">OTC</button>

<button class="tab" onclick="setMarket('CRYPTO',this)">CRYPTO</button>

<button class="tab" onclick="setMarket('STOCK',this)">STOCK</button>

</div>

<select id="pairs" multiple size="10"></select>

<div style="display:flex;gap:10px">

<input type="time" id="start" value="00:00">

<input type="time" id="end" value="23:59">

</div>

<button class="generate" onclick="generateFlow()">GENERATE PREMIUM FLOW ⚡</button>

<button class="telegram" onclick="sendToTelegram()">SEND TO TELEGRAM 📲</button>

<div id="output">READY • SELECT PAIRS</div>

</div>

</div>

<script>

const API_BASE="https://quotexotc-futureapi.poghen-dx.workers.dev/pairs=";

const TG="https://signal.mkapi009.workers.dev/send";

const PAIRS={

OTC:[
"AUDUSD_otc","EURUSD_otc","GBPUSD_otc","NZDUSD_otc","USDCAD_otc","USDCHF_otc","USDJPY_otc",
"USDINR_otc","USDBDT_otc","USDPKR_otc","USDNGN_otc","USDARS_otc"
],

CRYPTO:[
"BTCUSD_otc","ETHUSD_otc","XRPUSD_otc"
],

STOCK:[
"FB_otc","AXP_otc","PFE_otc"
]

};

let signals=[];
let currentMarket="OTC";

function setMarket(type,el){

currentMarket=type;

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

el.classList.add("active");

let select=document.getElementById("pairs");

select.innerHTML="";

PAIRS[type].forEach(p=>{

let o=document.createElement("option");

o.value=p;

o.textContent=p.replace("_otc","");

select.appendChild(o);

});

}

function toMin(t){

let[h,m]=t.split(":").map(Number);

return h*60+m;

}

function pad(min){

let h=Math.floor(min/60)%24;

let m=min%60;

return(h<10?"0":"")+h+":"+(m<10?"0":"")+m;

}

async function generateFlow(){

let selected=[...document.getElementById("pairs").selectedOptions].map(o=>o.value);

if(selected.length===0){

document.getElementById("output").innerText="SELECT PAIRS";

return;

}

signals=[];

for(let pair of selected){

try{

let r=await fetch(API_BASE+pair);

let j=await r.json();

let list=j.signals||[];

list.forEach(s=>{

signals.push({

pair:pair.replace("_otc",""),

direction:s.direction,

time:s.time

});

});

}catch(e){}

}

signals.sort((a,b)=>toMin(a.time)-toMin(b.time));

let text="ADOX PREMIUM FLOW\n\n";

signals.forEach(s=>{

text+=`M1 | ${s.pair} | ${s.time} | ${s.direction}\n`;

});

document.getElementById("output").innerText=text;

}

async function sendToTelegram(){

if(signals.length===0){

alert("Generate signals first");

return;

}

for(let s of signals){

await fetch(TG,{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

pair:s.pair,

dir:s.direction,

time:s.time

})

});

await new Promise(r=>setTimeout(r,700));

}

alert("Signals Sent To Telegram");

}

document.addEventListener("DOMContentLoaded",()=>{

setMarket("OTC",document.querySelector(".tab"));

});

</script>

</body>
</html>
