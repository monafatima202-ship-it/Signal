<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✦ ADOX PREMIUM REAL STRUCTURE ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#02060c;
  --panel:#0a111f;
  --neon:#00ff88;
  --cyan:#00ccff;
  --glow:0 0 15px #00ff88,0 0 25px #00ccff;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);
  color:#e0fbee;
  font-family:'Rajdhani',sans-serif;
  padding:20px;
}
header{
  text-align:center;
  padding:25px 0;
  background:black;
  border-bottom:4px solid var(--neon);
  box-shadow:var(--glow);
}
.logo{
  font-family:'Orbitron';
  font-size:2rem;
  color:var(--neon);
  text-shadow:0 0 15px var(--neon);
  letter-spacing:3px;
}
.container{max-width:600px;margin:20px auto;}
.panel{
  background:var(--panel);
  border-radius:20px;
  padding:25px;
  border:1px solid rgba(0,255,136,.2);
  box-shadow:0 0 25px rgba(0,255,136,.15);
}
.tabs{display:flex;gap:8px;margin-bottom:15px;}
.tab{
  flex:1;
  padding:12px;
  border:2px solid var(--neon);
  background:transparent;
  color:var(--neon);
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}
.tab.active{
  background:var(--neon);
  color:black;
}
select,input{
  width:100%;
  padding:12px;
  margin:10px 0;
  background:#050d1a;
  border:1px solid #1a3a3a;
  border-radius:12px;
  color:white;
}
button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:15px;
  font-family:'Orbitron';
  font-weight:900;
  cursor:pointer;
  margin:10px 0;
}
.generate{
  background:linear-gradient(135deg,#00ff88,#00ccff);
  color:black;
  box-shadow:var(--glow);
}
.telegram{
  background:linear-gradient(135deg,#0088cc,#00aaff);
  color:white;
}
#loader{
  display:none;
  text-align:center;
  margin:20px 0;
  color:var(--neon);
}
#output{
  margin-top:20px;
  background:#01040a;
  padding:15px;
  border-radius:15px;
  border:1px dashed var(--neon);
  white-space:pre-wrap;
  font-family:monospace;
  font-size:13px;
  min-height:300px;
}
.footer{
  text-align:center;
  margin-top:30px;
  font-size:.9rem;
  color:var(--cyan);
}
</style>
</head>
<body>

<header>
<div class="logo">✦ ADOX PREMIUM REAL STRUCTURE ✦</div>
</header>

<div class="container">
<div class="panel">

<div class="tabs">
<button class="tab active" onclick="setMarket('OTC',this)">OTC</button>
<button class="tab" onclick="setMarket('CRYPTO',this)">CRYPTO</button>
<button class="tab" onclick="setMarket('STOCK',this)">STOCK</button>
</div>

<select id="pairs" multiple size="8"></select>

<input type="time" id="start" value="14:00">
<input type="time" id="end" value="18:00">

<button class="generate" onclick="generateFlow()">GENERATE REAL STRUCTURE</button>
<button class="telegram" onclick="sendToTelegram()">SEND TO TELEGRAM</button>

<div id="loader">Analyzing Market Structure...</div>
<div id="output">READY • SELECT PAIRS</div>

</div>
</div>

<div class="footer">
UTC+6 • EMA Trend + Momentum Filter • 1 Step MG Max • Avoid News
</div>

<script>
const API="https://mrbeaxt.site/Qx/Qx.php?format=json&pair=";
const TG="https://signal.mkapi009.workers.dev/send";

const PAIRS={
  OTC:["USDINR_otc","USDPKR_otc","USDBDT_otc","USDARS_otc","USDNGN_otc","BRLUSD_otc","USDMXN_otc","USDEGP_otc"],
  CRYPTO:["BTCUSD_otc","ETHUSD_otc","XAUUSD_otc"],
  STOCK:["MSFSTK_otc","AXPSTK_otc","PFESTK_otc"]
};

let currentMarket="OTC";
let signals=[];

function setMarket(type,el){
  currentMarket=type;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  loadPairs();
}

function loadPairs(){
  const select=document.getElementById("pairs");
  select.innerHTML="";
  PAIRS[currentMarket].forEach(p=>{
    const opt=document.createElement("option");
    opt.value=p;
    opt.textContent=p.replace("_otc","");
    select.appendChild(opt);
  });
}
loadPairs();

function EMA(arr,p){
  let k=2/(p+1);
  let ema=arr[0];
  for(let i=1;i<arr.length;i++){
    ema=arr[i]*k+ema*(1-k);
  }
  return ema;
}

function padTime(min){
  let h=Math.floor(min/60)%24;
  let m=min%60;
  return (h<10?"0":"")+h+":"+(m<10?"0":"")+m;
}

function toMin(t){
  let [h,m]=t.split(":").map(Number);
  return h*60+m;
}

async function getStructure(pair){

  let res=await fetch(API+pair);
  let json=await res.json();

  if(!json.success || !json.data || json.data.length<50)
    return null;

  let data=json.data.reverse();
  let closes=data.map(c=>parseFloat(c.close));
  let opens=data.map(c=>parseFloat(c.open));

  let ema9=EMA(closes.slice(-40),9);
  let ema21=EMA(closes.slice(-40),21);

  let separation=Math.abs(ema9-ema21);
  if(separation<0.0012) return null;

  let bull=0,bear=0,strongBody=0;

  for(let i=closes.length-5;i<closes.length;i++){
    let body=Math.abs(closes[i]-opens[i]);
    if(body>0.0015) strongBody++;
    if(closes[i]>opens[i]) bull++;
    if(closes[i]<opens[i]) bear++;
  }

  if(strongBody<3) return null;

  if(ema9>ema21 && bull>=4)
    return {dir:"CALL",confidence:80+strongBody,gap:7};

  if(ema9<ema21 && bear>=4)
    return {dir:"PUT",confidence:80+strongBody,gap:7};

  return null;
}

async function generateFlow(){

  signals=[];
  const output=document.getElementById("output");
  const loader=document.getElementById("loader");

  loader.style.display="block";
  output.innerText="";

  const selected=[...document.getElementById("pairs").selectedOptions].map(o=>o.value);

  if(selected.length<1){
    loader.style.display="none";
    output.innerText="Select at least 1 pair";
    return;
  }

  let start=toMin(document.getElementById("start").value);
  let end=toMin(document.getElementById("end").value);
  if(end<=start) end+=1440;

  let pointer=start;

  while(pointer<=end && signals.length<25){

    let bestPair=null;
    let bestData=null;
    let bestScore=0;

    for(let p of selected){
      let s=await getStructure(p);
      if(s && s.confidence>bestScore){
        bestScore=s.confidence;
        bestPair=p;
        bestData=s;
      }
    }

    if(!bestPair) break;

    signals.push(
      `M1;${bestPair.replace("_otc","")};${padTime(pointer)};${bestData.dir};${bestData.confidence}%`
    );

    pointer+=bestData.gap+3;
  }

  loader.style.display="none";

  if(signals.length===0){
    output.innerText="No strong structure detected.";
    return;
  }

  let text=
  "✦ ADOX PREMIUM REAL STRUCTURE FLOW ✦\n"+
  "━━━━━━━━━━━━━━━━━━\nUTC+6 | 1 MIN\n\n"+
  signals.join("\n")+
  "\n━━━━━━━━━━━━━━━━━━\n"+
  "Rules:\n"+
  "• EMA Trend Confirmed\n"+
  "• Momentum Verified\n"+
  "• 1 Step Martingale Max\n"+
  "• Avoid News\n"+
  "• Stop After 2 Loss";

  output.innerText=text;
}

async function sendToTelegram(){
  if(signals.length===0){
    alert("Generate first");
    return;
  }

  let msg="✦ ADOX PREMIUM REAL STRUCTURE FLOW ✦\n━━━━━━━━━━\n"+
          signals.join("\n")+
          "\n━━━━━━━━━━\nTrade Safe";

  await fetch(TG,{
    method:"POST",
    headers:{"Content-Type":"text/plain"},
    body:msg
  });

  alert("Sent to Telegram");
}
</script>
</body>
</html>
