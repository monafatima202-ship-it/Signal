<script>
// same setMarket, EMA, RSI, ADX functions as before

function analyzeBrain(candles) {
  if (candles.length < 200) return { dir: "HOLD", score: 0 };

  // same logic as before (EMA, RSI, momentum, strength, breakout, ADX)
  // ... (copy from previous)

  let totalScore = trendScore + rsiScore + momentum + strengthScore + breakoutScore + adxScore;

  return { dir: "HOLD", score: totalScore }; // return raw score always for debug
}

async function deepNeuralScan() {
  // same fetch loop

  let debugText = "DEBUG - Raw Scores:\n";
  for (let asset of pool) {
    debugText += `${asset.pair.padEnd(10)} score: ${Math.round(asset.score || 0)}\n`;
  }
  debugText += "\n";

  if (pool.length === 0) {
    output.innerText = debugText + "NO STRONG SETUPS FOUND OR API ISSUE.\nThreshold low karne ke bawajood kuch strong nahi mila.\nSubah high volatility time try karo.";
    return;
  }

  // same time range logic

  // lower threshold for signals
  while (current < endT && signalCount < maxSignals && pool.length > 0) {
    // same gap logic

    let asset = pool[idx];
    if (Math.abs(asset.score || 0) >= 8) { // lowered threshold
      FINAL_LIST.push({ time: new Date(current).toTimeString().slice(0,5), pair: asset.pair, dir: asset.dir, score: asset.score });
      signalCount++;
    }
  }

  renderResult();
  output.innerText = debugText + output.innerText;
}
