<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>APX HYBRID MILOGZAI PRO v12</title>
<style>
body{background:#0e1624;color:#00ff88;font-family:Arial;margin:0;padding:20px}
.container{max-width:750px;margin:auto;background:#16273b;padding:20px;border-radius:12px}
h2{text-align:center}
select,input,button{width:100%;padding:10px;margin:6px 0;border-radius:6px;border:none}
button{background:#00ff88;color:black;font-weight:bold;cursor:pointer}
#output{background:#000;padding:12px;margin-top:10px;white-space:pre-wrap;min-height:220px;border-radius:6px}
#status{color:yellow;text-align:center;margin-top:5px;font-weight:bold}
</style>
</head>
<body>

<div class="container">
<h2>APX HYBRID MILOGZAI PRO v11 SMART</h2>

<select id="pairs" multiple>
<option value="USDTRY-OTC">USDTRY</option>
<option value="USDPKR-OTC">USDPKR</option>
<option value="USDINR-OTC">USDINR</option>
<option value="USDARS-OTC">USDARS</option>
<option value="USDBDT-OTC">USDBDT</option>
<option value="USDNGN-OTC">USDNGN</option>
</select>

<input type="time" id="start" value="18:00">
<input type="time" id="end" value="23:00">

<button onclick="generateSignals()">GENERATE SMART FLOW</button>

<div id="status"></div>
<div id="output">READY</div>
</div>

<script>
const API="https://apx.mkapi009.workers.dev?pair=";
const MAX_SIGNALS=40;

function padTime(min){
let h=Math.floor(min/60)%24;
let m=min%60;
return (h<10?"0":"")+h+":"+(m<10?"0":"")+m;
}

function toMin(t){
let [h,m]=t.split(":").map(Number);
return h*60+m;
}

function timeoutFetch(url,ms=5000){
return Promise.race([
fetch(url),
new Promise((_,rej)=>setTimeout(()=>rej("timeout"),ms))
]);
}

function EMA(prices,period){
let k=2/(period+1);
let ema=prices[0];
for(let i=1;i<prices.length;i++){
ema=prices[i]*k+ema*(1-k);
}
return ema;
}

async function getSmartBias(pair){
try{
let res=await timeoutFetch(API+pair);
if(!res.ok) return null;

let json=await res.json();
if(!json.data || json.data.length<20) return null;

let closes=json.data.map(c=>c.close);

// EMA trend
let ema9=EMA(closes.slice(-15),9);
let ema21=EMA(closes.slice(-15),21);

// Last 3 candles direction weight
let up=0,down=0;
for(let i=closes.length-3;i<closes.length;i++){
if(closes[i]>closes[i-1]) up++;
if(closes[i]<closes[i-1]) down++;
}

if(ema9>ema21 && up>=2) return "CALL";
if(ema9<ema21 && down>=2) return "PUT";

// If EMA equal, fallback to momentum only
if(up>=2) return "CALL";
if(down>=2) return "PUT";

return null;

}catch(e){
return null;
}
}

async function generateSignals(){

let output=document.getElementById("output");
let status=document.getElementById("status");

output.innerText="Analyzing Market Structure...";
status.innerText="Scanning...";

let selected=[...document.getElementById("pairs").selectedOptions].map(o=>o.value);
if(selected.length===0){
output.innerText="Select at least one pair.";
return;
}

let biasMap={};

await Promise.all(selected.map(async p=>{
biasMap[p]=await getSmartBias(p);
}));

status.innerText="Generating signals...";

let startMin=toMin(document.getElementById("start").value);
let endMin=toMin(document.getElementById("end").value);
if(endMin<=startMin) endMin+=1440;

let pointer=startMin;
let signals=[];
let count=0;

while(pointer<=endMin && count<MAX_SIGNALS){

for(let pair of selected){

if(count>=MAX_SIGNALS) break;

let dir=biasMap[pair];
if(!dir) continue;

let clean=pair.replace("-OTC","");
signals.push("M1;"+clean+";"+padTime(pointer)+";"+dir);

pointer+=3;
count++;
}

pointer+=1;
}

if(signals.length===0){
output.innerText="Market is too flat right now.";
status.innerText="0 Signals";
return;
}

output.innerText=
"HYBRID SMART FLOW\n━━━━━━━━━━━━━━\n"+
signals.join("\n")+
"\n━━━━━━━━━━━━━━\nEMA + Momentum Confirmed";

status.innerText="Generated "+signals.length+" Signals";
}
</script>

</body>
</html>
