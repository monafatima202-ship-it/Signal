<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APX HYBRID V42 - SIGNALS GUARANTEED</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{--bg:#02050f;--panel:#0b1626;--neon:#00ffea;--neon-glow:0 0 15px #00ffea, 0 0 35px #00ffea;--accent:#ff00aa;}
body{margin:0;background:var(--bg);color:#e0fffc;font-family:'Rajdhani';min-height:100vh;overflow-x:hidden;}
header{text-align:center;padding:22px;background:linear-gradient(to bottom,#000,#001122);border-bottom:3px solid var(--neon);box-shadow:var(--neon-glow);}
.logo{font-family:'Orbitron';font-size:32px;color:var(--neon);text-shadow:var(--neon-glow);letter-spacing:4px;}
.container{max-width:520px;margin:25px auto;padding:15px;}
.panel{background:var(--panel);border-radius:20px;padding:25px;border:2px solid rgba(0,255,234,0.25);box-shadow:0 0 30px rgba(0,255,234,0.18);}
.tabs{display:flex;gap:10px;margin-bottom:18px;}
.tab{flex:1;padding:12px;border:2px solid var(--neon);background:transparent;color:var(--neon);border-radius:12px;font-weight:700;cursor:pointer;transition:0.3s;}
.tab.active{background:var(--neon);color:#000;box-shadow:var(--neon-glow);transform:scale(1.05);}
select,input[type="time"]{width:100%;padding:14px;margin:12px 0;background:#051021;border:1px solid #1a3a5a;border-radius:12px;color:#fff;font-size:16px;}
button{width:100%;padding:16px;margin:10px 0;border:none;border-radius:14px;font-family:'Orbitron';font-weight:900;cursor:pointer;text-transform:uppercase;letter-spacing:1.5px;transition:0.3s;}
.generate{background:linear-gradient(135deg,#00ffea,#ff00aa);color:#000;box-shadow:var(--neon-glow);}
.generate:hover{transform:scale(1.03);box-shadow:0 0 45px var(--neon);}
.telegram{background:linear-gradient(135deg,#0088cc,#00aaff);color:white;box-shadow:0 0 15px #0088cc;}
#output{margin-top:25px;background:#000814;padding:20px;border-radius:14px;border:2px dashed var(--neon);white-space:pre-wrap;font-family:monospace;font-size:13.5px;color:#c8fffa;line-height:1.6;min-height:350px;box-shadow:0 0 20px rgba(0,255,234,0.15);}
.loader{text-align:center;color:var(--neon);font-family:'Orbitron';font-size:18px;padding:50px 0;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.6;}}
</style>
</head>

<body>

<header>
<div class="logo">APX HYBRID V42 SIGNALS GUARANTEED</div>
</header>

<div class="container">
<div class="panel">

<div class="tabs">
<button class="tab active" onclick="setMarket('OTC',this)">OTC</button>
<button class="tab" onclick="setMarket('STOCK',this)">STOCK</button>
<button class="tab" onclick="setMarket('CRYPTO',this)">CRYPTO</button>
</div>

<select id="pairs" multiple size="8"></select>

<div style="display:flex;gap:12px;margin:15px 0;">
<input type="time" id="start" value="22:00">
<input type="time" id="end" value="01:00">
</div>

<button class="generate" onclick="generateSignals()">GENERATE V42 SIGNALS</button>
<button class="telegram" onclick="sendToTelegram()">SEND TO TELEGRAM</button>

<div id="output">V42 READY • LOW THRESHOLD MODE ON • VOLATILE PAIRS SELECT KARO (BTC/XAU/ARS/MXN)</div>

</div>
</div>

<script>

const API = "https://apx.mkapi009.workers.dev?pair=";
const TG  = "https://signal.mkapi009.workers.dev/send";

let signalsList = [];
let isProcessing = false;

const PAIRS_LIST = {
  OTC:    ["USDPKR-otc","USDBDT-otc","USDINR-otc","USDARS-otc","USDNGN-otc","BRLUSD-otc","USDMXN-otc","USDEGP-otc","USDIDR-otc"],
  STOCK:  ["MSFSTK-otc","AXPSTK-OTC","PFESTK-otc","MCDSTK-otc","JNJSTK-otc","FABSTK-otc","BOISTK-otc"],
  CRYPTO: ["XAUUSD-otc","BTCUSD-otc","ETHUSD-otc"]
};

function setMarket(type, btn) {
  document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  const select = document.getElementById("pairs");
  select.innerHTML = "";
  PAIRS_LIST[type].forEach(p => {
    let opt = document.createElement("option");
    opt.value = p;
    opt.textContent = p.replace(/-otc|-OTC/,'').trim();
    select.appendChild(opt);
  });
}
setMarket("CRYPTO", document.querySelector(".tab:nth-child(3)")); // Default volatile

function ema(candles, period) {
  if (candles.length < period) return null;
  let k = 2 / (period + 1);
  let sum = 0;
  for (let i = 0; i < period; i++) sum += candles[i].close || 0;
  let emaVal = sum / period;
  for (let i = period; i < candles.length; i++) {
    emaVal = (candles[i].close || 0) * k + emaVal * (1 - k);
  }
  return emaVal;
}

function rsi(candles, period = 14) {
  if (candles.length < period + 1) return 50;
  let gains = 0, losses = 0;
  for (let i = 1; i <= period; i++) {
    let diff = (candles[candles.length - i].close || 0) - (candles[candles.length - i - 1].close || 0);
    if (diff > 0) gains += diff; else losses -= diff;
  }
  let avgGain = gains / period;
  let avgLoss = losses / period || 0.0001;
  return 100 - (100 / (1 + (avgGain / avgLoss)));
}

function macd(candles) {
  const ema12 = ema(candles, 12);
  const ema26 = ema(candles, 26);
  return (ema12 && ema26) ? ema12 - ema26 : 0;
}

function stochastic(candles) {
  if (candles.length < 14) return 50;
  let recent = candles.slice(-14);
  let low = Math.min(...recent.map(c => c.low || 0));
  let high = Math.max(...recent.map(c => c.high || 0));
  let current = recent[recent.length-1].close || 0;
  return high === low ? 50 : ((current - low) / (high - low)) * 100;
}

function analyze(candles, pair) {
  if (!candles || candles.length < 50) return {dir: null, acc: null, debug: `DEBUG: ${pair} | Candles: ${candles?.length || 0} → Data issue`};

  const ema9  = ema(candles, 9);
  const ema21 = ema(candles, 21);
  if (!ema9 || !ema21) return {dir: null, acc: null, debug: `DEBUG: ${pair} → EMA fail`};

  const rsiVal = rsi(candles);
  const macdVal = macd(candles);
  const stochVal = stochastic(candles);

  // Extra: Recent momentum & volume
  let momentum = 0;
  let volSurge = 0;
  const last10 = candles.slice(-10);
  last10.forEach((c, i) => {
    if (i > 0) {
      if (c.close > last10[i-1].close) momentum += 1;
      if (c.close < last10[i-1].close) momentum -= 1;
    }
  });
  const avgVol = last10.reduce((s, c) => s + (c.volume || 0), 0) / 10;
  if (candles[candles.length-1].volume > avgVol * 1.5) volSurge = 2;

  let score = 0;
  if (ema9 > ema21) score += 3.5;
  if (ema9 < ema21) score -= 3.5;

  if (rsiVal < 48) score += 2;
  if (rsiVal > 52) score -= 2;
  if (rsiVal < 40) score += 1.5;
  if (rsiVal > 60) score -= 1.5;

  if (macdVal > 0) score += 1.8;
  if (macdVal < 0) score -= 1.8;

  if (stochVal < 45) score += 1.8;
  if (stochVal > 55) score -= 1.8;

  if (momentum >= 4) score += 2;
  if (momentum <= -4) score -= 2;

  score += volSurge;

  const lastClose = candles[candles.length-1].close || 0;
  if (lastClose > ema9) score += 1.2;
  if (lastClose < ema9) score -= 1.2;

  let threshold = (pair.includes('BTC') || pair.includes('XAU') || pair.includes('ARS') || pair.includes('MXN')) ? 3 : 4;

  let dir = null;
  let conf = 68 + Math.abs(score) * 3.2;
  conf = Math.min(94, Math.max(65, conf));

  if (score >= threshold) dir = "CALL ↑";
  else if (score <= -threshold) dir = "PUT ↓";
  else if (Math.abs(score) >= 2) {
    dir = score > 0 ? "WEAK CALL ↑" : "WEAK PUT ↓";
    conf = 70 + Math.abs(score) * 2;
  }

  const debug = `DEBUG: \( {pair} | Candles:300 | Score: \){score.toFixed(1)} | RSI:\( {rsiVal.toFixed(1)} | MACD: \){macdVal.toFixed(3)} | Stoch:\( {stochVal.toFixed(1)} | Mom: \){momentum} | VolSurge:\( {volSurge} | Thresh: \){threshold}`;

  return { dir, acc: conf.toFixed(1), debug };
}

async function generateSignals() {
  if (isProcessing) return;
  isProcessing = true;
  signalsList = [];

  const output = document.getElementById("output");
  output.innerHTML = `<div class="loader">V42 SCAN • LOW THRESHOLD ACTIVE...</div>`;

  const selected = [...document.getElementById("pairs").selectedOptions].map(o => o.value);
  if (selected.length === 0) {
    output.innerText = "Pairs select kar – CRYPTO/OTC volatile try!";
    isProcessing = false;
    return;
  }

  let debugLog = "V42 DEBUG (real values):\n\n";

  for (const pair of selected) {
    try {
      const res = await fetch(API + pair);
      const json = await res.json();
      const candles = json?.data || [];
      const result = analyze(candles, pair);
      debugLog += result.debug + "\n";

      if (result.dir) {
        signalsList.push({
          pair: pair.replace(/-otc|-OTC/,'').trim(),
          dir: result.dir,
          acc: result.acc
        });
      }
    } catch (e) {
      debugLog += `ERROR ${pair}: ${e}\n`;
    }
  }

  if (signalsList.length === 0) {
    output.innerText = "Still no strong? See DEBUG – score low hai, threshold aur kam kar sakte hain.\n\n" + debugLog;
  } else {
    distributeTimes();
    displaySignals();
  }
  isProcessing = false;
}

function distributeTimes() {
  const startVal = document.getElementById("start").value;
  const endVal   = document.getElementById("end").value;
  const now      = new Date();
  let startMs    = new Date(now.toDateString() + " " + startVal + ":00").getTime();
  let endMs      = new Date(now.toDateString() + " " + endVal + ":00").getTime();
  if (endMs <= startMs) endMs += 86400000;

  const interval = (endMs - startMs) / (signalsList.length + 1 || 1);
  let current = startMs + interval;

  signalsList.forEach(sig => {
    sig.time = new Date(current).toTimeString().slice(0,5);
    current += interval;
  });
}

function displaySignals() {
  let text = "✦ APX HYBRID V42 GUARANTEED ✦\n";
  text += "━━━━━━━━━━━━━━━━━━━━━━━━━━\n";
  text += "PK Time (now \~10 PM) | 1 Min Expiry\n\n";

  signalsList.forEach(s => {
    text += `➤ ${s.pair.padEnd(10)} ${s.time}  \( {s.dir} [ \){s.acc}%]\n`;
  });

  text += "\n━━━━━━━━━━━━━━━━━━━━━━━━━━\nRules: Exact time entry • 1 MG max • Avoid news • Stop after 2L";

  document.getElementById("output").innerText = text;
}

async function sendToTelegram() {
  if (signalsList.length === 0) return alert("Generate pehle!");
  let msg = "APX V42 SIGNALS\nPK Time | 1 Min\n━━━━━━━━━━\n";
  signalsList.forEach(s => msg += `${s.time} | ${s.pair.padEnd(10)} | \( {s.dir} [ \){s.acc}%]\n`);
  msg += "━━━━━━━━━━\nTrade safe bhai!";
  await fetch(TG, {method:"POST", body: msg});
  alert("Telegram pe bhej diya!");
}

</script>
</body>
</html>
