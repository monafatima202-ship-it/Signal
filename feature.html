<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>APX FUTURE FEATURE ENGINE</title>
<style>
body{background:#01060b;color:#00ff88;font-family:monospace;padding:20px}
button{padding:12px;background:#00ff88;border:none;font-weight:bold;margin:10px 0}
select,input{padding:8px;margin:5px 0;background:#111;color:#00ff88}
#output{white-space:pre-wrap;margin-top:20px}
</style>
</head>
<body>

<select id="pairs" multiple size="5">
<option value="USDPKR-otc">USDPKR</option>
<option value="USDINR-otc">USDINR</option>
<option value="USDARS-otc">USDARS</option>
<option value="USDBDT-otc">USDBDT</option>
<option value="USDNGN-otc">USDNGN</option>
</select>

<br>

<input type="time" id="start" value="18:00">
<input type="time" id="end" value="19:00">

<br>

<button onclick="generate()">GENERATE FUTURE FEATURE SIGNALS</button>

<div id="output">READY</div>

<script>

const API="https://apx.mkapi009.workers.dev?pair=";

function EMA(prices,period){
 let k=2/(period+1);
 let ema=prices[0];
 for(let i=1;i<prices.length;i++){
  ema=prices[i]*k + ema*(1-k);
 }
 return ema;
}

async function generate(){

 let output=document.getElementById("output");
 output.innerText="ANALYZING MARKET BIAS...";

 let selected=[...document.getElementById("pairs").selectedOptions].map(o=>o.value);
 if(selected.length===0){
   output.innerText="SELECT PAIRS";
   return;
 }

 let start=document.getElementById("start").value;
 let end=document.getElementById("end").value;

 let startMin=parseInt(start.split(":")[0])*60+parseInt(start.split(":")[1]);
 let endMin=parseInt(end.split(":")[0])*60+parseInt(end.split(":")[1]);

 let signals=[];

 for(let pair of selected){

   let res=await fetch(API+pair);
   let data=await res.json();
   if(!data || !data.data) continue;

   let candles=data.data;
   if(candles.length<30) continue;

   let closes=candles.slice(-30).map(c=>c.close);

   let ema9=EMA(closes,9);
   let ema21=EMA(closes,21);

   let bias = ema9>ema21 ? "CALL" : "PUT";

   let volatility=0;
   for(let i=1;i<closes.length;i++){
     volatility+=Math.abs(closes[i]-closes[i-1]);
   }

   volatility/=closes.length;

   // projection spacing based on volatility
   let gap = volatility>0.02 ? 3 : 6;

   let t=startMin;
   while(true){

     if(startMin<=endMin){
       if(t>endMin) break;
     }else{
       if(t>endMin && t<startMin) break;
     }

     let hh=Math.floor(t/60).toString().padStart(2,"0");
     let mm=(t%60).toString().padStart(2,"0");

     signals.push(`M1;${pair.replace("-otc","")};${hh}:${mm};${bias}`);

     t+=gap;

     if(signals.length>20) break;
   }
 }

 if(signals.length===0){
   output.innerText="NO FEATURE PROJECTION POSSIBLE";
   return;
 }

 output.innerText=signals.join("\n");
}

</script>

</body>
</html>
