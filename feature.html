<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>APX FEATURE SIGNAL ENGINE</title>
<style>
body{background:#0e1624;color:#00ff88;font-family:Arial;margin:0;padding:20px}
.container{max-width:800px;margin:auto;background:#16273b;padding:20px;border-radius:12px}
h2{text-align:center}
select,input,button{width:100%;padding:10px;margin:6px 0;border-radius:6px;border:none}
button{background:#00ff88;color:black;font-weight:bold;cursor:pointer}
#output{background:#000;padding:12px;margin-top:10px;white-space:pre-wrap;min-height:250px;border-radius:6px}
#status{color:yellow;text-align:center;margin-top:5px;font-weight:bold}
</style>
</head>
<body>

<div class="container">
<h2>APX FEATURE SIGNAL ENGINE (Hack2 Style)</h2>

<select id="pair">
<option value="USDTRY-OTC">USDTRY</option>
<option value="USDPKR-OTC">USDPKR</option>
<option value="USDINR-OTC" selected>USDINR</option>
<option value="USDARS-OTC">USDARS</option>
<option value="USDBDT-OTC">USDBDT</option>
<option value="USDNGN-OTC">USDNGN</option>
</select>

<label>Min Confidence (0.5 - 0.95)</label>
<input type="number" id="confidence" step="0.05" value="0.80">

<label>Min Hours (trend persistence)</label>
<input type="number" id="hours" value="3">

<label>Remove Back-to-Back (1 or 0)</label>
<input type="number" id="remove" value="1">

<button onclick="generateFeatureSignals()">GENERATE FEATURE SIGNALS</button>

<div id="status"></div>
<div id="output">READY</div>
</div>

<script>

const API="https://apx.mkapi009.workers.dev?pair=";

function padTime(min){
let h=Math.floor(min/60)%24;
let m=min%60;
return (h<10?"0":"")+h+":"+(m<10?"0":"")+m;
}

function EMA(prices,period){
let k=2/(period+1);
let ema=prices[0];
for(let i=1;i<prices.length;i++){
ema=prices[i]*k+ema*(1-k);
}
return ema;
}

async function generateFeatureSignals(){

let pair=document.getElementById("pair").value;
let minConf=parseFloat(document.getElementById("confidence").value);
let minHours=parseInt(document.getElementById("hours").value);
let remove=parseInt(document.getElementById("remove").value);

let output=document.getElementById("output");
let status=document.getElementById("status");

output.innerText="Analyzing historical structure...";
status.innerText="Fetching candles...";

let res=await fetch(API+pair);
let json=await res.json();

if(!json.data || json.data.length<100){
output.innerText="Not enough candle data.";
return;
}

let closes=json.data.map(c=>c.close);

let signals=[];
let lastDir=null;

for(let i=50;i<closes.length-5;i++){

let slice=closes.slice(i-30,i);

let ema9=EMA(slice,9);
let ema21=EMA(slice,21);

if(!ema9||!ema21) continue;

let direction=ema9>ema21?"CALL":"PUT";

// agreement check (last N candles consistency)
let up=0,down=0;
for(let j=i-5;j<i;j++){
if(closes[j]>closes[j-1]) up++;
if(closes[j]<closes[j-1]) down++;
}

let agreement = direction==="CALL" ? up/5 : down/5;

let confidenceScore = agreement;

// convert candle index to time
let candleTime=json.data[i].time || "00:00";

if(confidenceScore>=minConf){

if(remove===1 && direction===lastDir) continue;

signals.push({
pair:pair,
time:candleTime,
direction:direction,
confidence:Math.round(confidenceScore*100),
agreement:Math.round(agreement*100)
});

lastDir=direction;
}
}

if(signals.length===0){
output.innerText="No feature signals found.";
status.innerText="0 Signals";
return;
}

let formatted="TRADING SIGNALS\n━━━━━━━━━━━━━━\n";

signals.forEach(s=>{
formatted+=`${s.pair} => ${s.time} => ${s.direction} (${s.confidence}%)\n`;
});

formatted+="\nJSON DATA:\n"+JSON.stringify(signals,null,2);

output.innerText=formatted;
status.innerText="Generated "+signals.length+" Feature Signals";

}

</script>
</body>
</html>
