<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>APX SIMPLE WORKING</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
body { margin:0; background:#000; color:#0f0; font-family:'Rajdhani',sans-serif; }
header { text-align:center; padding:15px; background:#111; }
.container { max-width:500px; margin:20px auto; padding:20px; background:#0a0a0a; border:1px solid #0f0; border-radius:10px; }
select, input, button { width:100%; margin:10px 0; padding:12px; font-size:16px; }
button { background:#0f0; color:#000; border:none; font-weight:bold; cursor:pointer; }
#output { margin-top:20px; white-space:pre-wrap; font-size:14px; line-height:1.5; }
.debug { color:#ff0; }
</style>
</head>
<body>
<header><h2>APX SIMPLE WORKING</h2></header>

<div class="container">
  <select id="pairs" multiple size="6">
    <option value="USDPKR-otc">USDPKR</option>
    <option value="USDBDT-otc">USDBDT</option>
    <option value="USDINR-otc">USDINR</option>
    <option value="USDARS-otc">USDARS</option>
    <option value="USDNGN-otc">USDNGN</option>
  </select>

  <input type="time" id="start" value="18:00">
  <input type="time" id="end" value="19:00">

  <button onclick="runScan()">RUN SCAN</button>

  <div id="output">Waiting for scan...</div>
</div>

<script>
const API = "https://apx.mkapi009.workers.dev?pair=";

async function runScan() {
  const output = document.getElementById('output');
  output.innerHTML = "<span class='debug'>Scanning API...</span><br>";

  const pairs = Array.from(document.getElementById('pairs').selectedOptions).map(o => o.value);
  if (pairs.length === 0) {
    output.innerHTML += "Koi pair select nahi kiya!";
    return;
  }

  let signals = "";
  let startTime = new Date().toDateString() + " " + document.getElementById('start').value;
  let current = new Date(startTime).getTime();

  for (let pair of pairs) {
    try {
      let res = await fetch(API + pair);
      let json = await res.json();
      let candles = json.data || [];
      output.innerHTML += `<span class='debug'>${pair} - ${candles.length} candles loaded</span><br>`;

      if (candles.length < 50) continue;

      let last = candles[candles.length - 1];
      let prev = candles[candles.length - 2];

      let direction = "HOLD";
      if (last.close > prev.close && last.close > last.open) direction = "CALL";
      if (last.close < prev.close && last.close < last.open) direction = "PUT";

      if (direction !== "HOLD") {
        let timeStr = new Date(current).toTimeString().slice(0,5);
        signals += `M1;\( {pair.replace('-otc','')}; \){timeStr};${direction}\n`;
        current += (60 + Math.floor(Math.random() * 300)) * 1000; // 1-5 min gap
      }
    } catch (e) {
      output.innerHTML += `<span style='color:red'>Error on ${pair}: ${e.message}</span><br>`;
    }
  }

  if (signals === "") {
    output.innerHTML += "No strong signals found right now.\nSubah 8-11 try karo ya different time range daal ke dekho.";
  } else {
    output.innerHTML += "\nGenerated Signals:\n" + signals;
  }
}
</script>
</body>
</html>
