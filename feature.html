<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APX NEURAL V52 - MORE SIGNALS</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
/* same style as previous - no change needed */

<body>
<!-- same HTML structure -->

<script>
// same functions (EMA, RSI, ADX, analyzeBrain)

async function deepNeuralScan() {
  if (SCANNING) return;
  SCANNING = true;
  FINAL_LIST = [];

  const pairs = [...document.getElementById('pairs').selectedOptions].map(o => o.value);
  if (pairs.length < 1) {
    document.getElementById('output').innerText = "Select at least 1 asset!";
    SCANNING = false;
    return;
  }

  const output = document.getElementById('output');
  output.innerHTML = `<div class="loader-box">DEEP SCAN 200+ CANDLES...<div class="bar-bg"><div class="bar-fill" id="pb"></div></div><span id="perc">0%</span></div>`;

  let pool = [];
  for (let i = 0; i < pairs.length; i++) {
    try {
      let res = await fetch(API + pairs[i]);
      let json = await res.json();
      let candles = json.data || [];
      let decision = analyzeBrain(candles);
      pool.push({ pair: pairs[i].replace(/-otc|-OTC/gi, ''), dir: decision || "HOLD" });
      let p = ((i + 1) / pairs.length) * 100;
      document.querySelector('#pb').style.width = p + "%";
      document.getElementById('perc').innerText = Math.round(p) + "%";
    } catch (e) { console.error(e); }
  }

  // Exact 1-min intervals
  let startTime = new Date().toDateString() + " " + document.getElementById('start').value;
  let current = new Date(startTime).getTime();

  for (let i = 0; i < 20; i++) { // 20 signals cap
    current += 60000;
    let idx = i % pool.length;
    let asset = pool[idx];

    if (asset.dir === "HOLD") continue;

    FINAL_LIST.push({
      time: new Date(current).toTimeString().slice(0,5),
      pair: asset.pair,
      dir: asset.dir
    });
  }

  if (FINAL_LIST.length === 0) {
    output.innerText = "NO STRONG SETUPS FOUND. MARKET TOO WEAK.";
  } else {
    renderResult();
  }
  SCANNING = false;
}

// same renderResult and sendToTG as previous
</script>
</body>
</html>
