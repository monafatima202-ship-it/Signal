<script>

const API="https://apx.mkapi009.workers.dev?pair=";
const TG="https://signal.mkapi009.workers.dev/send";

let signals=[];
let currentMarket="OTC";

const PAIRS={
OTC:["USDPKR-otc","USDINR-otc","USDARS-otc","USDBDT-otc","USDNGN-otc"],
CRYPTO:["BTCUSD-otc","ETHUSD-otc","XAUUSD-otc"],
STOCK:["MCDSTK-otc","JNJSTK-otc","AXPSTK-otc"]
};

function setMarket(type,el){
currentMarket=type;
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
el.classList.add("active");
loadPairs();
}

function loadPairs(){
let s=document.getElementById("pairs");
s.innerHTML="";
PAIRS[currentMarket].forEach(p=>{
let o=document.createElement("option");
o.value=p;
o.textContent=p.replace("-otc","");
s.appendChild(o);
});
}
loadPairs();

function EMA(arr,period){
if(arr.length<period) return null;
let k=2/(period+1);
let ema=arr[0];
for(let i=1;i<arr.length;i++){
ema=arr[i]*k+ema*(1-k);
}
return ema;
}

function body(c){return Math.abs(c.close-c.open);}
function rangeC(c){return c.high-c.low;}

function calcConfidence(clusterBias,c,ema9,ema21){
let score=50;

if(clusterBias==="CALL" && ema9>ema21) score+=15;
if(clusterBias==="PUT" && ema9<ema21) score+=15;

if(body(c)>=rangeC(c)*0.4) score+=15;

if(rangeC(c)>0) score+=10;

return score;
}

function removeBackToBack(list){
let cleaned=[];
let last=-999;

for(let s of list){
let t=s.split(";")[2];
let total=parseInt(t.split(":")[0])*60+parseInt(t.split(":")[1]);
if(Math.abs(total-last)>=2){
cleaned.push(s);
last=total;
}
}

return cleaned;
}

async function generateSignals(){

signals=[];
let out=document.getElementById("output");
out.innerText="MILOGZAI FLOW ANALYZING...";

let selected=[...document.getElementById("pairs").selectedOptions].map(o=>o.value);
if(selected.length==0){out.innerText="Select pairs";return;}

let start=document.getElementById("start").value;
let end=document.getElementById("end").value;

let startMin=parseInt(start.split(":")[0])*60+parseInt(start.split(":")[1]);
let endMin=parseInt(end.split(":")[0])*60+parseInt(end.split(":")[1]);

let all=[];

for(let pair of selected){

let r=await fetch(API+pair);
let j=await r.json();
if(!j.data||j.data.length<40) continue;

let candles=j.data;

// ---- Trend Cluster Detection ----
let up=0, down=0;
for(let i=candles.length-15;i<candles.length;i++){
if(candles[i].close>candles[i-1].close) up++;
else down++;
}

let clusterBias= up>=down ? "CALL" : "PUT";

let pairSignals=[];

for(let i=20;i<candles.length;i++){

let c=candles[i];
let [h,m]=c.time.split(":").map(Number);
let total=h*60+m;

if(startMin<=endMin){
if(total<startMin||total>endMin) continue;
}else{
if(total>endMin&&total<startMin) continue;
}

let closes=candles.slice(i-20,i+1).map(x=>x.close);
let ema9=EMA(closes,9);
let ema21=EMA(closes,21);
if(!ema9||!ema21) continue;

let conf=calcConfidence(clusterBias,c,ema9,ema21);

if(conf>=60 && conf<=90){

pairSignals.push(`M1;${pair.replace("-otc","")};${c.time.slice(0,5)};${clusterBias}`);

}

if(pairSignals.length>=5) break;
}

// Bias projection if none found
if(pairSignals.length===0){
let hh=Math.floor(startMin/60).toString().padStart(2,"0");
let mm=(startMin%60).toString().padStart(2,"0");
pairSignals.push(`M1;${pair.replace("-otc","")};${hh}:${mm};${clusterBias}`);
}

all=all.concat(pairSignals);
if(all.length>=20) break;
}

all=removeBackToBack(all);
all.sort((a,b)=>a.split(";")[2].localeCompare(b.split(";")[2]));

signals=all;

let msg="MILOGZAI STYLE SIGNALS\n━━━━━━━━━━━━━━\n";
msg+=all.join("\n");
msg+="\n━━━━━━━━━━━━━━\nConfidence Band: 60-90\nCluster Bias Mode";

out.innerText=msg;
}

async function sendToTelegram(){
if(signals.length==0){alert("No signals");return;}
let text="APX MILOGZAI FLOW\nUTC+6 | M1\n━━━━━━━━━━\n";
text+=signals.join("\n");
text+="\n━━━━━━━━━━\nCluster Bias Engine";
await fetch(TG,{method:"POST",body:text});
alert("Sent to Telegram");
}

</script>
