<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APX NEON PRO SCANNER</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#02060c;
--panel:#0a111f;
--neon:#00ff88;
--cyan:#00ccff;
--glow:0 0 15px #00ff88,0 0 25px #00ccff;
--text:#e0fbee;
}
body{margin:0;background:var(--bg);color:var(--text);font-family:'Rajdhani';}
header{text-align:center;padding:25px;background:black;border-bottom:4px solid var(--neon);box-shadow:var(--glow);}
.logo{font-family:'Orbitron';font-size:26px;color:var(--neon);text-shadow:0 0 10px var(--neon);}
.container{max-width:480px;margin:20px auto;padding:15px;}
.panel{background:var(--panel);border-radius:20px;padding:25px;border:1px solid rgba(0,255,136,.2);}
.tabs{display:flex;gap:10px;margin-bottom:15px;}
.tab{flex:1;padding:10px;border:1px solid var(--neon);background:transparent;color:var(--neon);border-radius:8px;cursor:pointer;}
.tab.active{background:var(--neon);color:black;box-shadow:var(--glow);}
select,input{width:100%;padding:12px;margin-bottom:12px;background:#050d1a;border:1px solid #1a3a3a;border-radius:10px;color:white;}
button{width:100%;padding:14px;margin-top:10px;border:none;border-radius:12px;font-family:'Orbitron';font-weight:bold;cursor:pointer;}
.generate{background:linear-gradient(135deg,#00ff88,#00ccff);color:black;box-shadow:var(--glow);}
.telegram{background:#0088cc;color:white;}
#output{margin-top:20px;background:#01040a;padding:15px;border-radius:12px;border:1px dashed var(--neon);white-space:pre-wrap;font-family:monospace;min-height:220px;}
.loader{padding:20px;text-align:center;color:var(--neon);}
.bar{height:8px;background:#123;border-radius:6px;overflow:hidden;margin-top:10px;}
.fill{height:100%;width:0;background:linear-gradient(90deg,#00ff88,#00ccff,#00ff88);background-size:200% 100%;animation:move 1.5s linear infinite;}
@keyframes move{0%{background-position:0%}100%{background-position:200%}}
</style>
</head>

<body>
<header><div class="logo">APX NEON PRO SCANNER</div></header>

<div class="container">
<div class="panel">

<div class="tabs">
<button class="tab active" onclick="setMarket('OTC',this)">OTC</button>
<button class="tab" onclick="setMarket('STOCK',this)">STOCK</button>
<button class="tab" onclick="setMarket('CRYPTO',this)">CRYPTO</button>
</div>

<select id="pairs" multiple size="6"></select>

<input type="time" id="contextTime" value="18:00">

<button class="generate" onclick="scanMarket()">SCAN STRUCTURE</button>
<button class="telegram" onclick="sendToTG()">SEND REPORT</button>

<div id="output">SYSTEM READY</div>

</div>
</div>

<script>
const API="https://apx.mkapi009.workers.dev?pair=";
const TG="https://signal.mkapi009.workers.dev/send";

let REPORT="";

const PAIRS={
OTC:["USDPKR-otc","USDBDT-otc","USDINR-otc","USDARS-otc","USDNGN-otc","BRLUSD-otc","USDMXN-otc","USDEGP-otc","USDIDR-otc"],
STOCK:["MSFSTK-otc","AXPSTK-OTC","PFESTK-otc","MCDSTK-otc","JNJSTK-otc"],
CRYPTO:["XAUUSD-otc","BTCUSD-otc","ETHUSD-otc"]
};

function setMarket(type,btn){
document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
const select=document.getElementById("pairs");
select.innerHTML="";
PAIRS[type].forEach(p=>{
let o=document.createElement("option");
o.value=p;
o.textContent=p.replace(/-otc|-OTC/gi,"");
select.appendChild(o);
});
}
setMarket("OTC",document.querySelector(".tab.active"));

function EMA(data,period){
if(data.length<period)return null;
let k=2/(period+1);
let ema=data[data.length-period].close;
for(let i=data.length-period+1;i<data.length;i++){
ema=data[i].close*k+ema*(1-k);
}
return ema;
}

function RSI(data,period=14){
if(data.length<period+1)return 50;
let gain=0,loss=0;
for(let i=data.length-period;i<data.length;i++){
let d=data[i].close-data[i-1].close;
if(d>0)gain+=d;else loss-=d;
}
let rs=gain/(loss||0.0001);
return 100-(100/(1+rs));
}

async function scanMarket(){
const output=document.getElementById("output");
output.innerHTML='<div class="loader">Scanning Market<div class="bar"><div class="fill"></div></div></div>';

const selected=[...document.getElementById("pairs").selectedOptions].map(o=>o.value);
if(!selected.length){output.innerText="Select pairs!";return;}

let results=[];

for(const pair of selected){
try{
let r=await fetch(API+pair);
let j=await r.json();
let c=j.data||[];
if(c.length<100)continue;

let ema9=EMA(c,9);
let ema21=EMA(c,21);
let rsi=RSI(c);
let momentum=c[c.length-1].close-c[c.length-5].close;

let trend=ema9>ema21?"BULLISH":"BEARISH";
let strength=Math.abs(momentum)*1000;
let zone=rsi<40?"OVERSOLD":rsi>60?"OVERBOUGHT":"NEUTRAL";

results.push({
pair:pair.replace(/-otc|-OTC/gi,""),
trend,
zone,
strength:strength.toFixed(2)
});
}catch(e){}
}

if(!results.length){output.innerText="No strong structure detected.";return;}

REPORT="APX NEON STRUCTURE REPORT\n━━━━━━━━━━━━━━━━━━\nUTC+5 Context: "+document.getElementById("contextTime").value+"\n\n";

results.sort((a,b)=>b.strength-a.strength);

results.forEach(r=>{
REPORT+=`${r.pair.padEnd(8)} | ${r.trend} | ${r.zone} | Power:${r.strength}\n`;
});

output.innerText=REPORT;
}

async function sendToTG(){
if(!REPORT)return alert("Scan first!");
await fetch(TG,{method:"POST",body:REPORT});
alert("Report Sent!");
}
</script>
</body>
</html>
