<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>✦ ADOX PREMIUM OTC ENGINE ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#050b14;color:#e0fbee;font-family:'Rajdhani'}
header{text-align:center;padding:20px;background:black;border-bottom:3px solid #00ff88}
.logo{font-family:'Orbitron';color:#00ff88;font-size:22px}
.container{max-width:700px;margin:20px auto;padding:15px}
.panel{background:#0f1c2c;padding:20px;border-radius:12px}
select,input{width:100%;padding:10px;margin:8px 0;background:#06121f;color:white;border:1px solid #1a3a3a}
button{width:100%;padding:14px;margin:8px 0;border:none;border-radius:8px;font-weight:bold;cursor:pointer}
.generate{background:#00ff88;color:black}
.telegram{background:#0088cc;color:white}
#output{margin-top:10px;background:black;padding:10px;min-height:300px;font-family:monospace;white-space:pre-wrap}
</style>
</head>
<body>

<header><div class="logo">✦ ADOX PREMIUM OTC ENGINE ✦</div></header>

<div class="container">
<div class="panel">

<select id="pairs" multiple size="6">
<option value="USDINR_otc">USDINR</option>
<option value="USDPKR_otc">USDPKR</option>
<option value="USDBDT_otc">USDBDT</option>
<option value="USDARS_otc">USDARS</option>
<option value="USDNGN_otc">USDNGN</option>
</select>

<input type="time" id="start" value="14:00">
<input type="time" id="end" value="18:00">

<button class="generate" onclick="generate()">GENERATE FLOW</button>
<button class="telegram" onclick="sendToTelegram()">SEND TO TELEGRAM</button>

<div id="output">READY</div>

</div>
</div>

<script>

const API="https://mrbeaxt.site/Qx/Qx.php?format=json&pair=";
const TG="https://signal.mkapi009.workers.dev/send";

let signals=[];

function EMA(arr,p){
let k=2/(p+1);
let ema=arr[0];
for(let i=1;i<arr.length;i++){
ema=arr[i]*k+ema*(1-k);
}
return ema;
}

function padTime(min){
let h=Math.floor(min/60)%24;
let m=min%60;
return (h<10?"0":"")+h+":"+(m<10?"0":"")+m;
}

function toMin(t){
let [h,m]=t.split(":").map(Number);
return h*60+m;
}

async function getBias(pair){

let res=await fetch(API+pair);
let json=await res.json();

if(!json.success || !json.data || json.data.length<30)
return null;

let data=json.data.reverse();

let closes=data.map(c=>parseFloat(c.close));

let ema9=EMA(closes.slice(-20),9);
let ema21=EMA(closes.slice(-20),21);

let dir=ema9>ema21?"CALL":"PUT";

let momentum=0;
for(let i=closes.length-6;i<closes.length;i++){
if(closes[i]>closes[i-1]) momentum++;
if(closes[i]<closes[i-1]) momentum--;
}

let confidence=Math.min(90,55+Math.abs(momentum)*7);

return {dir,confidence};
}

async function generate(){

signals=[];
let output=document.getElementById("output");
output.innerText="Analyzing MRBEAXT Data...";

let selected=[...document.getElementById("pairs").selectedOptions].map(o=>o.value);

if(selected.length<2){
output.innerText="Select at least 2 pairs";
return;
}

let start=toMin(document.getElementById("start").value);
let end=toMin(document.getElementById("end").value);
if(end<=start) end+=1440;

let biasMap={};

for(let p of selected){
biasMap[p]=await getBias(p);
}

let pointer=start;
let index=0;
let lastPair=null;

while(pointer<=end && signals.length<40){

let pair=selected[index%selected.length];
let data=biasMap[pair];

if(data && pair!==lastPair){

signals.push(`M1;${pair.replace("_otc","").padEnd(8)};${padTime(pointer)};${data.dir};${data.confidence}%`);
lastPair=pair;

let gap = data.confidence>=75 ? 7 : 9;
pointer+=gap;
}

index++;
if(index>300) break;
}

if(signals.length===0){
output.innerText="Structure weak.";
return;
}

let text="✦ ADOX PREMIUM FLOW ✦\n━━━━━━━━━━━━━━━━━━\n";
text+=signals.join("\n");
text+="\n━━━━━━━━━━━━━━━━━━\n• Exact Entry\n• 1 Step MG Max\n• Stop After 2 Loss";

output.innerText=text;
}

async function sendToTelegram(){

if(signals.length===0){
alert("Generate first");
return;
}

let msg="✦ ADOX PREMIUM FLOW ✦\n━━━━━━━━━━\n"+signals.join("\n")+"\n━━━━━━━━━━\nTrade Safe";

await fetch(TG,{
method:"POST",
headers:{ "Content-Type":"text/plain" },
body:msg
});

alert("Sent");
}

</script>

</body>
</html>
