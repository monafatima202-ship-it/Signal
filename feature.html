<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APX HYBRID MILOGZAI PRO v10</title>

<style>
body{
background:#0b1420;
color:#00ff88;
font-family:Arial;
margin:0;
padding:20px;
}
.container{
max-width:750px;
margin:auto;
background:#122235;
padding:20px;
border-radius:12px;
}
h2{text-align:center;margin-bottom:15px;}
select,input,button{
width:100%;
padding:10px;
margin:6px 0;
border-radius:6px;
border:none;
}
button{
background:#00ff88;
color:black;
font-weight:bold;
cursor:pointer;
}
#output{
background:#000;
padding:12px;
margin-top:10px;
white-space:pre-wrap;
min-height:220px;
border-radius:6px;
}
#status{
color:yellow;
margin-top:6px;
font-weight:bold;
text-align:center;
}
</style>
</head>
<body>

<div class="container">
<h2>APX HYBRID MILOGZAI PRO v10</h2>

<label>Select Pairs:</label>
<select id="pairs" multiple>
<option value="USDTRY-OTC">USDTRY</option>
<option value="USDPKR-OTC">USDPKR</option>
<option value="USDINR-OTC">USDINR</option>
<option value="USDARS-OTC">USDARS</option>
<option value="USDBDT-OTC">USDBDT</option>
<option value="USDNGN-OTC">USDNGN</option>
</select>

<label>Start Time:</label>
<input type="time" id="start" value="18:00">

<label>End Time:</label>
<input type="time" id="end" value="23:00">

<button onclick="generateSignals()">GENERATE REAL FLOW</button>

<div id="status"></div>
<div id="output">READY</div>
</div>

<script>
const API="https://apx.mkapi009.workers.dev?pair=";
const MAX_SIGNALS=50;

function padTime(min){
let h=Math.floor(min/60)%24;
let m=min%60;
return (h<10?"0":"")+h+":"+(m<10?"0":"")+m;
}

function toMin(t){
let [h,m]=t.split(":").map(Number);
return h*60+m;
}

function timeoutFetch(url,ms=5000){
return Promise.race([
fetch(url),
new Promise((_,rej)=>setTimeout(()=>rej("timeout"),ms))
]);
}

function EMA(prices,period){
if(prices.length<period) return null;
let k=2/(period+1);
let ema=prices[0];
for(let i=1;i<prices.length;i++){
ema=prices[i]*k+ema*(1-k);
}
return ema;
}

async function getRealBias(pair){
try{
let res=await timeoutFetch(API+pair);
if(!res.ok) return null;

let json=await res.json();
if(!json.data || json.data.length<30) return null;

let closes=json.data.map(c=>c.close);

let ema9=EMA(closes.slice(-25),9);
let ema21=EMA(closes.slice(-25),21);

if(!ema9 || !ema21) return null;

// Strength threshold
let diff=Math.abs(ema9-ema21);
if(diff < 0.00001) return null;

return ema9>ema21 ? "CALL" : "PUT";

}catch(e){
return null;
}
}

async function generateSignals(){

let output=document.getElementById("output");
let status=document.getElementById("status");

output.innerText="Analyzing Market...";
status.innerText="Fetching EMA structure...";

let selected=[...document.getElementById("pairs").selectedOptions].map(o=>o.value);

if(selected.length===0){
output.innerText="Please select at least one pair.";
status.innerText="";
return;
}

// Fetch bias once per pair
let biasMap={};

await Promise.all(selected.map(async pair=>{
biasMap[pair]=await getRealBias(pair);
}));

status.innerText="Generating signals...";

let startMin=toMin(document.getElementById("start").value);
let endMin=toMin(document.getElementById("end").value);

if(endMin<=startMin) endMin+=1440;

let pointer=startMin;
let signals=[];
let count=0;

while(pointer<=endMin && count<MAX_SIGNALS){

for(let pair of selected){

if(count>=MAX_SIGNALS) break;

let dir=biasMap[pair];
if(!dir) continue;

let clean=pair.replace("-OTC","");
signals.push("M1;"+clean+";"+padTime(pointer)+";"+dir);

pointer+=3;
count++;
}

pointer+=1;
}

if(signals.length===0){
output.innerText="No valid market structure found.";
status.innerText="0 Signals";
return;
}

output.innerText=
"HYBRID REAL FLOW\n━━━━━━━━━━━━━━\n"+
signals.join("\n")+
"\n━━━━━━━━━━━━━━\nEMA 9/21 Structure Based";

status.innerText="Generated "+signals.length+" Signals";
}
</script>

</body>
</html>
